    color: var(--text-primary);
  }
  .trv-program-meta {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 1px;
  }
  .trv-program-remove {
    width: 22px; height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-tertiary);
    font-size: 16px;
    cursor: pointer;
    border-radius: 50%;
    user-select: none;
  }
  .trv-program-remove:hover {
    background: var(--bg-danger);
    color: var(--text-danger);
  }
  .trv-save-row {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    padding-top: 16px;
    border-top: 0.5px solid var(--border-subtle);
  }
  /* Danger zone block — bottom of traveler edit form. Visually quieter than
     the save row, but clearly marked as destructive. */
  .trv-danger-zone {
    border: 0.5px solid var(--text-danger);
    border-radius: var(--radius-md);
    margin-top: 24px;
    padding: 0;
    overflow: hidden;
  }
  .trv-danger-zone-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--bg-danger);
    border-bottom: 0.5px solid var(--text-danger);
  }
  .trv-danger-zone-icon {
    font-size: 14px;
  }
  .trv-danger-zone-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-danger);
  }
  .trv-danger-zone-body {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
  }
  .trv-danger-zone-text { flex: 1; min-width: 0; }
  .trv-danger-zone-action-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
  }
  .trv-danger-zone-action-sub {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  /* Strong destructive button (used in modal Remove + danger zone). Red fill,
     deliberately less inviting than the primary blue button. */
  .btn-danger-strong {
    background: var(--text-danger);
    color: white !important;
    border: none;
  }
  .btn-danger-strong:hover { opacity: 0.9; }
  .btn-danger-strong.disabled,

  /* ============ MODAL ============ */

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal-sheet {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    max-height: 92%;
    background: var(--bg-card);

    overflow: hidden;

  .modal-handle {

  .nt-traveler-row {
    display: flex; gap: 6px;
    margin-bottom: 5px; align-items: center;
  }
  /* ----- FORM ELEMENT SAFETY -----
     Browsers give <input> / <select> / <textarea> an intrinsic min-content
     width based on their `size` attribute or content. In a flex container,
     this min-width overrides `width: 100%` and `flex: 1`, causing the
     container to grow horizontally as the user types — which then pushes
     parent containers (modals, the phone frame) outward. Lock this down
     globally with `min-width: 0` and `max-width: 100%`. Individual inputs
     can still set explicit widths if needed. */
  input, select, textarea {
    min-width: 0;
    max-width: 100%;
    box-sizing: border-box;
  }

  .nt-traveler-row input { flex: 1; min-width: 0; }
  .nt-primary-pill {
    font-size: 9px; font-weight: 500;

    max-width: 220px;
    max-height: 160px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border);
    cursor: pointer;
    transition: transform 0.1s;
  }
  .doc-photo-thumb:hover {
    transform: scale(1.02);
  }
  .doc-photo-thumb.masked {
    filter: blur(14px);
    cursor: pointer;
  }
  .doc-photo-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0, 0, 0, 0.65);
    color: white;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    backdrop-filter: blur(8px);
    pointer-events: auto;
  }

  /* Add photo button */
  .doc-photo-add {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    margin-top: 10px;
    padding: 24px 16px;
    background: var(--bg-card);
    border: 0.5px dashed var(--border-strong);
    border-radius: var(--radius-sm);
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }
  .doc-photo-add:hover {
    background: var(--bg-soft);
    border-style: solid;
  }
  .doc-photo-add-icon {
    font-size: 24px;
  }
  .doc-photo-add-text {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-accent);
  }
  .doc-photo-add-sub {
    font-size: 10px;
    color: var(--text-tertiary);
    margin-top: 1px;
  }
  /* When two .doc-photo-add cards are placed side-by-side (Take photo +
     Choose file), put them in a 2-col grid so each takes half the width. */
  .doc-photo-add-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 10px;
  }
  .doc-photo-add-row .doc-photo-add { margin-top: 0; padding: 18px 10px; }
  .doc-photo-add-row .doc-photo-add-sub { display: none; }

  /* Masked field row (input + Show button side-by-side) */
  .doc-masked-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Vaccination dose card */
  .vax-dose {
    background: var(--bg-soft);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .vax-dose-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 0.5px solid var(--divider);
  }
  .vax-dose-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  /* 2FA method picker setup */
  .sp-subsection-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 14px 0 6px;
    padding-top: 12px;
    border-top: 0.5px solid var(--divider);
  }
  .twofa-setup {
    margin-top: 14px;
    padding: 14px;
    background: var(--bg-soft);
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border);
  }
  .twofa-setup-title {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .twofa-setup-desc {
    font-size: 11px;
    color: var(--text-tertiary);
    line-height: 1.5;
  }
  .twofa-qr-wrapper {
    display: flex;
    gap: 14px;
    align-items: center;
    margin-top: 12px;
  }
  .twofa-qr-placeholder {
    width: 100px;
    height: 100px;
    background: white;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 4px;
    flex-shrink: 0;
  }
  .twofa-key { flex: 1; min-width: 0; }
  .twofa-key-label {
    font-size: 10px;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .twofa-key-value {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
    color: var(--text-primary);
    word-break: break-all;
    user-select: all;
    background: var(--bg-card);
    padding: 6px 8px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border);
  }
  .twofa-email-current {
    margin-top: 10px;
    padding: 8px 10px;
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
  }
  .twofa-email-label {
    font-size: 10px;
    color: var(--text-tertiary);
    margin-bottom: 2px;
  }
  .twofa-email-value {
    font-size: 12px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--text-primary);
  }

  /* Badges showing source of a field (from Settings / overridden) */
  .nt-source-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 500;
    color: var(--text-accent);
    background: var(--bg-accent);
    padding: 1px 7px;
    border-radius: 999px;
    margin-left: 4px;
    vertical-align: middle;
    letter-spacing: 0.2px;
  }
  .nt-source-badge.overridden {
    color: var(--text-warn);
    background: var(--bg-warn);
  }

  /* Hint inside preferences section */
  .nt-prefs-hint {
    font-size: 11px;
    color: var(--text-tertiary);
    margin: -4px 0 10px;
    line-height: 1.5;
  }

  /* Each preferences subsection gets a colored left stripe to visually
     separate Lodging / Cuisines / Sightseeing as the user scrolls. */
  .nt-pref-group {
    border: 0.5px solid rgba(0, 0, 0, 0.15);
    border-left: 4px solid var(--border-subtle);
    padding: 10px 12px 10px 12px;
    margin-bottom: 14px;
    border-radius: 0 4px 4px 0;
  }
  .nt-pref-group .nt-label {
    margin-bottom: 6px;
    font-weight: 600;
  }
  .nt-pref-lodging {
    border-left-color: #2563EB; /* blue */
    background: rgba(37, 99, 235, 0.04);
  }
  .nt-pref-cuisines {
    border-left-color: #D97706; /* amber */
    background: rgba(217, 119, 6, 0.04);
  }
  .nt-pref-sights {
    border-left-color: #059669; /* green */
    background: rgba(5, 150, 105, 0.04);
  }

  .nt-select {
    width: 100%;
    padding: 6px 8px;
    font-size: 12px;
    font-family: inherit;
    color: var(--text-primary);
    background: var(--bg-card);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    outline: none;
  }

  .nt-stay {
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px; margin-bottom: 6px;
  }
  .nt-stay-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 6px;
  }
  .nt-stay-label {
    font-size: 10px; font-weight: 500;
    color: var(--text-tertiary); text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .nt-stay-label.origin, .nt-stay-label.return { color: var(--text-accent); }
  .nt-stay-remove {
    font-size: 11px;
    color: var(--text-danger);
    cursor: pointer;
    user-select: none;
    padding: 1px 6px;
    border-radius: var(--radius-sm);
    font-weight: 500;
  }
  .nt-stay-remove:hover { background: var(--bg-danger); }
  .nt-stay-body { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 6px; }
  .nt-stay-body.two-col { grid-template-columns: 1.4fr 1fr; }
  .nt-stay-body input { padding: 6px 8px; font-size: 12px; }
  .nt-stay-body .nt-label { font-size: 10px; margin-bottom: 2px; }
  /* Grid children default to min-width: auto, equal to their min-content
     width. <input type="date"> has a wide min-content (the date format
     text), which pushes the grid's columns wider than the phone frame.
     Force shrinkability with min-width: 0 on every direct grid child. */
  .nt-stay-body > * { min-width: 0; }
  /* Multi-stay layout: city full width on top, dates below */
  .nt-stay-body > .nt-field {
    grid-column: 1 / -1;
    margin-bottom: 4px;
  }
  .nt-stay-body > .nt-field input { width: 100%; box-sizing: border-box; }
  .nt-stay-body > .two-col {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  /* Hint showing the computed dates for a stay (since user only enters nights now) */
  .nt-stay-date-hint {
    font-size: 10px;
    color: var(--text-secondary);
    margin-top: 4px;
    font-style: italic;
  }
  /* Window flexibility stepper on New Trip dialog */
  .nt-window-field {
    margin-top: 10px;
  }
  .nt-window-stepper {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nt-window-stepper input[type="number"] {
    width: 70px;
    padding: 6px 8px;
    font-size: 13px;
    text-align: center;
  }
  .nt-window-unit {
    font-size: 13px;
    color: var(--text-secondary);
  }
  .nt-transit {
    padding: 4px 0 4px 14px;
    position: relative;
  }
  .nt-transit::before {
    content: "";
    position: absolute;
    left: 17px; top: 0; bottom: 0;
    border-left: 1px dashed var(--border-strong);
  }
  .nt-transit-card {
    background: var(--bg-soft);
    border: 0.5px dashed var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 7px 10px;
    margin-left: 12px;
    font-size: 11px; color: var(--text-secondary);
  }
  .nt-transit-card strong { color: var(--text-primary); font-weight: 500; }
  .nt-transit-editable {
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .nt-transit-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nt-transit-label {
    font-size: 10px;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    width: 40px;
    flex-shrink: 0;
    font-weight: 500;
  }
  .nt-transit-select {
    flex: 1;
    padding: 5px 8px;
    font-size: 12px;
  }
  .nt-transit-overnight {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-top: 6px;
    margin-top: 4px;
    border-top: 0.5px solid var(--divider);
    font-size: 11px;
    color: var(--text-secondary);
    cursor: pointer;
    user-select: none;
  }
  .nt-transit-overnight input[type="checkbox"] {
    margin: 0;
    cursor: pointer;
    flex-shrink: 0;
  }
  .nt-transit-overnight-hint {
    color: var(--text-tertiary);
    font-size: 10px;
  }
  .nt-transit-between {
    text-align: center;
    padding: 6px 10px;
    font-style: italic;
    background: var(--bg-soft);
  }
  .nt-transit-label-inline {
    font-size: 10px;
    color: var(--text-tertiary);
  }
  .nt-add-stay {
    margin: 8px 0; padding: 9px;
    text-align: center; font-size: 12px;
    font-weight: 500;
    color: var(--text-accent);
    background: var(--bg-card);
    border: 0.5px dashed var(--text-accent);
    border-radius: var(--radius-sm);
    cursor: pointer; user-select: none;
    transition: background 0.1s;
  }
  .nt-add-stay:hover {
    background: var(--bg-accent);
    border-style: solid;
  }
  .nt-issues {
    margin: 0 18px 12px;
    padding: 10px 12px;
    background: var(--bg-warn);
    border-left: 3px solid var(--text-warn);
    border-radius: var(--radius-sm);
  }
  .nt-issues-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-warn);
    margin-bottom: 4px;
  }
  .nt-issues-list {
    margin: 0;
    padding-left: 18px;
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.55;
  }
  .nt-issues-list li {
    margin-bottom: 2px;
  }

  .modal-footer {
    padding: 12px 18px;
    border-top: 0.5px solid var(--border);
    display: flex; gap: 8px;
    flex-shrink: 0;
  }
  /* Stacked variant — used for the 3-button new-trip footer where the
     primary action sits on top of two secondary actions for visual
     hierarchy. */
  .modal-footer.modal-footer-stack {
    flex-direction: column;
  }
  .modal-footer.modal-footer-stack .btn {
    width: 100%;
  }
  .btn {
    flex: 1; padding: 10px;
    font-size: 14px; font-weight: 500;
    border-radius: var(--radius-sm);
    cursor: pointer;
    border: 0.5px solid var(--border-strong);
    background: var(--bg-card); color: var(--text-primary);
    user-select: none; text-align: center;
  }
  .btn:hover { background: var(--bg-surface); }
  .btn-primary {
    background: var(--text-primary); color: var(--text-invert);
    border-color: var(--text-primary);
  }
  .btn-primary.disabled {
    background: var(--border-strong); border-color: var(--border-strong);
    color: var(--bg-card); cursor: not-allowed; opacity: 0.7;
  }
  .btn-danger {
    background: var(--text-danger);
    color: var(--text-invert);
    border-color: var(--text-danger);
  }
  .btn-danger:hover { background: #8b2424; }
  .btn-danger.disabled {
    background: var(--border-strong);
    border-color: var(--border-strong);
    color: var(--bg-card);
    cursor: not-allowed;
    opacity: 0.6;
  }

  /* Trip actions section (bottom of itinerary) */
  .trip-actions {
    padding: 18px 16px 24px;
    border-top: 0.5px solid var(--divider);
    margin-top: 8px;
  }
  .trip-actions-title {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .trip-action {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px;
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: border-color 0.1s, background 0.1s;
  }
  .trip-action.danger:hover {
    background: var(--bg-danger);
    border-color: var(--text-danger);
  }
  .trip-action-icon {
    font-size: 18px;
    line-height: 1;
    margin-top: 1px;
    flex-shrink: 0;
  }
  .trip-action-text { flex: 1; }
  .trip-action-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-danger);
  }
  .trip-action-desc {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 2px;
    line-height: 1.4;
  }

  /* Delete dialog content */
  .delete-summary {
    background: var(--bg-soft);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-bottom: 14px;
  }
  .delete-summary-name {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .delete-summary-cities {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .delete-summary-stats {
    font-size: 12px;
    color: var(--text-tertiary);
  }
  .delete-warning {
    background: var(--bg-danger);
    border-left: 3px solid var(--text-danger);
    padding: 12px 14px;
    border-radius: var(--radius-sm);
  }
  .delete-warning-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-danger);
    margin-bottom: 4px;
  }
  .delete-warning-text {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
  }
  .delete-final-prompt {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 8px;
    line-height: 1.5;
  }
  .delete-final-name {
    background: var(--bg-soft);
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 14px;
    color: var(--text-primary);
    margin-bottom: 12px;
    border: 0.5px solid var(--border);
    user-select: all;
  }
  .delete-final-input {
    width: 100%;
    padding: 10px 12px;
    font-size: 14px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    outline: none;
    margin-bottom: 6px;
  }
  .delete-final-input:focus {
    border-color: var(--text-danger);
  }
  .delete-final-hint {
    font-size: 11px;
    color: var(--text-tertiary);
    line-height: 1.5;
  }

  /* DETAILS PHOTOS - gallery pattern (main image + thumbnail strip) */
  .details-photos {
    background: var(--bg-surface);
    position: relative;
    flex-shrink: 0;
  }
  .details-photo-main {
    height: 180px;
    background: linear-gradient(135deg, #B5C8D4 0%, #8BA7B8 100%);
    position: relative;
  }
  .details-photo-main-link {
    display: block;
    text-decoration: none;
    color: inherit;
    position: relative;
  }
  .details-photo-main-link:hover .details-photo-main::after {
    opacity: 1;
  }
  .details-photo-main::after {
    content: "";
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.15);
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
  }
  .details-photo-visit {
    position: absolute;
    bottom: 10px;
    right: 14px;
    background: rgba(0,0,0,0.6);
    color: white;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 999px;
    font-weight: 500;
    backdrop-filter: blur(8px);
    max-width: 55%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .details-close-floating {
    position: absolute;
    top: 10px; right: 10px;
    z-index: 3;
  }
  .details-photo-main::before {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.2), transparent 60%),
                radial-gradient(circle at 70% 70%, rgba(0,0,0,0.1), transparent 60%);
  }
  .details-photo-placeholder {
    position: absolute; bottom: 10px; left: 14px;
    background: rgba(0,0,0,0.5); color: white;
    font-size: 10px; padding: 3px 9px;
    border-radius: 999px; font-weight: 500;
    backdrop-filter: blur(8px);
  }
  .details-photo-strip {
    display: flex;
    gap: 4px;
    padding: 6px;
    background: var(--bg-card);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .details-photo-strip::-webkit-scrollbar { display: none; }
  .details-photo-thumb {
    width: 56px; height: 56px;
    border-radius: var(--radius-sm);
    flex-shrink: 0;
    cursor: pointer;
    background: linear-gradient(135deg, #B5C8D4 0%, #8BA7B8 100%);
    border: 1.5px solid transparent;
    transition: border-color 0.1s;
  }
  .details-photo-thumb:hover { border-color: var(--border-strong); }
  .details-photo-thumb.active {
    border-color: var(--text-primary);
  }
  .details-photo-thumb.more {
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-surface);
    color: var(--text-secondary);
    font-size: 11px;
    font-weight: 500;
  }
  .details-close {
    position: absolute; top: 10px; right: 10px;
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(0,0,0,0.5); color: white;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; user-select: none;
    backdrop-filter: blur(4px);
  }
  .details-body { padding: 16px 18px 18px; }
  .details-name { font-size: 18px; font-weight: 500; margin: 0 0 4px; }
  .details-sub {
    font-size: 12px; color: var(--text-secondary);
    display: flex; align-items: center; gap: 6px;
  }
  .details-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-tertiary); }
  .details-section {
    padding: 14px 0;
    border-top: 0.5px solid var(--divider);
  }
  .info-row {
    display: flex; align-items: flex-start;
    gap: 10px; padding: 6px 0;
    font-size: 12px;
  }
  .info-icon {
    width: 18px; color: var(--text-tertiary);
    flex-shrink: 0; font-size: 13px;
  }
  .info-value { flex: 1; color: var(--text-primary); }
  .info-value .sub { color: var(--text-secondary); font-size: 11px; display: block; margin-top: 1px; }
  .info-link {
    color: var(--text-primary);
    text-decoration: none;
    border-bottom: 0.5px solid var(--border);
  }
  .info-link:hover { border-bottom-color: var(--text-secondary); }
  .info-link-accent {
    color: var(--text-accent);
    font-weight: 500;
    border-bottom: none;
  }
  .info-link-accent:hover { text-decoration: underline; }
  .open-now { color: var(--text-success); font-weight: 500; }
  .hours-list {
    margin-top: 4px; font-size: 11px;
    color: var(--text-secondary); line-height: 1.8;
  }
  .hours-list .today { color: var(--text-primary); font-weight: 500; }
  .details-section-title {
    font-size: 10px; font-weight: 500;
    color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .review { padding: 8px 0; border-bottom: 0.5px solid var(--divider); }
  .review:last-child { border-bottom: none; }
  .review-top {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 3px;
  }

/* ============================================================
   LIVE DATA HELPERS (Day 16)
   ============================================================
   This block hosts integrations with free, no-key external APIs:
   - Nominatim (OSM geocoder): city autocomplete + lat/lng resolution
   - Open-Meteo: weather + timezone (coming soon in this session)
   - Frankfurter: currency rates (coming soon in this session)

   Design principles:
   - Every fetch is best-effort. Network failures must NEVER break the app —
     they fall back to the existing behavior (typed text accepted as-is).
   - Results are cached aggressively to respect rate limits and feel snappy.
   - Each helper exposes a small, named API the rest of the app can call.
*/

// ---- Nominatim (OSM geocoder) -------------------------------------------
// Free, no key. Required: identifying User-Agent, ≤1 req/sec.
// We debounce by 300ms (well over the rate limit for a single user typing),
// abort in-flight requests when a new keystroke supersedes, and cache by
// query string so backspace/retype is instant.
const NOMINATIM_BASE = "https://nominatim.openstreetmap.org";
const _nominatimCache = new Map(); // query → results array
let _nominatimAbort = null;

// Search for cities matching `query`. Resolves to an array of:
//   { name: "London", country: "United Kingdom", display: "London, England, UK",
//     lat: 51.5, lng: -0.12 }
// Returns [] on any failure (network, abort, empty) — never throws.
async function searchCities(query) {
  const q = (query || "").trim();
  if (q.length < 2) return [];
  if (_nominatimCache.has(q)) return _nominatimCache.get(q);

  // Cancel any previous in-flight request — we only care about the latest.
  if (_nominatimAbort) {
    try { _nominatimAbort.abort(); } catch (e) { /* ignore */ }
  }
  _nominatimAbort = new AbortController();

  const params = new URLSearchParams({
    q: q,
    format: "json",
    addressdetails: "1",
    limit: "6",
    // Restrict to populated places — keeps "Paris" from returning a
    // street named Paris or a Paris museum. Nominatim's featuretype
    // filter is the cleanest way to get cities, towns, and villages.
    featuretype: "city"
  });

  try {
    const res = await fetch(`${NOMINATIM_BASE}/search?${params}`, {
      signal: _nominatimAbort.signal,
      headers: {
        // Nominatim's usage policy requires an identifying header.
        // Browsers won't let us set User-Agent directly, so we use
        // Accept-Language as a soft identifier; the request still
        // sends our origin in the Referer header automatically.
        "Accept-Language": navigator.language || "en"
      }
    });
    if (!res.ok) return [];
    const raw = await res.json();
    const results = (raw || []).map(r => {
      // Nominatim's address object has city/town/village/county — pull the
      // most specific populated place name available.
      const a = r.address || {};
      const cityName = a.city || a.town || a.village || a.hamlet || a.municipality || r.name || "";
      const country = a.country || "";
      // Build a readable display string: "London, England, United Kingdom"
      const parts = [cityName];
      if (a.state && a.state !== cityName) parts.push(a.state);
      if (country) parts.push(country);
      return {
        name: cityName,
        country,
        display: parts.filter(Boolean).join(", "),
        lat: parseFloat(r.lat),
        lng: parseFloat(r.lon)
      };
    }).filter(r => r.name && !isNaN(r.lat) && !isNaN(r.lng));
    _nominatimCache.set(q, results);
    return results;
  } catch (e) {
    // AbortError is expected during fast typing; network errors fall back
    // to "no suggestions" which is graceful (the input still accepts text).
    return [];
  }
}

// Attach autocomplete to a text input. The dropdown is a sibling element
// inserted into the input's parent; it positions itself absolutely below.
// `onPick` receives the chosen result object and is responsible for
// updating app state. Falls back gracefully if Nominatim is unreachable.
function attachCityAutocomplete(input, onPick) {
  if (!input || input._acAttached) return;
  input._acAttached = true;

  // Day 16: wrap onPick so every successful pick registers the city
  // center in CITY_CENTERS. This is what lets the Map tab show real
  // tiles for newly-typed cities AND enables Foursquare backfill for
  // them (the backfill needs lat/lng to query nearby places).
  const wrappedOnPick = (pick) => {
    if (pick && pick.name && typeof pick.lat === "number" && typeof pick.lng === "number") {
      // Only register if not already present; curated entries (London/Paris/etc.)
      // have hand-tuned zoom and should NOT be overwritten by Nominatim's
      // generic city centroid.
      if (typeof CITY_CENTERS !== "undefined" && !CITY_CENTERS[pick.name]) {
        CITY_CENTERS[pick.name] = { lat: pick.lat, lng: pick.lng, zoom: 12 };
      }
    }
    if (typeof onPick === "function") onPick(pick);
  };

  // Create dropdown shell. We attach it to .nt-field (the input's parent)
  // because that has position:relative already in the new-trip CSS.
  const wrap = input.closest(".nt-field") || input.parentElement;
  if (wrap && getComputedStyle(wrap).position === "static") {
    wrap.style.position = "relative";
  }
  const dd = document.createElement("div");
  dd.className = "city-ac-dropdown";
  dd.style.display = "none";
  wrap.appendChild(dd);

  let activeIdx = -1;
  let currentResults = [];
  let debounceTimer = null;

  const closeDropdown = () => {
    dd.style.display = "none";
    activeIdx = -1;
  };

  const renderDropdown = (results) => {
    currentResults = results;
    if (results.length === 0) { closeDropdown(); return; }
    dd.innerHTML = results.map((r, i) => `
      <div class="city-ac-item ${i === activeIdx ? 'active' : ''}" data-idx="${i}">
        <div class="city-ac-name">${escapeHtml(r.name)}</div>
        <div class="city-ac-meta">${escapeHtml(r.display.replace(r.name + ", ", ""))}</div>
      </div>
    `).join("");
    dd.style.display = "block";
    dd.querySelectorAll(".city-ac-item").forEach(el => {
      // Use mousedown not click — click fires after the input's blur,
      // which would close the dropdown before the click registers.
      el.onmousedown = (e) => {
        e.preventDefault();
        const idx = parseInt(el.dataset.idx, 10);
        const pick = currentResults[idx];
        if (pick) {
          input.value = pick.name;
          closeDropdown();
          wrappedOnPick(pick);
        }
      };
    });
  };

  // The input already has an oninput handler (for state updates). We
  // chain ours by saving the existing one and calling it first, then
  // running the autocomplete fetch. This keeps backward-compat with
  // the existing form logic.
  const existingHandler = input.oninput;
  input.oninput = (e) => {
    if (typeof existingHandler === "function") existingHandler.call(input, e);
    const q = e.target.value;
    if (debounceTimer) clearTimeout(debounceTimer);
    if (!q || q.trim().length < 2) { closeDropdown(); return; }
    debounceTimer = setTimeout(async () => {
      const results = await searchCities(q);
      // Only show if the input still has this query (user might have typed more)
      if (input.value.trim() === q.trim()) renderDropdown(results);
    }, 300);
  };

  // Keyboard navigation: ↑ ↓ Enter Esc
  input.addEventListener("keydown", (e) => {
    if (dd.style.display === "none") return;
    if (e.key === "ArrowDown") {
      e.preventDefault();
      activeIdx = Math.min(activeIdx + 1, currentResults.length - 1);
      renderDropdown(currentResults);
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      activeIdx = Math.max(activeIdx - 1, 0);
      renderDropdown(currentResults);
    } else if (e.key === "Enter") {
      if (activeIdx >= 0 && currentResults[activeIdx]) {
        e.preventDefault();
        const pick = currentResults[activeIdx];
        input.value = pick.name;
        closeDropdown();
        wrappedOnPick(pick);
      }
    } else if (e.key === "Escape") {
      closeDropdown();
    }
  });

  // Close on blur (small delay so item mousedown wins the race)
  input.addEventListener("blur", () => setTimeout(closeDropdown, 150));
}

// ---- Foursquare Places (Day 16) -----------------------------------------
// Real places data for cities not in the curated PLACES catalog. Hybrid
// approach: curated cities (London/Paris/etc.) are untouched; Foursquare
// fills in for everything else, replacing the procedural sample data.
//
// Architecture notes:
// - Called from getCityPlaces() lazily, only when a non-curated city is
//   accessed. Results are stashed back into PLACES[city] so subsequent
//   reads are instant (in-memory cache).
// - Also persisted to localStorage with a 7-day TTL so reloads don't
//   re-hit the API. Foursquare data doesn't change minute-to-minute,
//   and free-tier quota is precious.
// - All calls are best-effort. Network errors, missing key, or quota
//   exhaustion fall back to procedural samples — the app NEVER breaks.
// - Three search calls per city (one per category). Caching means this
//   only happens once per city per week.

const FSQ_BASE = "https://api.foursquare.com/v3/places/search";
const FSQ_CACHE_KEY_PREFIX = "fsq:v1:";
const FSQ_CACHE_TTL_MS = 7 * 24 * 60 * 60 * 1000; // 7 days

// Category IDs from Foursquare's taxonomy. These are stable, documented
// at docs.foursquare.com/data-products/docs/categories.
// We use broad category groups for each app category so we get good
// coverage without over-specifying.
const FSQ_CATEGORIES = {
  stay:   "19009,19014,19021",  // Hotel, Hostel, Bed & Breakfast (Lodging group)
  dining: "13000",              // Dining and Drinking (top-level group, covers all restaurants)
  sights: "10000,16000"         // Arts & Entertainment + Landmarks & Outdoors
};

// Fields requested per mode. Conservative stays in Foursquare's Pro
// (free) tier; Rich adds Premium fields.
function fsqFieldsFor(mode) {
  const pro = ["fsq_id", "name", "geocodes", "location", "categories", "distance"];
  const premium = ["rating", "price", "tel", "website", "hours"];
  return (mode === "rich" ? [...pro, ...premium] : pro).join(",");
}

// In-flight de-duplication: if multiple call sites ask for the same
// (city, cat) at once during a render pass, share the same promise.
const _fsqInFlight = new Map();

// Read cache → in-flight → network. Returns a normalized array shaped
// like our PLACES[city][cat] catalog entries, OR null on any failure
// (caller falls back to procedural samples).
async function fetchFoursquarePlaces(city, lat, lng, cat) {
  if (!foursquareEnabled()) return null;
  if (typeof lat !== "number" || typeof lng !== "number") return null;
  if (!FSQ_CATEGORIES[cat]) return null;

  const cacheKey = `${FSQ_CACHE_KEY_PREFIX}${city}:${cat}:${FSQ_MODE}`;

  // 1. localStorage cache
  try {
    const raw = localStorage.getItem(cacheKey);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.t && (Date.now() - parsed.t) < FSQ_CACHE_TTL_MS) {
        return parsed.data;
      }
    }
  } catch (e) { /* corrupt cache entry, ignore */ }

  // 2. in-flight de-dup
  if (_fsqInFlight.has(cacheKey)) return _fsqInFlight.get(cacheKey);

  // 3. fetch
  const promise = (async () => {
    const params = new URLSearchParams({
      ll: `${lat},${lng}`,
      categories: FSQ_CATEGORIES[cat],
      radius: "5000",        // 5 km — matches the city-center scale of our maps
      limit: "20",
      sort: "POPULARITY",
      fields: fsqFieldsFor(FSQ_MODE)
    });

    try {
      const res = await fetch(`${FSQ_BASE}?${params}`, {
        headers: {
          "Accept": "application/json",
          "Authorization": FSQ_API_KEY,
          // Pin the API version so future Foursquare schema changes
          // don't silently break this integration.
          "X-Places-Api-Version": "2023-10-01"
        }
      });
      if (!res.ok) {
        // 401 = bad key, 429 = quota. Either way, we fall back to samples.
        // Log to console so the developer can diagnose; user sees nothing.
        console.warn(`Foursquare ${cat} for ${city}: HTTP ${res.status}`);
        return null;
      }
      const json = await res.json();
      const normalized = normalizeFoursquareResults(json.results || [], cat, city);

      // Persist for 7 days
      try {
        localStorage.setItem(cacheKey, JSON.stringify({ t: Date.now(), data: normalized }));
      } catch (e) { /* quota or private mode — silent */ }

      return normalized;
    } catch (e) {
      console.warn(`Foursquare fetch failed (${city}/${cat}):`, e.message);
      return null;
    } finally {
      _fsqInFlight.delete(cacheKey);
    }
  })();

  _fsqInFlight.set(cacheKey, promise);
  return promise;
}

// Shape Foursquare's API response into the same structure our PLACES
// catalog uses. This is the seam — every entry coming out of this
// function should be drop-in compatible with curated PLACES entries.
function normalizeFoursquareResults(results, cat, city) {
  return results.map(r => {
    const loc = r.location || {};
    const geo = r.geocodes?.main || {};
    const primaryCategory = r.categories?.[0];

    // Build tags from Foursquare's category short_name + price tier.
    // These tags feed the slot filters (cuisineFilters, typeFilters, etc.)
    // — see normalizePrefTag for the canonical short forms.
    const tags = [];
    if (primaryCategory?.short_name) tags.push(primaryCategory.short_name);
    if (r.price) {
      // FSQ price is 1-4. Convert to our $/$$/$$$/$$$$ tag form.
      tags.push("$".repeat(Math.max(1, Math.min(4, r.price))));
    }
    // Category-specific tag enrichment based on FSQ category name keywords.
    // Cheap heuristic; gets the common cases right and we can refine later.
    const catName = (primaryCategory?.name || "").toLowerCase();
    if (cat === "dining") {
      const cuisineMap = {
        "italian": "Italian", "french": "French", "japanese": "Japanese",
        "chinese": "Chinese", "thai": "Thai", "indian": "Indian",
        "mexican": "Mexican", "spanish": "Spanish", "greek": "Greek",
        "vietnamese": "Vietnamese", "korean": "Korean", "mediterranean": "Mediterranean",
        "steak": "Steak", "seafood": "Seafood", "cafe": "Cafe",
        "coffee": "Cafe", "bakery": "Cafe", "pizza": "Pizza"
      };
      for (const [key, tag] of Object.entries(cuisineMap)) {
        if (catName.includes(key) && !tags.includes(tag)) tags.push(tag);
      }
    }
    if (cat === "stay") {
      if (catName.includes("hotel")) tags.push("Hotel");
      else if (catName.includes("hostel")) tags.push("Hostel");
      else if (catName.includes("bed") || catName.includes("breakfast")) tags.push("B&B");
    }

    return {
      id: `fsq-${r.fsq_id}`,
      cat,
      name: r.name || "Place",
      meta: loc.locality || loc.region || primaryCategory?.name || "",
      // Rating only present in Rich mode; null in Conservative
      rating: typeof r.rating === "number" ? r.rating : null,
      reviews: null, // FSQ doesn't expose review count
      tags,
      lat: typeof geo.latitude === "number" ? geo.latitude : null,
      lng: typeof geo.longitude === "number" ? geo.longitude : null,
      address: loc.formatted_address || "",
      phone: r.tel || null,
      website: r.website || null,
      // Source marker so the UI can show a "Foursquare" attribution chip
      // in place of the rating row when no rating is present.
      _source: "foursquare"
    };
  }).filter(p => p.lat != null && p.lng != null); // drop entries without coords
}

// Kick off Foursquare backfill for a city we just resolved coords for.
// Fire-and-forget: the call will populate PLACES[city] when it returns,
// and a subsequent render() will pick up the new data. Safe to call
// repeatedly — the cache + in-flight de-dup handle it.
async function backfillFoursquareForCity(city, lat, lng) {
  if (!foursquareEnabled()) return;
  if (!city || typeof lat !== "number" || typeof lng !== "number") return;

  // Only backfill cities NOT in the curated catalog. Curated entries
  // are higher quality and we don't want to override them.
  if (CURATED_CITIES.has(city)) return;

  const cats = ["stay", "dining", "sights"];
  const results = await Promise.all(cats.map(c => fetchFoursquarePlaces(city, lat, lng, c)));
  if (!PLACES[city]) PLACES[city] = {};
  let changed = false;
  cats.forEach((c, i) => {
    const arr = results[i];
    if (arr && arr.length > 0) {
      // Replace the sample data with real Foursquare data.
      PLACES[city][c] = arr;
      changed = true;
    }
  });
  // Trigger a re-render so any open Plan/Map view picks up the new data.
  if (changed && typeof render === "function") render();
}

/* ============================================================
   PROCEDURAL CATALOG
   ============================================================
   When a user creates a trip in a city we don't have curated data for
   (anything outside London/Paris/Brussels/Tokyo/Kyoto/Lisbon), the Plan
   tab and Map would otherwise be empty. To keep the experience feeling
   populated, we procedurally generate 4 sample entries per category
   (stay, dining, sights) for any unknown city or any category that's
   missing for an otherwise-known city.

   - Names are plausible-but-fictional (no real-brand entries).
   - Each sample carries `sample: true` so the UI can show a small
     "sample" chip next to the name.
   - IDs are deterministic per (city, category, index) so they survive
     re-renders and selection persistence.
   - Coords are jittered around the city center if known; for fully
     unknown cities, coords are omitted and the Map will simply not
     show pins for that city (better than dropping pins in the ocean).
   - Transport is intentionally NOT generated — the existing transport
     option generator handles that elsewhere. */

const SAMPLE_NAME_POOL = {
  stay: [
    { name: "Hotel Monteverde",    meta: "Old town · 4-star",      rating: 4.5, tags: ["Boutique", "Central"] },
    { name: "The Old Quarter Inn", meta: "Historic district · 3-star", rating: 4.2, tags: ["Charming", "Quiet"] },

};

// Deterministic small jitter so a city's sample pins land in a believable
// scatter around the center rather than stacked on one point. Mirrors
// jitterFromId's style but uses (city, cat, idx) as the seed.
function _sampleJitter(city, cat, idx) {
  let h = 0;
  const seed = `${city}|${cat}|${idx}`;
  for (let i = 0; i < seed.length; i++) h = ((h << 5) - h + seed.charCodeAt(i)) | 0;
  // ~0.005° = ~500m at most latitudes; gives a realistic urban scatter
  const latOff = ((h % 1000) / 1000 - 0.5) * 0.012;
  const lngOff = (((h >> 10) % 1000) / 1000 - 0.5) * 0.012;
  return { latOff, lngOff };
}

// Build the sample list for one (city, category) pair. Coords omitted when
// the city center is unknown; the Map will then skip the pin gracefully.
function _generateSamples(city, cat) {
  const center = CITY_CENTERS[city];
  return SAMPLE_NAME_POOL[cat].map((tmpl, i) => {
    const id = `sample-${cat}-${city.replace(/\s+/g, "_")}-${i}`;
    const entry = {
      id,
      cat,
      name: tmpl.name,
      meta: tmpl.meta,
      rating: tmpl.rating,
      reviews: 0,
      tags: tmpl.tags,
      sample: true   // UI flag → "sample" chip
    };
    if (center) {
      const j = _sampleJitter(city, cat, i);
      entry.lat = center.lat + j.latOff;
      entry.lng = center.lng + j.lngOff;
    }
    return entry;
  });
}

// Backfill PLACES[city] with sample entries for any missing categories.
// Idempotent: only fills what's empty/missing. Curated entries are never
// overwritten or merged into. Call this whenever code is about to read
// from PLACES[city] for a category.
function ensureCityPlaces(city) {
  if (!city) return;
  if (!PLACES[city]) PLACES[city] = {};
  const bucket = PLACES[city];
  ["stay", "dining", "sights"].forEach(cat => {
    if (!bucket[cat] || bucket[cat].length === 0) {
      bucket[cat] = _generateSamples(city, cat);
    }
  });
}

// Read accessor — auto-backfills before returning. All read sites should use
// this rather than raw `PLACES[city]` so sample data is guaranteed.
//
// Day 16: also kicks off (fire-and-forget) a Foursquare backfill for cities
// not in the curated catalog. Returns samples synchronously so existing
// callers don't have to await. When the network call returns, PLACES[city]
// is upgraded to real data and render() is invoked → next render uses it.
const _fsqBackfillAttempted = new Set(); // cities we've already tried this session
function getCityPlaces(city) {
  ensureCityPlaces(city);

  // Foursquare backfill: only when key is set, city isn't curated, and we
  // haven't already attempted this session. The 7-day localStorage cache
  // inside fetchFoursquarePlaces handles the cross-session story.
  if (city && foursquareEnabled() && !CURATED_CITIES.has(city) && !_fsqBackfillAttempted.has(city)) {
    _fsqBackfillAttempted.add(city);
    const center = CITY_CENTERS[city];
    if (center) {
      // Fire-and-forget; backfillFoursquareForCity will call render() if it
      // successfully replaces sample data with real entries.
      backfillFoursquareForCity(city, center.lat, center.lng);
    }
    // Note: if the city has no CITY_CENTERS entry, we currently skip the
    // backfill. Next step (when wiring the New Trip dialog's autocomplete
    // pick → CITY_CENTERS), we'll be able to backfill those too.
  }

  return PLACES[city] || {};
}

// Trips (the Europe trip is the active demo)
// Trips start empty — users build their own from scratch via "+ New" or the
// "Plan a new trip" buttons on the Home and Trips screens.
const trips = [];

/* ============================================================
   PERSISTENCE — localStorage (saves your changes between sessions)
   ============================================================ */

const STORAGE_KEY = "myTravelAgent.v1";
const STORAGE_VERSION = 2;
// v1 → v2: demo trips removed; existing saved trips wiped on first load.
// Profile (user) and preferences (userSettings) are preserved.
let _saveDebounce = null;

// Sets aren't JSON-serializable. We tag them so they round-trip correctly.
function serializeSettings(s) {
  const out = {};
  for (const k in s) {
    const v = s[k];
    if (v instanceof Set) out[k] = { __set: true, items: [...v] };
    else out[k] = v;
  }
  return out;
}
function deserializeSettings(o) {
  const out = {};
  for (const k in o) {
    const v = o[k];
    if (v && typeof v === "object" && v.__set) out[k] = new Set(v.items);
    else out[k] = v;
  }
  return out;
}

// Save: writes the entire user-owned state. Called automatically after every change.
function saveToStorage() {
  try {
    const payload = {
      version: STORAGE_VERSION,
      savedAt: Date.now(),
      userSettings: serializeSettings(userSettings),
      trips: trips,
      user: user
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  } catch (e) {
    // Quota exceeded, private mode, etc. — don't crash the app
    console.warn("Could not save to localStorage:", e.message);
  }
}

// Debounced save: wait 150ms after the last change before writing.
// Avoids hammering localStorage during rapid input (like typing in a name field).
// 150ms is short enough that a quick refresh after a click usually still
// catches the save, but long enough to coalesce typing.
function persist() {
  clearTimeout(_saveDebounce);
  _saveDebounce = setTimeout(saveToStorage, 150);
}

// Force any pending debounced save to flush immediately. Called when the page
// is being hidden or unloaded so we don't lose the user's most recent change.
function flushPendingSave() {
  if (_saveDebounce) {
    clearTimeout(_saveDebounce);
    _saveDebounce = null;
    saveToStorage();
  }
}

// Mobile/tab-switch save guard. Browsers don't reliably fire `unload` on
// modern mobile (especially iOS Safari) — they fire `pagehide` and
// `visibilitychange` instead. Listening to all three covers desktop and
// mobile, and the flush is idempotent so duplicate calls are safe.
window.addEventListener("pagehide", flushPendingSave);
window.addEventListener("beforeunload", flushPendingSave);
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "hidden") flushPendingSave();
});

// Load: pull saved state on page load. If there's no saved data or the format is
// incompatible, fall back to demo data.
function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);

    // Version mismatch: run a migration. We try to keep what we can —
    // specifically the user profile and preferences — and discard whatever
    // the new version's schema can't carry forward.
    if (data.version !== STORAGE_VERSION) {
      console.warn(`Saved data is from version ${data.version}; migrating to ${STORAGE_VERSION}.`);
      // v1 → v2 migration: drop saved trips (schema unchanged but the v2
      // build ships with an empty trips list and the user explicitly asked
      // to start over). Keep user + userSettings.
      if (data.userSettings) {
        const savedSettings = deserializeSettings(data.userSettings);
        for (const k in savedSettings) userSettings[k] = savedSettings[k];
      }
      if (data.user) Object.assign(user, data.user);
      // Persist the migrated state immediately so the version stamp updates
      // and we don't run this branch again on the next load.
      saveToStorage();
      return true;
    }

    // Same version — restore everything.
    const savedSettings = deserializeSettings(data.userSettings);
    for (const k in savedSettings) {
      userSettings[k] = savedSettings[k];
    }
    trips.length = 0;
    for (const t of data.trips) trips.push(t);
    if (data.user) Object.assign(user, data.user);
    return true;
  } catch (e) {
    console.warn("Could not load from localStorage:", e.message);
    return false;
  }
}

// Reset: wipe saved state and reload to get fresh demo data.
function resetAllData() {
  try {
    localStorage.removeItem(STORAGE_KEY);
  } catch (e) {}
  location.reload();
}

function currentTrip() {
  // In trip edit mode, render against the draft so changes are isolated until Save
  if (app.editMode && app.tripDraft && app.tripDraft.id === app.activeTripId) {
    return app.tripDraft;
  }
  return trips.find(t => t.id === app.activeTripId);
}

/* ============================================================
   TRAVELER helpers — globals + trip resolution
   ============================================================ */

// Look up a traveler in the global roster.
function findTraveler(travelerId) {
  if (!travelerId) return null;
  return userSettings.travelers.find(tr => tr.id === travelerId) || null;
}

// Returns the array of traveler objects for a trip, resolving travelerId
// references to the global roster. Falls back to the inline `name` if the
// referenced traveler doesn't exist (handles old data and deleted travelers).
function tripTravelers(t) {
  if (!t || !t.travelers) return [];
  return t.travelers.map(ref => {
    const global = findTraveler(ref.travelerId);
    if (global) {
      // Merge: global profile + per-trip flags (primary)
      return { ...global, primary: ref.primary, _ref: ref };
    }
    // Legacy/missing — fall back to inline name so old trips still render
    return {
      id: ref.travelerId || `legacy-${ref.id || ref.name || 'unknown'}`,
      name: ref.name || "(removed traveler)",
      primary: ref.primary,
      _ref: ref,
      _orphaned: !ref.travelerId
    };
  });
}

// Generate a new traveler ID.
function newTravelerId() {
  return "trv-" + Math.random().toString(36).slice(2, 9);
}

// Add a traveler to the global roster. Returns the new traveler object.
function addGlobalTraveler(data) {
  const trv = {
    id: newTravelerId(),
    name: (data.name || "").trim(),
    birthday: data.birthday || "",
    gender: data.gender || "",
    primary: false,    // primary is set per-account; new travelers are companions
    frequentFlyer: data.frequentFlyer || [],
    loyaltyPrograms: data.loyaltyPrograms || [],
    knownTravelerNumber: data.knownTravelerNumber || "",
    redressNumber: data.redressNumber || ""
  };
  userSettings.travelers.push(trv);
  persist();
  return trv;
}

// Update a traveler. Special handling for `primary`: only one traveler can be
// primary at a time, so setting primary=true clears it on others.
function updateGlobalTraveler(travelerId, updates) {
  const trv = findTraveler(travelerId);
  if (!trv) return;
  if (updates.primary === true) {
    userSettings.travelers.forEach(t => { t.primary = false; });
  }
  Object.assign(trv, updates);
  persist();
}

// Remove a traveler from the global roster + drop them from any trip's
// roster. Won't remove the primary (must demote first).
function removeGlobalTraveler(travelerId) {
  const trv = findTraveler(travelerId);
  if (!trv) return;
  if (trv.primary) {
    showToast("Can't remove the primary traveler — demote first");
    return;
  }

  // Cascade-delete documents owned by this traveler so we don't leave
  // orphaned data. Multi-record arrays: filter out matching travelerId.
  // Single-record objects (globalEntry, tsaPreCheck, insurance): clear if
  // owned by this traveler.
  const docs = userSettings.documents || {};
  ["passports", "driversLicenses", "visas", "vaccinations"].forEach(cat => {
    if (Array.isArray(docs[cat])) {
      docs[cat] = docs[cat].filter(d => d.travelerId !== travelerId);
    }
  });
  ["globalEntry", "tsaPreCheck", "insurance"].forEach(cat => {
    if (docs[cat] && docs[cat].travelerId === travelerId) {
      docs[cat] = {};
    }
  });

  // Remove the traveler itself (which deletes their loyalty programs since
  // those live on the traveler object).
  userSettings.travelers = userSettings.travelers.filter(t => t.id !== travelerId);

  // Remove from every trip's roster
  trips.forEach(t => {
    if (t.travelers) {
      t.travelers = t.travelers.filter(ref => ref.travelerId !== travelerId);
    }
  });
  persist();
}

// One-time migration: move legacy userSettings.loyalty (Set of program names)
// + loyaltyNumbers (program → number hash) into the primary traveler's
// frequentFlyer / loyaltyPrograms arrays. Idempotent — won't duplicate
// programs that already exist on the traveler.
function migrateLegacyLoyaltyToPrimary() {
  if (!userSettings.loyalty || userSettings.loyalty.size === 0) return;
  const primary = userSettings.travelers.find(t => t.primary);
  if (!primary) return;

  // Categorize programs as "travel" (flight/rail/car/cruise) or "lodging" (hotel)
  // by looking them up in the catalogs.
  const travelSet  = new Set(CATALOG.travelLoyalty);
  const lodgingSet = new Set(CATALOG.lodgingLoyalty);

  // Index existing programs on the primary traveler so we don't add duplicates
  const haveFF = new Set((primary.frequentFlyer || []).map(p => p.program.toLowerCase()));
  const haveLP = new Set((primary.loyaltyPrograms || []).map(p => p.program.toLowerCase()));

  let migrated = 0;
  userSettings.loyalty.forEach(program => {
    const number = (userSettings.loyaltyNumbers && userSettings.loyaltyNumbers[program]) || "";
    if (travelSet.has(program) && !haveFF.has(program.toLowerCase())) {
      if (!Array.isArray(primary.frequentFlyer)) primary.frequentFlyer = [];
      primary.frequentFlyer.push({ program, number, status: "" });
      migrated++;
    } else if (lodgingSet.has(program) && !haveLP.has(program.toLowerCase())) {
      if (!Array.isArray(primary.loyaltyPrograms)) primary.loyaltyPrograms = [];
      primary.loyaltyPrograms.push({ program, number, status: "" });
      migrated++;
    }
  });

  if (migrated > 0) {
    persist();
  }
  // We leave the legacy fields in place rather than deleting them — keeps
  // backward-compat for any old code path we might have missed. They're just
  // dormant once the migration runs.
}

// Documents belonging to a specific traveler. Pulls from the unified doc vault
// (userSettings.documents.*) by filtering on travelerId. Returns a flat array
// of {kind, doc} so the UI can render mixed doc types.
function travelerDocuments(travelerId) {
  const docs = userSettings.documents || {};
  const out = [];
  (docs.passports || []).forEach(d => { if (d.travelerId === travelerId) out.push({ kind: "passport", doc: d }); });
  (docs.driversLicenses || []).forEach(d => { if (d.travelerId === travelerId) out.push({ kind: "driversLicense", doc: d }); });
  (docs.visas || []).forEach(d => { if (d.travelerId === travelerId) out.push({ kind: "visa", doc: d }); });
  (docs.vaccinations || []).forEach(d => { if (d.travelerId === travelerId) out.push({ kind: "vaccination", doc: d }); });
  if (docs.globalEntry && docs.globalEntry.travelerId === travelerId) out.push({ kind: "globalEntry", doc: docs.globalEntry });
  if (docs.tsaPreCheck && docs.tsaPreCheck.travelerId === travelerId) out.push({ kind: "tsaPreCheck", doc: docs.tsaPreCheck });
  if (docs.insurance && docs.insurance.travelerId === travelerId) out.push({ kind: "insurance", doc: docs.insurance });
  return out;
}

// Derive the effective bucket for a trip:
// If the return date has passed, it's "past" regardless of stored status.
// Otherwise use the stored status ("planning" or "pending").
function tripBucket(t) {
  const today = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
  if (t.returnDate < today) return "past";
  return t.status === "pending" ? "pending" : "planning";
}

// Move a trip between Planning and Pending (Past is computed, can't be set)
function setTripBucket(tripId, bucket) {
  const t = trips.find(x => x.id === tripId);
  if (!t) return;
  t.status = bucket;
  showToast(`Moved to ${bucket.charAt(0).toUpperCase() + bucket.slice(1)}`);
  persist();
  render();
}

// Deep clone for the draft buffer: handles Sets, arrays, plain objects, primitives
function cloneForDraft(val) {
  if (val instanceof Set) return new Set(val);
  if (Array.isArray(val)) return val.map(cloneForDraft);
  if (val !== null && typeof val === "object") {
    const out = {};
    for (const k in val) out[k] = cloneForDraft(val[k]);
    return out;
  }
  return val;
}

function startEdit() {
  // Traveler detail uses direct input save, no draft needed
  if (app.screen === "settings" && app.settingsPage === "travelers" && app.travelerEditId) {
    app.editMode = true;
    render();
    return;
  }
  // Deep-copy the relevant parts of userSettings so changes don't leak
  app.draft = {};
  for (const key in userSettings) {
    app.draft[key] = cloneForDraft(userSettings[key]);
  }
  app.editMode = true;
  render();
}

function cancelEdit() {
  app.draft = null;
  app.editMode = false;
  render();
}

function saveEdit() {
  // Special path for the traveler detail page: read inputs directly and persist
  // via updateGlobalTraveler. The traveler detail page doesn't use the draft
  // mechanism since travelers live in their own array, not the prefs hash.
  if (app.screen === "settings" && app.settingsPage === "travelers" && app.travelerEditId) {
    const nameEl = document.getElementById("trv-name");
    const bdayEl = document.getElementById("trv-birthday");
    const genderEl = document.getElementById("trv-gender");
    const ktnEl = document.getElementById("trv-ktn");
    const redressEl = document.getElementById("trv-redress");
    if (nameEl && !nameEl.value.trim()) {
      showToast("Name is required");
      return;
    }
    updateGlobalTraveler(app.travelerEditId, {
      name: nameEl ? nameEl.value.trim() : undefined,
      birthday: bdayEl ? bdayEl.value : undefined,
      gender: genderEl ? genderEl.value : undefined,
      knownTravelerNumber: ktnEl ? ktnEl.value.trim() : undefined,
      redressNumber: redressEl ? redressEl.value.trim() : undefined
    });
    app.editMode = false;
    showToast("Traveler saved");
    render();
    return;
  }
  if (!app.draft) return;
  // Commit the draft back to userSettings
  for (const key in app.draft) {
    userSettings[key] = app.draft[key];
  }

  // Sync the new global preferences into any trip slots that haven't been
  // committed yet. Without this, slots that were initialized at trip-create
  // time keep their old filter snapshot forever — so Settings changes never
  // visibly affect existing trips. We only touch slots with no `selectedIds`
  // / `selectedOptionId` so we don't blow away genuinely customized filters
  // for trips where the user has already made picks.
  const lodgingArr = [...(userSettings.lodging || [])];
  const amenitiesArr = [...(userSettings.amenities || [])];
  const cuisinesArr = [...(userSettings.cuisines || [])];
  const pricesArr = [...(userSettings.prices || [])];
  const mealsArr = [...(userSettings.meals || [])];
  const sightsArr = [...(userSettings.sights || [])];
  const newPace = userSettings.pace;
  for (const trip of trips) {
    const sel = trip.selections;
    if (!sel) continue;
    Object.values(sel.stay || {}).forEach(slot => {
      // Don't blow away filters if the user has committed any selection
      // (legacy selectedOptionId OR new bookings array).
      if (slot && !slot.selectedOptionId && (!slot.bookings || slot.bookings.length === 0)) {
        slot.typeFilters = [...lodgingArr];
        slot.amenityFilters = [...amenitiesArr];
      }
    });
    Object.values(sel.dining || {}).forEach(slot => {
      if (slot && (!slot.selectedIds || slot.selectedIds.length === 0)) {
        slot.cuisineFilters = [...cuisinesArr];
        slot.priceFilters = [...pricesArr];
        slot.mealFilters = [...mealsArr];
      }
    });
    Object.values(sel.sights || {}).forEach(slot => {
      if (slot && (!slot.selectedIds || slot.selectedIds.length === 0)) {
        slot.interestFilters = [...sightsArr];
        slot.paceFilter = newPace;
      }
    });
  }

  app.draft = null;
  app.editMode = false;
  showToast("Changes saved");
  persist();
  render();
}

// Returns the value to display: draft if editing, otherwise the saved setting
function effective(group) {
  return (app.editMode && app.draft) ? app.draft[group] : userSettings[group];
}

// Escape a JS value (string) for safe embedding inside a double-quoted HTML attribute
// like: onclick="someFn(${attrJS('foo&bar')})"
// Produces a single-quoted JS string with HTML-safe entities, e.g., 'foo&amp;bar'
function attrJS(s) {
  return "'" + String(s)
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/\n/g, "\\n") + "'";
}

function switchTab(tab) {
  app.tab = tab;
  app.selectedPinId = null;
  app.itineraryDetail = null;
  app.itineraryDay = null;
  app.detailReturnTab = null;
  // Reset Plan drill-down so tapping the Plan tab from a Plan detail page
  // returns to the Plan overview, not whichever sub-screen they were on.
  app.selectionCategory = null;
  app.selectionSlotId = null;
  render();
  document.getElementById("screen-area").scrollTop = 0;
}

function renderTopBar() {
  const bar = document.getElementById("top-bar");

  // Reusable pencil/spacer HTML for any editable settings page.
  // Pencil shown when not editing → tap to enter edit mode.
  // Spacer shown when editing → keeps title centered (Save/Cancel are at bottom).
  const settingsEditIcon = (() => {
    if (app.screen !== "settings") return `<div class="top-bar-spacer"></div>`;
    if (!settingsPageIsEditable(app.settingsPage)) return `<div class="top-bar-spacer"></div>`;
    if (app.editMode) return `<div class="top-bar-spacer"></div>`;
    return `<div class="top-bar-icon" onclick="startEdit()" title="Edit">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            </div>`;
  })();

  if (app.screen === "home") {
    bar.innerHTML = `
      <div class="top-bar-spacer"></div>
      <div class="top-bar-title top-bar-title-centered">My Travel Agent</div>
      <div class="top-bar-spacer"></div>
    `;
  } else if (app.screen === "trips") {
    bar.innerHTML = `
      <span class="top-bar-back" onclick="goto('home')">← Home</span>
      <div class="top-bar-flex"></div>
      <div class="top-bar-title top-bar-title-centered">My Trips</div>
      <span class="top-bar-link" onclick="openNewTrip()">+ New</span>
      <div class="top-bar-icon" onclick="goto('settings')" title="Settings">⚙</div>
    `;
  } else if (app.screen === "trip") {
    const t = currentTrip();
    // Synthesize the back action based on current state — drill out one level at a time
    // rather than always jumping back to the trip list.
    let backLabel, backHandler;
    if (app.itineraryDetail) {
      // On an Itinerary detail page → back to wherever we came from.
      // detailReturnTab === "map" means the user arrived here by tapping
      // "Open in Itinerary" on a Map pin popup, and expects the back
      // button to return them to the Map (not bounce them to the
      // Itinerary day list, which is what backFromTripScreen does by default).
      if (app.detailReturnTab === "map") {
        backLabel = "Map";
      } else {
        backLabel = "Itinerary";
      }
      backHandler = "backFromTripScreen()";
    } else if (app.tab === "plan" && app.selectionCategory && app.selectionSlotId) {
      // On a Plan detail page (e.g., specific leg) → back to category list
      const labels = { transport: "Transport", stay: "Stays", dining: "Dining", sights: "Sights" };
      backLabel = labels[app.selectionCategory] || "Plan";
      backHandler = "backFromTripScreen()";
    } else if (app.tab === "plan" && app.selectionCategory) {
      // On a Plan category list → back to Plan overview
      backLabel = "Plan";
      backHandler = "backFromTripScreen()";
    } else {
      // Top-level tab (Plan overview, Itinerary day list, Map) → back to trip list
      backLabel = "Trips";
      backHandler = "backFromTripScreen()";
    }
    const tripBucketState = t ? tripBucket(t) : "past";
    const tripEditable = tripBucketState !== "past";
    const editIconHtml = tripEditable
      ? `<div class="top-bar-icon" onclick="openNewTrip(currentTrip())" title="Edit trip">
           <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
         </div>`
      : "";
    bar.innerHTML = `
      <span class="top-bar-back" onclick="${backHandler}">← ${backLabel}</span>
      <div class="top-bar-flex"></div>
      <div class="top-bar-title top-bar-title-centered">${t?.name || ""}</div>
      ${editIconHtml}

  } else if (app.screen === "settings") {
    if (app.settingsPage === "documents" && app.documentCategory && app.documentId) {
      // Document detail: back to traveler (if we came from one) or to category list
      const backTarget = app.docReturnTraveler
        ? `gotoTravelerDetail('${app.docReturnTraveler}')`
        : `gotoDocCategory('${app.documentCategory}')`;
      const backLabel = app.docReturnTraveler
        ? (findTraveler(app.docReturnTraveler)?.name || "Traveler")
        : docCategoryLabel(app.documentCategory);
      bar.innerHTML = `
        <span class="top-bar-back" onclick="${backTarget}">← ${backLabel}</span>

      const backTarget = app.docReturnTraveler
        ? `gotoTravelerDetail('${app.docReturnTraveler}')`

      const backLabel = app.docReturnTraveler
        ? (findTraveler(app.docReturnTraveler)?.name || "Traveler")
        : "Settings";
      bar.innerHTML = `
        <span class="top-bar-back" onclick="${backTarget}">← ${backLabel}</span>
        <div class="top-bar-flex"></div>
        <div class="top-bar-title top-bar-title-centered">${docCategoryLabel(app.documentCategory)}</div>
        ${settingsEditIcon}
      `;
    } else if (app.settingsPage === "travelers" && app.travelerEditId) {
      const trv = findTraveler(app.travelerEditId);
      // When viewing: pencil to enter edit mode. When editing: no icon —
      // Save/Cancel live at the bottom of the form.
      const editIconHtml = !app.editMode
        ? `<div class="top-bar-icon" onclick="startEdit()" title="Edit traveler">
             <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
           </div>`
        : `<div class="top-bar-spacer"></div>`;
      bar.innerHTML = `

      const titles = {

        dining: "Dining preferences",
        sights: "Sightseeing preferences",
        notifications: "Notifications",
        app: "Display & units",

        lock: "App lock",
        privacy: "Privacy & data",

}

function renderScreen() {
  const area = document.getElementById("screen-area");
  if (app.screen === "home") renderHome(area);
  else if (app.screen === "trips") renderTripsList(area);
  else if (app.screen === "trip") renderTripDetail(area);
  else if (app.screen === "settings") renderSettings(area);
}

function renderTabBar() {
  const bar = document.getElementById("tab-bar");
  bar.classList.toggle("hidden", app.screen !== "trip");
  bar.querySelectorAll(".tab").forEach(t => {
    t.classList.toggle("active", t.dataset.tab === app.tab);
    t.onclick = () => switchTab(t.dataset.tab);
  });
}

function renderFab() {
  const fab = document.getElementById("fab");
  fab.classList.add("hidden");

  // Day 16: position the assistant FAB based on whether the tab bar is
  // currently visible. When the tab bar is hidden (home, trips list,
  // settings screens) the FAB sits lower so it's not floating in dead
  // space. When tab bar is visible (trip detail) it sits above it.
  const assistFab = document.getElementById("fab-assist");
  const tabBar = document.getElementById("tab-bar");
  if (assistFab && tabBar) {
    if (tabBar.classList.contains("hidden")) {
      assistFab.classList.add("tab-bar-hidden");
    } else {
      assistFab.classList.remove("tab-bar-hidden");
    }
  }
}

function renderTripsList(area) {

  const fmtDateRange = (t) => {
    const s = new Date(t.originDate + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
    const e = new Date(t.returnDate + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    return `${s} – ${e}`;
  };
  const dayCount = (t) => {
    const diff = Math.round((new Date(t.returnDate + "T00:00:00") - new Date(t.originDate + "T00:00:00")) / 86400000);
    return diff + " days";
  };

  // Bucket every trip into one of the three groups
  const planningTrips = trips.filter(t => tripBucket(t) === "planning");
  const pendingTrips = trips.filter(t => tripBucket(t) === "pending");
  const pastTrips = trips.filter(t => tripBucket(t) === "past");

  const counts = {
    planning: planningTrips.length,
    pending: pendingTrips.length,
    past: pastTrips.length
  };
  const visibleTrips = {
    planning: planningTrips,
    pending: pendingTrips,
    past: pastTrips
  }[app.tripsBucket];

  const bucketDescription = {
    planning: "Trips you're still figuring out — flexible dates, ideas, no bookings yet.",
    pending: "Booked and locked in — countdown until departure.",
    past: "Trips you've already taken."
  }[app.tripsBucket];

  // Card status pill class names
  const pillClass = (b) => `trip-card-status ${b}`;
  const pillLabel = (b) => ({ planning: "Planning", pending: "Pending", past: "Past" })[b];

  // Move action: the destination depends on current bucket
  const moveActionFor = (t) => {
    const b = tripBucket(t);
    if (b === "planning") {
      return `<span class="trip-card-move" onclick="event.stopPropagation(); setTripBucket('${t.id}', 'pending')" title="Mark as booked">Move to Pending →</span>`;
    }
    if (b === "pending") {
      return `<span class="trip-card-move" onclick="event.stopPropagation(); setTripBucket('${t.id}', 'planning')" title="Move back to Planning">← Move to Planning</span>`;
    }
    return ""; // past trips can't be moved
  };

  // Delete action: same two-step flow as Trip Detail
  const deleteActionFor = (t) => {
    return `<span class="trip-card-delete" onclick="event.stopPropagation(); openDeleteTripDialog('${t.id}')" title="Delete this trip">Delete</span>`;
  };

  area.innerHTML = `
    <div class="bucket-tabs">
      <div class="bucket-tab ${app.tripsBucket === 'planning' ? 'active' : ''}" onclick="app.tripsBucket='planning'; render()">
        <span>Planning</span>
        ${counts.planning > 0 ? `<span class="bucket-count">${counts.planning}</span>` : ''}
      </div>
      <div class="bucket-tab ${app.tripsBucket === 'pending' ? 'active' : ''}" onclick="app.tripsBucket='pending'; render()">
        <span>Pending</span>
        ${counts.pending > 0 ? `<span class="bucket-count">${counts.pending}</span>` : ''}
      </div>
      <div class="bucket-tab ${app.tripsBucket === 'past' ? 'active' : ''}" onclick="app.tripsBucket='past'; render()">
        <span>Past</span>
        ${counts.past > 0 ? `<span class="bucket-count">${counts.past}</span>` : ''}
      </div>
    </div>

    <div class="bucket-description">${bucketDescription}</div>

    <div class="trips-list">
      ${visibleTrips.length === 0 ? `
        <div class="bucket-empty">
          <div class="bucket-empty-text">No ${app.tripsBucket} trips ${app.tripsBucket === 'past' ? 'yet' : ''}.</div>
          ${app.tripsBucket !== 'past' ? `<span class="btn btn-small btn-primary" onclick="openNewTrip()">+ Plan a new trip</span>` : ''}
        </div>
      ` : visibleTrips.map(t => `
        <div class="trip-card" onclick="goto('trip', '${t.id}')">
          <div class="trip-card-name">${t.name}</div>
          <div class="trip-card-cities">${t.cities.join(" · ")}</div>
          <div class="trip-card-meta">
            <span>${fmtDateRange(t)}</span>
            <span>·</span>
            <span>${dayCount(t)}</span>
          </div>
          <div class="trip-card-bottom">
            <span class="${pillClass(tripBucket(t))}">${pillLabel(tripBucket(t))}</span>
            <div class="trip-card-actions">
              ${moveActionFor(t)}
              ${deleteActionFor(t)}
            </div>
          </div>
        </div>
      `).join("")}
    </div>
  `;
}

        summary: `Reservations recommended, especially for dinner and weekends. Bookings open 30 days in advance. 24-hour cancellation policy. Smart casual dress code. Parties of 6+ subject to set menu.`
      }
    ];
  }
  if (category === "sights") {
    const slug = (selection.name || "sight").toLowerCase().replace(/\s+/g, "-").replace(/[^a-z0-9-]/g, "");
    return [
      {
        title: "Tickets & admission",
        source: `${slug}.org`,
        url: `https://www.${slug}.org/tickets`,
        summary: `General admission: $24 adults, $18 students/seniors, free under 12. Timed-entry tickets recommended in peak season. Members enter free. Tickets valid for one full day, re-entry not permitted.`
      },
      {
        title: "Hours & visiting info",
        source: `${slug}.org`,
        url: `https://www.${slug}.org/visit`,
        summary: `Open Tuesday–Sunday, 10:00 AM – 6:00 PM (Thursday until 9:00 PM). Closed Mondays and major holidays. Allow 2–3 hours for a thorough visit. Photography permitted (no flash).`
      }
    ];
  }
  return [];
}

// Run reference doc fetch for a selection. Mode: demo or live.
async function fetchReferenceDocs(category, slotId, selection) {
  const t = currentTrip();
  const runtime = userSettings.agentMode || "demo";

  // Build context object for the prompt
  let context;
  if (category === "transport") {
    const leg = tripLegs(t).find(l => l.id === slotId);
    context = { fromCity: leg.fromCity, toCity: leg.toCity, date: leg.date };
  } else {
    const stay = (t.stays || []).find(s => s.id === slotId);
    context = { city: stay?.city, checkIn: stay?.checkIn, checkOut: stay?.checkOut };
  }

  // Remove any old reference docs for this slot — replace with the new selection's
  ensureTripDocs(t);
  if (!t.tripDocs[category][slotId]) t.tripDocs[category][slotId] = [];
  t.tripDocs[category][slotId] = t.tripDocs[category][slotId].filter(d => d.kind !== "reference");

  // Show a placeholder doc to indicate fetching
  const placeholderId = "ref-loading-" + Date.now();
  t.tripDocs[category][slotId].push({
    id: placeholderId,
    kind: "reference",
    loading: true,
    title: "Looking up reference docs...",
    source: "",
    summary: "",
    addedAt: Date.now()
  });
  render();

  try {
    let refs;
    if (runtime === "demo") {
      await new Promise(r => setTimeout(r, 900));
      refs = generateMockReferenceDocs(category, selection, context);
    } else {
      const prompt = buildReferenceDocsPrompt(category, selection, context);
      refs = await callClaudeAgent(prompt);
    }
    // Remove placeholder, add real refs
    t.tripDocs[category][slotId] = t.tripDocs[category][slotId].filter(d => d.id !== placeholderId);
    refs.forEach((r, i) => {
      t.tripDocs[category][slotId].push({
        id: "ref-" + Date.now() + "-" + i,
        kind: "reference",
        title: r.title,
        source: r.source,
        url: r.url,
        summary: r.summary,
        runtime,
        addedAt: Date.now()
      });
    });
    persist();
    render();
  } catch (err) {
    console.warn("Reference doc fetch failed:", err);
    // Replace placeholder with error
    t.tripDocs[category][slotId] = t.tripDocs[category][slotId].filter(d => d.id !== placeholderId);
    t.tripDocs[category][slotId].push({
      id: "ref-err-" + Date.now(),
      kind: "reference",
      error: true,
      title: "Couldn't fetch reference docs",
      summary: err.message || "Try again later",
      addedAt: Date.now()
    });
    render();
  }
}

/* ============================================================
   SELECT TAB — picking specific options for transport / stay / dining / sights
   ============================================================ */

// Ensure the active trip has a selections data structure. Lazily initialized so
// existing trips don't need migration.
function ensureSelections(t) {
  if (!t.selections) {
    t.selections = { transport: {}, stay: {}, dining: {}, sights: {} };
  }
  return t.selections;
}

/* ============================================================
   SELECTION INTEGRITY — detect selections that no longer match
   the trip's current dates / cities / stays.
   ============================================================ */

// Returns array of issues: { category, slotId, severity: "warn"|"error", type, message, recoverable }
// "warn" = item is still useful but mismatched (e.g. flight date changed, hotel dates changed but city still right)
// "error" = item is no longer applicable (e.g. shortlisted London restaurant, but stay city is now Paris)
function getSelectionIssues(t) {
  if (!t) return [];
  ensureSelections(t);
  const issues = [];

  // ---------- TRANSPORT ----------
  // For each leg, if there's a selection, check that the selected option's date matches the leg's current date.
  const legs = tripLegs(t);
  Object.entries(t.selections.transport || {}).forEach(([legId, slot]) => {
    if (!slot.selectedOptionId) return;
    const leg = legs.find(l => l.id === legId);
    if (!leg) {
      issues.push({
        category: "transport",
        slotId: legId,
        severity: "error",
        type: "leg-removed",
        message: "This flight is for a leg that no longer exists in the trip.",
        recoverable: false
      });
      return;
    }
    // Check the selected option's date
    let selectedDate = null;
    const id = slot.selectedOptionId;
    if (slot.agentSelections?.[id]) {
      selectedDate = slot.agentSelections[id].date;
    } else {
      // First try regenerating options for the current leg date — if the selection still exists, use its date
      if (typeof generateTransportOptions === "function") {
        const opts = generateTransportOptions(leg, leg.date, slot.window || 0);
        const opt = opts.find(o => o.id === id);
        if (opt) selectedDate = opt.date;
      }
      // If not found in current options, the selection was made for a date no longer in the window.
      // Extract the date from the option id format: `${leg.id}-${YYYY-MM-DD}-${i}`
      if (!selectedDate) {
        const dateMatch = id.match(/(\d{4}-\d{2}-\d{2})/);
        if (dateMatch) selectedDate = dateMatch[1];
      }
    }
    if (selectedDate && selectedDate !== leg.date) {
      issues.push({
        category: "transport",
        slotId: legId,
        severity: "warn",
        type: "date-mismatch",
        message: `Selected flight is for ${formatDate(selectedDate)} but the leg is now ${formatDate(leg.date)}.`,
        recoverable: true,
        oldDate: selectedDate,
        newDate: leg.date
      });
    }
  });

  // ---------- STAY ----------
  // For each stay, if there's any selection (legacy single OR new bookings),
  // check city integrity. Each booking is checked independently since a stay
  // can hold multiple bookings (e.g. central + airport hotel).
  Object.entries(t.selections.stay || {}).forEach(([stayId, slot]) => {
    if (!hasStaySelection(t, stayId)) return;
    const stay = (t.stays || []).find(s => s.id === stayId);
    if (!stay) {
      issues.push({
        category: "stay",
        slotId: stayId,
        severity: "error",
        type: "stay-removed",
        message: "Hotel selection is for a stay that no longer exists.",
        recoverable: false
      });
      return;
    }
    // For non-agent selections, check that each booked hotel is in the
    // stay's current city. We iterate the unified bookings list (legacy
    // single-selection appears as a one-element list).
    const bookings = getStayBookings(t, stayId);
    bookings.forEach(b => {
      const id = b.hotelId;
      if (slot.agentSelections?.[id]) return; // agent results are city-flexible
      if (typeof PLACES !== "object") return;
      let foundCity = null;
      for (const [city, cityData] of Object.entries(PLACES)) {
        if ((cityData.stay || []).find(p => p.id === id)) {
          foundCity = city;
          break;
        }
      }
      if (foundCity && foundCity !== stay.city) {
        issues.push({
          category: "stay",
          slotId: stayId,
          severity: "error",
          type: "city-mismatch",
          message: `Selected hotel is in ${foundCity} but the stay is now in ${stay.city}.`,
          recoverable: false
        });
      }
    });
  });

  // ---------- DINING ----------
  // For each dining shortlist, check that catalog items match the stay's current city.
  // (Agent items don't have a city baked in, so we can't validate them strictly.)
  Object.entries(t.selections.dining || {}).forEach(([stayId, slot]) => {
    if (!slot.selectedIds || slot.selectedIds.length === 0) return;
    const stay = (t.stays || []).find(s => s.id === stayId);
    if (!stay) {
      issues.push({
        category: "dining",
        slotId: stayId,
        severity: "error",
        type: "stay-removed",
        message: "Dining shortlist is for a stay that no longer exists.",
        recoverable: false
      });
      return;
    }
    let mismatchCount = 0;
    slot.selectedIds.forEach(id => {
      // Skip agent items (id starts with "agent-")
      if (id.startsWith("agent-")) return;
      // Walk PLACES + custom places
      let foundCity = null;
      for (const [city, cityData] of Object.entries(PLACES || {})) {
        if ((cityData.dining || []).find(p => p.id === id)) {
          foundCity = city;
          break;
        }
      }
      if (!foundCity && userSettings?.customPlaces) {
        const custom = userSettings.customPlaces.find(p => p.id === id);
        if (custom) foundCity = custom.city;
      }
      if (foundCity && foundCity !== stay.city) mismatchCount++;
    });
    if (mismatchCount > 0) {
      issues.push({
        category: "dining",
        slotId: stayId,
        severity: "error",
        type: "city-mismatch",
        message: `${mismatchCount} planned restaurant${mismatchCount === 1 ? '' : 's'} ${mismatchCount === 1 ? 'is' : 'are'} in a different city than ${stay.city}.`,
        recoverable: false,
        mismatchCount
      });
    }
  });

  // ---------- SIGHTS ----------
  Object.entries(t.selections.sights || {}).forEach(([stayId, slot]) => {
    if (!slot.selectedIds || slot.selectedIds.length === 0) return;
    const stay = (t.stays || []).find(s => s.id === stayId);
    if (!stay) {
      issues.push({
        category: "sights",
        slotId: stayId,
        severity: "error",
        type: "stay-removed",
        message: "Sights shortlist is for a stay that no longer exists.",
        recoverable: false
      });
      return;
    }
    let mismatchCount = 0;
    slot.selectedIds.forEach(id => {
      if (id.startsWith("agent-")) return;
      let foundCity = null;
      for (const [city, cityData] of Object.entries(PLACES || {})) {
        if ((cityData.sights || []).find(p => p.id === id)) {
          foundCity = city;
          break;
        }
      }
      if (!foundCity && userSettings?.customPlaces) {
        const custom = userSettings.customPlaces.find(p => p.id === id);
        if (custom) foundCity = custom.city;
      }
      if (foundCity && foundCity !== stay.city) mismatchCount++;
    });
    if (mismatchCount > 0) {
      issues.push({
        category: "sights",
        slotId: stayId,
        severity: "error",
        type: "city-mismatch",
        message: `${mismatchCount} planned sight${mismatchCount === 1 ? '' : 's'} ${mismatchCount === 1 ? 'is' : 'are'} in a different city than ${stay.city}.`,
        recoverable: false,
        mismatchCount
      });
    }
  });

  // ---------- SCHEDULED DAY ITEMS ----------
  // Day items that fall on dates outside the trip's current range, or in the wrong city.
  const tripDates = new Set();
  if (t.originDate && t.returnDate) {
    let d = new Date(t.originDate + "T00:00:00");
    const end = new Date(t.returnDate + "T00:00:00");
    while (d <= end) {
      tripDates.add(toLocalDateStr(d));
      d.setDate(d.getDate() + 1);
    }
  }

  Object.entries(t.dayItems || {}).forEach(([date, items]) => {
    if (!tripDates.has(date)) {
      // Whole day is outside trip range
      items.forEach(item => {
        if (item.fromSelection || item.category === "dining" || item.category === "sights") {
          issues.push({
            category: item.category,
            slotId: item.id,
            severity: "error",
            type: "date-out-of-range",
            message: `"${item.name}" is scheduled for ${formatDate(date)}, which is outside your trip dates.`,
            recoverable: true,
            date,
            dayItemId: item.id
          });
        }
      });
    }
  });

  return issues;
}

// Convenience helpers
function getIssuesForSlot(t, category, slotId) {
  return getSelectionIssues(t).filter(i => i.category === category && i.slotId === slotId);
}
function getIssueCountByCategory(t) {
  const issues = getSelectionIssues(t);
  return {
    transport: issues.filter(i => i.category === "transport").length,
    stay: issues.filter(i => i.category === "stay").length,
    dining: issues.filter(i => i.category === "dining").length,
    sights: issues.filter(i => i.category === "sights").length,
    total: issues.length
  };
}

// Trip-scoped documents (confirmations, tickets, vouchers per slot)
function ensureTripDocs(t) {
  if (!t.tripDocs) {
    t.tripDocs = { transport: {}, stay: {}, dining: {}, sights: {} };
  }
  return t.tripDocs;
}
function getSlotDocs(t, category, slotId) {
  ensureTripDocs(t);
  if (!t.tripDocs[category][slotId]) t.tripDocs[category][slotId] = [];
  return t.tripDocs[category][slotId];
}

// Add a doc to a slot. For images, re-encodes through a canvas to shrink
// the stored data URL — phone camera shots are commonly 4–10 MB raw, which
// would blow through localStorage's ~5 MB total quota almost instantly.
// After compression, a typical photo lands at 150–400 KB.
function uploadTripDoc(event, category, slotId) {
  const file = event.target.files?.[0];
  if (!file) return;
  // Generous raw-file ceiling. iPhone shots routinely hit 6–8 MB, so the
  // earlier 5 MB limit was rejecting common camera output. Compression below
  // brings the stored size way down regardless.
  if (file.size > 15 * 1024 * 1024) {
    showToast("File too large — max 15 MB");
    event.target.value = "";
    return;
  }
  const isImage = (file.type || "").startsWith("image/");
  const isPdf = (file.type || "") === "application/pdf";
  if (!isImage && !isPdf) {
    showToast("Unsupported file type");
    event.target.value = "";
    return;
  }

  const finish = (dataUrl, sizeBytes, mimeType, label) => {
    const t = currentTrip();
    const docs = getSlotDocs(t, category, slotId);
    docs.push({
      id: "td-" + Date.now(),
      name: file.name,
      mimeType,
      fileData: dataUrl,
      sizeBytes,
      notes: "",
      addedAt: Date.now()
    });
    app.docsExpanded.add(`${category}:${slotId}`);
    showToast("Document added" + (label ? " · " + label : ""));
    persist();
    render();
  };

  if (isPdf) {
    // PDFs can't be re-encoded; pass through. localStorage may complain on
    // very large PDFs — but we let the silent-quota path in saveToStorage
    // handle that case.
    const reader = new FileReader();
    reader.onload = (e) => finish(e.target.result, file.size, file.type || "application/pdf");
    reader.readAsDataURL(file);
    event.target.value = "";
    return;
  }

  // Image path: load → draw to canvas at max 1600px long edge → re-encode
  // as JPEG at quality 0.82. This typically reduces phone-camera images
  // by 90%+ while remaining readable as a document/ticket photo.
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const MAX_LONG_EDGE = 1600;
      let { width, height } = img;
      if (Math.max(width, height) > MAX_LONG_EDGE) {
        const scale = MAX_LONG_EDGE / Math.max(width, height);
        width = Math.round(width * scale);
        height = Math.round(height * scale);
      }
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);
      const compressed = canvas.toDataURL("image/jpeg", 0.82);
      // Approximate size: data URL length ≈ bytes * 1.37 (base64 overhead),
      // and the prefix "data:image/jpeg;base64," is ~23 chars.
      const approxBytes = Math.round((compressed.length - 23) * 0.75);
      const reduction = file.size > 0 ? Math.round((1 - approxBytes / file.size) * 100) : 0;
      const label = reduction > 5
        ? `Compressed ${(file.size / (1024 * 1024)).toFixed(1)}MB → ${(approxBytes / 1024).toFixed(0)}KB`
        : "";
      finish(compressed, approxBytes, "image/jpeg", label);
    };
    img.onerror = () => {
      showToast("Couldn't read this image");
      event.target.value = "";
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  event.target.value = "";
}

async function deleteTripDoc(category, slotId, docId) {
  if (!(await confirmDialog({
    title: "Remove this document?",
    message: "It will be deleted from this trip.",
    confirmLabel: "Remove",
    danger: true
  }))) return;
  const t = currentTrip();
  if (!t.tripDocs?.[category]?.[slotId]) return;
  t.tripDocs[category][slotId] = t.tripDocs[category][slotId].filter(d => d.id !== docId);
  showToast("Document removed");
  persist();
  render();
}

function updateTripDocNotes(category, slotId, docId, notes) {
  const t = currentTrip();
  const doc = t.tripDocs?.[category]?.[slotId]?.find(d => d.id === docId);
  if (doc) {
    doc.notes = notes;
    persist();
  }
}

// Render the documents section that appears at the top of each selection detail page
function renderTripDocsSection(category, slotId) {
  const t = currentTrip();
  const docs = getSlotDocs(t, category, slotId);
  const key = `${category}:${slotId}`;
  const isExpanded = app.docsExpanded.has(key);
  // Show "loading" state inline in header if a reference doc is being fetched
  const hasLoading = docs.some(d => d.kind === "reference" && d.loading);
  // If a reference doc just landed (no manual collapse), auto-expand
  // Heuristic: any non-loading reference doc within the last 5 seconds → auto-expand
  const recentlyFetched = docs.some(d => d.kind === "reference" && !d.loading && d.addedAt > Date.now() - 5000);
  const expanded = isExpanded || hasLoading || recentlyFetched;
  if (recentlyFetched && !isExpanded) app.docsExpanded.add(key);

  return `
    <div class="trip-docs-section ${expanded ? 'expanded' : ''}">
      <div class="trip-docs-header" onclick="toggleDocsExpanded('${category}', '${slotId}')">
        <div class="trip-docs-title">
          📎 Documents
          ${docs.length > 0 ? `<span class="trip-docs-count">${docs.length}</span>` : ''}
        </div>
        <div class="trip-docs-add-actions" onclick="event.stopPropagation()">
          <label class="trip-docs-add-btn" for="trip-doc-photo-${slotId}">📷 Photo</label>
          <input type="file" id="trip-doc-photo-${slotId}" accept="image/*" capture="environment" style="display:none"
                 onchange="uploadTripDoc(event, '${category}', '${slotId}')">
          <label class="trip-docs-add-btn secondary" for="trip-doc-file-${slotId}">📁 File</label>
          <input type="file" id="trip-doc-file-${slotId}" accept="image/*,application/pdf" style="display:none"
                 onchange="uploadTripDoc(event, '${category}', '${slotId}')">
        </div>
        <span class="trip-docs-chevron">${expanded ? '▾' : '▸'}</span>
      </div>
      ${expanded ? `
        ${docs.length === 0 ? `
          <div class="trip-docs-empty">No documents yet. Upload confirmations, tickets, or notes.</div>
        ` : `
          <div class="trip-docs-list">
            ${docs.map(d => renderTripDocCard(category, slotId, d)).join("")}
          </div>
        `}
      ` : ''}
    </div>
  `;
}

function toggleDocsExpanded(category, slotId) {
  const key = `${category}:${slotId}`;
  if (app.docsExpanded.has(key)) app.docsExpanded.delete(key);
  else app.docsExpanded.add(key);
  render();
}

function renderTripDocCard(category, slotId, doc) {
  // Reference docs (auto-fetched by the agent) render as knowledge cards
  if (doc.kind === "reference") {
    if (doc.loading) {
      return `
        <div class="trip-doc-card ref-card loading">
          <div class="ref-card-spinner"></div>
          <div class="trip-doc-info">
            <div class="trip-doc-name">${doc.title}</div>
            <div class="trip-doc-meta">Searching...</div>
          </div>
        </div>
      `;
    }
    if (doc.error) {
      return `
        <div class="trip-doc-card ref-card error">
          <div class="trip-doc-icon">⚠</div>
          <div class="trip-doc-info">
            <div class="trip-doc-name">${doc.title}</div>
            <div class="trip-doc-meta">${doc.summary}</div>
          </div>
          <span class="trip-doc-delete" onclick="deleteTripDoc('${category}', '${slotId}', '${doc.id}')" title="Dismiss">×</span>
        </div>
      `;
    }
    return `
      <div class="trip-doc-card ref-card">
        <div class="trip-doc-icon ref-icon">📋</div>
        <div class="trip-doc-info">
          <div class="trip-doc-name">${doc.title}</div>
          <div class="trip-doc-meta">
            ${doc.source || ''} · auto-fetched ${doc.runtime === 'live' ? '(live)' : '(demo)'}
          </div>
          ${doc.summary ? `<div class="ref-summary">${doc.summary}</div>` : ''}
          ${doc.url ? `<a href="${doc.url}" target="_blank" rel="noopener" class="ref-source-link" onclick="event.stopPropagation()">Open source ↗</a>` : ''}
        </div>
        <span class="trip-doc-delete" onclick="deleteTripDoc('${category}', '${slotId}', '${doc.id}')" title="Remove">×</span>
      </div>
    `;
  }

  // User-uploaded docs (existing behavior)
  const isImg = doc.mimeType?.startsWith("image/");
  const isPdf = doc.mimeType === "application/pdf";
  const sizeKB = Math.round(doc.sizeBytes / 1024);
  return `
    <div class="trip-doc-card">
      ${isImg ? `
        <img src="${doc.fileData}" class="trip-doc-thumb" onclick="openTripDocViewer('${category}', '${slotId}', '${doc.id}')" alt="${doc.name}">
      ` : `
        <div class="trip-doc-icon" onclick="openTripDocViewer('${category}', '${slotId}', '${doc.id}')">
          ${isPdf ? '📄' : '📎'}
        </div>
      `}
      <div class="trip-doc-info">
        <div class="trip-doc-name" title="${doc.name}">${doc.name}</div>
        <div class="trip-doc-meta">${sizeKB} KB · ${new Date(doc.addedAt).toLocaleDateString()}</div>
        ${doc.notes ? `<div class="trip-doc-notes">${doc.notes}</div>` : ''}
      </div>
      <span class="trip-doc-delete" onclick="deleteTripDoc('${category}', '${slotId}', '${doc.id}')" title="Remove">×</span>
    </div>
  `;
}

// Open a doc in a fullscreen viewer modal (image inline, PDF in new tab)
function openTripDocViewer(category, slotId, docId) {
  const t = currentTrip();
  const doc = t.tripDocs?.[category]?.[slotId]?.find(d => d.id === docId);
  if (!doc) return;

  if (doc.mimeType === "application/pdf") {
    // Open PDFs in new tab — base64 data URLs work directly
    const w = window.open();
    if (w) {
      w.document.write(`<title>${doc.name}</title><iframe src="${doc.fileData}" style="border:0;width:100%;height:100vh"></iframe>`);
    } else {
      showToast("Pop-ups blocked — allow them to view PDF");
    }
    return;
  }

  // Image preview in modal
  const html = `
    <div class="modal-sheet" style="max-height: 95%; height: 90%;">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <div class="modal-title">${doc.name}</div>
        <div class="modal-close" onclick="closeModal()">×</div>
      </div>
      <div class="modal-body" style="padding: 12px; display: flex; flex-direction: column; gap: 12px;">
        <img src="${doc.fileData}" style="max-width: 100%; max-height: 60vh; object-fit: contain; border-radius: var(--radius-sm); align-self: center;">
        <div>
          <div class="nt-label">Notes</div>
          <textarea rows="3" placeholder="Add notes about this document..."
                    style="width: 100%; padding: 8px 10px; font-size: 13px; font-family: inherit; border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); resize: vertical; outline: none; box-sizing: border-box;"
                    oninput="updateTripDocNotes('${category}', '${slotId}', '${doc.id}', this.value)">${(doc.notes || '').replace(/</g, '&lt;')}</textarea>
        </div>
      </div>
      <div class="modal-footer">
        <span class="btn btn-danger" onclick="closeModal(); deleteTripDoc('${category}', '${slotId}', '${doc.id}')">Delete</span>
        <span class="btn btn-primary" onclick="closeModal()">Done</span>
      </div>
    </div>
  `;
  openModal(html);
}

// Ensure a transport-leg slot has its filter defaults
function ensureTransportSlot(t, legId) {
  ensureSelections(t);
  if (!t.selections.transport[legId]) {
    t.selections.transport[legId] = {
      window: 0,                                       // ± days flexibility
      stopFilters: ["nonstop", "1stop"],               // default: show nonstop + 1-stop
      classFilter: userSettings.flightClass,
      sort: "best",                                    // best | price | duration | departure
      selectedOptionId: null
    };
  }
  return t.selections.transport[legId];
}

function ensureStaySlot(t, stayId) {
  ensureSelections(t);
  if (!t.selections.stay[stayId]) {
    t.selections.stay[stayId] = {
      typeFilters: [...userSettings.lodging],
      amenityFilters: [...userSettings.amenities],
      sort: "best",
      // Multiple bookings per stay: a stay can hold sequential hotel
      // bookings, e.g. 4 nights central + 1 night airport hotel before the
      // early flight home. Each booking has its own check-in/check-out
      // window inside the stay's overall window. The original
      // selectedOptionId is kept for migration / single-booking convenience.
      bookings: [],
      // Legacy single-selection fields. Still written by the old code path
      // for back-compat; `getStayBookings(slot)` reads them as a virtual
      // one-element bookings array if `bookings` is empty.
      selectedOptionId: null
    };
  }
  const slot = t.selections.stay[stayId];
  // Migrate older slots
  if (!Array.isArray(slot.bookings)) slot.bookings = [];
  return slot;
}

// Read accessor — returns the slot's bookings, synthesizing a single-booking
// list from legacy `selectedOptionId` if the slot hasn't been migrated to the
// new model yet. Uses the stay's full check-in/out window for the synthetic
// booking. Read sites should call this instead of inspecting raw fields.
function getStayBookings(t, stayId) {
  const slot = t.selections?.stay?.[stayId];
  if (!slot) return [];
  if (slot.bookings && slot.bookings.length > 0) return slot.bookings;
  if (slot.selectedOptionId) {
    const stay = (t.stays || []).find(s => s.id === stayId);
    return [{
      id: "bk-legacy-" + slot.selectedOptionId,
      hotelId: slot.selectedOptionId,
      checkIn: stay?.checkIn || "",
      checkOut: stay?.checkOut || "",
      snapshot: slot.selectedSnapshot || null
    }];
  }
  return [];
}

// Has the user committed any hotel for this stay (legacy or new model)?
function hasStaySelection(t, stayId) {
  const slot = t.selections?.stay?.[stayId];
  if (!slot) return false;
  if (slot.bookings && slot.bookings.length > 0) return true;
  if (slot.selectedOptionId) return true;
  return false;
}

function ensureDiningSlot(t, stayId) {
  ensureSelections(t);
  if (!t.selections.dining[stayId]) {
    t.selections.dining[stayId] = {
      cuisineFilters: [...userSettings.cuisines],
      priceFilters: [...userSettings.prices],
      mealFilters: [...userSettings.meals],
      sort: "best",
      selectedIds: []
    };
  }
  return t.selections.dining[stayId];
}

function ensureSightsSlot(t, stayId) {
  ensureSelections(t);
  if (!t.selections.sights[stayId]) {
    t.selections.sights[stayId] = {
      interestFilters: [...userSettings.sights],
      paceFilter: userSettings.pace,
      sort: "best",
      selectedIds: []
    };
  }
  return t.selections.sights[stayId];
}

// Trip "legs" — derived from origin + stays + return. Each leg has from/to/date.
function tripLegs(t) {
  const legs = [];
  const stays = t.stays || [];
  if (stays.length === 0) return legs;
  // Outbound: origin → first stay
  legs.push({
    id: "leg-out",
    fromCity: t.origin,
    toCity: stays[0].city,
    date: t.originDate,
    label: "Outbound"
  });
  // Between stays
  for (let i = 0; i < stays.length - 1; i++) {
    legs.push({
      id: "leg-mid-" + i,
      fromCity: stays[i].city,
      toCity: stays[i + 1].city,
      date: stays[i].checkOut,
      label: `Travel day ${i + 1}`
    });
  }
  // Return: last stay → return city
  legs.push({
    id: "leg-ret",
    fromCity: stays[stays.length - 1].city,
    toCity: t.returnCity || t.origin,
    date: t.returnDate,
    label: "Return"
  });
  return legs;
}

/* === MAIN DISPATCHER === */

function renderSelect(area) {
  const t = currentTrip();
  if (!t) return;
  ensureSelections(t);
  if (app.selectionCategory && app.selectionSlotId) {
    if (app.selectionCategory === "transport") return renderTransportSelection(area, t, app.selectionSlotId);
    if (app.selectionCategory === "stay")      return renderStaySelection(area, t, app.selectionSlotId);
    if (app.selectionCategory === "dining")    return renderDiningSelection(area, t, app.selectionSlotId);
    if (app.selectionCategory === "sights")    return renderSightsSelection(area, t, app.selectionSlotId);
  }
  if (app.selectionCategory) {
    // Category list (showing all slots in that category)
    return renderSelectCategoryList(area, t, app.selectionCategory);
  }
  // Default: overview
  return renderSelectOverview(area, t);
}

function gotoSelection(category, slotId) {
  app.tab = "plan";
  app.selectionCategory = category;
  app.selectionSlotId = slotId || null;
  render();
  document.getElementById("screen-area").scrollTop = 0;
}

function backToSelectOverview() {
  app.selectionCategory = null;
  app.selectionSlotId = null;
  render();
}

function backToSelectCategory() {
  app.selectionSlotId = null;
  render();
}

// Dispatcher for the global trip-screen back arrow. Drills out one level at a time
// rather than jumping all the way back to the trip list.
function backFromTripScreen() {
  // Itinerary item detail page → back to wherever the user came from.
  if (app.itineraryDetail) {
    app.itineraryDetail = null;
    // If the user opened this detail page from the Map (via "Open in
    // Itinerary" on a pin popup), send them back to the Map. Otherwise,
    // fall through to the default — back to the Itinerary day view/list.
    if (app.detailReturnTab === "map") {
      app.detailReturnTab = null;
      app.tab = "map";
    }
    render();
    return;
  }
  // Itinerary day-detail page → back to full day list
  if (app.itineraryDay) {
    app.itineraryDay = null;
    render();
    return;
  }
  // Plan detail page (specific leg/stay) → back to category list
  if (app.tab === "plan" && app.selectionCategory && app.selectionSlotId) {
    app.selectionSlotId = null;
    render();
    return;
  }
  // Plan category list → back to overview
  if (app.tab === "plan" && app.selectionCategory) {
    app.selectionCategory = null;
    render();
    return;
  }
  // Top-level tab (Plan overview, Itinerary day list, Map) → back to trip list
  goto("trips");
}

/* === OVERVIEW === */

function renderSelectOverview(area, t) {
  const legs = tripLegs(t);
  const transportSelected = legs.filter(l => t.selections.transport[l.id]?.selectedOptionId).length;
  const staySelected = (t.stays || []).filter(s => hasStaySelection(t, s.id)).length;
  const diningTotal = (t.stays || []).reduce((sum, s) => sum + (t.selections.dining[s.id]?.selectedIds?.length || 0), 0);
  const sightsTotal = (t.stays || []).reduce((sum, s) => sum + (t.selections.sights[s.id]?.selectedIds?.length || 0), 0);

  // Count docs across all slots in each category
  ensureTripDocs(t);
  const countDocs = (cat) => Object.values(t.tripDocs[cat] || {}).reduce((sum, list) => sum + (list?.length || 0), 0);
  const transportDocs = countDocs("transport");
  const stayDocs = countDocs("stay");
  const diningDocs = countDocs("dining");
  const sightsDocs = countDocs("sights");

  const docsSuffix = (n) => n === 0 ? "" : ` · ${n} doc${n === 1 ? '' : 's'}`;

  const sections = [
    {
      id: "transport",
      icon: "✈",
      title: "Transport",
      sub: `${transportSelected} of ${legs.length} legs selected${docsSuffix(transportDocs)}`,
      complete: transportSelected === legs.length && legs.length > 0
    },
    {
      id: "stay",
      icon: "🏨",
      title: "Stay",
      sub: `${staySelected} of ${(t.stays || []).length} stays selected${docsSuffix(stayDocs)}`,
      complete: staySelected === (t.stays || []).length && (t.stays || []).length > 0
    },
    {
      id: "dining",
      icon: "🍽",
      title: "Dining",
      sub: (diningTotal === 0 ? "No restaurants planned yet" : `${diningTotal} restaurant${diningTotal === 1 ? "" : "s"} planned`) + docsSuffix(diningDocs),
      complete: false
    },
    {
      id: "sights",
      icon: "🗺",
      title: "Sights",
      sub: (sightsTotal === 0 ? "No sights planned yet" : `${sightsTotal} sight${sightsTotal === 1 ? "" : "s"} planned`) + docsSuffix(sightsDocs),
      complete: false
    }
  ];

  area.innerHTML = `
    <div class="sel-overview">
      <div class="sel-overview-header">
        <div class="sel-overview-title">Plan your trip</div>
        <div class="sel-overview-sub">Browse, plan, and lock in transport, stays, dining, and sights — all in one place.</div>
      </div>
      ${getSelectionIssues(t).length > 0 ? renderTripIssuesBanner(t) : ''}
      <div class="sel-cat-grid">
        ${sections.map(s => {
          const catIssues = getIssueCountByCategory(t)[s.id];
          return `
          <div class="sel-cat-card ${s.complete ? 'complete' : ''} ${catIssues > 0 ? 'has-issues' : ''}" onclick="gotoSelection('${s.id}', null)">
            <div class="sel-cat-icon">${s.icon}</div>
            <div class="sel-cat-text">
              <div class="sel-cat-title">${s.title}${catIssues > 0 ? ` <span class="issue-pill">⚠ ${catIssues}</span>` : ''}</div>
              <div class="sel-cat-sub">${s.sub}</div>
            </div>
            ${s.complete && catIssues === 0 ? '<div class="sel-cat-check">✓</div>' : '<div class="sel-cat-chevron">›</div>'}
          </div>
        `;}).join("")}
      </div>
    </div>
  `;
}

// Top-of-overview banner showing the trip-wide issue summary
function renderTripIssuesBanner(t) {
  const issues = getSelectionIssues(t);
  const errors = issues.filter(i => i.severity === "error").length;
  const warns = issues.filter(i => i.severity === "warn").length;
  let parts = [];
  if (errors > 0) parts.push(`${errors} need${errors === 1 ? 's' : ''} attention`);
  if (warns > 0) parts.push(`${warns} flagged`);
  return `
    <div class="trip-issues-banner">
      <div class="trip-issues-banner-icon">⚠</div>
      <div class="trip-issues-banner-text">
        <div class="trip-issues-banner-title">Some selections may no longer match your trip</div>
        <div class="trip-issues-banner-sub">${parts.join(" · ")} — review the categories below</div>
      </div>
    </div>
  `;
}

/* === CATEGORY LIST (drill: category → list of slots in that category) === */

function renderSelectCategoryList(area, t, category) {
  const labels = { transport: "Transport", stay: "Stay", dining: "Dining", sights: "Sights" };
  ensureTripDocs(t);
  const docCount = (slotId) => (t.tripDocs[category][slotId] || []).length;
  const docSuffix = (slotId) => {
    const c = docCount(slotId);
    return c === 0 ? "" : ` · 📎 ${c}`;
  };
  let rows;
  if (category === "transport") {
    rows = tripLegs(t).map(leg => {
      const slot = t.selections.transport[leg.id];
      const sel = slot?.selectedOptionId;
      const slotIssues = getIssuesForSlot(t, "transport", leg.id);
      const issueBadge = slotIssues.length > 0 ? `<span class="row-issue-badge">⚠</span>` : '';
      const rebook = getTransportRebookStatus(t, leg.id);
      const rebookBadge = rebook ? `<span class="row-rebook-badge">!</span>` : '';
      const rebookMsg = rebook
        ? (rebook.type === "leg-removed"
            ? "Leg removed — please cancel reservation"
            : `Date changed: was ${formatDate(rebook.oldDate)}, now ${formatDate(rebook.newDate)} — rebook`)
        : null;
      return `
        <div class="sel-slot-row ${slotIssues.length > 0 ? 'has-issue' : ''} ${rebook ? 'needs-reschedule' : ''}" onclick="gotoSelection('transport', '${leg.id}')">
          <div class="sel-slot-icon">✈</div>
          <div class="sel-slot-info">
            <div class="sel-slot-title">${leg.label}: ${cityShort(leg.fromCity)} → ${cityShort(leg.toCity)}${rebookBadge}${issueBadge}</div>
            <div class="sel-slot-sub">${formatDate(leg.date) || "Date not set"} ${sel ? '· '+ sel : '· No flight selected'}${docSuffix(leg.id)}</div>
            ${rebookMsg ? `<div class="sel-slot-rebook-msg">${rebookMsg}</div>` : ''}
            ${slotIssues.length > 0 && !rebookMsg ? `<div class="sel-slot-issue-msg">${slotIssues[0].message}</div>` : ''}
          </div>
          <div class="sel-slot-chevron">${sel ? '✓' : '›'}</div>
        </div>
      `;
    }).join("");
  } else if (category === "stay") {
    rows = (t.stays || []).map(stay => {
      const slot = t.selections.stay[stay.id];
      const bookings = getStayBookings(t, stay.id);
      const slotIssues = getIssuesForSlot(t, "stay", stay.id);
      const issueBadge = slotIssues.length > 0 ? `<span class="row-issue-badge">⚠</span>` : '';
      const rebook = getStayRebookStatus(t, stay.id);
      const rebookBadge = rebook ? `<span class="row-rebook-badge">!</span>` : '';
      const rebookMsg = rebook
        ? (rebook.type === "stay-removed"
            ? "Stay removed — please cancel reservation"
            : `Dates changed: was ${formatDate(rebook.oldCheckIn)} – ${formatDate(rebook.oldCheckOut)}, now ${formatDate(rebook.newCheckIn)} – ${formatDate(rebook.newCheckOut)} — rebook`)
        : null;
      // Status text: 0 = "No hotel selected"; 1 = the hotel name; 2+ = "N hotels booked"
      let statusText;
      if (bookings.length === 0) {
        statusText = "No hotel selected";
      } else if (bookings.length === 1) {
        const name = bookings[0].snapshot?.name || "Hotel";
        statusText = name;
      } else {
        statusText = `${bookings.length} hotels booked`;
      }
      return `
        <div class="sel-slot-row ${slotIssues.length > 0 ? 'has-issue' : ''} ${rebook ? 'needs-reschedule' : ''}" onclick="gotoSelection('stay', '${stay.id}')">
          <div class="sel-slot-icon">🏨</div>
          <div class="sel-slot-info">
            <div class="sel-slot-title">${stay.city || "Stay"}${rebookBadge}${issueBadge}</div>
            <div class="sel-slot-sub">${formatDate(stay.checkIn)} – ${formatDate(stay.checkOut)} · ${statusText}${docSuffix(stay.id)}</div>
            ${rebookMsg ? `<div class="sel-slot-rebook-msg">${rebookMsg}</div>` : ''}
            ${slotIssues.length > 0 && !rebookMsg ? `<div class="sel-slot-issue-msg">${slotIssues[0].message}</div>` : ''}
          </div>
          <div class="sel-slot-chevron">${bookings.length > 0 ? '✓' : '›'}</div>
        </div>
      `;
    }).join("");
  } else {
    // dining or sights — one slot per stay
    rows = (t.stays || []).map(stay => {
      const slot = t.selections[category][stay.id];
      const count = slot?.selectedIds?.length || 0;
      const slotIssues = getIssuesForSlot(t, category, stay.id);
      const issueBadge = slotIssues.length > 0 ? `<span class="row-issue-badge">⚠</span>` : '';
      return `
        <div class="sel-slot-row ${slotIssues.length > 0 ? 'has-issue' : ''}" onclick="gotoSelection('${category}', '${stay.id}')">
          <div class="sel-slot-icon">${category === 'dining' ? '🍽' : '🗺'}</div>
          <div class="sel-slot-info">
            <div class="sel-slot-title">${stay.city || "Stay"}${issueBadge}</div>
            <div class="sel-slot-sub">${count > 0 ? `${count} planned` : "Browse options"}${docSuffix(stay.id)}</div>
            ${slotIssues.length > 0 ? `<div class="sel-slot-issue-msg">${slotIssues[0].message}</div>` : ''}
          </div>
          <div class="sel-slot-chevron">${count > 0 ? count : '›'}</div>
        </div>
      `;
    }).join("");
  }

  area.innerHTML = `
    <div class="sel-back-row" onclick="backToSelectOverview()">← Back to selections</div>
    <div class="sel-overview">
      <div class="sel-overview-header">
        <div class="sel-overview-title">${labels[category]}</div>
      </div>
      <div class="sel-slot-list">
        ${rows || `<div class="sel-empty">No ${labels[category].toLowerCase()} slots yet. Add stays in trip details first.</div>`}
      </div>
    </div>
  `;
}

/* === HELPERS === */

function cityShort(city) {
  return (city || "").split(",")[0].trim();
}
function formatDate(d) {
  if (!d) return "";
  return new Date(d + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
}

// Convert a Date object to a YYYY-MM-DD string using LOCAL date components.
// Important: do NOT use toISOString().slice(0, 10) — that uses UTC and gives wrong
// results in any non-UTC timezone (off-by-one in either direction depending on offset).
function toLocalDateStr(d) {
  const pad = (n) => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
}

// ---- Save bar shared by all 4 selection detail pages ----
// Returns the sticky-footer HTML when there's something worth saving, else "".
// Banner shown at the top of a Plan detail page when this slot has integrity issues
function renderSlotIssueBanner(category, slotId) {
  const t = currentTrip();
  const issues = getIssuesForSlot(t, category, slotId);
  if (issues.length === 0) return "";

  return issues.map(issue => {
    let actionsHtml = "";
    if (issue.type === "date-mismatch" && issue.recoverable) {
      // Offer a one-tap "clear and re-pick" action
      actionsHtml = `<span class="slot-issue-action" onclick="clearTransportSelectionFromItinerary('${slotId}')">Clear selection</span>`;
    } else if (issue.type === "city-mismatch" && category === "stay") {
      actionsHtml = `<span class="slot-issue-action" onclick="clearStaySelectionFromItinerary('${slotId}')">Clear selection</span>`;
    } else if (issue.type === "city-mismatch" && (category === "dining" || category === "sights")) {
      actionsHtml = `<span class="slot-issue-action" onclick="clearMismatchedShortlistItems('${category}', '${slotId}')">Clear mismatched items</span>`;
    }
    return `
      <div class="slot-issue-banner ${issue.severity}">
        <span class="slot-issue-icon">⚠</span>
        <div class="slot-issue-text">${issue.message}</div>
        ${actionsHtml}
      </div>
    `;
  }).join("");
}

// Clear shortlist items that don't belong in the current city
async function clearMismatchedShortlistItems(category, stayId) {
  if (!(await confirmDialog({
    title: "Clear mismatched items?",
    message: "Items in your shortlist for this stay that don't belong in the stay's current city will be removed.",
    confirmLabel: "Clear",
    danger: true
  }))) return;
  const t = currentTrip();
  const slot = (category === "dining" ? ensureDiningSlot : ensureSightsSlot)(t, stayId);
  const stay = (t.stays || []).find(s => s.id === stayId);
  if (!stay) return;

  const beforeCount = slot.selectedIds.length;
  slot.selectedIds = slot.selectedIds.filter(id => {
    if (id.startsWith("agent-")) return true; // keep agent items (no city baked in)
    // Find the city of this place id
    let foundCity = null;
    for (const [city, cityData] of Object.entries(PLACES || {})) {
      if ((cityData[category] || []).find(p => p.id === id)) {
        foundCity = city;
        break;
      }
    }
    if (!foundCity && userSettings?.customPlaces) {
      const custom = userSettings.customPlaces.find(p => p.id === id);
      if (custom) foundCity = custom.city;
    }
    return !foundCity || foundCity === stay.city;
  });
  const removed = beforeCount - slot.selectedIds.length;
  showToast(`Removed ${removed} mismatched item${removed === 1 ? '' : 's'}`);
  persist();
  render();
}

function renderSaveBar(category, slotId) {
  // Always show a "Done with [Category]" sticky bar at the bottom of every
  // selection page. Tapping it confirms the user is finished with this
  // category and routes back to the Plan tab's top-level overview (the
  // 4-tile grid). This gives an explicit confirmation point — matches the
  // user's mental model of "I'm done filling in transport, take me back".
  const labels = {
    transport: "Done with Transport",
    stay: "Done with Stay",
    dining: "Done with Dining",
    sights: "Done with Sights"
  };
  const label = labels[category] || "Done";
  return `
    <div class="sel-save-row">
      <span class="btn btn-primary" onclick="saveSelection('${category}', '${slotId}')">${label}</span>
    </div>
  `;
}


// User taps Done with X — flush any pending save, confirm with toast, and
// route back to the Plan tab's top-level overview (4-tile grid).
function saveSelection(category, slotId) {
  flushPendingSave();
  app.selectionCategory = null;
  app.selectionSlotId = null;
  app.tab = "plan";
  showToast("Saved");
  render();
}

/* === TRANSPORT SELECTION (the rich one) === */

// Generate mock flight options for a leg. In production this comes from Amadeus / Skyscanner.
// Deterministic based on leg id + date so options are stable across renders.
function generateTransportOptions(leg, baseDate, windowDays) {
  if (!baseDate) return [];
  const airlines = [
    { code: "UA", name: "United" },
    { code: "DL", name: "Delta" },
    { code: "AA", name: "American" },
    { code: "BA", name: "British Airways" },
    { code: "AF", name: "Air France" },
    { code: "LH", name: "Lufthansa" }
  ];
  const options = [];
  // Build a list of dates within the window
  const dates = [];
  for (let d = -windowDays; d <= windowDays; d++) {
    const dt = new Date(baseDate + "T00:00:00");
    dt.setDate(dt.getDate() + d);
    dates.push(dt.toISOString().slice(0, 10));
  }
  // For each date, generate ~4 flight options
  let seed = leg.id.length * 13 + leg.fromCity.length;
  function rng() { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; }
  dates.forEach((dt, dateIdx) => {
    for (let i = 0; i < 4; i++) {
      const airline = airlines[Math.floor(rng() * airlines.length)];
      const stops = rng() < 0.55 ? 0 : (rng() < 0.85 ? 1 : 2);
      const depHour = 6 + Math.floor(rng() * 16);
      const depMin = Math.floor(rng() * 6) * 10;
      const baseDuration = stops === 0 ? 240 : (stops === 1 ? 360 : 480); // minutes
      const duration = baseDuration + Math.floor(rng() * 120);
      const arrTotal = depHour * 60 + depMin + duration;
      const arrHour = Math.floor(arrTotal / 60) % 24;
      const arrMin = arrTotal % 60;
      const nextDay = arrTotal >= 24 * 60;
      // Price: nonstop + business is most expensive
      const basePrice = stops === 0 ? 850 : (stops === 1 ? 620 : 480);
      const price = basePrice + Math.floor(rng() * 400);
      options.push({
        id: `${leg.id}-${dt}-${i}`,
        airline: airline.name,
        airlineCode: airline.code,
        flightNum: airline.code + (100 + Math.floor(rng() * 900)),
        date: dt,
        depTime: `${String(depHour).padStart(2, "0")}:${String(depMin).padStart(2, "0")}`,
        arrTime: `${String(arrHour).padStart(2, "0")}:${String(arrMin).padStart(2, "0")}${nextDay ? " +1" : ""}`,
        durationMin: duration,
        stops,
        classes: ["Economy", "Premium economy", "Business", "First class"],
        price,
        website: CARRIER_WEBSITES[airline.name.toLowerCase()] || null
      });
    }
  });
  return options;
}

function formatDuration(min) {
  return `${Math.floor(min / 60)}h ${min % 60}m`;
}

function renderTransportSelection(area, t, legId) {
  const leg = tripLegs(t).find(l => l.id === legId);
  if (!leg) {
    area.innerHTML = `<div class="sel-empty">Leg not found.</div>`;
    return;
  }
  const slot = ensureTransportSlot(t, legId);
  const opts = generateTransportOptions(leg, leg.date, slot.window);

  // Apply filters
  const stopMatch = (s) => {
    if (!slot.stopFilters || slot.stopFilters.length === 0) return true;
    if (s === 0 && slot.stopFilters.includes("nonstop")) return true;
    if (s === 1 && slot.stopFilters.includes("1stop")) return true;
    if (s >= 2 && slot.stopFilters.includes("2stop")) return true;
    return false;
  };
  let filtered = opts.filter(o => stopMatch(o.stops));

  // Merge in user-added custom transport options (slot-scoped) — these appear at the very top
  if (slot.customOptions && slot.customOptions.length > 0) {
    const customMatched = slot.customOptions.filter(o => stopMatch(o.stops));
    filtered = [...customMatched, ...filtered];
  }

  // Merge in agent results (if any), as items in the same list with an _isAgent marker
  const agentState = getAgentState(t, "transport", legId);
  if (agentState.status === "results" && agentState.results.length > 0) {
    const agentItems = agentState.results.map((r, i) => {
      const virtualId = `agent-${legId}-${i}`;
      // Stash the original on the slot so selectFromAgentResult / save bar can find it later
      if (!slot.agentSelections) slot.agentSelections = {};
      slot.agentSelections[virtualId] = r;
      return {
        id: virtualId,
        airline: r.airline || "",
        flightNum: r.flightNum || "",
        depTime: r.depTime || "",
        arrTime: r.arrTime || "",
        durationMin: r.durationMin || 0,
        stops: r.stops || 0,
        price: r.price || 0,
        date: r.date || leg.date,
        why: r.why || "",
        _isAgent: true,
        _agentIndex: i
      };
    }).filter(o => stopMatch(o.stops));
    // Agent items appear first; user-applied sort then re-orders the whole list together
    filtered = [...agentItems, ...filtered];
  }

  // Sort
  if (slot.sort === "price") filtered.sort((a, b) => a.price - b.price);
  else if (slot.sort === "duration") filtered.sort((a, b) => a.durationMin - b.durationMin);
  else if (slot.sort === "departure") filtered.sort((a, b) => a.depTime.localeCompare(b.depTime));
  // For "best", agent items naturally lead since they're already ranked
  else if (slot.sort !== "best") /* fallback */ filtered.sort((a, b) => (a.price + a.durationMin * 1.5) - (b.price + b.durationMin * 1.5));

  area.innerHTML = `
    <div class="sel-back-row" onclick="backToSelectCategory()">← Back to transport</div>
    ${renderSlotIssueBanner("transport", legId)}
    <div class="sel-detail">
      <div class="sel-detail-header">
        <div class="sel-detail-title">${cityShort(leg.fromCity)} → ${cityShort(leg.toCity)}</div>
        <div class="sel-detail-sub">${leg.label} · ${formatDate(leg.date) || "No date"}</div>
      </div>
      ${slot.autoSuggested ? `
        <div class="auto-suggested-banner">
          <span class="auto-suggested-icon">✨</span>
          <span class="auto-suggested-text">
            <strong>Auto-selected for round-trip return.</strong>
            Same airline as your outbound. Tap a different option below to change.
          </span>
        </div>
      ` : ''}

      <div class="sel-filters">
        <div class="sel-filter-row">
          <div class="sel-filter-label">Stops</div>
          <div class="sel-filter-chips">
            <span class="sel-chip ${slot.stopFilters.includes("nonstop") ? 'active' : ''}" onclick="toggleTransportFilter('${legId}', 'stopFilters', 'nonstop')">Nonstop</span>
            <span class="sel-chip ${slot.stopFilters.includes("1stop") ? 'active' : ''}" onclick="toggleTransportFilter('${legId}', 'stopFilters', '1stop')">1 stop</span>
            <span class="sel-chip ${slot.stopFilters.includes("2stop") ? 'active' : ''}" onclick="toggleTransportFilter('${legId}', 'stopFilters', '2stop')">2+ stops</span>
          </div>
        </div>
        <div class="sel-filter-row">
          <div class="sel-filter-label">Class</div>
          <select class="sel-filter-select" onchange="setTransportClass('${legId}', this.value)">
            ${["Economy","Premium economy","Business","First class"].map(c =>
              `<option ${slot.classFilter === c ? 'selected' : ''}>${c}</option>`).join("")}
          </select>
        </div>
        <div class="sel-filter-row">
          <div class="sel-filter-label">Window</div>
          <div class="sel-window-control">
            <span class="sel-window-btn" onclick="adjustTransportWindow('${legId}', -1)">−</span>
            <span class="sel-window-value">${slot.window === 0 ? 'Exact date' : `± ${slot.window} day${slot.window === 1 ? '' : 's'}`}</span>
            <span class="sel-window-btn" onclick="adjustTransportWindow('${legId}', 1)">+</span>
          </div>
        </div>
        <div class="sel-filter-row">
          <div class="sel-filter-label">Sort</div>
          <select class="sel-filter-select" onchange="setTransportSort('${legId}', this.value)">
            <option value="best" ${slot.sort === 'best' ? 'selected' : ''}>Best fit</option>
            <option value="price" ${slot.sort === 'price' ? 'selected' : ''}>Price</option>
            <option value="duration" ${slot.sort === 'duration' ? 'selected' : ''}>Duration</option>
            <option value="departure" ${slot.sort === 'departure' ? 'selected' : ''}>Departure time</option>
          </select>
        </div>
      </div>

      ${renderAddOwnRow("transport", legId)}

      ${renderAgentSection("transport", legId)}

      <div class="sel-results-count">${filtered.length} option${filtered.length === 1 ? '' : 's'}</div>

      <div class="sel-results">
        ${filtered.length === 0 ? '<div class="sel-empty">No flights match these filters. Try widening the window or adding more stops.</div>' :
          filtered.map(o => {
            const isSelected = slot.selectedOptionId === o.id;
            return `
              <div class="sel-result ${isSelected ? 'selected' : ''}${o._isAgent ? ' is-agent' : ''}${o.isCustom ? ' is-custom' : ''}">
                <div class="sel-result-top">
                  <div class="sel-result-airline">${o.airline} ${o.flightNum}${o.isCustom ? ' <span class="sug-custom-badge">YOUR PICK</span>' : ''}${o._isAgent ? ' <span class="ai-badge">AI</span>' : ''}</div>
                  <div class="sel-result-price">${o.price > 0 ? '$' + o.price.toLocaleString() : '—'}</div>
                </div>
                <div class="sel-result-times">
                  <span class="sel-result-time">${o.depTime}</span>
                  <span class="sel-result-arrow">→</span>
                  <span class="sel-result-time">${o.arrTime}</span>
                  <span class="sel-result-duration">${formatDuration(o.durationMin)}</span>
                </div>
                <div class="sel-result-meta">
                  <span class="sel-result-tag ${o.stops === 0 ? 'tag-good' : ''}">${o.stops === 0 ? 'Nonstop' : o.stops + ' stop' + (o.stops > 1 ? 's' : '')}</span>
                  <span class="sel-result-tag">${formatDate(o.date)}</span>
                  <span class="sel-result-tag">${slot.classFilter}</span>
                </div>
                ${isSelected ? renderSelectedDates(leg.date) : ''}
                ${o._isAgent && o.why ? `<div class="sel-result-why">${o.why}</div>` : ''}
                <div class="sel-result-bottom">
                  ${renderCardWebsite(resolveCarrierWebsite(o))}
                  <span class="sel-result-action ${isSelected ? 'selected' : ''}" onclick="${o._isAgent ? `selectFromAgentResult('transport', '${legId}', ${attrJS(JSON.stringify({airline:o.airline, flightNum:o.flightNum, depTime:o.depTime, arrTime:o.arrTime, durationMin:o.durationMin, stops:o.stops, price:o.price, date:o.date, why:o.why}))}, ${o._agentIndex})` : `selectTransportOption('${legId}', '${o.id}')`}">${isSelected ? (slot.autoSuggested ? '✨ Auto-booked' : '✓ Booked') : 'Book this flight'}</span>
                </div>
              </div>
            `;
          }).join("")
        }
      </div>
    </div>
  `;
  // Append the docs section at the bottom of the page (collapsed by default)
  area.innerHTML += renderTripDocsSection("transport", legId);
  // Append the save bar (sticky footer) — only renders when something is selected
  area.innerHTML += renderSaveBar("transport", legId);
}

function toggleTransportFilter(legId, group, value) {
  const t = currentTrip();
  const slot = ensureTransportSlot(t, legId);
  const idx = slot[group].indexOf(value);
  if (idx === -1) slot[group].push(value);
  else slot[group].splice(idx, 1);
  persist();
  render();
}
function setTransportClass(legId, value) {
  const t = currentTrip();
  ensureTransportSlot(t, legId).classFilter = value;
  persist();
  render();
}
function setTransportSort(legId, value) {
  const t = currentTrip();
  ensureTransportSlot(t, legId).sort = value;
  persist();
  render();
}
function adjustTransportWindow(legId, delta) {
  const t = currentTrip();
  const slot = ensureTransportSlot(t, legId);
  slot.window = Math.max(0, Math.min(7, slot.window + delta));
  persist();
  render();
}
// Round-trip detection: origin and return city are the same.
// Falls back to origin when returnCity isn't set.
function isRoundTrip(t) {
  if (!t || !t.origin) return false;
  const returnCity = t.returnCity || t.origin;
  return t.origin.trim().toLowerCase() === returnCity.trim().toLowerCase();
}

// Find the next leg in order that doesn't have a selection yet. Returns the
// leg object or null if every leg is filled.
function nextLegToFill(t, afterLegId) {
  const legs = tripLegs(t);
  const idx = legs.findIndex(l => l.id === afterLegId);
  if (idx === -1) return null;
  for (let i = idx + 1; i < legs.length; i++) {
    const slot = t.selections?.transport?.[legs[i].id];
    if (!slot || !slot.selectedOptionId) return legs[i];
  }
  return null;
}

// For a round-trip's return leg, pick a sensible default flight matching the
// outbound's airline (if available). Returns the option object or null.
// Note: option.classes is an array (not the user's chosen class) so for now
// we just match airline. Live mode could match class once that's per-option.
function findReciprocalFlight(outboundOpt, returnLeg, t) {
  if (!outboundOpt || !returnLeg) return null;
  const slot = ensureTransportSlot(t, returnLeg.id);
  const opts = generateTransportOptions(returnLeg, returnLeg.date, slot.window || 0);
  if (opts.length === 0) return null;
  // First try: same airline (case-insensitive)
  if (outboundOpt.airline) {
    const sameAirline = opts.find(o =>
      (o.airline || "").toLowerCase() === outboundOpt.airline.toLowerCase()
    );
    if (sameAirline) return sameAirline;
  }
  // Fallback: first option in the list
  return opts[0];
}

// Apply the round-trip auto-fill. Only fills the LAST leg, and only if it has
// no current selection (we never overwrite the user's manual pick).
// Sets `_autoSuggested: true` on the selection metadata so the UI can mark it.
// Returns true if a fill happened, false otherwise.
function applyRoundTripAutoFill(t, justSelectedLegId, justSelectedOpt) {
  if (!isRoundTrip(t)) return false;
  // Only auto-fill from a non-return leg (don't loop)
  if (justSelectedLegId === "leg-ret") return false;
  const legs = tripLegs(t);
  const returnLeg = legs.find(l => l.id === "leg-ret");
  if (!returnLeg) return false;
  const slot = ensureTransportSlot(t, returnLeg.id);
  if (slot.selectedOptionId) return false;  // user already picked or auto-fill ran
  // Auto-fill primarily off the OUTBOUND. If we're picking inter-city legs,
  // don't trigger auto-fill — wait until outbound is actually picked.
  if (justSelectedLegId !== "leg-out") return false;
  const reciprocal = findReciprocalFlight(justSelectedOpt, returnLeg, t);
  if (!reciprocal) return false;
  slot.selectedOptionId = reciprocal.id;
  slot.autoSuggested = true;  // marker for UI badge
  slot.selectedSnapshot = {
    airline: reciprocal.airline,
    airlineCode: reciprocal.airlineCode,
    stops: reciprocal.stops,
    depTime: reciprocal.depTime,
    flightNum: reciprocal.flightNum
  };
  // Auto-fill happens as part of the user picking the outbound — treat the
  // return as resolved too. (For live mode where the user may want to review
  // the return separately, we may want to revisit this and surface a softer
  // "auto-suggested" affordance instead.)
  clearRebookFlag(t, "transport", returnLeg.id);
  return true;
}

// Re-validate transport selections after a trip's dates have changed.
// Selected option IDs include the leg's date (`${legId}-${date}-${i}`) so when
// dates shift, every existing selectedOptionId becomes stale. We try to find
// an equivalent on the new date, prioritizing airline match (same algorithm
// as initial round-trip auto-fill).
//
// Special case for round-trip return: even if the outbound was unchanged, we
// re-match the return to the outbound's airline on the new date — same
// behavior as initial setup.
//
// Returns { refreshed: number, cleared: number } for diagnostics.
function refreshTransportAfterDateChange(trip) {
  if (!trip || !trip.selections?.transport) return { refreshed: 0, cleared: 0 };
  const legs = tripLegs(trip);
  let refreshed = 0;
  let cleared = 0;

  // First pass: refresh non-return legs. Match each by the snapshot's airline+stops.
  legs.forEach(leg => {
    if (leg.id === "leg-ret") return; // handle return last so we can match outbound
    const slot = trip.selections.transport[leg.id];
    if (!slot || !slot.selectedOptionId) return;
    const newOpts = generateTransportOptions(leg, leg.date, slot.window || 0);
    if (newOpts.length === 0) return;
    // First try: airline + stops match (closest semantic equivalent)
    let match = null;
    if (slot.selectedSnapshot && slot.selectedSnapshot.airline) {
      match = newOpts.find(o =>
        o.airline === slot.selectedSnapshot.airline &&
        o.stops === slot.selectedSnapshot.stops
      );
      // Fallback: airline only
      if (!match) match = newOpts.find(o => o.airline === slot.selectedSnapshot.airline);
    }
    if (match) {
      slot.selectedOptionId = match.id;
      slot.selectedSnapshot = {
        airline: match.airline,
        airlineCode: match.airlineCode,
        stops: match.stops,
        depTime: match.depTime,
        flightNum: match.flightNum
      };
      slot.autoSuggested = false; // user-equivalent, not auto
      refreshed++;
    } else {
      // No equivalent — clear so the user can re-pick. Selection is stale.
      slot.selectedOptionId = null;
      slot.selectedSnapshot = null;
      slot.autoSuggested = false;
      cleared++;
    }
  });

  // Second pass: refresh return leg with airline match against outbound.
  // This mirrors the initial-setup algorithm via findReciprocalFlight.
  const returnLeg = legs.find(l => l.id === "leg-ret");
  if (returnLeg && trip.selections.transport[returnLeg.id]) {
    const retSlot = trip.selections.transport[returnLeg.id];
    if (retSlot.selectedOptionId) {
      const outSlot = trip.selections.transport["leg-out"];
      if (isRoundTrip(trip) && outSlot?.selectedOptionId && outSlot.selectedSnapshot) {
        // Re-match return to outbound's airline on the new return date
        const newRetOpts = generateTransportOptions(returnLeg, returnLeg.date, retSlot.window || 0);
        const reciprocal = newRetOpts.find(o =>
          o.airline === outSlot.selectedSnapshot.airline
        ) || newRetOpts[0] || null;
        if (reciprocal) {
          retSlot.selectedOptionId = reciprocal.id;
          retSlot.selectedSnapshot = {
            airline: reciprocal.airline,
            airlineCode: reciprocal.airlineCode,
            stops: reciprocal.stops,
            depTime: reciprocal.depTime,
            flightNum: reciprocal.flightNum
          };
          retSlot.autoSuggested = true; // re-flagged because it's machine-matched
          refreshed++;
        } else {
          retSlot.selectedOptionId = null;
          retSlot.selectedSnapshot = null;
          retSlot.autoSuggested = false;
          cleared++;
        }
      } else {
        // Not a round-trip OR no outbound snapshot to match against:
        // fall back to standard same-airline match like other legs.
        const newOpts = generateTransportOptions(returnLeg, returnLeg.date, retSlot.window || 0);
        let match = null;
        if (retSlot.selectedSnapshot && retSlot.selectedSnapshot.airline) {
          match = newOpts.find(o =>
            o.airline === retSlot.selectedSnapshot.airline &&
            o.stops === retSlot.selectedSnapshot.stops
          ) || newOpts.find(o => o.airline === retSlot.selectedSnapshot.airline);
        }
        if (match) {
          retSlot.selectedOptionId = match.id;
          retSlot.selectedSnapshot = {
            airline: match.airline, airlineCode: match.airlineCode,
            stops: match.stops, depTime: match.depTime, flightNum: match.flightNum
          };
          retSlot.autoSuggested = false;
          refreshed++;
        } else {
          retSlot.selectedOptionId = null;
          retSlot.selectedSnapshot = null;
          retSlot.autoSuggested = false;
          cleared++;
        }
      }
    }
  }

  return { refreshed, cleared };
}

// Navigate to a transport leg detail page (Plan tab > transport > specific leg).
function gotoTransportLeg(legId) {
  app.tab = "plan";
  app.selectionCategory = "transport";
  app.selectionSlotId = legId;
  render();
  const sa = document.getElementById("screen-area");
  if (sa) sa.scrollTop = 0;
}

function selectTransportOption(legId, optId) {
  const t = currentTrip();
  const slot = ensureTransportSlot(t, legId);
  // Toggle: tap the selected option to unselect it
  const wasCleared = slot.selectedOptionId === optId;
  slot.selectedOptionId = wasCleared ? null : optId;
  // Clear auto-suggested marker if user is making a deliberate pick
  if (slot.autoSuggested) slot.autoSuggested = false;
  // Save a small snapshot of the picked option so date changes can re-match.
  // We don't snapshot the full option (it's regeneratable) — just the bits we
  // need to find an equivalent on a new date: airline, stops, depTime.
  if (!wasCleared && slot.selectedOptionId) {
    const leg = tripLegs(t).find(l => l.id === legId);
    if (leg) {
      const opts = generateTransportOptions(leg, leg.date, slot.window || 0);
      const sel = opts.find(o => o.id === optId);
      if (sel) {
        slot.selectedSnapshot = {
          airline: sel.airline,
          airlineCode: sel.airlineCode,
          stops: sel.stops,
          depTime: sel.depTime,
          flightNum: sel.flightNum
        };
      }
    }
  } else {
    slot.selectedSnapshot = null;
  }

  // The user has just made a deliberate selection on this leg — that's the
  // signal that they've reviewed and confirmed the new date. Clear any
  // pending rebook flag for this leg from trip.dateWarning so the red goes
  // away immediately. (Selecting a fresh option counts as re-confirmation;
  // unselecting also counts because the slot becoming empty already clears
  // the flag via the live filter.)
  clearRebookFlag(t, "transport", legId);

  persist();

  // If this was an unselect, just refresh in place — no auto-advance.
  if (wasCleared || !slot.selectedOptionId) {
    showToast("Selection cleared");
    render();
    return;
  }

  // Find the option object so we can do auto-fill + reference docs
  const leg = tripLegs(t).find(l => l.id === legId);
  const allOpts = generateTransportOptions(leg, leg.date, slot.window);
  const sel = allOpts.find(o => o.id === optId);

  // Round-trip auto-fill: if this was the outbound and the trip is a round-trip
  // with an empty return leg, populate it with a reciprocal flight.
  const autoFilled = applyRoundTripAutoFill(t, legId, sel);
  if (autoFilled) persist();

  // Reference doc fetch (cosmetic for the prototype)
  if (sel) fetchReferenceDocs("transport", legId, sel);

  // Auto-advance: jump to the next leg without a selection.
  // Special case: if round-trip auto-fill just filled leg-ret, navigate to
  // leg-ret anyway (overriding nextLegToFill's "no empty legs" answer) so the
  // user can see the auto-selected option marked on the card and either
  // accept it or pick a different one. The toast below promises "tap to
  // review" — this is what makes that promise true.
  let nextLeg = nextLegToFill(t, legId);
  if (autoFilled && !nextLeg) {
    nextLeg = tripLegs(t).find(l => l.id === "leg-ret") || null;
  }

  if (autoFilled) {
    showToast("Round-trip return auto-selected — tap to review");
  }
  // No toast for normal flight select — the visual ✓ Selected button is enough

  if (nextLeg) {
    // Small delay so the user sees the toast and the selection visually flips
    // before navigating to the next leg's selection page.
    setTimeout(() => gotoTransportLeg(nextLeg.id), 350);
  } else {
    // All legs filled — stay on this page so the user can review their final
    // pick. They explicitly tap "Done with Transport" at the bottom when
    // ready to leave.
    render();
  }
}

/* === STAY SELECTION === */

function renderStaySelection(area, t, stayId) {
  const stay = (t.stays || []).find(s => s.id === stayId);
  if (!stay) {
    area.innerHTML = `<div class="sel-empty">Stay not found.</div>`;
    return;
  }
  const slot = ensureStaySlot(t, stayId);
  // Pull hotel-cat places for the city
  const cityPlaces = getCityPlaces(stay.city);
  // Merge with user-added custom stays for this city (stored in userSettings.customPlaces)
  const customStays = (userSettings.customPlaces || [])
    .filter(p => p.cat === "stay" && p.city === stay.city)
    .map(p => ({
      id: p.id,
      name: p.name,
      meta: [p.address, p.type].filter(Boolean).join(" · "),
      rating: p.rating,
      reviews: p.reviews,
      tags: p.tags || [p.type].filter(Boolean),
      pricePerNight: p.pricePerNight || 0,
      address: p.address,
      website: p.website,
      isCustom: true
    }));
  const catalogOpts = (cityPlaces.stay || []).map(p => ({
    id: p.id,
    name: p.name,
    meta: p.meta,
    rating: p.rating,
    reviews: p.reviews,
    tags: p.tags,
    pricePerNight: 150 + (p.id.length * 17) % 400, // mock price for prototype
    address: p.address,
    website: p.website,
    sample: p.sample || false,
    _source: p._source // Day 16: preserve Foursquare attribution
  }));
  let opts = [...customStays, ...catalogOpts];

  // Filter by type (chip in tags) — if any type filters set, place must match at least one
  if (slot.typeFilters.length > 0) {
    const norms = slot.typeFilters.map(normalizePrefTag);
    opts = opts.filter(o => o.tags.some(tag => norms.includes(tag)));
  }

  // Merge in agent results
  const agentState = getAgentState(t, "stay", stayId);
  if (agentState.status === "results" && agentState.results.length > 0) {
    const agentItems = agentState.results.map((r, i) => {
      const virtualId = `agent-${stayId}-${i}`;
      if (!slot.agentSelections) slot.agentSelections = {};
      slot.agentSelections[virtualId] = r;
      return {
        id: virtualId,
        name: r.name || "",
        meta: [r.neighborhood, r.type].filter(Boolean).join(" · "),
        rating: r.rating || null,
        reviews: null,
        tags: [r.type, ...(r.amenities || [])].filter(Boolean),
        pricePerNight: r.pricePerNight || 0,
        address: r.neighborhood || "",
        website: r.website || null,
        why: r.why || "",
        _isAgent: true,
        _agentIndex: i
      };
    });
    // Optional filter pass — only include if no type filters set, or if agent matches one
    const filterNorms = slot.typeFilters.map(normalizePrefTag);
    const filteredAgent = slot.typeFilters.length > 0
      ? agentItems.filter(o => o.tags.some(tag => filterNorms.includes(tag)))
      : agentItems;
    opts = [...filteredAgent, ...opts];
  }

  // Sort
  if (slot.sort === "price") opts.sort((a, b) => a.pricePerNight - b.pricePerNight);
  else if (slot.sort === "rating") opts.sort((a, b) => (b.rating || 0) - (a.rating || 0));

    <div class="sel-detail">

            `).join("")}

        </div>
        <div class="sel-filter-row">
          <div class="sel-filter-label">Amenities</div>
          <div class="sel-filter-chips">
            ${AMENITY_OPTIONS.map(opt => `
              <span class="sel-chip ${slot.amenityFilters.includes(opt) ? 'active' : ''}" onclick="toggleStayFilter('${stayId}', 'amenityFilters', ${attrJS(opt)})">${opt}</span>
            `).join("")}
          </div>
        </div>
        <div class="sel-filter-row">
          <div class="sel-filter-label">Sort</div>
          <select class="sel-filter-select" onchange="setStaySort('${stayId}', this.value)">
            <option value="best" ${slot.sort === 'best' ? 'selected' : ''}>Best fit</option>
            <option value="price" ${slot.sort === 'price' ? 'selected' : ''}>Price (low to high)</option>
            <option value="rating" ${slot.sort === 'rating' ? 'selected' : ''}>Rating</option>
          </select>
        </div>
      </div>

      ${renderAddOwnRow("stay", stayId)}

      ${renderAgentSection("stay", stayId)}

      <div class="sel-results-count">${opts.length} option${opts.length === 1 ? '' : 's'}</div>

      <div class="sel-results">
        ${opts.length === 0 ? `<div class="sel-empty">
          <div>No hotels match these filters.</div>
          <span class="btn btn-primary sel-empty-btn" onclick="clearStayFilters('${stayId}')">Show all hotels</span>
        </div>` :
          opts.map(o => {
            const bookings = getStayBookings(t, stayId).filter(b => b.hotelId === o.id);
            const hasBooking = bookings.length > 0;

            return `
              <div class="sel-result ${hasBooking ? 'selected' : ''}${o._isAgent ? ' is-agent' : ''}${o.isCustom ? ' is-custom' : ''}">
                <div class="sel-result-top">
                  <div class="sel-result-airline">${o.name}${o.isCustom ? ' <span class="sug-custom-badge">YOUR PICK</span>' : ''}${o._isAgent ? ' <span class="ai-badge">AI</span>' : ''}${o.sample ? ' <span class="sample-badge">Sample</span>' : ''}${o._source === "foursquare" ? ' <span class="fsq-badge">Foursquare</span>' : ''}${hasBooking ? ` <span class="sched-badge">✓ ${bookings.length === 1 ? 'Booked' : bookings.length + ' bookings'}</span>` : ''}</div>
                  <div class="sel-result-price">${o.pricePerNight > 0 ? '$' + o.pricePerNight + '/night' : '—'}</div>
                </div>
                <div class="sel-result-meta">
                  ${o.rating ? `<span class="sel-result-tag tag-good">★ ${o.rating}</span>` : ''}
                  ${o.tags.map(t => `<span class="sel-result-tag">${t}</span>`).join("")}
                </div>
                ${o.meta ? `<div class="sel-result-sub">${o.meta}</div>` : ''}
                ${nights > 0 ? `<div class="sel-result-sub">Total: $${totalPrice.toLocaleString()}</div>` : ''}
                ${hasBooking ? bookings.map(b => `
                  <div class="sel-booking-row">
                    <span class="sel-booking-dates">${formatDate(b.checkIn)} – ${formatDate(b.checkOut)}</span>
                    <span class="sel-booking-edit" onclick="editStayBooking('${stayId}', '${b.id}')">Edit dates</span>
                    <span class="sel-booking-remove" onclick="removeStayBooking('${stayId}', '${b.id}')">✕ Remove</span>
                  </div>

                <div class="sel-result-bottom">
                  ${renderCardWebsite(o.website)}
                  <span class="sel-result-action ${hasBooking ? 'selected' : ''}" onclick="${o._isAgent ? `selectFromAgentResult('stay', '${stayId}', ${attrJS(JSON.stringify({name:o.name, neighborhood:o.address, type:o.tags[0]||'Hotel', amenities:o.tags.slice(1), pricePerNight:o.pricePerNight, rating:o.rating, why:o.why}))}, ${o._agentIndex})` : `addStayBooking('${stayId}', '${o.id}')`}">${hasBooking ? '+ Add another stay' : 'Book this hotel'}</span>

function toggleStayFilter(stayId, group, value) {
  const t = currentTrip();
  const slot = ensureStaySlot(t, stayId);
  const idx = slot[group].indexOf(value);
  if (idx === -1) slot[group].push(value);
  else slot[group].splice(idx, 1);
  persist();
  render();
}

// Reset all filters on the stay slot back to empty so the unfiltered list
// shows. Used by the "Show all results" escape hatch on the empty state.
// Wipes typeFilters AND amenityFilters; sort is preserved.
function clearStayFilters(stayId) {
  const t = currentTrip();
  const slot = ensureStaySlot(t, stayId);
  slot.typeFilters = [];
  slot.amenityFilters = [];
  persist();
  render();
}
function setStaySort(stayId, value) {
  ensureStaySlot(currentTrip(), stayId).sort = value;
  persist();
  render();
}
function selectStayOption(stayId, optId) {
  const t = currentTrip();
  const slot = ensureStaySlot(t, stayId);
  const wasCleared = slot.selectedOptionId === optId;
  slot.selectedOptionId = wasCleared ? null : optId;

  // Save a snapshot of the picked option (parallel to transport). Useful for
  // displaying the hotel name in the rebook banner if dates later change.
  if (!wasCleared && slot.selectedOptionId) {
    const stay = (t.stays || []).find(s => s.id === stayId);
    if (stay) {
      const cityPlaces = getCityPlaces(stay.city);
      const place = (cityPlaces.stay || []).find(p => p.id === optId);
      const ag = slot.agentSelections?.[optId];
      slot.selectedSnapshot = place
        ? { name: place.name, neighborhood: place.meta || "", rating: place.rating || null }
        : ag
          ? { name: ag.name || "Hotel", neighborhood: ag.neighborhood || "", rating: ag.rating || null }
          : { name: "Hotel" };
    }
  } else {
    slot.selectedSnapshot = null;
  }

  // The user just made a deliberate selection — clear any pending stay rebook
  // flag so the red treatment goes away immediately (live-filter would only
  // clear it on slot empty, which doesn't apply here since they picked a hotel).
  clearRebookFlag(t, "stay", stayId);

  persist();

  // Unselect = stay on this page so user can pick a different one
  if (wasCleared || !slot.selectedOptionId) {
    showToast("Selection cleared");
    render();
    return;
  }

  // No toast for normal hotel select — the visual ✓ Selected button is enough

  // Pull reference docs for context (cosmetic in prototype)
  const stay = (t.stays || []).find(s => s.id === stayId);
  const cityPlaces = getCityPlaces(stay.city);
  const sel = (cityPlaces.stay || []).find(p => p.id === optId);
  if (sel) fetchReferenceDocs("stay", stayId, sel);

  // Stay on the selection page after picking a hotel — user explicitly
  // taps "Done with Stay" at the bottom when finished.
  render();
}

// Open the booking date dialog. Two modes:
//   - Adding a new booking: pass `optId` (the hotel id), no `bookingId`.
//   - Editing an existing booking: pass `bookingId`. `optId` is ignored.
// The dialog shows ALL bookings on the stay (existing + the new/edited one)
// so the user can see and adjust dates side-by-side. Save validates the whole
// set together: no overlaps, all within the stay's window.
function addStayBooking(stayId, optId, bookingId) {
  const t = currentTrip();
  const slot = ensureStaySlot(t, stayId);
  const stay = (t.stays || []).find(s => s.id === stayId);
  if (!stay) return;

  // Build the working state: a list of "rows" representing every booking
  // we'll commit. Editing replaces one row; adding appends a new one.
  // Each row: { id, hotelId, hotelName, checkIn, checkOut, isNew, isEditing }
  const resolveName = (hotelId, snapshot) => {
    const cityPlaces = getCityPlaces(stay.city);
    const place = (cityPlaces.stay || []).find(p => p.id === hotelId);
    if (place) return place.name;
    if (snapshot?.name) return snapshot.name;
    if (slot.agentSelections?.[hotelId]) return slot.agentSelections[hotelId].name || "Hotel";
    return "Hotel";
  };

  // Snapshot of current bookings for the dialog. Use getStayBookings so a
  // legacy slot (with selectedOptionId set but no bookings array) shows up
  // as a one-element synthetic booking in the dialog. After commit, the
  // slot is migrated to the new bookings model.
  const currentBookings = getStayBookings(t, stayId);
  const rows = currentBookings.map(b => ({
    id: b.id,
    hotelId: b.hotelId,
    hotelName: resolveName(b.hotelId, b.snapshot),
    checkIn: b.checkIn,
    checkOut: b.checkOut,
    isNew: false,
    isEditing: b.id === bookingId
  }));

  // Add or edit the focused row
  if (bookingId) {
    // Editing existing — already in `rows`. No new row.
  } else {
    // Adding new. Pick a default window that doesn't overlap existing rows.
    // If no other rows: full stay window. Otherwise: 1 night at the latest
    // gap, falling back to the very end (and the user gets to adjust).
    let defIn = stay.checkIn, defOut = stay.checkOut;
    if (rows.length > 0) {
      // Sort existing rows by checkIn
      const sorted = [...rows].sort((a, b) => a.checkIn.localeCompare(b.checkIn));
      // Find the first gap with at least 1 night
      const stayEnd = stay.checkOut;
      const advanceDate = (d, n) => {
        const dt = new Date(d + "T00:00:00");
        dt.setDate(dt.getDate() + n);
        return toLocalDateStr(dt);
      };
      let cursor = stay.checkIn;
      let found = false;
      for (const r of sorted) {
        if (r.checkIn > cursor) {
          defIn = cursor;
          defOut = advanceDate(cursor, 1);
          if (defOut > r.checkIn) defOut = r.checkIn;
          found = true;
          break;
        }
        if (r.checkOut > cursor) cursor = r.checkOut;
      }
      if (!found && cursor < stayEnd) {
        defIn = cursor;
        defOut = advanceDate(cursor, 1);
        if (defOut > stayEnd) defOut = stayEnd;
        found = true;
      }
      if (!found) {
        // No room — default to last day of last existing booking, user must shrink
        const last = sorted[sorted.length - 1];
        defIn = last.checkIn;
        defOut = last.checkOut;
      }
    }
    rows.push({
      id: "bk-new-" + Date.now(),
      hotelId: optId,
      hotelName: resolveName(optId, null),
      checkIn: defIn,
      checkOut: defOut,
      isNew: true,
      isEditing: true
    });
  }

  // Render
  function renderDialog() {
    const html = `
      <div class="modal-sheet" style="max-height: 80%;">
        <div class="modal-handle"></div>
        <div class="modal-header">
          <div class="modal-title">${bookingId ? 'Edit booking' : (rows.length > 1 ? 'Add another booking' : 'Add booking')}</div>
          <div class="modal-close" onclick="closeModal()">×</div>
        </div>
        <div class="modal-body">
          <div class="nt-section">
            <div class="nt-sub-hint" style="margin-bottom: 14px;">Stay window: ${formatDate(stay.checkIn)} – ${formatDate(stay.checkOut)}</div>
            ${rows.length > 1 ? `<div class="sp-section-title" style="margin-bottom:8px;">All bookings for this stay</div>` : ''}
            <div id="bk-rows">
              ${rows.map((r, i) => renderRow(r, i)).join("")}
            </div>
            <div id="bk-error" class="sp-hint" style="color: var(--text-danger); display: none; margin-top: 10px;"></div>
          </div>
        </div>
        <div class="modal-footer">
          <span class="btn" onclick="closeModal()">Cancel</span>
          <span class="btn btn-primary" id="bk-save">${bookingId ? 'Save' : 'Add booking'}</span>
        </div>
      </div>
    `;
    openModal(html);
    wireRows();
    document.getElementById("bk-save").onclick = () => commitBookingsDialog(stayId, rows);
  }

  function renderRow(r, i) {
    const editable = r.isEditing;
    const focusBadge = r.isEditing && !r.isNew ? '<span class="sample-badge" style="text-transform:none;">Editing</span>' : '';
    const newBadge = r.isNew ? '<span class="shortlist-badge" style="background:var(--bg-accent);color:var(--text-accent);border-color:var(--text-accent);">New</span>' : '';
    return `
      <div class="bk-row ${editable ? '' : 'bk-row--locked'}" data-row-idx="${i}">
        <div class="bk-row-name">${r.hotelName}${newBadge}${focusBadge}</div>
        <div class="bk-row-dates">
          <div class="nt-field">
            <label class="nt-label">Check in</label>
            <input type="date" class="bk-in" data-idx="${i}" min="${stay.checkIn}" max="${stay.checkOut}" value="${r.checkIn}" ${editable ? '' : 'disabled'}>
          </div>
          <div class="nt-field">
            <label class="nt-label">Check out</label>
            <input type="date" class="bk-out" data-idx="${i}" min="${stay.checkIn}" max="${stay.checkOut}" value="${r.checkOut}" ${editable ? '' : 'disabled'}>
          </div>
        </div>
        <div class="bk-row-actions">
          ${!r.isEditing ? `<span class="sel-booking-edit" data-edit-idx="${i}">Adjust dates</span>` : ''}
          ${(rows.length > 1 && !r.isNew) ? `<span class="sel-booking-remove" data-remove-idx="${i}">Remove</span>` : ''}
        </div>
      </div>
    `;
  }

  function wireRows() {
    document.querySelectorAll("#bk-rows .bk-in").forEach(el => {
      el.oninput = (e) => { rows[+e.target.dataset.idx].checkIn = e.target.value; validateLive(); };
    });
    document.querySelectorAll("#bk-rows .bk-out").forEach(el => {
      el.oninput = (e) => { rows[+e.target.dataset.idx].checkOut = e.target.value; validateLive(); };
    });
    document.querySelectorAll("#bk-rows [data-edit-idx]").forEach(el => {
      el.onclick = () => {
        rows[+el.dataset.editIdx].isEditing = true;
        renderDialog();
      };
    });
    document.querySelectorAll("#bk-rows [data-remove-idx]").forEach(el => {
      el.onclick = () => {
        rows.splice(+el.dataset.removeIdx, 1);
        renderDialog();
      };
    });
    validateLive();
  }

  function validateLive() {
    const err = validateBookings(rows, stay);
    const errEl = document.getElementById("bk-error");
    const saveEl = document.getElementById("bk-save");
    if (err) {
      if (errEl) { errEl.style.display = "block"; errEl.textContent = err; }
      if (saveEl) saveEl.classList.add("disabled");
    } else {
      if (errEl) errEl.style.display = "none";
      if (saveEl) saveEl.classList.remove("disabled");
    }
  }

  renderDialog();
}

// Validate a list of booking rows. Returns null if OK or an error string.
function validateBookings(rows, stay) {
  for (const r of rows) {
    if (!r.checkIn || !r.checkOut) return "Pick check-in and check-out dates for every booking";
    if (r.checkOut <= r.checkIn) return `${r.hotelName}: check-out must be after check-in`;
    if (r.checkIn < stay.checkIn || r.checkOut > stay.checkOut) {
      return `${r.hotelName}: must be within the stay window (${formatDate(stay.checkIn)} – ${formatDate(stay.checkOut)})`;
    }
  }
  // Pairwise overlap
  for (let i = 0; i < rows.length; i++) {
    for (let j = i + 1; j < rows.length; j++) {
      const a = rows[i], b = rows[j];
      if (a.checkIn < b.checkOut && a.checkOut > b.checkIn) {
        return `${a.hotelName} and ${b.hotelName} overlap. Adjust dates so each booking has its own range.`;
      }
    }
  }
  return null;
}

// Final commit: validate the whole set, then write back to the slot.
function commitBookingsDialog(stayId, rows) {
  const t = currentTrip();
  const slot = ensureStaySlot(t, stayId);
  const stay = (t.stays || []).find(s => s.id === stayId);
  if (!stay) return;
  const err = validateBookings(rows, stay);
  if (err) {
    showToast(err);
    return;
  }
  // Snapshot helper
  const cityPlaces = getCityPlaces(stay.city);
  const makeSnapshot = (hotelId) => {
    const place = (cityPlaces.stay || []).find(p => p.id === hotelId);
    if (place) return { name: place.name, neighborhood: place.meta || "", rating: place.rating || null };
    const ag = slot.agentSelections?.[hotelId];
    if (ag) return { name: ag.name || "Hotel", neighborhood: ag.neighborhood || "", rating: ag.rating || null };
    return { name: "Hotel" };
  };
  // Build the new bookings list
  slot.bookings = rows.map(r => ({
    id: r.isNew ? ("bk-" + Date.now() + "-" + Math.random().toString(36).slice(2, 6)) : r.id,
    hotelId: r.hotelId,
    checkIn: r.checkIn,
    checkOut: r.checkOut,
    snapshot: makeSnapshot(r.hotelId)
  }));
  // Clear legacy single-selection now that bookings is the source of truth
  slot.selectedOptionId = null;
  slot.selectedSnapshot = null;
  closeModal();
  showToast(rows.length > 1 ? `${rows.length} bookings saved` : "Booking saved");
  persist();
  render();
}

// Remove a booking from a stay. Confirms with an in-app dialog.
async function removeStayBooking(stayId, bookingId) {
  const ok = await confirmDialog({
    title: "Remove this booking?",
    message: "The hotel reservation entry will be removed from your trip. You can re-add it later.",
    confirmLabel: "Remove",
    danger: true
  });
  if (!ok) return;
  const t = currentTrip();
  const slot = ensureStaySlot(t, stayId);
  slot.bookings = slot.bookings.filter(b => b.id !== bookingId);
  // If this also clears a legacy selectedOptionId match, clear that too.
  showToast("Booking removed");
  persist();
  render();
}

// Edit dates on an existing booking (just a thin wrapper for clarity).
function editStayBooking(stayId, bookingId) {
  addStayBooking(stayId, null, bookingId);
}

/* === DINING SELECTION === */

function renderDiningSelection(area, t, stayId) {
  const stay = (t.stays || []).find(s => s.id === stayId);
  if (!stay) {
    area.innerHTML = `<div class="sel-empty">Stay not found.</div>`;
    return;
  }
  const slot = ensureDiningSlot(t, stayId);
  const cityPlaces = getCityPlaces(stay.city);
  // Merge with custom places for this city
  const customDining = (userSettings.customPlaces || []).filter(p => p.city === stay.city && p.cat === "dining");
  let opts = [...customDining, ...(cityPlaces.dining || [])];

  // Merge in agent results
  const agentState = getAgentState(t, "dining", stayId);
  if (agentState.status === "results" && agentState.results.length > 0) {
    const agentItems = agentState.results.map((r, i) => {
      const virtualId = `agent-${stayId}-${i}`;
      if (!slot.agentSelections) slot.agentSelections = {};
      slot.agentSelections[virtualId] = r;
      return {
        id: virtualId,
        name: r.name || "",
        meta: [r.neighborhood, r.cuisine, r.priceTier].filter(Boolean).join(" · "),
        rating: r.rating || null,
        tags: [r.cuisine, r.priceTier].filter(Boolean),
        website: r.website || null,
        why: r.why || "",
        _isAgent: true,
        _agentIndex: i
      };
    });
    opts = [...agentItems, ...opts];
  }

  // Filter by cuisine — if filters set, must match at least one tag.
  // Normalize labels to their short-tag form (e.g. "Steakhouse" → "Steak")
  // so settings prefs match place tags.
  if (slot.cuisineFilters.length > 0) {

    const norms = slot.priceFilters.map(normalizePrefTag);
    opts = opts.filter(o => (o.tags || []).some(tag => norms.includes(tag)));
  }
  // Sort
  if (slot.sort === "rating") opts.sort((a, b) => (b.rating || 0) - (a.rating || 0));

  // Mirror filter chip lists from CATALOG — see renderStaySelection for rationale.
  const CUISINE_OPTIONS = CATALOG.cuisines;

  const MEAL_OPTIONS = CATALOG.meals;

  area.innerHTML = `

    <div class="sel-detail">
      <div class="sel-detail-header">
        <div class="sel-detail-title">${stay.city} dining</div>
        <div class="sel-detail-sub">${slot.selectedIds.length} planned</div>
      </div>

      <div class="sel-filters">
        <div class="sel-filter-row">
          <div class="sel-filter-label">Cuisine</div>
          <div class="sel-filter-chips">
            ${CUISINE_OPTIONS.map(opt => `
              <span class="sel-chip ${slot.cuisineFilters.includes(opt) ? 'active' : ''}" onclick="toggleDiningFilter('${stayId}', 'cuisineFilters', ${attrJS(opt)})">${opt}</span>
            `).join("")}
          </div>
        </div>
        <div class="sel-filter-row">
          <div class="sel-filter-label">Price</div>
          <div class="sel-filter-chips">
            ${PRICE_OPTIONS.map(opt => `
              <span class="sel-chip ${slot.priceFilters.includes(opt) ? 'active' : ''}" onclick="toggleDiningFilter('${stayId}', 'priceFilters', ${attrJS(opt)})">${opt}</span>
            `).join("")}
          </div>
        </div>
        <div class="sel-filter-row">
          <div class="sel-filter-label">Meal</div>
          <div class="sel-filter-chips">
            ${MEAL_OPTIONS.map(opt => `
              <span class="sel-chip ${slot.mealFilters.includes(opt) ? 'active' : ''}" onclick="toggleDiningFilter('${stayId}', 'mealFilters', ${attrJS(opt)})">${opt}</span>
            `).join("")}
          </div>
        </div>
        <div class="sel-filter-row">
          <div class="sel-filter-label">Sort</div>
          <select class="sel-filter-select" onchange="setDiningSort('${stayId}', this.value)">
            <option value="best" ${slot.sort === 'best' ? 'selected' : ''}>Best fit</option>
            <option value="rating" ${slot.sort === 'rating' ? 'selected' : ''}>Rating</option>
          </select>
        </div>
      </div>

   a specific day in the Itinerary.

// Look up the full data for a shortlisted item — it may be a real catalog place,
// a custom place, or a virtual agent result (stashed in slot.agentSelections).
function resolveShortlistItem(category, stayId, itemId) {
  const t = currentTrip();
  const stay = (t.stays || []).find(s => s.id === stayId);
  if (!stay) return null;
  const slot = (category === "dining" ? ensureDiningSlot : ensureSightsSlot)(t, stayId);

  // Agent virtual result?
  if (slot.agentSelections && slot.agentSelections[itemId]) {
    const r = slot.agentSelections[itemId];
    return {
      isAgent: true,
      id: itemId,
      name: r.name,
      meta: category === "dining"
        ? `${r.cuisine || ""}${r.priceTier ? " · " + r.priceTier : ""}`.trim()
        : `${r.category || ""}${r.timeNeeded ? " · " + r.timeNeeded : ""}`.trim(),
      raw: r
    };
  }

  // Custom place (user added via Plan)
  const customMatch = (userSettings.customPlaces || []).find(p => p.id === itemId);
  if (customMatch) {
    return { isAgent: false, isCustom: true, id: itemId, name: customMatch.name, meta: customMatch.meta || "" };
  }

  // Curated catalog place
  const cityPlaces = getCityPlaces(stay.city);
  const list = cityPlaces[category] || [];
  const found = list.find(p => p.id === itemId);
  if (found) return { isAgent: false, id: itemId, name: found.name, meta: found.meta || "" };

  return null;
}

// Open the day/period/time picker modal
function openScheduleDialog(category, stayId, itemId, itemName) {
  const t = currentTrip();
  const stay = (t.stays || []).find(s => s.id === stayId);
  if (!stay) return;

  // Build the list of valid days from the stay's check-in to check-out (inclusive)
  const days = [];
  if (stay.checkIn && stay.checkOut) {
    let d = new Date(stay.checkIn + "T00:00:00");
    const end = new Date(stay.checkOut + "T00:00:00");
    while (d <= end) {
      days.push(toLocalDateStr(d));
      d.setDate(d.getDate() + 1);
    }
  }
  if (days.length === 0) {
    showToast("Set check-in and check-out dates first");
    return;
  }

  const periods = category === "dining"
    ? ["Breakfast", "Lunch", "Dinner", "Drinks"]
    : ["Morning", "Afternoon", "Evening"];

  // Local state for the dialog
  const state = {
    day: days[0],
    period: periods[0],
    time: ""
  };

  function renderDialog() {
    const fmtDay = (d) => new Date(d + "T00:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
    // Category-specific verbs so the dialog matches what the user tapped to
    // get here. "Reserve [Restaurant]" reads better than "Schedule [Restaurant]"
    // and signals what kind of commitment they're making.
    const verb = category === "dining" ? "Reserve" : "Plan";
    const saveLabel = category === "dining" ? "Reserve" : "Plan it";
    const html = `
      <div class="modal-sheet" style="max-height: 65%;">
        <div class="modal-handle"></div>
        <div class="modal-header">
          <div class="modal-title">${verb} ${itemName}</div>
          <div class="modal-close" onclick="closeModal()">×</div>
        </div>
        <div class="modal-body">
          <div class="nt-section">
            <div class="nt-field">
              <label class="nt-label">Day</label>
              <select id="sched-day" class="sp-select">
                ${days.map(d => `<option value="${d}" ${state.day === d ? 'selected' : ''}>${fmtDay(d)}</option>`).join("")}
              </select>
            </div>
            <div class="nt-field">
              <label class="nt-label">${category === "dining" ? "Meal" : "Period"}</label>
              <div class="sel-filter-chips" id="sched-period-chips">
                ${renderPeriodChips()}
              </div>
              <div class="nt-sub-hint" id="sched-period-hint" style="display:none;">Greyed slots are already booked. Add a specific time below to schedule alongside an existing item.</div>
            </div>
            <div class="nt-field">
              <label class="nt-label">Time (optional)</label>
              <input type="time" id="sched-time" value="${state.time}">
              <div class="nt-sub-hint">e.g., 7:30 PM. Leave blank if you don't have a specific time yet.</div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <span class="btn" onclick="closeModal()">Cancel</span>
          <span class="btn btn-primary" id="sched-save">${saveLabel}</span>
        </div>
      </div>
    `;
    openModal(html);

    // Wire inputs
    document.getElementById("sched-day").onchange = (e) => {
      state.day = e.target.value;
      // Re-render period chips since unavailable slots depend on the day
      const wrap = document.getElementById("sched-period-chips");
      if (wrap) wrap.innerHTML = renderPeriodChips();
      bindPeriodChips();
      updatePeriodHint();
    };
    document.getElementById("sched-time").oninput = (e) => { state.time = e.target.value; };
    bindPeriodChips();
    updatePeriodHint();
    document.getElementById("sched-save").onclick = () => {
      scheduleShortlistedItem(category, stayId, itemId, state);
    };
  }

  function renderPeriodChips() {
    const taken = unavailablePeriodsForDate(currentTrip(), category, state.day);
    return periods.map(p => {
      const isUnavail = taken.has(p);
      // If the currently-selected period is now unavailable on this day,
      // auto-pick the first available one so we don't ship a conflict.
      if (isUnavail && state.period === p) {
        const firstAvail = periods.find(x => !taken.has(x));
        if (firstAvail) state.period = firstAvail;
      }
      return `<span class="sel-chip ${state.period === p ? 'active' : ''} ${isUnavail ? 'sel-chip-unavailable' : ''}" data-period="${p}" data-unavail="${isUnavail ? '1' : '0'}">${p}${isUnavail ? ' · taken' : ''}</span>`;
    }).join("");
  }

  function bindPeriodChips() {
    document.querySelectorAll("#sched-period-chips .sel-chip").forEach(chip => {
      chip.onclick = () => {
        // Allow tapping a "taken" chip — but show a hint that they need to
        // add a specific time to disambiguate from the existing item.
        state.period = chip.dataset.period;
        document.querySelectorAll("#sched-period-chips .sel-chip").forEach(c => c.classList.remove("active"));
        chip.classList.add("active");
        updatePeriodHint();
      };
    });
  }

  function updatePeriodHint() {
    const taken = unavailablePeriodsForDate(currentTrip(), category, state.day);
    const hint = document.getElementById("sched-period-hint");
    if (hint) hint.style.display = taken.size > 0 ? "block" : "none";
  }

  renderDialog();
}

// Detect if the proposed schedule would conflict with an existing dayItem.
// Returns the conflicting item, or null if no conflict.
//
// Dining: any two dining items on the same date conflict by default. Meals
//   are inherently slotted (Breakfast/Lunch/Dinner/Drinks) and people don't
//   typically schedule two different restaurants for the same meal. We check
//   period for precision when both are set, but err toward blocking.
// Sights: same (date, period) conflicts. If both items have a specific time
//   set, only an exact match counts as a conflict (so you can schedule two
//   morning sights at 9:00 and 11:00).
// excludeId lets a reschedule operation skip the item being moved so it
//   doesn't conflict with itself.
// Map a period (from either category vocabulary) to a normalized time-of-day
// bucket so we can detect cross-category conflicts. Returns null if the
// period doesn't fit cleanly into a bucket.
function periodToBucket(period) {
  if (!period) return null;
  const p = String(period).toLowerCase();
  if (p === "breakfast" || p === "morning") return "morning";
  if (p === "lunch" || p === "afternoon") return "afternoon";
  if (p === "dinner" || p === "drinks" || p === "evening") return "evening";
  return null;
}

// Detect if scheduling at (date, period, time) would conflict with an
// existing dayItem. Returns the conflicting item, or null.
//
// Conflict rule (across categories):
//   Two items collide if they're on the same date and resolve to the same
//   time-of-day bucket (morning / afternoon / evening). Dining "Lunch" and
//   sights "Afternoon" both bucket to "afternoon" → conflict.
//
// Specific-time override:
//   If BOTH items have an explicit time (e.g. "09:00" and "11:00") AND the
//   times differ, they don't conflict. This lets the user schedule two
//   morning sights at different specific times.
//
// excludeId lets reschedules skip the item being moved.
function findScheduleConflict(t, category, date, period, time, excludeId) {
  const myBucket = periodToBucket(period);
  if (!myBucket) return null;
  const items = (t.dayItems && t.dayItems[date]) || [];
  for (const it of items) {
    if (excludeId && it.id === excludeId) continue;
    // Stays don't go in dayItems but if they did, they wouldn't conflict
    // with single-period scheduling. Skip transport too.
    if (it.category !== "dining" && it.category !== "sights") continue;
    const itBucket = periodToBucket(it.period);
    if (!itBucket || itBucket !== myBucket) continue;
    // Both have specific times → exact match needed for conflict
    if (it.time && time && it.time !== time) continue;
    return it;
  }
  return null;
}

// Returns a Set of period names that are unavailable on the given date for
// the given category. Used by the schedule dialog to grey out chips for
// time slots that are already taken (across categories).
function unavailablePeriodsForDate(t, category, date, excludeId) {
  const periods = category === "dining"
    ? ["Breakfast", "Lunch", "Dinner", "Drinks"]
    : ["Morning", "Afternoon", "Evening"];
  const unavailable = new Set();
  for (const p of periods) {
    if (findScheduleConflict(t, category, date, p, "", excludeId)) {
      unavailable.add(p);
    }
  }
  return unavailable;
}

// Convert a shortlisted item into a scheduled dayItem and remove from shortlist
function scheduleShortlistedItem(category, stayId, itemId, schedule) {
  const t = currentTrip();
  const slot = (category === "dining" ? ensureDiningSlot : ensureSightsSlot)(t, stayId);
  const item = resolveShortlistItem(category, stayId, itemId);
  if (!item) {
    showToast("Couldn't find that item");
    return;
  }

  // Conflict guard — prevent double-booking the same (date, meal) for dining
  // or the same (date, period) for sights. Times that match exactly also
  // collide. The user can still schedule different items at different times
  // on the same day; we only block when both items want the same slot.
  const conflict = findScheduleConflict(t, category, schedule.day, schedule.period, schedule.time);
  if (conflict) {
    const fmtWhen = category === "dining"
      ? schedule.period
      : (schedule.time ? `${schedule.period} at ${schedule.time}` : schedule.period);
    showToast(`Already booked for ${fmtWhen} that day: ${conflict.name}`);
    return;
  }

  // Build the dayItem record (matches existing dayItems structure)
  if (!t.dayItems) t.dayItems = {};
  if (!t.dayItems[schedule.day]) t.dayItems[schedule.day] = [];
  const dayItem = {
    id: "di-" + Date.now(),
    category: category,
    placeId: item.id,
    name: item.name,
    sub: item.meta,
    period: schedule.period,
    time: schedule.time || "",
    // Provenance — track where this came from so unscheduling can put it back
    fromSelection: { category, stayId, itemId, isAgent: item.isAgent || false }
  };
  // If from agent, snapshot the full result so dayItem renders correctly without lookup
  if (item.isAgent && slot.agentSelections?.[itemId]) {
    dayItem.agentSnapshot = slot.agentSelections[itemId];
  }
  t.dayItems[schedule.day].push(dayItem);

  // Auto-resolve stale instances: if this same shortlist item has any OTHER
  // dayItems whose dates are now outside every stay window or in a different
  // city than this stay, remove them. This way "rescheduling" an orphaned/
  // shifted item via the Schedule dialog truly replaces the bad date instead
  // of leaving a duplicate behind.
  //
  // We match three ways (any one is enough), in order of preference:
  //   1. fromSelection match (category + stayId + itemId) — most precise
  //   2. placeId match — works when fromSelection is missing/incomplete
  //   3. name match — last-resort fallback for legacy items without provenance
  //
  // We never remove dayItems on legitimate in-window dates — those are real
  // "scheduled another time" records the user wanted.
  const stays = t.stays || [];
  const inWindow = (date) => stays.some(s => date >= s.checkIn && date < s.checkOut);
  const cityForDate = (date) => (stays.find(s => date >= s.checkIn && date < s.checkOut) || {}).city || null;
  const thisStay = stays.find(s => s.id === stayId);
  const thisStayCity = thisStay ? thisStay.city : null;

  // Match identity for "same shortlist item." The new dayItem's placeId and
  // name are our reference points; legacy instances may have one without the
  // other.
  const refPlaceId = item.id || dayItem.placeId || null;
  const refName = (item.name || dayItem.name || "").trim().toLowerCase();

  let resolvedCount = 0;
  Object.entries(t.dayItems).forEach(([date, items]) => {
    if (!items || items.length === 0) return;
    // Don't touch the date we just added to
    if (date === schedule.day) return;
    t.dayItems[date] = items.filter(it => {
      if (it.id === dayItem.id) return true; // never drop the just-added one
      if (it.category !== category) return true;
      // Three-tier match: fromSelection → placeId → name
      const matchesProvenance =
        it.fromSelection &&
        it.fromSelection.stayId === stayId &&
        it.fromSelection.itemId === itemId;
      const matchesPlaceId = !!refPlaceId && it.placeId === refPlaceId;
      const matchesName = !!refName && (it.name || "").trim().toLowerCase() === refName;
      const isSameItem = matchesProvenance || matchesPlaceId || matchesName;
      if (!isSameItem) return true;
      // Same item — drop only if this date is currently a problem:
      //   - outside every stay window (orphan)   OR
      //   - now in a different city than the stay this item belongs to (city-shift)
      const isOrphan = !inWindow(date);
      const currentCity = cityForDate(date);
      const isShifted = currentCity && thisStayCity && currentCity !== thisStayCity;
      if (isOrphan || isShifted) {
        resolvedCount++;
        return false; // drop
      }
      return true; // keep — legitimate "scheduled another time"
    });
    if (t.dayItems[date].length === 0) delete t.dayItems[date];
  });

  // Also clean up trip.dateWarning entries that referenced any dayItem we just
  // dropped, so the live filter doesn't have to wait for the next render to
  // re-evaluate. (renderDateChangeWarning will also clear empty warnings, but
  // updating eagerly here keeps the model consistent.)
  if (resolvedCount > 0 && t.dateWarning) {
    const stillExists = (id) => Object.values(t.dayItems).some(arr => arr.some(it => it.id === id));
    if (Array.isArray(t.dateWarning.orphaned)) {
      t.dateWarning.orphaned = t.dateWarning.orphaned.filter(o => stillExists(o.dayItemId));
    }
    if (Array.isArray(t.dateWarning.stayChanged)) {
      t.dateWarning.stayChanged = t.dateWarning.stayChanged.filter(s => stillExists(s.dayItemId));
    }
    if ((t.dateWarning.orphaned || []).length === 0 && (t.dateWarning.stayChanged || []).length === 0) {
      t.dateWarning = null;
    }
  }

  // Make sure the item is in selectedIds so it persists on the trip and shows
  // a "scheduled" visual on the Plan list. (Was previously REMOVING; the new
  // model keeps it in the shortlist so users can schedule the same item again.)
  if (!slot.selectedIds.includes(itemId)) {
    slot.selectedIds.push(itemId);
  }

  closeModal();
  const nice = new Date(schedule.day + "T00:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
  const verbed = category === "dining" ? "Reserved for" : "Planned for";
  if (resolvedCount > 0) {
    showToast(`Rebooked to ${nice} · old date${resolvedCount === 1 ? "" : "s"} removed`);
  } else {
    showToast(`${verbed} ${nice}`);
  }
  persist();
  render();
}

// Reverse: move a scheduled dayItem back to the shortlist
// Check if a dining/sights item from a stay is scheduled anywhere on the trip.
// Returns the array of {date, dayItemId} for each scheduled instance.
function getScheduledInstances(t, category, stayId, itemId) {
  const matches = [];
  if (!t.dayItems) return matches;
  Object.entries(t.dayItems).forEach(([date, items]) => {
    items.forEach(it => {
      if (
        it.category === category &&
        it.fromSelection &&
        it.fromSelection.stayId === stayId &&
        it.fromSelection.itemId === itemId
      ) {
        matches.push({ date, dayItemId: it.id });
      }
    });
  });
  return matches;
}

// Remove a place from the shortlist AND unschedule every instance of it on the trip.
// Used by the new "Remove" button on dining/sights cards.
function removePlaceFromTrip(category, stayId, itemId) {
  const t = currentTrip();
  // Unschedule every dayItem that came from this selection
  const instances = getScheduledInstances(t, category, stayId, itemId);
  instances.forEach(({ date, dayItemId }) => {
    const items = t.dayItems[date];
    if (!items) return;
    const idx = items.findIndex(i => i.id === dayItemId);
    if (idx !== -1) items.splice(idx, 1);
    if (items.length === 0) delete t.dayItems[date];
  });
  // Remove from selectedIds (so the card's "scheduled" visual reverts)
  const slot = (category === "dining" ? ensureDiningSlot : ensureSightsSlot)(currentTrip(), stayId);
  const sIdx = slot.selectedIds.indexOf(itemId);
  if (sIdx !== -1) slot.selectedIds.splice(sIdx, 1);
  if (instances.length > 0) {
    showToast(`Removed ${instances.length} scheduled instance${instances.length === 1 ? '' : 's'}`);
  } else {
    showToast("Removed");
  }
  persist();
  render();
}

function unscheduleDayItem(date, dayItemId) {
  const t = currentTrip();
  const items = t.dayItems[date];
  if (!items) return;
  const idx = items.findIndex(i => i.id === dayItemId);
  if (idx === -1) return;
  const dayItem = items[idx];

  // If we have provenance, put it back on the relevant shortlist
  if (dayItem.fromSelection) {
    const { category, stayId, itemId } = dayItem.fromSelection;
    const slot = (category === "dining" ? ensureDiningSlot : ensureSightsSlot)(t, stayId);
    if (!slot.selectedIds.includes(itemId)) {
      slot.selectedIds.push(itemId);
    }
    // Also restore the agentSelections snapshot if applicable (in case it was lost)
    if (dayItem.agentSnapshot) {
      if (!slot.agentSelections) slot.agentSelections = {};
      slot.agentSelections[itemId] = dayItem.agentSnapshot;
    }
  }

  // Remove from dayItems
  items.splice(idx, 1);
  if (!items.length) delete t.dayItems[date];

  showToast("Removed from itinerary");
  persist();
  render();
}

function categoryLabel(cat) {
  return ({ stay: "Stay", dining: "Dining", sights: "Sight", transport: "Transport" })[cat] || cat;
}

function setPlanCat(cat) { app.planCat = cat; render(); }

function isItemAdded(placeId) {
  const t = currentTrip();
  return Object.values(t.dayItems).flat().some(i => i.placeId === placeId);
}

/* ======= MAP =======
   Pure-SVG coordinate-grid map. No external network calls. No tile servers.
   Pins are projected from lat/lng to SVG coords using a simple equirectangular
   projection centered on the city centroid. Works in any environment.
   Pan: drag. Zoom: + / − buttons (or pinch on touch).
*/

let _gridMapState = null; // { centerLat, centerLng, zoom, panX, panY, isPanning }

function setPlanCity(city) {
  app.planCity = city;
  app.selectedPinId = null;
  _gridMapState = null; // reset view on city change
  _leafletLastView = null; // Leaflet: also reset so fitBounds runs fresh
  render();
}

function setMapMode(mode) {
  if (app.mapMode === mode) return;
  app.mapMode = mode;
  app.selectedPinId = null;
  _gridMapState = null;
  _leafletLastView = null; // Leaflet: re-fit when toggling Plan vs My Trip
  render();
}

function renderMap(area) {
  const t = currentTrip();
  if (!t) {
    area.innerHTML = `<div style="padding:24px;text-align:center;color:var(--text-secondary);">No trip selected.</div>`;
    return;
  }

  if (!t.cities.includes(app.planCity)) {
    app.planCity = t.cities[0];
  }

  const allPins = app.mapMode === "plan"
    ? collectPlanPins(app.planCity)
    : collectTripPins(t, app.planCity);

  const visible = allPins.filter(p => app.mapFilters.has(p.cat));

  area.innerHTML = `
    <div class="map-mode-toggle">
      <div class="map-mode-btn ${app.mapMode === 'trip' ? 'active' : ''}" onclick="setMapMode('trip')">My trip</div>
      <div class="map-mode-btn ${app.mapMode === 'plan' ? 'active' : ''}" onclick="setMapMode('plan')">Plan</div>
    </div>
    <div class="city-picker">
      ${t.cities.map(c => `
        <div class="city-btn ${app.planCity === c ? 'active' : ''}" onclick="setPlanCity('${c}')">
          ${c}
        </div>
      `).join("")}
    </div>
    <div class="map-container">
      <div class="map-filters">
        <div class="map-filter ${app.mapFilters.has('transport') ? 'active' : ''}" data-cat="transport" onclick="toggleMapFilter('transport')"><span class="dot"></span>Transport</div>
        <div class="map-filter ${app.mapFilters.has('stay') ? 'active' : ''}" data-cat="stay" onclick="toggleMapFilter('stay')"><span class="dot"></span>Stay</div>
        <div class="map-filter ${app.mapFilters.has('dining') ? 'active' : ''}" data-cat="dining" onclick="toggleMapFilter('dining')"><span class="dot"></span>Dining</div>
        <div class="map-filter ${app.mapFilters.has('sights') ? 'active' : ''}" data-cat="sights" onclick="toggleMapFilter('sights')"><span class="dot"></span>Sights</div>
      </div>
      <div class="map-svg-wrap" id="grid-map-wrap">
        <!-- Day 16: Real OSM tiles via Leaflet. The empty <div id="leaflet-map">
             is populated by initLeafletMap() after innerHTML settles. -->
        <div class="leaflet-map" id="leaflet-map"></div>
        <div class="map-zoom-controls">
          <button class="map-zoom-btn" onclick="leafletMapZoom(1)">+</button>
          <button class="map-zoom-btn" onclick="leafletMapZoom(-1)">−</button>
          <button class="map-zoom-btn map-zoom-fit" onclick="leafletMapFit()" title="Fit to pins">⊡</button>
        </div>
        ${renderMapEmptyOverlay(visible, allPins, t)}
        <div class="map-popup" id="map-popup"></div>
      </div>
    </div>
  `;

  // Wire up the Leaflet map. Done after innerHTML so the container exists.
  initLeafletMap(visible, app.planCity);
}

/* ============================================================
   LEAFLET MAP (Day 16)
   ============================================================
   Replaces the hand-drawn SVG grid map with real OpenStreetMap tiles.
   - Free, no API key, no signup. OSM Standard tile server is fine for
     personal/dev usage under their fair-use policy.
   - We keep ONE singleton Leaflet instance per render cycle. Leaflet
     doesn't like being initialized on a container that already has a
     map attached, so we re-create it every renderMap() pass and let
     the old DOM be garbage-collected when innerHTML replaces it.
   - Pin click handlers mirror the SVG pin behavior exactly so
     showMapPopup() (and all its 4-button logic) works unchanged.
   - Custom +/-/fit buttons drive `_leafletMap.zoomIn/Out/fitBounds`
     so the visual chrome stays identical to the grid-map era.
*/

// Singleton: holds the current Leaflet map instance + its marker layer.
// Reset on every renderMap() call.
let _leafletMap = null;
let _leafletMarkers = [];   // {marker, pin} pairs for selection logic
let _leafletPinsBounds = null; // L.LatLngBounds of all visible pins, for fit
// Preserve view (center + zoom) across re-renders so that interactions
// like dismissing a popup or toggling a filter don't snap the map back
// to its default fit. Keyed by city so switching cities still re-fits.
let _leafletLastView = null; // { city, lat, lng, zoom }

function initLeafletMap(pins, city) {
  // Capture current view BEFORE tearing down so we can restore it if
  // this re-render is for the same city.
  if (_leafletMap) {
    try {
      const c = _leafletMap.getCenter();
      _leafletLastView = {
        city: _leafletLastView ? _leafletLastView.city : city,
        lat: c.lat, lng: c.lng, zoom: _leafletMap.getZoom()
      };
    } catch (e) { /* map already torn down */ }
    try { _leafletMap.remove(); } catch (e) { /* container already gone */ }
    _leafletMap = null;
    _leafletMarkers = [];
  }

  const container = document.getElementById("leaflet-map");
  if (!container) return;

  // Leaflet not loaded yet (rare CDN flake). Show a soft fallback so
  // the rest of the UI keeps working.
  if (typeof L === "undefined") {
    container.innerHTML = `<div style="padding:24px;text-align:center;color:var(--text-secondary);font-size:13px;">
      Map tiles couldn't load. Check your internet connection.
    </div>`;
    return;
  }

  const center = CITY_CENTERS[city] || { lat: 0, lng: 0, zoom: 12 };

  // Decide initial view:
  //   - Same-city re-render: restore previous pan/zoom (preserves user state)
  //   - Different city OR first render: use city centroid; fitBounds runs later
  const restoreView = _leafletLastView && _leafletLastView.city === city;
  const initLat = restoreView ? _leafletLastView.lat : center.lat;
  const initLng = restoreView ? _leafletLastView.lng : center.lng;
  const initZoom = restoreView ? _leafletLastView.zoom : (center.zoom || 12);
  // Remember the city we're now showing for the NEXT re-render
  _leafletLastView = { city, lat: initLat, lng: initLng, zoom: initZoom };

  // Create the map. zoomControl:false because we render our own buttons.
  // attributionControl:true is required by OSM's terms of use.
  _leafletMap = L.map(container, {
    center: [initLat, initLng],
    zoom: initZoom,
    zoomControl: false,
    attributionControl: true,
    // Smooth wheel zoom feels more like a native map app than stepped.
    scrollWheelZoom: true,
    // Disable double-click zoom — feels accidental on touch devices and
    // we want taps to register reliably on pins.
    doubleClickZoom: false
  });

  // Keep _leafletLastView in sync as the user pans/zooms so the next
  // re-render starts from where they left off.
  _leafletMap.on("moveend zoomend", () => {
    if (!_leafletMap) return;
    const c = _leafletMap.getCenter();
    _leafletLastView = { city, lat: c.lat, lng: c.lng, zoom: _leafletMap.getZoom() };
  });

  // OSM Standard tiles. Free, no key. The {s}.tile.openstreetmap.org
  // subdomain rotation is recommended in their usage policy to spread load.
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a>'
  }).addTo(_leafletMap);

  // Render pins. Each pin becomes an L.marker with a divIcon so we can
  // style them with our own CSS (cat-stay, cat-dining, etc.) and inherit
  // the design tokens automatically. Click handlers route to the same
  // showMapPopup() the grid map used — popup logic is unchanged.
  const latlngs = [];
  _leafletMarkers = pins.map(p => {
    if (typeof p.lat !== "number" || typeof p.lng !== "number") return null;
    const isSelected = app.selectedPinId === p.id;
    const icon = L.divIcon({
      className: "lpin-wrap",
      html: `<div class="lpin cat-${p.cat} ${isSelected ? 'selected' : ''}">
               <span class="lpin-inner">${categoryGlyph(p.cat)}</span>
             </div>`,
      iconSize: [28, 28],
      iconAnchor: [14, 28] // bottom-center of the teardrop
    });
    // bubblingMouseEvents:false is the Leaflet-idiomatic way to prevent
    // marker clicks from also firing the map's click handler. Stopping
    // propagation on the event object alone was unreliable on touch
    // devices because Leaflet wraps pointer events and the wrapped
    // event's stopPropagation doesn't always reach the map handler.
    // Setting this flag on the marker itself tells Leaflet's event
    // system at the framework level. interactive:true is the default
    // but we set it explicitly for clarity — the divIcon must be
    // interactive for click events to fire.
    const m = L.marker([p.lat, p.lng], {
      icon,
      bubblingMouseEvents: false,
      interactive: true,
      // riseOnHover lifts the selected/hovered pin above its neighbors
      // so dense pin clusters are tappable.
      riseOnHover: true
    }).addTo(_leafletMap);
    m.on("click", (ev) => {
      // Belt-and-suspenders: also stop the underlying DOM event in case
      // bubblingMouseEvents misses an edge case (older Leaflet, weird
      // mobile browser quirks).
      if (ev.originalEvent) {
        try { ev.originalEvent.stopPropagation(); } catch (e) { /* ignore */ }
      }
      app.selectedPinId = p.id;
      showMapPopup(p);
      refreshLeafletPinSelection();
    });
    latlngs.push([p.lat, p.lng]);
    return { marker: m, pin: p };
  }).filter(Boolean);

  // Fit bounds if we have pins AND this is the first time we're showing
  // this city (no restored view). Otherwise honor the user's current pan/zoom.
  if (latlngs.length > 0) {
    _leafletPinsBounds = L.latLngBounds(latlngs);
    if (!restoreView) {
      _leafletMap.fitBounds(_leafletPinsBounds, { padding: [40, 40], maxZoom: 15 });
    }
  } else {
    _leafletPinsBounds = null;
  }

  // Tapping empty map area clears the selected pin / popup, matching
  // the grid map's behavior.
  _leafletMap.on("click", () => {
    if (app.selectedPinId) {
      clearMapPin();
    }
  });

  // Restore popup if there was one selected before this render
  if (app.selectedPinId) {
    const sel = pins.find(p => p.id === app.selectedPinId);
    if (sel) showMapPopup(sel);
  }
}

// Map category to a short glyph for the pin face. Tiny, but adds
// scannability when there are many pins of mixed type on screen.
function categoryGlyph(cat) {
  return cat === "stay" ? "🛏" :
         cat === "transport" ? "✈" :
         cat === "dining" ? "🍴" :
         cat === "sights" ? "★" : "·";
}

// Update selection visual without rebuilding the whole map. Walks the
// existing markers and rewrites their divIcon html in place.
function refreshLeafletPinSelection() {
  _leafletMarkers.forEach(({ marker, pin }) => {
    const isSelected = app.selectedPinId === pin.id;
    marker.setIcon(L.divIcon({
      className: "lpin-wrap",
      html: `<div class="lpin cat-${pin.cat} ${isSelected ? 'selected' : ''}">
               <span class="lpin-inner">${categoryGlyph(pin.cat)}</span>
             </div>`,
      iconSize: [28, 28],
      iconAnchor: [14, 28]
    }));
  });
}

// Zoom controls — driven by our custom +/− buttons. Delta of +1/-1
// matches one Leaflet zoom level, which feels like a satisfying step.
function leafletMapZoom(delta) {
  if (!_leafletMap) return;
  _leafletMap.setZoom(_leafletMap.getZoom() + delta);
}

// Fit to pins, falling back to city center if no pins are visible.
function leafletMapFit() {
  if (!_leafletMap) return;
  if (_leafletPinsBounds) {
    _leafletMap.fitBounds(_leafletPinsBounds, { padding: [40, 40], maxZoom: 15 });
  } else {
    const center = CITY_CENTERS[app.planCity] || { lat: 0, lng: 0, zoom: 12 };
    _leafletMap.setView([center.lat, center.lng], center.zoom || 12);
  }
}

// Build the polished SVG grid map. Pins projected onto the grid by lat/lng.
// Features rendered in layers, bottom to top:
//   1. Cream land background
//   2. Subtle dot pattern + km grid lines (stronger contrast than v1)
//   3. Distance rings around city center (1km, 3km, 5km)
//   4. Parks / green spaces
//   5. Water bodies / harbors
//   6. River path (smoothed cubic bezier through waypoints)
//   7. Neighborhood labels
//   8. City center marker
//   9. Compass rose (top-left)
//  10. Landmarks (small glyph icons at exact coords)
//  11. Distance scale bar (bottom-right)
//  12. User pins (last so they're always visible on top)
function renderGridMap(pins, city) {
  const center = CITY_CENTERS[city] || { lat: 0, lng: 0, zoom: 12 };
  const features = CITY_FEATURES[city] || {};

  // 1 degree latitude ≈ 111 km. 1 degree longitude ≈ 111 km × cos(lat).
  const lngScale = Math.cos(center.lat * Math.PI / 180);
  const defaultHalfDeg = 6 / 111 / 2; // ±3 km

  let minLat = center.lat - defaultHalfDeg;
  let maxLat = center.lat + defaultHalfDeg;
  let minLng = center.lng - defaultHalfDeg / lngScale;
  let maxLng = center.lng + defaultHalfDeg / lngScale;

  // Always include the river / neighborhoods / landmarks in the bounds so the
  // city's geography is visible even if the user has no pins. This makes the
  // map feel "full" of context regardless of trip state.
  const allFeatPoints = [
    ...(features.outline || []),
    ...(features.river || []),
    ...(features.neighborhoods || []),
    ...(features.landmarks || []),
    ...(features.parks || []).map(p => ({ lat: p.lat, lng: p.lng }))
  ];
  allFeatPoints.forEach(p => {
    if (p.lat < minLat) minLat = p.lat;
    if (p.lat > maxLat) maxLat = p.lat;
    if (p.lng < minLng) minLng = p.lng;
    if (p.lng > maxLng) maxLng = p.lng;
  });

  pins.forEach(p => {
    if (p.lat < minLat) minLat = p.lat;
    if (p.lat > maxLat) maxLat = p.lat;
    if (p.lng < minLng) minLng = p.lng;
    if (p.lng > maxLng) maxLng = p.lng;
  });

  const latPad = (maxLat - minLat) * 0.12;
  const lngPad = (maxLng - minLng) * 0.12;
  minLat -= latPad; maxLat += latPad;
  minLng -= lngPad; maxLng += lngPad;

  if (!_gridMapState || _gridMapState.city !== city) {
    _gridMapState = { city, bounds: { minLat, maxLat, minLng, maxLng }, panX: 0, panY: 0, zoom: 1 };
  } else {
    _gridMapState.bounds = { minLat, maxLat, minLng, maxLng };
  }

  const W = 1000;
  const latSpan = maxLat - minLat;
  const lngSpan = maxLng - minLng;
  const H = Math.round(W * (latSpan / lngSpan) / lngScale);

  const project = (lat, lng) => ({
    x: ((lng - minLng) / lngSpan) * W,
    y: H - ((lat - minLat) / latSpan) * H
  });

  // ---------- LAYERS ----------

  // Distance scale
  const widthKm = lngSpan * 111 * lngScale;
  const targetKm = widthKm * 0.18;
  const scaleKm = niceScaleNumber(targetKm);
  const scaleSvgWidth = (scaleKm / widthKm) * W;

  // Grid lines every gridStepKm km
  const gridStepKm = niceScaleNumber(widthKm / 8);
  const gridStepLng = (gridStepKm / 111) / lngScale;
  const gridStepLat = gridStepKm / 111;

  const vLines = [];
  const startLng = Math.ceil(minLng / gridStepLng) * gridStepLng;
  for (let lng = startLng; lng <= maxLng; lng += gridStepLng) {
    const x = ((lng - minLng) / lngSpan) * W;
    vLines.push(`<line x1="${x}" y1="0" x2="${x}" y2="${H}" stroke="rgba(60,80,110,0.18)" stroke-width="1"/>`);
  }
  const hLines = [];
  const startLat = Math.ceil(minLat / gridStepLat) * gridStepLat;
  for (let lat = startLat; lat <= maxLat; lat += gridStepLat) {
    const y = H - ((lat - minLat) / latSpan) * H;
    hLines.push(`<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="rgba(60,80,110,0.18)" stroke-width="1"/>`);
  }

  // Distance rings around city center (1, 3, 5 km — only show ones that fit)
  const ctr = project(center.lat, center.lng);
  const kmToSvg = W / widthKm;
  const ringHtml = [1, 3, 5].map(km => {
    const r = km * kmToSvg;
    if (r > Math.max(W, H) * 0.85) return ""; // skip if larger than view
    return `
      <circle cx="${ctr.x}" cy="${ctr.y}" r="${r}" fill="none" stroke="rgba(60,80,110,0.22)" stroke-width="1" stroke-dasharray="4 4"/>
      <text x="${ctr.x + r * 0.707 + 4}" y="${ctr.y - r * 0.707 - 4}" font-size="10" font-family="system-ui, sans-serif" fill="rgba(60,80,110,0.55)" font-weight="600">${km}km</text>
    `;
  }).join("");

  // City admin outline (polygon, drawn behind everything else so other layers
  // sit on top). Filled with a slightly warmer/lighter tone than the cream
  // "outside" land plus a subtle border line — gives the map a real sense of
  // "where the city is" vs the surrounding area.
  let outlineHtml = "";
  if (features.outline && features.outline.length > 2) {
    const pts = features.outline.map(p => {
      const xy = project(p.lat, p.lng);
      return `${xy.x},${xy.y}`;
    }).join(" ");
    outlineHtml = `
      <polygon points="${pts}"
        fill="#F4EAD0"
        stroke="rgba(120,100,70,0.35)"
        stroke-width="1.5"
        stroke-dasharray="6 3"
        stroke-linejoin="round"/>
    `;
  }

  // Parks (green circles)
  const parkHtml = (features.parks || []).map(p => {
    const c = project(p.lat, p.lng);
    const rSvg = (p.r || 0.4) * kmToSvg;
    return `<circle cx="${c.x}" cy="${c.y}" r="${rSvg}" fill="#A8C896" opacity="0.45"/>`;
  }).join("");

  // Water bodies (polygons)
  const waterHtml = (features.waterBodies || []).map(poly => {
    const pts = poly.map(p => {
      const xy = project(p.lat, p.lng);
      return `${xy.x},${xy.y}`;
    }).join(" ");
    return `<polygon points="${pts}" fill="#9CC1D8" opacity="0.6" stroke="#6B96B0" stroke-width="0.5"/>`;
  }).join("");

  // River path (smooth cubic bezier through waypoints)
  let riverPath = "";
  if (features.river && features.river.length > 1) {
    const pts = features.river.map(p => project(p.lat, p.lng));
    let d = `M ${pts[0].x} ${pts[0].y}`;
    for (let i = 1; i < pts.length; i++) {
      const prev = pts[i - 1], curr = pts[i];
      // Use a control point halfway between for a gentle curve
      const mid = { x: (prev.x + curr.x) / 2, y: (prev.y + curr.y) / 2 };
      d += ` Q ${prev.x} ${prev.y} ${mid.x} ${mid.y}`;
    }
    d += ` T ${pts[pts.length - 1].x} ${pts[pts.length - 1].y}`;
    // Wider underlay + thinner top to give the river a "border"
    riverPath = `
      <path d="${d}" fill="none" stroke="#6B96B0" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
      <path d="${d}" fill="none" stroke="#9CC1D8" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
    `;
  }

  // Neighborhoods (small italic labels with subtle background)
  const neighHtml = (features.neighborhoods || []).map(n => {
    const c = project(n.lat, n.lng);
    const labelW = n.name.length * 6.5 + 8;
    return `
      <g opacity="0.85">
        <rect x="${c.x - labelW/2}" y="${c.y - 8}" width="${labelW}" height="16" rx="3" fill="rgba(255,255,255,0.7)"/>
        <text x="${c.x}" y="${c.y + 3}" text-anchor="middle" font-size="11" font-style="italic" font-family="Georgia, serif" fill="#3A4A5C" font-weight="500">${escapeHtml(n.name)}</text>
      </g>`;
  }).join("");

  // Landmarks (glyph icons)
  const landmarkHtml = (features.landmarks || []).map(l => {
    const c = project(l.lat, l.lng);
    return `
      <g>
        <circle cx="${c.x}" cy="${c.y}" r="11" fill="rgba(255,255,255,0.92)" stroke="#3A4A5C" stroke-width="1"/>
        <text x="${c.x}" y="${c.y + 4}" text-anchor="middle" font-size="13" font-family="system-ui, sans-serif">${l.glyph}</text>
        <text x="${c.x}" y="${c.y + 24}" text-anchor="middle" font-size="9.5" font-family="system-ui, sans-serif" fill="#3A4A5C" font-weight="600" stroke="white" stroke-width="2.5" paint-order="stroke">${escapeHtml(l.name)}</text>
      </g>`;
  }).join("");

  // City center crosshair
  const centerMark = `
    <g opacity="0.55">
      <circle cx="${ctr.x}" cy="${ctr.y}" r="5" fill="none" stroke="#3A4A5C" stroke-width="1.5"/>
      <circle cx="${ctr.x}" cy="${ctr.y}" r="2" fill="#3A4A5C"/>
    </g>
  `;

  // Compass rose (top-left)
  const compassRose = `
    <g transform="translate(40, 40)">
      <circle r="22" fill="rgba(255,255,255,0.85)" stroke="#3A4A5C" stroke-width="1"/>
      <polygon points="0,-18 4,0 0,2 -4,0" fill="#C44545"/>
      <polygon points="0,18 4,0 0,-2 -4,0" fill="#3A4A5C"/>
      <text x="0" y="-22" text-anchor="middle" font-size="10" font-weight="700" font-family="system-ui, sans-serif" fill="#3A4A5C">N</text>
    </g>
  `;

  // Pins (drawn last so they sit on top of everything)
  const pinElements = pins.map(p => {
    const pos = project(p.lat, p.lng);
    const isSelected = app.selectedPinId === p.id;
    const colorVar = `var(--pin-${p.cat})`;
    const letter = p.cat[0].toUpperCase();
    const ring = isSelected
      ? `<circle cx="${pos.x}" cy="${pos.y - 22}" r="22" fill="none" stroke="${colorVar}" stroke-width="3" opacity="0.4"/>`
      : "";
    return `
      ${ring}
      <g class="grid-pin" data-pin-id="${escapeHtml(String(p.id))}" style="cursor:pointer;">
        <path d="M ${pos.x} ${pos.y} C ${pos.x - 13} ${pos.y - 14} ${pos.x - 16} ${pos.y - 22} ${pos.x - 16} ${pos.y - 28} A 16 16 0 1 1 ${pos.x + 16} ${pos.y - 28} C ${pos.x + 16} ${pos.y - 22} ${pos.x + 13} ${pos.y - 14} ${pos.x} ${pos.y} Z"
              fill="${colorVar}" stroke="white" stroke-width="2" />
        <circle cx="${pos.x}" cy="${pos.y - 28}" r="9" fill="white" opacity="0.95"/>
        <text x="${pos.x}" y="${pos.y - 25}" text-anchor="middle" fill="${colorVar}"
              font-size="13" font-weight="700" font-family="system-ui, sans-serif">${letter}</text>
      </g>`;
  }).join("");

  return `
    <svg id="grid-map-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet"
         style="width:100%;height:100%;display:block;background:#EBE3D0;cursor:grab;user-select:none;-webkit-user-select:none;">
      <defs>
        <pattern id="grid-pattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
          <rect width="40" height="40" fill="#EBE3D0"/>
          <circle cx="20" cy="20" r="0.7" fill="rgba(60,80,110,0.22)"/>
        </pattern>
      </defs>
      <g id="grid-map-content">
        <rect x="0" y="0" width="${W}" height="${H}" fill="url(#grid-pattern)"/>
        ${outlineHtml}
        ${vLines.join("")}
        ${hLines.join("")}
        ${ringHtml}
        ${parkHtml}
        ${waterHtml}
        ${riverPath}
        ${centerMark}
        ${neighHtml}
        ${landmarkHtml}
        <!-- Distance scale bar (bottom-right) -->
        <g transform="translate(${W - scaleSvgWidth - 30}, ${H - 26})">
          <rect x="-8" y="-18" width="${scaleSvgWidth + 16}" height="26" fill="rgba(255,255,255,0.85)" rx="3"/>
          <line x1="0" y1="0" x2="${scaleSvgWidth}" y2="0" stroke="#3A4A5C" stroke-width="2.5"/>
          <line x1="0" y1="-5" x2="0" y2="5" stroke="#3A4A5C" stroke-width="2.5"/>
          <line x1="${scaleSvgWidth}" y1="-5" x2="${scaleSvgWidth}" y2="5" stroke="#3A4A5C" stroke-width="2.5"/>
          <text x="${scaleSvgWidth/2}" y="-7" text-anchor="middle" font-size="11" font-family="system-ui, sans-serif" fill="#3A4A5C" font-weight="600">${formatScaleKm(scaleKm)}</text>
        </g>
        ${compassRose}
        ${pinElements}
      </g>
    </svg>
  `;
}
// Pick a "nice" round number close to target for scale bar / grid spacing.
function niceScaleNumber(target) {
  if (target <= 0) return 1;
  const candidates = [0.1, 0.2, 0.25, 0.5, 1, 2, 2.5, 5, 10, 20, 25, 50, 100];
  let best = candidates[0];
  for (const c of candidates) {
    if (Math.abs(c - target) < Math.abs(best - target)) best = c;
  }
  return best;
}

function formatScaleKm(km) {
  if (km < 1) return `${(km * 1000).toFixed(0)} m`;
  return `${km} km`;
}

// Pan/zoom handlers — manipulate SVG viewBox directly for smooth interaction.
// Module-scoped state for grid-map pan/zoom — kept between renders so we can
// remove old document-level listeners before adding new ones (otherwise they
// accumulate every render and cause weird interaction bugs).
let _gridPanState = { isPanning: false, panStart: { x:0, y:0, vbX:0, vbY:0 } };
let _gridDocMouseMove = null;
let _gridDocMouseUp = null;

function attachGridMapHandlers() {
  const svg = document.getElementById("grid-map-svg");
  if (!svg) return;

  // Clean up any stale document-level listeners from a previous render
  if (_gridDocMouseMove) document.removeEventListener("mousemove", _gridDocMouseMove);
  if (_gridDocMouseUp) document.removeEventListener("mouseup", _gridDocMouseUp);

  // Read/write the SVG's viewBox
  const getVB = () => {
    const vb = svg.getAttribute("viewBox").split(/\s+/).map(Number);
    return { x: vb[0], y: vb[1], w: vb[2], h: vb[3] };
  };
  const setVB = ({ x, y, w, h }) => svg.setAttribute("viewBox", `${x} ${y} ${w} ${h}`);

  const start = (clientX, clientY) => {
    _gridPanState.isPanning = true;
    const vb = getVB();
    _gridPanState.panStart = { x: clientX, y: clientY, vbX: vb.x, vbY: vb.y };
    svg.style.cursor = "grabbing";
  };
  const move = (clientX, clientY) => {
    if (!_gridPanState.isPanning) return;
    const vb = getVB();
    const rect = svg.getBoundingClientRect();
    const scaleX = vb.w / rect.width;
    const scaleY = vb.h / rect.height;
    const dx = (clientX - _gridPanState.panStart.x) * scaleX;
    const dy = (clientY - _gridPanState.panStart.y) * scaleY;
    setVB({ x: _gridPanState.panStart.vbX - dx, y: _gridPanState.panStart.vbY - dy, w: vb.w, h: vb.h });
  };
  const end = () => {
    _gridPanState.isPanning = false;
    svg.style.cursor = "grab";
  };

  // SVG-local listeners (these go away with the SVG when render replaces it)
  svg.addEventListener("mousedown", e => {
    if (e.target.closest(".grid-pin")) return;
    e.preventDefault();
    start(e.clientX, e.clientY);
  });

  // Document-level listeners — saved to module scope so we can detach next render
  _gridDocMouseMove = e => move(e.clientX, e.clientY);
  _gridDocMouseUp = end;
  document.addEventListener("mousemove", _gridDocMouseMove);
  document.addEventListener("mouseup", _gridDocMouseUp);

  // Pin click handler — delegated to the SVG so it works for any child of <g>
  svg.addEventListener("click", e => {
    const pinG = e.target.closest(".grid-pin");
    if (!pinG) return;
    const id = pinG.getAttribute("data-pin-id");
    if (id) selectPinById(id);
  });

  // Touch — 1 finger pans, 2 fingers pinch-zoom the map. Marked
  // `passive: false` so we can preventDefault on multi-touch and stop the
  // browser's pinch-zoom-everything from kicking in. (Map container also
  // sets touch-action: none in CSS for the same reason.)
  let _pinchState = null; // { d, midX, midY }
  const distance = (a, b) => Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
  const midpoint = (a, b) => ({ x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 });

  svg.addEventListener("touchstart", e => {
    if (e.target.closest(".grid-pin")) return;
    if (e.touches.length === 2) {
      e.preventDefault();
      const [a, b] = e.touches;
      _pinchState = { d: distance(a, b), ...midpoint(a, b) };
      _gridPanState.isPanning = false; // pinch overrides pan
    } else if (e.touches.length === 1) {
      _pinchState = null;
      start(e.touches[0].clientX, e.touches[0].clientY);
    }
  }, { passive: false });
  svg.addEventListener("touchmove", e => {
    if (e.touches.length === 2 && _pinchState) {
      e.preventDefault();
      const [a, b] = e.touches;
      const newD = distance(a, b);
      if (newD === 0 || _pinchState.d === 0) return;
      const factor = newD / _pinchState.d;
      // Only fire if the change is meaningful — keeps small jitter from
      // creating a flood of viewBox updates.
      if (Math.abs(factor - 1) > 0.01) {
        const m = midpoint(a, b);
        gridMapZoomAt(factor, m.x, m.y);
        _pinchState = { d: newD, x: m.x, y: m.y };
      }
    } else if (e.touches.length === 1 && !_pinchState) {
      move(e.touches[0].clientX, e.touches[0].clientY);
    }
  }, { passive: false });
  svg.addEventListener("touchend", e => {
    if (e.touches.length < 2) _pinchState = null;
    if (e.touches.length === 0) end();
  });
  svg.addEventListener("touchcancel", e => {
    _pinchState = null;
    end();
  });

  // Wheel to zoom
  svg.addEventListener("wheel", e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    gridMapZoomAt(factor, e.clientX, e.clientY);
  }, { passive: false });
}

// Zoom by factor centered on the SVG.
function gridMapZoom(factor) {
  const svg = document.getElementById("grid-map-svg");
  if (!svg) return;
  const rect = svg.getBoundingClientRect();
  gridMapZoomAt(factor, rect.left + rect.width / 2, rect.top + rect.height / 2);
}

// Zoom by factor centered on a screen point (clientX/clientY).
function gridMapZoomAt(factor, clientX, clientY) {
  const svg = document.getElementById("grid-map-svg");
  if (!svg) return;
  const vb = svg.getAttribute("viewBox").split(/\s+/).map(Number);
  let [x, y, w, h] = vb;
  const rect = svg.getBoundingClientRect();
  const px = (clientX - rect.left) / rect.width;
  const py = (clientY - rect.top) / rect.height;
  const newW = w / factor;
  const newH = h / factor;
  // Clamp zoom: don't allow zooming in past 4x or out past 8x of the original
  // (we can re-derive original from the data, but this is good enough)
  if (newW < 100 || newW > 12000) return;
  // Adjust origin so the point under the cursor stays fixed.
  const newX = x + (px * w) - (px * newW);
  const newY = y + (py * h) - (py * newH);
  svg.setAttribute("viewBox", `${newX} ${newY} ${newW} ${newH}`);
}

// Reset view to fit all pins
function gridMapFit() {
  const svg = document.getElementById("grid-map-svg");
  if (!svg) return;
  // Just re-render — renderGridMap recomputes bounds to fit pins
  _gridMapState = null;
  render();
}

// Pin click handler called from inline onclick="selectPinById('id')".
// Re-collects the visible pin set and finds the matching record, then forwards
// to selectPin. Passing the id (a string) sidesteps attrJS's String() coercion.
function selectPinById(id) {
  const t = currentTrip();
  if (!t) return;
  const allPins = app.mapMode === "plan"
    ? collectPlanPins(app.planCity)
    : collectTripPins(t, app.planCity);
  const p = allPins.find(x => x.id === id);
  if (p) selectPin(p);
}

function selectPin(p) {
  // Tap a pin → always show the lightweight popup overlay. We never auto-route
  // to the Itinerary detail page anymore — the user said they want to stay on
  // the Map and decide whether to drill in. The popup itself offers the
  // drill-down ("Open in Itinerary") as an opt-in action, plus context-
  // appropriate Schedule / Reschedule / Details buttons.
  app.selectedPinId = p.id;
  // Render FIRST so the selected-pin highlight appears and the rebuild of
  // #screen-area doesn't destroy the popup we're about to populate. (Calling
  // showMapPopup before render is a foot-gun: render() rebuilds the whole
  // map area, which wipes the popup div that lives inside it.)
  render();
  showMapPopup(p);
}

// Find the dayItem (and its date) that this pin represents on the trip, if any.
// Used by the popup to decide whether to show "Reschedule" + "Open in Itinerary"
// (scheduled trip pin) vs "Schedule" (unscheduled catalog pin).
// Returns { date, item } or null.
function findDayItemForPin(p, t) {
  if (!p || !t) return null;
  // Stay pins are synthesized — they don't have a corresponding dayItem,
  // they map directly to a stay. Treat them as a separate case in the popup.
  if (p.cat === "stay" && p._stayId) return null;

  // First, the fast path: pin carries the date it's scheduled on
  if (p._date && t.dayItems?.[p._date]) {
    const hit = (t.dayItems[p._date] || []).find(i => i.id === p.id);
    if (hit) return { date: p._date, item: hit };
  }
  // Fallback: scan all dates. Only used if the _date hint was wrong/missing.
  for (const [date, items] of Object.entries(t.dayItems || {})) {
    const hit = (items || []).find(i => i.id === p.id);
    if (hit) return { date, item: hit };
  }
  return null;
}

// Open the Itinerary detail page for the given pin, if we can resolve a slotKey.
// Called from the popup's "Open in Itinerary" button.
function openItineraryFromPin(pinId) {
  const t = currentTrip();
  if (!t) return;
  // Re-collect pins to find the record (popup buttons don't carry the full pin object)
  const allPins = app.mapMode === "plan"
    ? collectPlanPins(app.planCity)
    : collectTripPins(t, app.planCity);
  const p = allPins.find(x => x.id === pinId);
  if (!p) return;

  // Stay pin → stay detail
  if (p.cat === "stay" && p._stayId) {
    const stay = (t.stays || []).find(s => s.id === p._stayId);
    if (!stay) return;
    app.detailReturnTab = "map";
    app.tab = "itinerary";
    app.itineraryDetail = { date: stay.checkIn, category: "stay", slotKey: stay.id };
    clearMapPin();
    render();
    const sa = document.getElementById("screen-area");
    if (sa) sa.scrollTop = 0;
    return;
  }

  // Other pins: resolve via dayItem
  const found = findDayItemForPin(p, t);
  if (!found) return;
  const { date, item } = found;
  let category = item.category;
  let slotKey;
  if (category === "dining" || category === "sights") {
    slotKey = item.id;
  } else if (category === "stay") {
    const stay = (t.stays || []).find(s => date >= s.checkIn && date < s.checkOut);
    slotKey = stay ? stay.id : null;
  } else {
    // transport doesn't have a clean detail page route from a pin; just bail.
    return;
  }
  if (!slotKey) return;

  app.detailReturnTab = "map";
  app.tab = "itinerary";
  app.itineraryDetail = { date, category, slotKey };
  clearMapPin();
  render();
  const sa = document.getElementById("screen-area");
  if (sa) sa.scrollTop = 0;
}

// Open the move/reschedule modal for a scheduled pin. Closes the map popup
// first so the modal doesn't open behind it.
function reschedulePinFromMap(date, dayItemId) {
  clearMapPin();
  openMoveItemDialog(date, dayItemId);
}

// Add a Plan-mode (catalog) pin to the itinerary. Opens the place details
// modal — that's where the "Schedule" / "Reschedule" button + the day-picker
// menu live. From the user's perspective: tap pin → popup → Schedule → see
// place details and pick a day. This mirrors the Plan list flow exactly.
function schedulePinFromMap(placeId) {
  clearMapPin();
  openDetails(placeId);
}

// Plan-mode hotel catalog pin → "Book this hotel" routes here. We close the
// popup, then jump the user into the stay selection page (where the booking
// dialog lives) and immediately open the booking date picker for this hotel.
function bookHotelFromPin(stayId, placeId) {
  clearMapPin();
  // Switch to the Plan tab → stays → this stay's selection page
  app.tab = "plan";
  app.planCat = "stay";
  app.selectionCategory = "stay";
  app.selectionSlotId = stayId;
  render();
  // Open the booking dialog directly so the user doesn't have to scroll
  // back through the list to find the hotel they just tapped on the Map.
  setTimeout(() => addStayBooking(stayId, placeId), 50);
}

function showMapPopup(p) {
  const popup = document.getElementById("map-popup");
  if (!popup) return;
  const ratingText = p.rating ? ` · ★ ${p.rating}` : "";
  const dateBadge = p._date
    ? ` · <span style="color:var(--text-accent);">Scheduled ${formatPopupDate(p._date)}${p._time ? ' ' + p._time : ''}</span>`
    : "";
  const approxBadge = p.approximate
    ? `<div style="font-size:10.5px;color:var(--text-tertiary);margin-top:2px;">📍 Approximate location — exact coordinates not available</div>`
    : "";

  // Resolve a placeId for this pin. Two pin sources have different shapes:
  //   - Plan-mode (catalog) pins come straight from PLACES; their `id` IS the
  //     place id (e.g. "lg1"). They have no separate `placeId` field.
  //   - Trip-mode pins are derived from dayItems and carry `placeId` explicitly.
  // Unify so the popup logic below can just rely on `placeId`.
  const placeId = p.placeId || (app.mapMode === "plan" ? p.id : null);

  // Always show all 4 buttons (Reschedule, Open in Itinerary, Details, Close)
  // for a consistent popup UX across pin categories. Buttons are disabled
  // (greyed out) when the action doesn't apply to this pin's type.
  const t = currentTrip();
  const found = t ? findDayItemForPin(p, t) : null;
  const isStayPin = !!(p.cat === "stay" && p._stayId);

  // Reschedule applies to:
  //   - scheduled dining/sights (move to a different day/time)
  //   - stay pins (edit booking check-in/check-out)
  const canReschedule = !!(found && (found.item.category === "dining" || found.item.category === "sights")) || isStayPin;

  // Open in Itinerary: stays (selected hotel) and scheduled dining/sights
  const canOpenItin = !!(t && (isStayPin || (found && found.item.category !== "transport")));

  // Details applies whenever we can resolve a placeId
  const canDetails = !!placeId;

  // Schedule (Plan-mode catalog dining/sights) and Book this hotel (Plan-mode
  // catalog stay) are mutually exclusive with Reschedule. We surface them as
  // alternates to the Reschedule button when this is a catalog (unscheduled) pin.
  const isPlanMode = app.mapMode === "plan";
  const stayForCity = isPlanMode && t ? (t.stays || []).find(s => s.city === app.planCity) : null;
  const canBookHotel = !!(isPlanMode && p.cat === "stay" && placeId && stayForCity);
  const canSchedule = !!(isPlanMode && placeId && !canReschedule && !canBookHotel && p.cat !== "stay");

  // Build the action button HTML. A button is rendered as enabled when its
  // action applies; otherwise it shows greyed out (the user still sees the
  // full button set so the layout doesn't shift between pin types).
  const btn = (label, action, enabled, primary) => {
    const cls = `popup-btn ${primary ? 'popup-btn-primary' : ''} ${enabled ? '' : 'popup-btn-disabled'}`;
    const onclick = enabled ? `onclick="${action}"` : '';
    return `<span class="${cls}" ${onclick}>${label}</span>`;
  };

  // Build Reschedule action depending on what kind of pin this is
  let rescheduleAction = "";
  if (isStayPin && p._bookingId) {
    rescheduleAction = `editStayBooking('${p._stayId}', '${p._bookingId}')`;
  } else if (canReschedule && found) {
    rescheduleAction = `reschedulePinFromMap('${found.date}', '${found.item.id}')`;
  }

  const buttons = [];
  // Slot 1: Rebook | Reserve/Plan | Book this hotel (whichever applies). The
  // verb depends on the pin's category so the action label matches the rest
  // of the app: "Reserve" for dining, "Plan it" for sights.
  if (canBookHotel) {
    buttons.push(btn("Book this hotel", `bookHotelFromPin('${stayForCity.id}', '${placeId}')`, true, true));
  } else if (canSchedule) {
    const scheduleLabel = p.cat === "dining" ? "Reserve" : (p.cat === "sights" ? "Plan it" : "Schedule");
    buttons.push(btn(scheduleLabel, `schedulePinFromMap('${placeId}')`, true, true));
  } else {
    buttons.push(btn("Rebook", rescheduleAction, canReschedule && rescheduleAction, canReschedule));
  }
  // Slot 2: Open in Itinerary
  buttons.push(btn("Itinerary", canOpenItin ? `openItineraryFromPin('${p.id}')` : "", canOpenItin, false));
  // Slot 3: Details
  buttons.push(btn("Details", canDetails ? `openDetails('${placeId}')` : "", canDetails, false));
  // Slot 4: Close (always enabled)
  buttons.push(btn("Close", `clearMapPin()`, true, false));

  popup.innerHTML = `
    <div class="popup-name">${escapeHtml(p.name)}${p.sample ? ' <span class="sample-badge">Sample</span>' : ''}${p._source === "foursquare" ? ' <span class="fsq-badge">Foursquare</span>' : ''}</div>
    <div class="popup-meta">${escapeHtml(p.meta || "")}${ratingText}${dateBadge}</div>
    ${approxBadge}
    <div class="popup-actions">
      ${buttons.join("")}
    </div>
  `;
  popup.classList.add("visible");
}

function formatPopupDate(dateStr) {
  if (typeof formatDate === "function") {
    try { return formatDate(dateStr); } catch (e) { /* fall through */ }
  }
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
}

function escapeHtml(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function clearMapPin() {
  app.selectedPinId = null;
  const popup = document.getElementById("map-popup");
  if (popup) popup.classList.remove("visible");
  render();
}

function toggleMapFilter(cat) {
  if (app.mapFilters.has(cat)) app.mapFilters.delete(cat);
  else app.mapFilters.add(cat);
  if (app.selectedPinId) {
    const t = currentTrip();
    const allPins = app.mapMode === "plan"
      ? collectPlanPins(app.planCity)
      : collectTripPins(t, app.planCity);
    const sel = allPins.find(p => p.id === app.selectedPinId);
    if (!sel || !app.mapFilters.has(sel.cat)) app.selectedPinId = null;
  }
  render();
}

// Empty-state overlay HTML (kept from previous version, slim banner style).
function renderMapEmptyOverlay(visible, allPins, trip) {
  if (visible.length > 0) return "";
  const city = app.planCity;
  if (app.mapMode === "plan") {
    if (!CITY_CENTERS[city]) {
      // Plan-mode samples are generated for every city (so the lists work),
      // but they only get map coords for cities we know the center of.
      // For unknown cities, the Plan tab list is populated; just the map
      // is empty. Direct the user there.
      return `
        <div class="map-empty-overlay">
          <strong>Map not available for ${city} yet.</strong> Open the Plan tab to browse suggested stays, dining, and sights.
        </div>`;
    }
    // Day 16: Plan-mode pins now respect per-trip-slot preference filters.
    // If filtering is what cleared the map, offer a one-tap escape hatch
    // (mirrors the "Show all X" buttons added to selection pages on Day 15).
    // We detect this case by comparing against the city's full unfiltered
    // catalog count: if there ARE pins in the catalog but none survived
    // filtering, it's a preference-filter dead-end.
    const hasUnfilteredPins = !!(CITY_CENTERS[city] && (
      (PLACES[city]?.stay || []).some(p => p.lat != null) ||
      (PLACES[city]?.dining || []).some(p => p.lat != null) ||
      (PLACES[city]?.sights || []).some(p => p.lat != null)
    ));
    if (hasUnfilteredPins && trip) {
      return `
        <div class="map-empty-overlay">
          <strong>No places match your preferences.</strong>
          <div style="margin-top:6px;">
            <span class="popup-btn popup-btn-primary" onclick="clearPlanMapPrefsForCity('${city}')">Show all places</span>
          </div>
        </div>`;

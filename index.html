// ----- NEW TRIP -----
// Convert an existing trip into the new-trip dialog's state shape, so the dialog
// can be reused for editing. Stays and travelers come from the trip; preferences
// fall back to current Settings if the trip didn't store its own snapshot.
// Add N days to a YYYY-MM-DD date string, returning the same format.
// Uses local-time midnight to avoid TZ rollover bugs.
function addDaysStr(dateStr, n) {
  if (!dateStr) return "";
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

// Cascade trip dates from origin date + per-city nights. Mutates the stays
// array in place and returns the computed return date string.
//
// arrivesNextDay (default false): when true, first stay's check-in is origin
// date + 1 (handles overnight/international outbound flights). All inter-city
// travel uses same-day transit (next stay's check-in = prior stay's check-out).
function cascadeStayDates(originDate, stays, arrivesNextDay) {
  if (!originDate || !stays || stays.length === 0) {
    if (stays) stays.forEach(s => { s.checkIn = ""; s.checkOut = ""; });
    return "";
  }
  // First stay's check-in handles the outbound travel-day offset.
  let cursor = arrivesNextDay ? addDaysStr(originDate, 1) : originDate;
  for (const s of stays) {
    const n = Math.max(1, parseInt(s.nights, 10) || 1);
    s.checkIn = cursor;
    s.checkOut = addDaysStr(cursor, n);
    cursor = s.checkOut;
  }
  return cursor; // = last checkOut = return date
}

function buildEditState(t) {
  // Find primary traveler (must be present per the data model rule)
  const primary = t.travelers.find(tr => tr.primary) || t.travelers[0] || { name: "" };
  // Build set of selected traveler IDs from the trip's existing travelers.
  // Each existing trip traveler should already have travelerId (added in
  // migration). For any orphan, try to match by name to a global traveler.
  const selectedTravelerIds = new Set();
  let primaryTravelerId = null;
  (t.travelers || []).forEach(ref => {
    let tid = ref.travelerId;
    if (!tid && ref.name) {
      const match = userSettings.travelers.find(g => g.name.toLowerCase() === ref.name.toLowerCase());
      if (match) tid = match.id;
    }
    if (tid) {
      selectedTravelerIds.add(tid);
      if (ref.primary) primaryTravelerId = tid;
    }
  });
  // Default primary to the global primary if the trip didn't have one
  if (!primaryTravelerId) {
    const gp = userSettings.travelers.find(g => g.primary);
    if (gp) {
      primaryTravelerId = gp.id;
      selectedTravelerIds.add(gp.id);
    }
  }

  // Back-compat: also derive primary/companion name strings the dialog still uses.
  // These will go away when the dialog UI gets refactored to a checklist.
  const companions = t.travelers
    .filter(tr => tr !== primary)
    .map((tr, idx) => ({ id: idx + 1, name: tr.name }));

  // Stays: keep the existing list (multiple cities supported; first stay was used as
  // stayCity in the simple new-trip flow, so we preserve all of them)
  let stays = (t.stays || []).map(s => {
    // Derive nights from checkIn/checkOut (back-compat). Defaults to 1 night
    // for stays without dates yet (e.g., a brand-new trip with origin date set
    // but stay dates unfilled).
    let nights = 1;
    if (s.checkIn && s.checkOut) {
      const inD = new Date(s.checkIn + "T00:00:00");
      const outD = new Date(s.checkOut + "T00:00:00");
      const ms = outD.getTime() - inD.getTime();
      const n = Math.round(ms / (1000 * 60 * 60 * 24));
      if (n > 0) nights = n;
    }
    return {
      id: s.id || ("st-" + Math.random().toString(36).slice(2, 8)),
      city: s.city,
      checkIn: s.checkIn,
      checkOut: s.checkOut,
      nights
    };
  });
  // Always have at least one stay row in the editor (so the user has something to fill in)
  if (stays.length === 0) {
    stays = [{ id: "ns-" + Date.now(), city: "", checkIn: "", checkOut: "", nights: 1 }];
  }

  // Trip-level window for outbound flexibility (in days). Defaults to 0 (exact).
  // On edit, derive from existing trip data if present, else fall back to the
  // outbound transport leg's window if set.
  let tripWindow = 0;
  if (typeof t.window === "number") {
    tripWindow = t.window;
  } else if (t.selections?.transport?.["leg-out"]?.window) {
    tripWindow = t.selections.transport["leg-out"].window;
  }

  // Use the trip's preference snapshot if it has one; otherwise fall back to current Settings
  const prefs = t.preferences || {};

  // Derive arrivesNextDay from existing dates: if the first stay's check-in
  // is one day after the origin date, the outbound was overnight.
  let outboundOvernight = false;
  if (t.originDate && stays[0]?.checkIn) {
    outboundOvernight = stays[0].checkIn === addDaysStr(t.originDate, 1);
  }

  return {
    name: t.name || "",
    primaryName: primary.name,
    companions,
    selectedTravelerIds,
    primaryTravelerId,
    origin: t.origin,
    originDate: t.originDate,
    // Keep first stay's city in the legacy stayCity field for back-compat with the simple form
    stayCity: stays[0]?.city || (t.cities && t.cities[0]) || "",
    // Full editable list of stays for multi-city support
    stays,
    returnCity: t.returnCity || t.origin,
    returnCityManuallyEdited: !!(t.returnCity && t.returnCity !== t.origin),
    returnDate: t.returnDate,
    window: tripWindow,
    outboundLeg: { mode: "Flight", serviceClass: prefs.flightClass || userSettings.flightClass, arrivesNextDay: outboundOvernight },
    returnLeg: { mode: "Flight", serviceClass: prefs.flightClass || userSettings.flightClass, arrivesNextDay: false },
    cuisines: new Set(prefs.cuisines || [...userSettings.cuisines]),
    sights: new Set(prefs.sights || [...userSettings.sights]),
    lodging: new Set(prefs.lodging || [...userSettings.lodging]),
    flightClass: prefs.flightClass || userSettings.flightClass,
    snapshot: {
      origin: t.origin,
      cuisines: new Set(prefs.cuisines || [...userSettings.cuisines]),
      sights: new Set(prefs.sights || [...userSettings.sights]),
      lodging: new Set(prefs.lodging || [...userSettings.lodging]),
      flightClass: prefs.flightClass || userSettings.flightClass
    },
    // Editing-specific:
    editingTripId: t.id
  };
}

function openNewTrip(existingTrip) {
  const isEdit = !!existingTrip;

  // Pre-fill state — from existing trip if editing, or from Settings defaults if creating
  const _gp = userSettings.travelers.find(g => g.primary);
  const state = isEdit ? buildEditState(existingTrip) : {
    name: "",
    primaryName: user.name,
    companions: [],
    selectedTravelerIds: new Set(_gp ? [_gp.id] : []),
    primaryTravelerId: _gp ? _gp.id : null,
    origin: user.homeCity,
    originDate: "",
    stayCity: "",                        // legacy single-stay field (kept for save back-compat)
    stays: [{ id: "ns-" + Date.now(), city: "", checkIn: "", checkOut: "", nights: 1 }],
    returnCity: user.homeCity,           // defaults to origin; editable
    returnCityManuallyEdited: false,     // tracks whether the user has overridden the auto-sync
    returnDate: "",
    window: 0,                            // departure flexibility, in days
    // Two legs: outbound (origin → stay) and return (stay → home)
    outboundLeg: { mode: "Flight", serviceClass: userSettings.flightClass, arrivesNextDay: false },
    returnLeg: { mode: "Flight", serviceClass: userSettings.flightClass, arrivesNextDay: false },
    // Preference snapshots (copied from Settings; editable in-dialog)
    cuisines: new Set(userSettings.cuisines),
    sights: new Set(userSettings.sights),
    lodging: new Set(userSettings.lodging),
    flightClass: userSettings.flightClass,
    // Frozen snapshot of what Settings held at open — used to detect overrides
    snapshot: {
      origin: user.homeCity,
      cuisines: new Set(userSettings.cuisines),
      sights: new Set(userSettings.sights),
      lodging: new Set(userSettings.lodging),
      flightClass: userSettings.flightClass
    }
  };
  let nextCompanionId = isEdit ? (state.companions.length + 1) : 1;

  function isValid() {
    return state.primaryName.trim() && state.origin.trim() && state.originDate && state.returnDate
      && getDateIssues().length === 0;
  }

  // Returns an array of issue messages for any date inconsistencies in state.
  // An empty array means dates are fine.
  function getDateIssues() {
    const issues = [];
    const dep = state.originDate;
    const ret = state.returnDate;

    if (dep && ret && ret < dep) {
      issues.push("Return date is before departure");
    }

    state.stays.forEach((s, i) => {
      if (!s.city || !s.city.trim()) return; // skip empty rows
      const inD = s.checkIn;
      const outD = s.checkOut;
      const num = i + 1;

      if (inD && dep && inD < dep) {
        issues.push(`Stay ${num} (${s.city}) check-in is before departure`);
      }
      if (outD && ret && outD > ret) {
        issues.push(`Stay ${num} (${s.city}) check-out is after return`);
      }
      if (inD && outD && outD < inD) {
        issues.push(`Stay ${num} (${s.city}) checks out before checking in`);
      }
      // Overlap with previous stay (warning, not block — treat as issue for clarity)
      if (i > 0 && inD) {
        const prev = state.stays[i - 1];
        if (prev.checkOut && inD < prev.checkOut) {
          issues.push(`Stay ${num} (${s.city}) check-in overlaps with previous stay`);
        }
      }
    });

    return issues;
  }

  function setsEqual(a, b) {
    if (a.size !== b.size) return false;
    for (const x of a) if (!b.has(x)) return false;
    return true;
  }

  // Service class options vary by mode
  function classOptions(mode, selected) {
    let opts;
    if (mode === "Flight") opts = ["Economy", "Premium economy", "Business", "First class"];
    else if (mode === "Train") opts = ["Standard", "Standard Premier / Comfort", "First class", "Business Premier"];
    else if (mode === "Cruise") opts = ["Interior", "Ocean view", "Balcony", "Suite"];
    else if (mode === "Rental Car") opts = ["Economy", "Compact", "Mid-size", "SUV", "Luxury", "Convertible"];
    else opts = ["Standard", "Premium"]; // Car (own), Bus
    return opts.map(c => `<option ${selected === c ? 'selected' : ''}>${c}</option>`).join("");
  }

  function badgeFor(field) {
    // Returns "from Settings" or "overridden"
    const snap = state.snapshot;
    let matches = true;
    if (field === "cuisines") matches = setsEqual(state.cuisines, snap.cuisines);
    else if (field === "sights") matches = setsEqual(state.sights, snap.sights);
    else if (field === "lodging") matches = setsEqual(state.lodging, snap.lodging);
    else if (field === "flightClass") matches = state.flightClass === snap.flightClass;
    else if (field === "origin") matches = state.origin === snap.origin;
    return matches
      ? '<span class="nt-source-badge">from Settings</span>'
      : '<span class="nt-source-badge overridden">overridden</span>';
  }

  function chipRowFor(field, options) {
    return options.map(opt => {
      const active = state[field].has(opt);
      const fromSettings = active && state.snapshot[field].has(opt);
      // Chip gets a small dot if it came from Settings AND is still active
      return `<span class="nt-chip ${active ? 'active' : ''} ${fromSettings ? 'from-settings' : ''}"
                    onclick="toggleNtChip(event, '${field}', ${attrJS(opt)})">${opt}</span>`;
    }).join("");
  }

  // Expose toggle handler on window so inline onclick can reach it.
  // Updates the chip's class in place rather than re-rendering, so the user's
  // scroll position is preserved when ticking multiple chips in a row.
  window.toggleNtChip = (e, field, opt) => {
    e.stopPropagation();
    if (state[field].has(opt)) state[field].delete(opt);
    else state[field].add(opt);
    // Find the chip element that was tapped and toggle its visual state
    const chip = e.currentTarget;
    if (chip) {
      const nowActive = state[field].has(opt);
      chip.classList.toggle("active", nowActive);
      // Update the from-settings dot: only shown when active AND still in snapshot
      const fromSettings = nowActive && state.snapshot[field] && state.snapshot[field].has(opt);
      chip.classList.toggle("from-settings", fromSettings);
    }
    // Update Save button (in case validity rules ever depend on chip selection)
    if (typeof updateCreateBtn === "function") updateCreateBtn();
  };

  function renderNewTrip() {
    const html = `
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
          <div class="modal-title">${isEdit ? 'Edit trip' : 'New trip'}</div>
          <div class="modal-close" onclick="closeModal()">×</div>
        </div>
        <div class="modal-body" id="nt-body">
          <div class="nt-section">
            <div class="nt-section-title">The basics</div>
            <div class="nt-field">
              <label class="nt-label">Trip name</label>
              <input type="text" id="nt-name" value="${state.name}" placeholder="e.g. Europe trip">
            </div>
            <div class="nt-field">
              <label class="nt-label">Travelers</label>
              <div class="nt-traveler-row">
                <input type="text" id="nt-primary" value="${state.primaryName}" placeholder="Primary traveler (required)" class="${state.primaryName.trim() ? '' : 'invalid'}">
                <span class="nt-primary-pill" title="The primary traveler can't be removed">PRIMARY</span>
              </div>
              ${state.companions.map(c => `
                <div class="nt-traveler-row">
                  <input type="text" value="${c.name}" data-companion-id="${c.id}" placeholder="Another traveler">
                  <div class="nt-remove" data-remove="${c.id}">×</div>
                </div>
              `).join("")}
              ${!state.primaryName.trim() ? '<div class="nt-hint">A trip needs at least a primary traveler.</div>' : ""}
              <span class="nt-add-link" id="nt-add-companion">+ Add traveler</span>
            </div>
          </div>

          <div class="nt-section">
            <div class="nt-section-title">Route</div>
            <div class="nt-stay">
              <div class="nt-stay-header">
                <span class="nt-stay-label origin">Start</span>
              </div>
              <div class="nt-stay-body two-col">
                <div>
                  <div class="nt-label">Departure city ${badgeFor("origin")}</div>
                  <input type="text" id="nt-origin" value="${state.origin}" placeholder="Where from">
                </div>
                <div>
                  <div class="nt-label">Departing</div>
                  <input type="date" id="nt-origin-date" value="${state.originDate}">
                </div>
              </div>
              <div class="nt-field nt-window-field">
                <div class="nt-label">Flexibility on departure date</div>
                <div class="nt-window-stepper">
                  <input type="number" id="nt-window-input" min="0" max="14" step="1" value="${state.window || 0}">
                  <span class="nt-window-unit">${state.window === 1 ? 'day' : 'days'} ${state.window > 0 ? '±' : ''}</span>
                </div>
                <div class="nt-sub-hint">When searching flights, look ±${state.window || 0} day${state.window === 1 ? '' : 's'} around your departure date.</div>
              </div>
            </div>
            <div class="nt-transit">
              <div class="nt-transit-card nt-transit-editable">
                <div class="nt-transit-row">
                  <label class="nt-transit-label">Mode</label>
                  <select class="nt-select nt-transit-select" data-leg="outbound" data-field="mode">
                    ${["Flight","Train","Rental Car","Car","Bus","Cruise"].map(m => `<option ${state.outboundLeg.mode === m ? 'selected' : ''}>${m}</option>`).join("")}
                  </select>
                </div>
                <div class="nt-transit-row">
                  <label class="nt-transit-label">Class</label>
                  <select class="nt-select nt-transit-select" data-leg="outbound" data-field="serviceClass">
                    ${classOptions(state.outboundLeg.mode, state.outboundLeg.serviceClass)}
                  </select>
                </div>
                <label class="nt-transit-overnight">
                  <input type="checkbox" data-leg="outbound" data-field="arrivesNextDay" ${state.outboundLeg.arrivesNextDay ? 'checked' : ''}>
                  <span>Arrives next day <span class="nt-transit-overnight-hint">(overnight / international)</span></span>
                </label>
              </div>
            </div>

            ${state.stays.map((stay, idx) => `
              <div class="nt-stay" data-stay-id="${stay.id}">
                <div class="nt-stay-header">
                  <span class="nt-stay-label">Stay ${idx + 1}</span>
                  ${state.stays.length > 1 ? `<span class="nt-stay-remove" data-remove-stay="${stay.id}">Remove</span>` : ''}
                </div>
                <div class="nt-stay-body">
                  <div class="nt-field">
                    <div class="nt-label">City</div>
                    <input type="text" class="nt-stay-city-input" data-stay-id="${stay.id}"
                           value="${(stay.city || '').replace(/"/g, '&quot;')}" placeholder="Destination">
                  </div>
                  <div class="nt-field">
                    <div class="nt-label">Nights</div>
                    <input type="number" min="1" max="30" step="1" class="nt-stay-nights-input"
                           data-stay-id="${stay.id}" value="${stay.nights || 1}">
                    <div class="nt-stay-date-hint" data-stay-hint="${stay.id}">${stay.checkIn && stay.checkOut ? `${formatDate(stay.checkIn)} → ${formatDate(stay.checkOut)}` : ''}</div>
                  </div>
                </div>
              </div>
              ${idx < state.stays.length - 1 ? `
                <div class="nt-transit">
                  <div class="nt-transit-card nt-transit-between">
                    <span class="nt-transit-label-inline">Travel between stays — defaults to flight, edit later</span>
                  </div>
                </div>
              ` : ''}
            `).join("")}

            <div class="nt-add-stay" id="nt-add-stay-btn">+ Add another city</div>

            <div class="nt-transit">
              <div class="nt-transit-card nt-transit-editable">
                <div class="nt-transit-row">
                  <label class="nt-transit-label">Mode</label>
                  <select class="nt-select nt-transit-select" data-leg="return" data-field="mode">
                    ${["Flight","Train","Rental Car","Car","Bus","Cruise"].map(m => `<option ${state.returnLeg.mode === m ? 'selected' : ''}>${m}</option>`).join("")}
                  </select>
                </div>
                <div class="nt-transit-row">
                  <label class="nt-transit-label">Class</label>
                  <select class="nt-select nt-transit-select" data-leg="return" data-field="serviceClass">
                    ${classOptions(state.returnLeg.mode, state.returnLeg.serviceClass)}
                  </select>
                </div>
                <label class="nt-transit-overnight">
                  <input type="checkbox" data-leg="return" data-field="arrivesNextDay" ${state.returnLeg.arrivesNextDay ? 'checked' : ''}>
                  <span>Arrives next day <span class="nt-transit-overnight-hint">(overnight / international)</span></span>
                </label>
              </div>
            </div>
            <div class="nt-stay">
              <div class="nt-stay-header">
                <span class="nt-stay-label return">Return</span>
              </div>
              <div class="nt-stay-body two-col">
                <div>
                  <div class="nt-label">Return city</div>
                  <input type="text" id="nt-return-city" value="${state.returnCity}" placeholder="${state.origin}">
                  ${state.returnCityManuallyEdited ? '<div class="nt-sub-hint">Custom return — different from origin</div>' : '<div class="nt-sub-hint">Defaults to origin city. Type to override.</div>'}
                </div>
                <div>
                  <div class="nt-label">Arriving</div>
                  <input type="date" id="nt-return-date" value="${state.returnDate}" disabled>
                  <div class="nt-sub-hint">Derived from city stays</div>
                </div>
              </div>
            </div>
          </div>

          <div class="nt-section">
            <div class="nt-section-title">Preferences for this trip</div>
            <div class="nt-prefs-hint">Pre-filled from your Settings. Tap any chip to override for this trip only.</div>

            <div class="nt-pref-group nt-pref-lodging">
              <label class="nt-label">Lodging ${badgeFor("lodging")}</label>
              <div class="nt-chip-group">
                ${chipRowFor("lodging", CATALOG.lodging)}
              </div>
            </div>

            <div class="nt-pref-group nt-pref-cuisines">
              <label class="nt-label">Cuisines ${badgeFor("cuisines")}</label>
              <div class="nt-chip-group">
                ${chipRowFor("cuisines", CATALOG.cuisines)}
              </div>
            </div>

            <div class="nt-pref-group nt-pref-sights">
              <label class="nt-label">Sightseeing ${badgeFor("sights")}</label>
              <div class="nt-chip-group">
                ${chipRowFor("sights", CATALOG.sights)}
              </div>
            </div>
          </div>
        </div>
        ${(() => {
          const issues = getDateIssues();
          if (issues.length === 0) return "";
          return `
            <div class="nt-issues">
              <div class="nt-issues-title">⚠ ${issues.length} ${issues.length === 1 ? 'issue' : 'issues'} to fix</div>
              <ul class="nt-issues-list">
                ${issues.map(i => `<li>${i}</li>`).join("")}
              </ul>
            </div>
          `;
        })()}
        <div class="modal-footer modal-footer-stack">
          <span class="btn btn-primary ${isValid() ? '' : 'disabled'}" id="nt-select-options">${isEdit ? 'Select Trip Options' : 'Select Trip Options'}</span>
          <span class="btn ${isValid() ? '' : 'disabled'}" id="nt-save-later">Save for Later</span>
          <span class="btn" onclick="closeModal()">Cancel</span>
        </div>
      </div>
    `;
    // Preserve scroll so re-renders (add city, remove city, overnight toggle)
    // don't snap the dialog back to the top.
    const prevScroll = document.getElementById("nt-body")?.scrollTop || 0;
    openModal(html);
    const newBody = document.getElementById("nt-body");
    if (newBody && prevScroll) newBody.scrollTop = prevScroll;

    // Wire inputs
    const primaryInput = document.getElementById("nt-primary");
    primaryInput.oninput = () => {
      state.primaryName = primaryInput.value;
      primaryInput.classList.toggle("invalid", !primaryInput.value.trim());
      document.getElementById("nt-select-options").classList.toggle("disabled", !isValid()); document.getElementById("nt-save-later").classList.toggle("disabled", !isValid());
      let hint = document.querySelector(".nt-hint");
      if (!primaryInput.value.trim() && !hint) {
        hint = document.createElement("div");
        hint.className = "nt-hint";
        hint.textContent = "A trip needs at least a primary traveler.";
        primaryInput.closest(".nt-field").insertBefore(hint, document.getElementById("nt-add-companion"));
      } else if (primaryInput.value.trim() && hint) {
        hint.remove();
      }
    };

    document.getElementById("nt-name").oninput = (e) => { state.name = e.target.value; };
    document.getElementById("nt-origin").oninput = (e) => {
      const newOrigin = e.target.value;
      // If return city wasn't manually edited, keep it synced to origin
      if (!state.returnCityManuallyEdited) {
        state.returnCity = newOrigin;
        const returnInp = document.getElementById("nt-return-city");
        if (returnInp) {
          returnInp.value = newOrigin;
          returnInp.placeholder = newOrigin;
        }
      }
      state.origin = newOrigin;
      updateCreateBtn();
    };
    // Day 16: live city autocomplete on origin input. On pick, set state
    // and trigger the same downstream logic the manual oninput does.
    attachCityAutocomplete(document.getElementById("nt-origin"), (pick) => {
      state.origin = pick.name;
      // Stash lat/lng for later (weather, currency lookups)
      state.originLatLng = { lat: pick.lat, lng: pick.lng, country: pick.country };
      if (!state.returnCityManuallyEdited) {
        state.returnCity = pick.name;
        const returnInp = document.getElementById("nt-return-city");
        if (returnInp) {
          returnInp.value = pick.name;
          returnInp.placeholder = pick.name;
        }
      }
      updateCreateBtn();
    });
    const originDateInp = document.getElementById("nt-origin-date");
    const originDateHandler = (e) => {
      state.originDate = e.target.value;
      // Recompute all stay dates and return date from new origin
      state.returnDate = cascadeStayDates(state.originDate, state.stays, state.outboundLeg && state.outboundLeg.arrivesNextDay);
      // Update each stay's date hint in place
      state.stays.forEach(s => {
        const hint = document.querySelector(`[data-stay-hint="${s.id}"]`);
        if (hint) {
          hint.textContent = (s.checkIn && s.checkOut)
            ? `${formatDate(s.checkIn)} → ${formatDate(s.checkOut)}`
            : "";
        }
      });
      const returnInp = document.getElementById("nt-return-date");
      if (returnInp) returnInp.value = state.returnDate || "";
      updateCreateBtn();
    };
    originDateInp.oninput = originDateHandler;
    originDateInp.onchange = originDateHandler;

    // Wire up each stay's city/dates inputs (multi-stay supported)
    document.querySelectorAll(".nt-stay-city-input").forEach(inp => {
      inp.oninput = (e) => {
        const stay = state.stays.find(s => s.id === inp.dataset.stayId);
        if (stay) {
          stay.city = e.target.value;
          // Keep legacy stayCity field synced to the FIRST stay (used in save)
          if (state.stays[0] === stay) state.stayCity = e.target.value;
        }
      };
      // Day 16: city autocomplete on each stay's city input. On pick we
      // stash lat/lng on the stay object so downstream Map/weather can use it.
      attachCityAutocomplete(inp, (pick) => {
        const stay = state.stays.find(s => s.id === inp.dataset.stayId);
        if (!stay) return;
        stay.city = pick.name;
        stay.latLng = { lat: pick.lat, lng: pick.lng, country: pick.country };
        if (state.stays[0] === stay) state.stayCity = pick.name;
      });
    });
    document.querySelectorAll(".nt-stay-nights-input").forEach(inp => {
      const handler = (e) => {
        const stay = state.stays.find(s => s.id === inp.dataset.stayId);
        if (!stay) return;
        // Clamp to 1..30
        let n = parseInt(e.target.value, 10);
        if (!n || n < 1) n = 1;
        if (n > 30) n = 30;
        stay.nights = n;
        // Cascade everything from origin date
        state.returnDate = cascadeStayDates(state.originDate, state.stays, state.outboundLeg && state.outboundLeg.arrivesNextDay);
        // Update each stay's date hint in place — DON'T re-render, since that
        // would destroy the input the user is clicking and scroll to top.
        state.stays.forEach(s => {
          const hint = document.querySelector(`[data-stay-hint="${s.id}"]`);
          if (hint) {
            hint.textContent = (s.checkIn && s.checkOut)
              ? `${formatDate(s.checkIn)} → ${formatDate(s.checkOut)}`
              : "";
          }
        });
        // Update the read-only return date input
        const returnInp = document.getElementById("nt-return-date");
        if (returnInp) returnInp.value = state.returnDate || "";
        // Update Save button enabled state (the cascade may have made the form valid)
        updateCreateBtn();
      };
      inp.oninput = handler;
      inp.onchange = handler;
    });

    // "+ Add another city" — append a new stay (1 night default), cascade, re-render
    const addStayBtn = document.getElementById("nt-add-stay-btn");
    if (addStayBtn) {
      addStayBtn.onclick = () => {
        if (state.stays.length >= 6) {
          showToast("Up to 6 cities per trip");
          return;
        }
        state.stays.push({
          id: "ns-" + Date.now() + "-" + Math.random().toString(36).slice(2, 6),
          city: "",
          checkIn: "",
          checkOut: "",
          nights: 1
        });
        state.returnDate = cascadeStayDates(state.originDate, state.stays, state.outboundLeg && state.outboundLeg.arrivesNextDay);
        renderNewTrip();
      };
    }

    // Remove a stay
    document.querySelectorAll("[data-remove-stay]").forEach(btn => {
      btn.onclick = () => {
        const id = btn.dataset.removeStay;
        state.stays = state.stays.filter(s => s.id !== id);
        state.stayCity = state.stays[0]?.city || "";
        state.returnDate = cascadeStayDates(state.originDate, state.stays, state.outboundLeg && state.outboundLeg.arrivesNextDay);
        renderNewTrip();
      };
    });

    // Window flexibility stepper
    const windowInput = document.getElementById("nt-window-input");
    if (windowInput) {
      const windowHandler = () => {
        let n = parseInt(windowInput.value, 10);
        if (isNaN(n) || n < 0) n = 0;
        if (n > 14) n = 14;
        state.window = n;
        // Update hint text in place — same pattern as nights handler
        const hint = windowInput.closest(".nt-window-field")?.querySelector(".nt-sub-hint");
        if (hint) {
          hint.textContent = `When searching flights, look ±${n} day${n === 1 ? '' : 's'} around your departure date.`;
        }
        const unit = windowInput.parentElement?.querySelector(".nt-window-unit");
        if (unit) {
          unit.textContent = `${n === 1 ? 'day' : 'days'} ${n > 0 ? '±' : ''}`;
        }
      };
      windowInput.oninput = windowHandler;
      windowInput.onchange = windowHandler;
    }

    // Return city: editable, with auto-sync from origin until manually overridden
    document.getElementById("nt-return-city").oninput = (e) => {
      const v = e.target.value;
      if (v.trim() === "") {
        // Cleared: revert to auto-sync from origin
        state.returnCity = state.origin;
        state.returnCityManuallyEdited = false;
      } else {
        state.returnCity = v;
        // Mark as manually edited only if the user typed something different from origin
        state.returnCityManuallyEdited = v !== state.origin;
      }
    };
    // Day 16: live city autocomplete on return city. Picking a different
    // city than origin marks it as manually edited (intentional override).
    attachCityAutocomplete(document.getElementById("nt-return-city"), (pick) => {
      state.returnCity = pick.name;
      state.returnLatLng = { lat: pick.lat, lng: pick.lng, country: pick.country };
      state.returnCityManuallyEdited = pick.name !== state.origin;
    });

    // Return date is now derived from origin date + stay nights — no input handler needed.
    // Flight class moved to per-leg outbound/return transit cards above.

    function updateCreateBtn() {
      document.getElementById("nt-select-options").classList.toggle("disabled", !isValid()); document.getElementById("nt-save-later").classList.toggle("disabled", !isValid());
    }

    document.querySelectorAll('input[data-companion-id]').forEach(inp => {
      inp.oninput = () => {
        const c = state.companions.find(x => x.id === +inp.dataset.companionId);
        if (c) {
          c.name = inp.value;
          // Editing the name invalidates a previously-picked travelerId.
          // The save flow will re-resolve by name (creating a new global if needed).
          c.travelerId = null;
        }
      };
    });
    document.querySelectorAll('[data-remove]').forEach(btn => {
      btn.onclick = () => {
        state.companions = state.companions.filter(c => c.id !== +btn.dataset.remove);
        renderNewTrip();
      };
    });
    document.getElementById("nt-add-companion").onclick = () => {
      openTravelerPicker();
    };

    // Open a small picker showing existing global travelers + "Add new" option.
    // Selecting an existing global adds them as a companion immediately.
    // Selecting "Add new" reveals a name input that creates a new global on save.
    function openTravelerPicker() {
      const t = currentTrip();
      // Names already used as companions or primary on this trip
      const usedIds = new Set();
      const usedNames = new Set();
      if (state.primaryTravelerId) usedIds.add(state.primaryTravelerId);
      if (state.primaryName) usedNames.add(state.primaryName.trim().toLowerCase());
      state.companions.forEach(c => {
        if (c.travelerId) usedIds.add(c.travelerId);
        if (c.name) usedNames.add(c.name.trim().toLowerCase());
      });
      // Available globals — anyone not already on the trip
      const available = userSettings.travelers.filter(g =>
        !usedIds.has(g.id) && !usedNames.has(g.name.trim().toLowerCase())
      );

      const html = `
        <div class="modal-sheet" style="max-height: 65%;">
          <div class="modal-handle"></div>
          <div class="modal-header">
            <div class="modal-title">Add traveler to this trip</div>
            <div class="modal-close" onclick="closeTravelerPicker()">×</div>
          </div>
          <div class="modal-body">
            ${available.length > 0 ? `
              <div class="sp-section-title" style="margin-top: 4px;">Existing travelers</div>
              <div class="settings-list">
                ${available.map(g => `
                  <div class="settings-row" data-pick-traveler="${g.id}">
                    <div class="settings-row-icon">👤</div>
                    <div class="settings-row-text">
                      <div>${g.name}${g.primary ? ' <span class="trv-primary-pill">PRIMARY</span>' : ''}</div>
                      ${g.birthday ? `<div class="settings-row-sub">${formatBirthday(g.birthday)}</div>` : ''}
                    </div>
                    <div class="settings-row-chevron">+</div>
                  </div>
                `).join("")}
              </div>
            ` : `
              <div class="sp-hint" style="padding: 12px 0;">All your travelers are already on this trip.</div>
            `}
            <div class="sp-section-title" style="margin-top: 16px;">Or add someone new</div>
            <div class="nt-field">
              <input type="text" id="trv-pick-new-name" placeholder="Enter name" autocomplete="off">
              <div class="sp-hint">A new traveler is added to your global roster — fill in their profile from Settings → Travelers later.</div>
            </div>
          </div>
          <div class="modal-footer">
            <span class="btn" onclick="closeTravelerPicker()">Cancel</span>
            <span class="btn btn-primary" id="trv-pick-add-new-btn">Add new traveler</span>
          </div>
        </div>
      `;
      // Open in a separate modal slot so closing it returns to the New Trip dialog.
      // The standard openModal/closeModal flow replaces the modal contents. To
      // avoid blowing away the New Trip dialog, we save its current HTML and
      // restore it when the picker closes.
      const m = document.getElementById("modal");
      state._savedDialogHtml = m.innerHTML;
      // Also save the modal-body scroll so we can restore it
      state._savedDialogScroll = document.getElementById("nt-body")?.scrollTop || 0;
      m.innerHTML = html;

      // Wire row taps — pick an existing global
      document.querySelectorAll("[data-pick-traveler]").forEach(row => {
        row.onclick = () => {
          const tid = row.dataset.pickTraveler;
          const g = findTraveler(tid);
          if (!g) return;
          // Add as companion — preserve travelerId so save links it correctly
          state.companions.push({
            id: nextCompanionId++,
            travelerId: g.id,
            name: g.name
          });
          closeTravelerPicker();
        };
      });

      // Wire add-new
      document.getElementById("trv-pick-add-new-btn").onclick = () => {
        const nameInput = document.getElementById("trv-pick-new-name");
        const name = nameInput.value.trim();
        if (!name) {
          showToast("Enter a name");
          nameInput.focus();
          return;
        }
        // Check for case-insensitive duplicate against globals + this trip
        const lc = name.toLowerCase();
        if (usedNames.has(lc)) {
          showToast(`${name} is already on this trip`);
          return;
        }
        const existingGlobal = userSettings.travelers.find(g => g.name.toLowerCase() === lc);
        if (existingGlobal) {
          // They typed a name that matches an existing global → use that
          state.companions.push({
            id: nextCompanionId++,
            travelerId: existingGlobal.id,
            name: existingGlobal.name
          });
        } else {
          // Brand new — add them as a global so the trip save links correctly
          const newGlobal = addGlobalTraveler({ name });
          state.companions.push({
            id: nextCompanionId++,
            travelerId: newGlobal.id,
            name: newGlobal.name
          });
        }
        closeTravelerPicker();
      };

      // Submit on Enter in the name field
      document.getElementById("trv-pick-new-name").onkeydown = (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          document.getElementById("trv-pick-add-new-btn").click();
        }
      };
    }

    // Restore the New Trip dialog after the picker closes.
    window.closeTravelerPicker = () => {
      const m = document.getElementById("modal");
      if (state._savedDialogHtml) {
        // Re-render the New Trip dialog (which re-wires all handlers from scratch
        // including the new companion row) and restore scroll.
        renderNewTrip();
      } else {
        closeModal();
      }
    };

    // Transit leg selects
    document.querySelectorAll('select[data-leg]').forEach(sel => {
      sel.onchange = () => {
        const leg = sel.dataset.leg === "outbound" ? state.outboundLeg : state.returnLeg;
        leg[sel.dataset.field] = sel.value;
        // If mode changed, service class options change too — re-render
        if (sel.dataset.field === "mode") {
          // Reset to a valid default for the new mode
          // Reset to a sensible default for the new mode
          if (sel.value === "Flight") leg.serviceClass = userSettings.flightClass;
          else if (sel.value === "Train") leg.serviceClass = userSettings.trainClass;
          else if (sel.value === "Rental Car") leg.serviceClass = "Mid-size";
          else leg.serviceClass = "Standard";
          renderNewTrip();
        }
      };
    });

    // Overnight checkbox handlers (international / red-eye legs).
    // Outbound's "arrives next day" shifts the first stay check-in by 1 day.
    // Return's "arrives next day" doesn't affect stay cascade — return date
    // is the last stay's check-out (when you leave the destination).
    document.querySelectorAll('input[type="checkbox"][data-leg]').forEach(box => {
      box.onchange = () => {
        const leg = box.dataset.leg === "outbound" ? state.outboundLeg : state.returnLeg;
        leg.arrivesNextDay = box.checked;
        if (box.dataset.leg === "outbound") {
          state.returnDate = cascadeStayDates(state.originDate, state.stays, state.outboundLeg.arrivesNextDay);
        }
        renderNewTrip();
      };
    });

    // Wire the Save / Create button. Two flavors:
    //   - "Select Trip Options" saves and routes the user to the Plan tab to
    //     start filling in transport/stay/dining/sights selections.
    //   - "Save for Later" saves and exits to the trips list.
    // Both run the same save logic; only the post-save navigation differs.
    const buildSaveHandler = (goToPlan) => async () => {
      // Ensure dates are fully cascaded before save (in case the user typed
      // a nights value and tapped Save before blur fired).
      state.returnDate = cascadeStayDates(state.originDate, state.stays, state.outboundLeg && state.outboundLeg.arrivesNextDay);
      if (!isValid()) {
        // Surface why the save was blocked so the user knows what to fix.
        if (!state.primaryName.trim()) {
          primaryInput.focus();
        }
        return;
      }

      // Build the updated/new trip data from the dialog state.
      // Each traveler entry needs a travelerId pointing to a global traveler.
      // Look up by name; if no match, auto-create a slim global traveler so
      // the data stays linked. This preserves the simple-name UX while building
      // out the global roster.
      const resolveOrCreateTraveler = (name, isPrimary) => {
        const trimmed = name.trim();
        if (!trimmed) return null;
        // Match existing global by case-insensitive name
        let global = userSettings.travelers.find(g => g.name.toLowerCase() === trimmed.toLowerCase());
        if (!global) {
          // Auto-create. Won't override primary on the global — that's a
          // separate explicit action via the Travelers settings page.
          global = addGlobalTraveler({ name: trimmed });
        }
        return { id: isPrimary ? 1 : null, travelerId: global.id, name: global.name, primary: isPrimary };
      };
      const primaryEntry = resolveOrCreateTraveler(state.primaryName, true);
      const companionEntries = state.companions
        .filter(c => c.name.trim())
        .map((c, i) => ({ ...resolveOrCreateTraveler(c.name, false), id: i + 2 }));
      const travelersList = [primaryEntry, ...companionEntries].filter(Boolean);

      // Build stays from the dialog state — only stays with a city name make it into the trip
      const validStays = state.stays
        .filter(s => s.city && s.city.trim())
        .map((s, i) => ({
          id: s.id || ("ns" + (i + 1)),
          city: s.city.trim(),
          // Default dates if missing: stay 0 = origin date, others = empty for now
          checkIn: s.checkIn || (i === 0 ? state.originDate : ""),
          checkOut: s.checkOut || (i === state.stays.length - 1 ? state.returnDate : "")
        }));

      if (isEdit) {
        // EDIT: update the existing trip in place, preserving dayItems and original status
        const idx = trips.findIndex(t => t.id === state.editingTripId);
        if (idx === -1) return;
        const existing = trips[idx];

        // ---------- Wholesale date-change clearing ----------
        // If any trip date moved (origin, return, or any stay window), every
        // existing selection is for the wrong date — flights, hotels, dining,
        // and sights all reference specific days. Rather than try to repair
        // each one with rebook flags and partial auto-rematches, we just clear
        // everything and ask the user to start fresh. This matches how live
        // booking systems work: every reservation is date-bound, you don't
        // "shift" a flight to another day, you cancel + rebook.
        //
        // But we don't ask the user this question gratuitously — only when
        // they actually have selections that would be wiped.
        const oldOriginDate = existing.originDate;
        const oldReturnDate = existing.returnDate;
        const oldStays = existing.stays || [];
        const newStays = validStays;
        const datesActuallyChanged =
          oldOriginDate !== state.originDate ||
          oldReturnDate !== state.returnDate ||
          oldStays.length !== newStays.length ||
          oldStays.some((os, i) => {
            const ns = newStays[i];
            return !ns || os.checkIn !== ns.checkIn || os.checkOut !== ns.checkOut || os.city !== ns.city;
          });

        const hasAnySelections = (() => {
          const sel = existing.selections || {};
          const hasTransport = Object.values(sel.transport || {}).some(s => s && s.selectedOptionId);
          const hasStay = Object.values(sel.stay || {}).some(s => s && (s.selectedOptionId || (s.bookings && s.bookings.length > 0)));
          const hasDining = Object.values(sel.dining || {}).some(s => s && (s.selectedIds || []).length > 0);
          const hasSights = Object.values(sel.sights || {}).some(s => s && (s.selectedIds || []).length > 0);
          const hasScheduled = Object.values(existing.dayItems || {}).some(items =>
            (items || []).some(it => it.category === "dining" || it.category === "sights")
          );
          return hasTransport || hasStay || hasDining || hasSights || hasScheduled;
        })();

        if (datesActuallyChanged && hasAnySelections) {
          const ok = await confirmDialog({
            title: "Clear all selections?",
            message:
              "Your trip dates have changed.\n\n" +
              "Because every flight, hotel, restaurant, and sight is tied to a specific date, all your previous selections will be cleared and you'll need to choose them again on the new dates.",
            confirmLabel: "Clear & save",
            cancelLabel: "Keep dates",
            danger: true
          });
          if (!ok) {
            // User cancelled — leave the dialog open so they can revert their date edits.
            return;
          }
          // User confirmed — wipe all selections and scheduled dayItems.
          // Keep the trip's identity, name, travelers, preferences, custom places, etc.
          // We blow away everything that's date-bound.
          trips[idx] = {
            ...existing,
            name: state.name || existing.name,
            cities: validStays.map(s => s.city),
            origin: state.origin,
            returnCity: state.returnCity || state.origin,
            originDate: state.originDate,
            returnDate: state.returnDate,
            window: state.window || 0,
            travelers: travelersList,
            stays: validStays,
            // Wipe all date-bound state
            selections: { transport: {}, stay: {}, dining: {}, sights: {} },
            dayItems: {},
            dateWarning: null,
            // Also wipe the per-trip preferences snapshot. When the user
            // re-picks selections, ensureStaySlot/ensureDiningSlot/etc. fall
            // back to userSettings (the user's CURRENT global preferences).
            // Without this, an old preference snapshot from when the trip
            // was first created would silently override changes the user
            // just made in Settings.
            preferences: null
          };
          closeModal();
          showToast("Trip dates changed · all selections cleared. Re-pick your transport, stay, dining, and sights.");
          persist();
          if (goToPlan) {
            app.screen = "trip";
            app.tab = "plan";
            app.activeTripId = state.editingTripId;
            app.selectionCategory = "transport";
            app.selectionSlotId = null;
          }
          render();
          return;
        }
        // ---------- End wholesale date-change clearing ----------

        // ---------- Date-change detection ----------
        // Compare old stay windows vs new. Any dayItem whose date used to be
        // covered by a stay but isn't anymore needs the user's attention.
        const oldWindows = (existing.stays || []).map(s => ({ id: s.id, city: s.city, in: s.checkIn, out: s.checkOut }));
        const newWindows = validStays.map(s => ({ id: s.id, city: s.city, in: s.checkIn, out: s.checkOut }));
        const inSomeWindow = (date, windows) => windows.some(w => date >= w.in && date < w.out);
        const cityForDate = (date, windows) => (windows.find(w => date >= w.in && date < w.out) || {}).city || null;

        const orphaned = []; // { dayItemId, name, category, oldDate, oldCity }
        const stayChanged = []; // dates where the city assignment changed
        Object.entries(existing.dayItems || {}).forEach(([date, items]) => {
          const wasIn = inSomeWindow(date, oldWindows);
          const isIn = inSomeWindow(date, newWindows);
          (items || []).forEach(item => {
            // Only flag dining/sights — transport/stay are handled separately below
            if (item.category !== "dining" && item.category !== "sights") return;
            if (wasIn && !isIn) {
              orphaned.push({
                dayItemId: item.id, name: item.name,
                category: item.category, oldDate: date,
                oldCity: cityForDate(date, oldWindows)
              });
            } else if (wasIn && isIn) {
              const oldCity = cityForDate(date, oldWindows);
              const newCity = cityForDate(date, newWindows);
              if (oldCity !== newCity) {
                stayChanged.push({
                  dayItemId: item.id, name: item.name,
                  category: item.category, oldDate: date,
                  oldCity, newCity
                });
              }
            }
          });
        });

        // ---- Transport-changed detection ----
        // For each leg with a selection, compare the leg's date in the OLD trip
        // vs the NEW trip. If the date moved, the user's selected flight is
        // for the wrong day and needs rebooking. Also flag legs that no longer
        // exist (stay was removed → leg vanished).
        const transportChanged = [];
        const oldLegs = typeof tripLegs === "function" ? tripLegs(existing) : [];
        const tempNewTrip = {
          ...existing,
          stays: validStays,
          originDate: state.originDate,
          returnDate: state.returnDate,
          origin: state.origin,
          returnCity: state.returnCity || state.origin
        };
        const newLegs = typeof tripLegs === "function" ? tripLegs(tempNewTrip) : [];
        const newLegById = Object.fromEntries(newLegs.map(l => [l.id, l]));
        Object.entries(existing.selections?.transport || {}).forEach(([legId, slot]) => {
          if (!slot || !slot.selectedOptionId) return;
          const oldLeg = oldLegs.find(l => l.id === legId);
          const newLeg = newLegById[legId];
          const snapshot = slot.selectedSnapshot || null;
          if (!newLeg) {
            // Leg removed entirely (e.g. a stay was deleted)
            transportChanged.push({
              legId,
              type: "leg-removed",
              oldDate: oldLeg ? oldLeg.date : null,
              newDate: null,
              fromCity: oldLeg?.fromCity, toCity: oldLeg?.toCity,
              airline: snapshot?.airline || null,
              flightNum: snapshot?.flightNum || null
            });
            return;
          }
          if (oldLeg && oldLeg.date !== newLeg.date) {
            transportChanged.push({
              legId,
              type: "date-changed",
              oldDate: oldLeg.date,
              newDate: newLeg.date,
              fromCity: newLeg.fromCity, toCity: newLeg.toCity,
              airline: snapshot?.airline || null,
              flightNum: snapshot?.flightNum || null
            });
          }
        });

        // ---- Stay-changed detection ----
        // For each stay with a hotel selection, compare the OLD checkIn/checkOut
        // vs NEW. If either moved, the reservation is now date-mismatched.
        const staysChanged = [];
        const oldStaysById = Object.fromEntries((existing.stays || []).map(s => [s.id, s]));
        const newStaysById = Object.fromEntries(validStays.map(s => [s.id, s]));
        Object.entries(existing.selections?.stay || {}).forEach(([stayId, slot]) => {
          if (!slot || !slot.selectedOptionId) return;
          const oldStay = oldStaysById[stayId];
          const newStay = newStaysById[stayId];
          if (!newStay) {
            // Stay removed entirely
            staysChanged.push({
              stayId,
              type: "stay-removed",
              oldCheckIn: oldStay?.checkIn, oldCheckOut: oldStay?.checkOut,
              newCheckIn: null, newCheckOut: null,
              oldCity: oldStay?.city, newCity: null,
              hotelName: slot.selectedSnapshot?.name || null
            });
            return;
          }
          if (oldStay && (oldStay.checkIn !== newStay.checkIn || oldStay.checkOut !== newStay.checkOut)) {
            staysChanged.push({
              stayId,
              type: "dates-changed",
              oldCheckIn: oldStay.checkIn, oldCheckOut: oldStay.checkOut,
              newCheckIn: newStay.checkIn, newCheckOut: newStay.checkOut,
              oldCity: oldStay.city, newCity: newStay.city,
              hotelName: slot.selectedSnapshot?.name || null
            });
          }
        });

        // Detect whether any stay window itself moved (start or end)
        const datesShifted = oldWindows.some((ow, i) => {
          const nw = newWindows[i];
          return !nw || ow.in !== nw.in || ow.out !== nw.out;
        }) || oldWindows.length !== newWindows.length;

        const hasAnyChange = orphaned.length > 0 || stayChanged.length > 0 || transportChanged.length > 0 || staysChanged.length > 0;
        const dateWarning = (datesShifted && hasAnyChange)
          ? {
              changedAt: Date.now(),
              orphaned,
              stayChanged,
              transportChanged,
              staysChanged,
              oldWindows,
              newWindows
            }
          : null;
        // ---------- End date-change detection ----------

        trips[idx] = {
          ...existing,
          name: state.name || existing.name,
          cities: validStays.map(s => s.city),
          origin: state.origin,
          returnCity: state.returnCity || state.origin,
          originDate: state.originDate,
          returnDate: state.returnDate,
          window: state.window || 0,
          travelers: travelersList,
          stays: validStays,
          // dayItems is preserved from existing — important: planned items survive an edit
          // preferences are preserved as the original snapshot (the immutability rule)
          // dateWarning carries info about scheduled items affected by stay-date changes
          dateWarning: dateWarning || existing.dateWarning || null,
        };

        // If the trip's dates shifted, refresh transport selections against the
        // new dates. Selected option IDs encode the leg's date and become stale
        // when dates move. We re-match by airline (same algorithm as initial
        // round-trip auto-fill) so the user keeps the airline they picked when
        // possible, and the return flight stays in sync with the outbound's
        // airline on the new date.
        let refreshResult = { refreshed: 0, cleared: 0 };
        if (datesShifted) {
          refreshResult = refreshTransportAfterDateChange(trips[idx]);
        }

        closeModal();
        if (dateWarning) {
          showToast("Trip dates changed — please review your scheduled items");
        } else if (refreshResult.cleared > 0) {
          showToast(`Trip updated · ${refreshResult.cleared} flight${refreshResult.cleared === 1 ? "" : "s"} need re-selection`);
        } else if (refreshResult.refreshed > 0) {
          showToast(`Trip updated · flights re-matched to new dates`);
        } else {
          showToast("Trip updated");
        }
        persist();
        if (goToPlan) {
          app.screen = "trip";
          app.tab = "plan";
          app.activeTripId = state.editingTripId;
          app.selectionCategory = "transport";
          app.selectionSlotId = null;
        }
        render();
        return;
      }

      // CREATE: brand new trip
      const newTrip = {
        id: "trip-new-" + Date.now(),
        name: state.name || "New trip",
        cities: validStays.map(s => s.city),
        origin: state.origin,
        returnCity: state.returnCity || state.origin,
        originDate: state.originDate,
        returnDate: state.returnDate,
        window: state.window || 0,
        status: "planning",
        travelers: travelersList,
        stays: validStays,
        dayItems: {}
        // Note: we deliberately do NOT snapshot preferences here. Filter
        // chip defaults read straight from userSettings every time a
        // slot is initialized, so the user's CURRENT preferences flow
        // into new selections. Per-trip customization still works because
        // it lives in slot.cuisineFilters/typeFilters/interestFilters.
      };
      trips.unshift(newTrip);
      closeModal();
      showToast("Trip created");
      persist();
      if (goToPlan) {
        app.screen = "trip";
        app.tab = "plan";
        app.activeTripId = newTrip.id;
        // Land on the Transport category list directly so the user can
        // start filling in flights without navigating through the Plan
        // overview tile grid.
        app.selectionCategory = "transport";
        app.selectionSlotId = null;
      }
      render();
    };

    // Bind both action buttons. Both run identical save logic; the goToPlan
    // flag controls post-save routing.
    document.getElementById("nt-select-options").onclick = buildSaveHandler(true);
    document.getElementById("nt-save-later").onclick = buildSaveHandler(false);
  }

  // Seed the snapshot tracking so the cascade can detect manual overrides going forward
  state._prevOriginDate = state.originDate;
  state._prevLastCheckOut = state.stays.length ? state.stays[state.stays.length - 1].checkOut : "";
  // Compute the expected first check-in (origin + 1 day if overnight)
  const _addDaysSeed = (dateStr, n) => {
    if (!dateStr) return dateStr;
    const d = new Date(dateStr + "T00:00:00");
    d.setDate(d.getDate() + n);
    return toLocalDateStr(d);
  };
  state._prevExpectedFirstCheckIn = state.stays[0]
    ? (state.outboundLeg.arrivesNextDay ? _addDaysSeed(state.originDate, 1) : state.originDate)
    : "";
  state.stays.forEach(s => { s._prevCheckOut = s.checkOut; });

  renderNewTrip();
}

// Add a custom place. Pre-fills city + category from current Plan view.
function openAddCustomPlace(city, category) {
  const state = {
    name: "",
    cat: category,
    city: city,
    address: "",
    website: "",
    priceLevel: "",
    notes: ""
  };

  function isValid() { return state.name.trim().length > 0; }

  function renderForm() {
    const html = `
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
          <div class="modal-title">Add your own ${categoryLabel(state.cat)}</div>
          <div class="modal-close" onclick="closeModal()">×</div>
        </div>
        <div class="modal-body">
          <div class="nt-section">
            <div class="nt-field">
              <label class="nt-label">Name <span style="color: var(--text-danger);">*</span></label>
              <input type="text" id="cp-name" value="${state.name.replace(/"/g, '&quot;')}" placeholder="e.g., Padella Borough Market">
            </div>
            <div class="nt-field">
              <label class="nt-label">City</label>
              <input type="text" id="cp-city" value="${state.city.replace(/"/g, '&quot;')}" placeholder="London">
            </div>
            <div class="nt-field">
              <label class="nt-label">Address (optional)</label>
              <input type="text" id="cp-address" value="${state.address.replace(/"/g, '&quot;')}" placeholder="Street address or neighborhood">
            </div>
            <div class="nt-field">
              <label class="nt-label">Website (optional)</label>
              <input type="url" id="cp-website" value="${state.website.replace(/"/g, '&quot;')}" placeholder="https://...">
            </div>
            ${state.cat === 'dining' ? `
            <div class="nt-field">
              <label class="nt-label">Price (optional)</label>
              <select id="cp-price" class="sp-select">
                <option value="" ${state.priceLevel === '' ? 'selected' : ''}>—</option>
                <option value="$" ${state.priceLevel === '$' ? 'selected' : ''}>$ — Inexpensive</option>
                <option value="$$" ${state.priceLevel === '$$' ? 'selected' : ''}>$$ — Moderate</option>
                <option value="$$$" ${state.priceLevel === '$$$' ? 'selected' : ''}>$$$ — Pricey</option>
                <option value="$$$$" ${state.priceLevel === '$$$$' ? 'selected' : ''}>$$$$ — Splurge</option>
              </select>
            </div>` : ''}
            <div class="nt-field">
              <label class="nt-label">Notes (optional)</label>
              <textarea id="cp-notes" rows="3" placeholder="Why you want to add this — a friend's tip, what's special, etc."
                        style="width: 100%; padding: 8px 10px; font-size: 13px; font-family: inherit; border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); resize: vertical; outline: none;">${state.notes.replace(/</g, '&lt;')}</textarea>
            </div>
          </div>

function saveCustomTransport(legId, state) {
  if (!state.operator.trim() || !state.date) {
    showToast("Operator and date are required");
    return;
  }
  const t = currentTrip();
  const slot = ensureTransportSlot(t, legId);
  if (!slot.customOptions) slot.customOptions = [];

  const customId = "tcustom-" + Date.now();
  // Build a result-shaped object that the unified results list can render
  // The arrTime gets a "+1" marker if arrivesNextDay is checked, mirroring the catalog format
  const arrTimeDisplay = state.arrTime ? (state.arrivesNextDay ? `${state.arrTime} +1` : state.arrTime) : "";
  // Compute durationMin if we have both times
  let durationMin = 0;
  if (state.depTime && state.arrTime) {
    const [dh, dm] = state.depTime.split(":").map(Number);
    const [ah, am] = state.arrTime.split(":").map(Number);
    durationMin = (ah * 60 + am) - (dh * 60 + dm);
    if (state.arrivesNextDay || durationMin < 0) durationMin += 24 * 60;
  }
  slot.customOptions.push({
    id: customId,
    airline: state.operator.trim(),
    flightNum: state.flightNum.trim(),
    date: state.date,
    depTime: state.depTime,
    arrTime: arrTimeDisplay,
    durationMin: durationMin,
    stops: state.stops,
    price: parseFloat(state.price) || 0,
    website: state.website.trim() || null,
    notes: state.notes.trim(),
    isCustom: true
  });
  closeModal();
  showToast(`Added "${state.operator}"`);
  persist();
  render();
}

async function deleteCustomPlace(placeId) {
  if (!(await confirmDialog({
    title: "Delete saved place?",
    message: "This will also remove it from any trip days where you scheduled it.",

    danger: true
  }))) return;
  userSettings.customPlaces = (userSettings.customPlaces || []).filter(p => p.id !== placeId);
  // Also remove it from any trip's dayItems so we don't have orphan references
  for (const t of trips) {
    for (const date in t.dayItems) {
      t.dayItems[date] = t.dayItems[date].filter(i => i.placeId !== placeId);
      if (!t.dayItems[date].length) delete t.dayItems[date];
    }
  }
  closeModal();
  showToast("Place removed");
  persist();
  render();
}

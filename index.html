    }
    return `
      <div class="map-empty-overlay">
        <strong>No places match.</strong> Try toggling a filter chip above.
      </div>`;
  }
  if (allPins.length === 0) {
    return `
      <div class="map-empty-overlay">
        <strong>Nothing scheduled in ${city} yet.</strong> Add hotels, dining, or sights from the Plan tab.
      </div>`;
  }
  return `
    <div class="map-empty-overlay">
      <strong>No places match.</strong> Try toggling a filter chip above.
    </div>`;
}

// Day 16: "Show all places" escape from the Plan-map's empty state.
// Clears the per-slot preference filters for every stay in this city,
// matching the Day 15 selection-page pattern. Only acts on stays that
// have no committed selection (preserves user picks).
function clearPlanMapPrefsForCity(city) {
  const t = currentTrip();
  if (!t) return;
  const cityStays = (t.stays || []).filter(s => s.city === city);
  cityStays.forEach(stay => {
    const stay_slot = t.selections?.stay?.[stay.id];
    if (stay_slot && !stay_slot.selectedOptionId && (!stay_slot.bookings || stay_slot.bookings.length === 0)) {
      stay_slot.typeFilters = [];
      stay_slot.amenityFilters = [];
    }
    const dining_slot = t.selections?.dining?.[stay.id];
    if (dining_slot && (!dining_slot.selectedIds || dining_slot.selectedIds.length === 0)) {
      dining_slot.cuisineFilters = [];
      dining_slot.priceFilters = [];
      dining_slot.mealFilters = [];
    }
    const sights_slot = t.selections?.sights?.[stay.id];
    if (sights_slot && (!sights_slot.selectedIds || sights_slot.selectedIds.length === 0)) {
      sights_slot.interestFilters = [];
    }
  });
  _leafletLastView = null; // re-fit to whatever's now visible
  render();
  showToast("Filters cleared for this city");
}

// findPlaceById, findPlaceByName, jitterFromId, resolveItemCoords, collectTripPins,
// collectPlanPins are defined below (unchanged from previous version).

function findPlaceById(placeId) {
  if (!placeId) return null;
  if (typeof findPlace === "function") {
    try { return findPlace(placeId); } catch (e) { /* fall through */ }
  }
  for (const city in PLACES) {
    const buckets = PLACES[city] || {};
    for (const cat of ["stay", "transport", "dining", "sights"]) {
      const list = buckets[cat] || [];
      const hit = list.find(p => p.id === placeId);
      if (hit) return hit;
    }
  }
  if (typeof userSettings !== "undefined" && userSettings?.customPlaces) {
    return userSettings.customPlaces.find(p => p.id === placeId) || null;
  }
  return null;
}

function findPlaceByName(name, city) {
  if (!name) return null;
  const target = String(name).trim().toLowerCase();
  const buckets = getCityPlaces(city);
  for (const cat of ["stay", "transport", "dining", "sights"]) {
    const list = buckets[cat] || [];
    const hit = list.find(p => String(p.name).trim().toLowerCase() === target);
    if (hit) return hit;
  }
  if (typeof userSettings !== "undefined" && userSettings?.customPlaces) {
    const hit = userSettings.customPlaces.find(p => p.city === city && String(p.name).trim().toLowerCase() === target);
    if (hit) return hit;
  }
  return null;
}

function jitterFromId(id) {
  let h = 0;
  const s = String(id || "");
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  const latOff = (((h & 0xffff) / 0xffff) - 0.5) * 0.008;
  const lngOff = ((((h >>> 16) & 0xffff) / 0xffff) - 0.5) * 0.012;
  return { latOff, lngOff };
}

function resolveItemCoords(dayItem, city) {
  if (dayItem.placeId) {
    const p = findPlaceById(dayItem.placeId);
    if (p && p.lat != null && p.lng != null) {
      return { lat: p.lat, lng: p.lng, approximate: false, source: "catalog", _enrich: p };
    }
  }
  if (dayItem.name) {
    const p = findPlaceByName(dayItem.name, city);
    if (p && p.lat != null && p.lng != null) {
      return { lat: p.lat, lng: p.lng, approximate: false, source: "name", _enrich: p };
    }
  }
  if (dayItem.agentSnapshot && dayItem.agentSnapshot.lat != null && dayItem.agentSnapshot.lng != null) {
    return { lat: dayItem.agentSnapshot.lat, lng: dayItem.agentSnapshot.lng, approximate: false, source: "snapshot" };
  }
  if (dayItem.lat != null && dayItem.lng != null) {
    return { lat: dayItem.lat, lng: dayItem.lng, approximate: false, source: "self" };
  }
  const center = CITY_CENTERS[city];
  if (!center) return null;
  const j = jitterFromId(dayItem.id || dayItem.name || "anon");
  return { lat: center.lat + j.latOff, lng: center.lng + j.lngOff, approximate: true, source: "approx" };
}

function collectTripPins(trip, city) {
  if (!trip) return [];
  const pins = [];
  const seenItemIds = new Set();
  const cityStays = (trip.stays || []).filter(s => s.city === city);
  if (cityStays.length === 0) return pins;

  // ---- Stay pins ----
  // Stays aren't written into dayItems — they're virtual on the Itinerary tab,
  // rendered from t.selections.stay[stayId].bookings (with legacy fallback to
  // selectedOptionId). Each booking gets its own pin, so a stay with both a
  // city-center hotel and an airport hotel shows two markers on the Map.
  cityStays.forEach(stay => {
    const bookings = getStayBookings(trip, stay.id);
    bookings.forEach(booking => {
      const id = booking.hotelId;
      // Resolve coords: PLACES catalog → customPlaces → agent snapshot.
      // placeId is always set to the hotel id so the popup's Details button
      // can succeed via findPlace, which now walks curated, custom, and
      // agent stores.
      let lat = null, lng = null, name = "Hotel", meta = "", placeId = id, rating = null;
      let approximate = false;
      const place = findPlaceById(id);
      const slot = trip.selections?.stay?.[stay.id];
      if (place && place.lat != null && place.lng != null) {
        lat = place.lat; lng = place.lng;
        name = place.name; meta = place.meta || "";
        rating = place.rating || null;
      } else if (slot?.agentSelections?.[id]) {
        const ag = slot.agentSelections[id];
        name = ag.name || name;
        meta = ag.neighborhood || ag.meta || "";
        if (ag.lat != null && ag.lng != null) {
          lat = ag.lat; lng = ag.lng;
        } else {
          // Approximate at city center with deterministic jitter so different
          // selections don't stack
          const center = CITY_CENTERS[city];
          if (center) {
            const j = jitterFromId(id);
            lat = center.lat + j.latOff;
            lng = center.lng + j.lngOff;
            approximate = true;
          }
        }
      } else if (booking.snapshot) {
        // Use the snapshot for name/meta even if we can't resolve coords from catalog
        name = booking.snapshot.name || name;
        meta = booking.snapshot.neighborhood || meta;
        rating = booking.snapshot.rating || null;
        const center = CITY_CENTERS[city];
        if (center) {
          const j = jitterFromId(id);
          lat = center.lat + j.latOff;
          lng = center.lng + j.lngOff;
          approximate = true;
        }
      } else {
        // Catalog item without coords — fall back to city center jitter
        const center = CITY_CENTERS[city];
        if (center) {
          const j = jitterFromId(id);
          lat = center.lat + j.latOff;
          lng = center.lng + j.lngOff;
          approximate = true;
          name = place?.name || name;
        }
      }
      if (lat == null || lng == null) return;
      // Pin id includes booking id so multiple bookings at same hotel get
      // distinct pins. (Not a typical case but theoretically possible.)
      const stayPinId = `stay:${stay.id}:${booking.id}`;
      if (seenItemIds.has(stayPinId)) return;
      seenItemIds.add(stayPinId);
      pins.push({
        id: stayPinId,
        cat: "stay",
        name, meta, rating, lat, lng, approximate,
        placeId,
        _date: booking.checkIn,
        _time: "",
        _stayId: stay.id,        // marker so pin-click can route to stay detail
        _bookingId: booking.id   // optional: lets the popup show booking-specific dates
      });
    });
  });

  // ---- Dining/Sights pins (and any other categories that DO live in dayItems) ----
  cityStays.forEach(stay => {
    Object.entries(trip.dayItems || {}).forEach(([date, items]) => {
      if (date < stay.checkIn || date >= stay.checkOut) return;
      (items || []).forEach(item => {
        if (!item || !item.id) return;
        if (seenItemIds.has(item.id)) return;
        seenItemIds.add(item.id);
        const coords = resolveItemCoords(item, city);
        if (!coords) return;
        const enrich = coords._enrich || null;
        pins.push({
          id: item.id,
          cat: item.category || enrich?.cat || "sights",
          name: item.name || enrich?.name || "Unnamed",
          meta: item.sub || enrich?.meta || "",
          rating: enrich?.rating || null,
          lat: coords.lat,
          lng: coords.lng,
          approximate: coords.approximate,
          placeId: item.placeId || enrich?.id || null,
          _date: date,
          _time: item.time || ""
        });
      });
    });
  });
  return pins;
}

function collectPlanPins(city) {
  const buckets = getCityPlaces(city);
  // Include the user's custom places for this city so Map > Plan shows the
  // same universe of options as the Plan tab list. Without this, places
  // added via "+ Add your own" in the Plan tab appear in the list but
  // never on the Map. Custom places already carry lat/lng and a `cat` tag.
  const customForCity = (userSettings.customPlaces || []).filter(p => p.city === city);

  // Include AI-agent-found places that have coords. Agent results live on
  // the per-stay slot's `agentSelections` map. Walk every trip's selections
  // for stays in this city and pull the agent results out.
  const agentForCity = [];
  const t = currentTrip();
  if (t) {
    const cityStays = (t.stays || []).filter(s => s.city === city);
    cityStays.forEach(stay => {
      ["dining", "sights", "stay"].forEach(cat => {
        const slot = t.selections?.[cat]?.[stay.id];
        if (!slot?.agentSelections) return;
        Object.entries(slot.agentSelections).forEach(([id, ag]) => {
          if (ag.lat != null && ag.lng != null) {
            agentForCity.push({
              id, cat, name: ag.name || "Place",
              meta: ag.neighborhood || ag.cuisine || "",
              rating: ag.rating || null,
              tags: [ag.cuisine, ag.priceTier, ag.type].filter(Boolean),
              lat: ag.lat, lng: ag.lng,
              _isAgent: true
            });
          }
        });
      });
    });
  }

  // Note: transport pins are intentionally excluded from Plan mode. Plan
  // mode is for browsing places to add to the trip — transport is selected
  // per-leg via the Plan tab, not via map pins. Transport pins still appear
  // in My Trip mode via collectTripPins.
  const allPins = [
    ...customForCity,
    ...agentForCity,
    ...(buckets.stay || []),
    ...(buckets.dining || []),
    ...(buckets.sights || [])
  ].filter(p => p.lat != null && p.lng != null);

  // Day 16: Apply per-trip-slot preference filters. The Plan map should
  // mirror what the Plan > Stay/Dining/Sights selection pages would show
  // for this city — same intersection semantics (within-category OR,
  // across-category AND). If no slot exists for this city, OR if a slot
  // has empty filters, pins for that category pass through unfiltered.
  //
  // For multi-stay-same-city trips we UNION filters across stays so a
  // user's intent on either stay's slot keeps its pins visible. Custom
  // and agent-found places (already user-curated) bypass filtering.
  if (!t) return allPins;
  const cityStays = (t.stays || []).filter(s => s.city === city);
  if (cityStays.length === 0) return allPins;

  // Union filter arrays across stays in this city for each category.
  const unionFilters = (cat, ...filterKeys) => {
    const result = {};
    filterKeys.forEach(k => result[k] = []);
    let anyHasFilters = false;
    cityStays.forEach(stay => {
      const slot = t.selections?.[cat]?.[stay.id];
      if (!slot) return;
      filterKeys.forEach(k => {
        if (Array.isArray(slot[k]) && slot[k].length > 0) {
          anyHasFilters = true;
          slot[k].forEach(v => { if (!result[k].includes(v)) result[k].push(v); });
        }
      });
    });
    return anyHasFilters ? result : null;
  };

  const stayF = unionFilters("stay", "typeFilters");
  const diningF = unionFilters("dining", "cuisineFilters", "priceFilters");
  const sightsF = unionFilters("sights", "interestFilters");

  // tagsIntersect: returns true if `tags` contains at least one match from
  // every non-empty filter list in `filterGroups`. Mirrors the AND-across-
  // categories, OR-within-category semantics used by the selection pages.
  const tagsIntersect = (tags, filterGroups) => {
    const lowered = (tags || []).map(t => t);
    for (const list of filterGroups) {
      if (!list || list.length === 0) continue;
      const norms = list.map(normalizePrefTag);
      if (!lowered.some(tag => norms.includes(tag))) return false;
    }
    return true;
  };

  return allPins.filter(p => {
    // Always show custom + agent pins (already user-curated).
    if (p._isAgent || (userSettings.customPlaces || []).some(cp => cp.id === p.id)) {
      return true;
    }
    if (p.cat === "stay" && stayF) {
      return tagsIntersect(p.tags, [stayF.typeFilters]);
    }
    if (p.cat === "dining" && diningF) {
      return tagsIntersect(p.tags, [diningF.cuisineFilters, diningF.priceFilters]);
    }
    if (p.cat === "sights" && sightsF) {
      return tagsIntersect(p.tags, [sightsF.interestFilters]);
    }
    return true; // no filters set for this category → passthrough
  });
}

/* ---------- Trip date-change warning banner ----------
   Surfaced on Map and Itinerary tabs when a trip's stays were edited and
   scheduled Dining/Sights items either fell outside every new stay window
   (orphaned) or shifted into a different city's stay (city changed).
   Persisted on trip.dateWarning. Dismissed via dismissDateWarning(tripId). */
// Returns the active reschedule status for a given dayItemId, or null if none.
// Uses the same live-filter logic as renderDateChangeWarning so what's red on
// a card matches exactly what's listed in the banner.
//   { type: "orphan" }                            — date now outside any stay window
//   { type: "shifted", oldCity, newCity }         — date now in a different city
function getDayItemRescheduleStatus(trip, dayItemId) {
  const w = trip && trip.dateWarning;
  if (!w || !dayItemId) return null;

  const stays = trip.stays || [];
  const dayItems = trip.dayItems || {};
  const findItemAndDate = (id) => {
    for (const [date, items] of Object.entries(dayItems)) {
      const hit = (items || []).find(i => i.id === id);
      if (hit) return { date, item: hit };
    }
    return null;
  };
  const inSomeStayWindow = (date) => stays.some(s => date >= s.checkIn && date < s.checkOut);
  const cityForDate = (date) => (stays.find(s => date >= s.checkIn && date < s.checkOut) || {}).city || null;

  // Check orphan list — item still present + still outside windows = active orphan
  const orphan = (w.orphaned || []).find(o => o.dayItemId === dayItemId);
  if (orphan) {
    const found = findItemAndDate(dayItemId);
    if (found && !inSomeStayWindow(found.date)) {
      return { type: "orphan" };
    }
  }
  // Check shifted list
  const shifted = (w.stayChanged || []).find(s => s.dayItemId === dayItemId);
  if (shifted) {
    const found = findItemAndDate(dayItemId);
    if (found) {
      const currentCity = cityForDate(found.date);
      if (currentCity && currentCity !== shifted.oldCity) {
        return { type: "shifted", oldCity: shifted.oldCity, newCity: currentCity };
      }
    }
  }
  return null;
}

// Returns the active rebooking status for a given transport leg id, or null.
// Filtered against current trip state so resolved entries auto-clear (just
// like the dining/sights helper).
//   { type: "date-changed", oldDate, newDate, fromCity, toCity, airline, flightNum }
//   { type: "leg-removed",  oldDate, fromCity, toCity, airline, flightNum }
function getTransportRebookStatus(trip, legId) {
  const w = trip && trip.dateWarning;
  if (!w || !legId) return null;
  const entry = (w.transportChanged || []).find(c => c.legId === legId);
  if (!entry) return null;
  // The user has resolved this if they re-selected (we'd need to compare current
  // selectedOptionId against snapshot — but simpler: a re-select clears slot's
  // autoSuggested flag. We instead key on whether the stored snapshot matches
  // what was originally noted.) For now, the entry is considered active until
  // explicitly cleared on re-selection. Live-filter alternative: confirm the
  // leg still exists with a selection.
  const slot = trip.selections?.transport?.[legId];
  if (!slot || !slot.selectedOptionId) return null;
  // For "leg-removed", the slot is gone too — covered by the above check.
  return entry;
}

// Returns the active rebooking status for a given stay id, or null.
//   { type: "dates-changed", oldCheckIn, oldCheckOut, newCheckIn, newCheckOut, oldCity, newCity, hotelName }
//   { type: "stay-removed", oldCheckIn, oldCheckOut, oldCity, hotelName }
function getStayRebookStatus(trip, stayId) {
  const w = trip && trip.dateWarning;
  if (!w || !stayId) return null;
  const entry = (w.staysChanged || []).find(c => c.stayId === stayId);
  if (!entry) return null;
  const slot = trip.selections?.stay?.[stayId];
  if (!slot || !slot.selectedOptionId) return null;
  return entry;
}

// Remove a rebook flag entry from trip.dateWarning. Called when the user makes
// a fresh selection on a flagged slot — that's the user's signal that they've
// re-confirmed the booking on the new dates. If clearing this entry leaves the
// warning empty, wipe trip.dateWarning entirely (matches the live-filter
// auto-clear behavior in renderDateChangeWarning).
//
// kind: "transport" → clears from trip.dateWarning.transportChanged matching legId
// kind: "stay"      → clears from trip.dateWarning.staysChanged matching stayId
function clearRebookFlag(trip, kind, slotId) {
  if (!trip || !trip.dateWarning || !slotId) return;
  const w = trip.dateWarning;
  if (kind === "transport") {
    if (Array.isArray(w.transportChanged)) {
      w.transportChanged = w.transportChanged.filter(c => c.legId !== slotId);
    }
  } else if (kind === "stay") {
    if (Array.isArray(w.staysChanged)) {
      w.staysChanged = w.staysChanged.filter(c => c.stayId !== slotId);
    }
  }
  // If everything is now empty, drop the whole warning so the banner self-clears
  // on the next render. (renderDateChangeWarning will also do this defensively
  // via its own filter, but eager cleanup here keeps the model tidy.)
  const totalRemaining =
    (w.orphaned || []).length +
    (w.stayChanged || []).length +
    (w.transportChanged || []).length +
    (w.staysChanged || []).length;
  if (totalRemaining === 0) {
    trip.dateWarning = null;
  }
}

function renderDateChangeWarning(trip) {
  const w = trip && trip.dateWarning;
  if (!w) return "";

  // Filter the original orphan/shifted lists against current state. An entry is
  // considered "resolved" (and dropped from the banner) when:
  //   - the dayItem no longer exists in trip.dayItems anywhere, OR
  //   - for orphans: the item is now scheduled inside SOME stay window, OR
  //   - for shifted: the item is now scheduled in the city it was supposed to be in
  //   (we use original oldCity as the reference — if user moved it back, it's resolved)
  // This makes the banner self-clear as the user re-schedules things, instead of
  // showing stale info forever until they manually dismiss.
  const dayItems = trip.dayItems || {};
  const stays = trip.stays || [];
  const findItemAndDate = (id) => {
    for (const [date, items] of Object.entries(dayItems)) {
      const hit = (items || []).find(i => i.id === id);
      if (hit) return { date, item: hit };
    }
    return null;
  };
  const inSomeStayWindow = (date) => stays.some(s => date >= s.checkIn && date < s.checkOut);
  const cityForDate = (date) => (stays.find(s => date >= s.checkIn && date < s.checkOut) || {}).city || null;

  const liveOrphans = (w.orphaned || []).filter(o => {
    const found = findItemAndDate(o.dayItemId);
    if (!found) return false; // item deleted → resolved
    if (inSomeStayWindow(found.date)) return false; // re-scheduled inside a window → resolved
    return true;
  });
  const liveShifted = (w.stayChanged || []).filter(s => {
    const found = findItemAndDate(s.dayItemId);
    if (!found) return false;
    const currentCity = cityForDate(found.date);
    if (!currentCity) return false; // outside all windows → already a different problem
    return currentCity !== s.oldCity; // still in the wrong city
  });

  // ---- Transport / Stay live-filter ----
  // An entry is "resolved" when the user has cleared the slot or made a fresh
  // selection that overrides the snapshot we recorded at the time of change.
  // Until we have a confirm-action UX, we conservatively keep entries while
  // the slot still has a selectedOptionId.
  const liveTransport = (w.transportChanged || []).filter(c => {
    const slot = trip.selections?.transport?.[c.legId];
    if (!slot || !slot.selectedOptionId) return false; // slot cleared → resolved
    return true;
  });
  const liveStays = (w.staysChanged || []).filter(c => {
    const slot = trip.selections?.stay?.[c.stayId];
    if (!slot || !slot.selectedOptionId) return false; // slot cleared → resolved
    return true;
  });

  const orphanCount = liveOrphans.length;
  const shiftedCount = liveShifted.length;
  const transportCount = liveTransport.length;
  const staysCount = liveStays.length;
  if (orphanCount === 0 && shiftedCount === 0 && transportCount === 0 && staysCount === 0) {
    // All items are now resolved. Clear the warning from the trip so it doesn't
    // get re-evaluated on every render. Persist so the cleanup is permanent.
    trip.dateWarning = null;
    if (typeof persist === "function") {
      try { persist(); } catch (e) { /* fail-soft */ }
    }
    return "";
  }

  const orphanList = liveOrphans.map(o => `
    <li style="margin:2px 0;">
      <strong>${escapeHtml(o.name || "(unnamed)")}</strong>
      <span style="color:var(--text-tertiary);">— ${o.category}, was on ${formatPopupDate(o.oldDate)} (${escapeHtml(o.oldCity || "?")})</span>
    </li>`).join("");

  const shiftedList = liveShifted.map(s => `
    <li style="margin:2px 0;">
      <strong>${escapeHtml(s.name || "(unnamed)")}</strong>
      <span style="color:var(--text-tertiary);">— ${s.category}, ${formatPopupDate(s.oldDate)} now in ${escapeHtml(s.newCity || "?")} (was ${escapeHtml(s.oldCity || "?")})</span>
    </li>`).join("");

  const transportList = liveTransport.map(c => {
    const route = c.fromCity && c.toCity ? `${escapeHtml(c.fromCity)} → ${escapeHtml(c.toCity)}` : "";
    const flight = [c.airline, c.flightNum].filter(Boolean).join(" ");
    if (c.type === "leg-removed") {
      return `<li style="margin:2px 0;"><strong>${escapeHtml(flight || "Flight")}</strong>
        <span style="color:var(--text-tertiary);">— ${route} (was ${formatPopupDate(c.oldDate)}) — leg removed, please cancel reservation</span></li>`;
    }
    return `<li style="margin:2px 0;"><strong>${escapeHtml(flight || "Flight")}</strong>
      <span style="color:var(--text-tertiary);">— ${route}, was ${formatPopupDate(c.oldDate)}, now ${formatPopupDate(c.newDate)}</span></li>`;
  }).join("");

  const staysList = liveStays.map(c => {
    const hotel = c.hotelName || "Hotel";
    if (c.type === "stay-removed") {
      return `<li style="margin:2px 0;"><strong>${escapeHtml(hotel)}</strong>
        <span style="color:var(--text-tertiary);">— ${escapeHtml(c.oldCity || "")}, was ${formatPopupDate(c.oldCheckIn)} – ${formatPopupDate(c.oldCheckOut)} — stay removed, please cancel reservation</span></li>`;
    }
    return `<li style="margin:2px 0;"><strong>${escapeHtml(hotel)}</strong>
      <span style="color:var(--text-tertiary);">— ${escapeHtml(c.newCity || c.oldCity || "")}, was ${formatPopupDate(c.oldCheckIn)} – ${formatPopupDate(c.oldCheckOut)}, now ${formatPopupDate(c.newCheckIn)} – ${formatPopupDate(c.newCheckOut)}</span></li>`;
  }).join("");

  return `
    <div class="date-warning-banner">
      <div class="date-warning-head">
        <span class="date-warning-icon">⚠</span>
        <span class="date-warning-title">Trip dates changed</span>
        <span class="date-warning-dismiss" onclick="dismissDateWarning('${trip.id}')">Dismiss</span>
      </div>
      <div class="date-warning-body">
        Please review the items below — they need to match your new trip dates.
        ${transportCount > 0 ? `
          <div class="date-warning-section">
            <div class="date-warning-section-title">${transportCount} flight${transportCount === 1 ? "" : "s"} need rebooking:</div>
            <ul class="date-warning-list">${transportList}</ul>
          </div>` : ""}
        ${staysCount > 0 ? `
          <div class="date-warning-section">
            <div class="date-warning-section-title">${staysCount} stay${staysCount === 1 ? "" : "s"} need rebooking:</div>
            <ul class="date-warning-list">${staysList}</ul>
          </div>` : ""}
        ${orphanCount > 0 ? `
          <div class="date-warning-section">
            <div class="date-warning-section-title">${orphanCount} dining/sights item${orphanCount === 1 ? "" : "s"} no longer on a trip day:</div>
            <ul class="date-warning-list">${orphanList}</ul>
          </div>` : ""}
        ${shiftedCount > 0 ? `
          <div class="date-warning-section">
            <div class="date-warning-section-title">${shiftedCount} dining/sights item${shiftedCount === 1 ? "" : "s"} now in a different city:</div>
            <ul class="date-warning-list">${shiftedList}</ul>
          </div>` : ""}
      </div>
    </div>
  `;
}

function dismissDateWarning(tripId) {
  const t = trips.find(x => x.id === tripId);
  if (!t) return;
  t.dateWarning = null;
  persist();
  render();
}

   ============================================================ */

// Pages that should never show edit controls (no editable fields).
const NON_EDITABLE_SETTINGS_PAGES = new Set(["documents-hub-only-flag-not-used"]);
// Returns true if this settings page has an Edit/Save mode.
function settingsPageIsEditable(page) {
  // Settings root menu = navigation only
  if (!page) return false;
  // Travelers list = non-editable (just navigation)
  if (page === "travelers" && !app.travelerEditId) return false;
  // Documents HUB (no category yet) = non-editable list
  if (page === "documents" && !app.documentCategory) return false;
  return !NON_EDITABLE_SETTINGS_PAGES.has(page);
}

function renderSettingsPage(area, page) {
  const bodyHtml = settingsPageBody(page);
  // Add bottom Save/Cancel when editable + in edit mode.
  // Traveler detail already injects its own footer in travelerDetailBody —
  // skip injecting another one here.
  const isTravelerDetail = page === "travelers" && app.travelerEditId;
  let footer = "";
  if (settingsPageIsEditable(page) && app.editMode && !isTravelerDetail) {
    footer = `
      <div class="settings-save-row">
        <span class="btn" onclick="cancelEdit()">Cancel</span>
        <span class="btn btn-primary" onclick="saveEdit()">Save changes</span>
      </div>
    `;
  }
  area.innerHTML = `${bodyHtml}${footer}`;
}

function settingsPageBody(page) {
  if (page === "travel") return travelSettingsBody();
  if (page === "lodging") return lodgingSettingsBody();
  if (page === "dining") return diningSettingsBody();
  if (page === "sights") return sightsSettingsBody();
  if (page === "notifications") return notificationsSettingsBody();
  if (page === "app") return appSettingsBody();
  if (page === "security") return securitySettingsBody();
  if (page === "lock") return lockSettingsBody();
  if (page === "privacy") return privacySettingsBody();
  if (page === "travelers") {
    if (app.travelerEditId) return travelerDetailBody(app.travelerEditId);
    return travelersListBody();
  }
  if (page === "documents") {
    if (app.documentCategory && app.documentId) return documentDetailBody(app.documentCategory, app.documentId);
    if (app.documentCategory) return documentCategoryBody(app.documentCategory);
    return documentsHubBody();
  }
  return "";
}

function travelersListBody() {
  const travelers = userSettings.travelers || [];
  // Show primary first, then companions in add order
  const sorted = [...travelers].sort((a, b) => (b.primary ? 1 : 0) - (a.primary ? 1 : 0));

  const rows = sorted.map(tr => {
    const docCount = travelerDocuments(tr.id).length;
    const flyerCount = (tr.frequentFlyer || []).length;
    const subParts = [];
    if (tr.birthday) subParts.push(formatBirthday(tr.birthday));
    if (docCount > 0) subParts.push(`${docCount} doc${docCount === 1 ? '' : 's'}`);
    if (flyerCount > 0) subParts.push(`${flyerCount} loyalty`);
    const sub = subParts.length ? subParts.join(" · ") : "Tap to add details";
    return `
      <div class="settings-row" onclick="gotoTravelerDetail('${tr.id}')">
        <div class="settings-row-icon">👤</div>
        <div class="settings-row-text">
          <div>${tr.name}${tr.primary ? ' <span class="trv-primary-pill">PRIMARY</span>' : ''}</div>
          <div class="settings-row-sub">${sub}</div>
        </div>
        <div class="settings-row-chevron">›</div>
      </div>
    `;
  }).join("");

  return `
    <div class="sp-body">
      <div class="sp-section">
        <div class="sp-hint">Travelers you can add to any trip. Add once, reuse across trips.</div>
      </div>
      <div class="settings-list">
        ${rows || '<div class="sp-hint" style="padding: 16px;">No travelers yet.</div>'}
      </div>
      <div class="sp-section">
        <span class="btn btn-primary" onclick="openAddTravelerDialog()">+ Add traveler</span>
      </div>
    </div>
  `;
}

function gotoTravelerDetail(travelerId) {
  app.screen = "settings";

// Format a YYYY-MM-DD birthday for display, respecting US/EU date format pref
function formatBirthday(yyyymmdd) {
  if (!yyyymmdd) return "";
  const d = new Date(yyyymmdd + "T00:00:00");
  if (isNaN(d.getTime())) return yyyymmdd;
  const opts = { year: "numeric", month: "short", day: "numeric" };
  return d.toLocaleDateString(userSettings.dateFormat === "EU" ? "en-GB" : "en-US", opts);
}

// Helpers used by the traveler detail page
function travelerDocLabel(kind, doc) {
  switch (kind) {
    case "passport":        return `Passport · ${doc.country || ''}`;
    case "driversLicense":  return `Driver's license · ${doc.state || ''}`;
    case "visa":            return `Visa · ${doc.country || ''}`;
    case "vaccination":     return doc.vaccine || "Vaccination";
    case "globalEntry":     return "Global Entry";
    case "tsaPreCheck":     return "TSA PreCheck";
    case "insurance":       return `Insurance · ${doc.provider || ''}`;
    default:                return kind;
  }
}
function travelerDocSub(kind, doc) {
  if (doc.expiration) return `Expires ${formatBirthday(doc.expiration)}`;
  if (doc.number)     return doc.number;
  return "";
}

// Confirm + remove traveler.
// Deliberate, hard-to-trigger remove flow:
// 1. If traveler is on any Planning or Pending trip, block and explain.
// 2. Otherwise, open a modal that requires typing the traveler's name to enable
//    the Remove button. Lists exactly what will be deleted.
function confirmRemoveTraveler(travelerId) {
  const trv = findTraveler(travelerId);
  if (!trv) return;

  // Block removal when traveler is on an active (Planning or Pending) trip.
  // Past trips don't block — historical record is fine to keep referencing
  // them (the trip data carries name fallbacks).
  const activeTripsWithThem = trips.filter(t => {
    const bucket = tripBucket(t);
    if (bucket !== "planning" && bucket !== "pending") return false;
    return (t.travelers || []).some(ref => ref.travelerId === travelerId);
  });

  if (activeTripsWithThem.length > 0) {
    const tripList = activeTripsWithThem.map(t => `• ${t.name}`).join("<br>");
    const html = `
      <div class="modal-sheet" style="max-height: 50%;">
        <div class="modal-handle"></div>
        <div class="modal-header">
          <div class="modal-title">Can't remove ${trv.name}</div>
          <div class="modal-close" onclick="closeModal()">×</div>
        </div>
        <div class="modal-body">
          <div class="trv-warn-block">
            <div class="trv-warn-icon">⚠</div>
            <div>
              <div class="trv-warn-title">${trv.name} is on active trips</div>
              <div class="trv-warn-sub">Remove them from these trips first, then come back and try again:</div>
              <div class="trv-warn-list">${tripList}</div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <span class="btn btn-primary" onclick="closeModal()">OK</span>
        </div>
      </div>
    `;
    openModal(html);
    return;
  }

  // Inventory what's about to be deleted
  const docCount = travelerDocuments(travelerId).length;
  const ffCount = (trv.frequentFlyer || []).length;
  const lpCount = (trv.loyaltyPrograms || []).length;
  const lossLines = [];
  if (docCount > 0) lossLines.push(`<div class="trv-loss-row">📄 <strong>${docCount}</strong> document${docCount === 1 ? '' : 's'}</div>`);
  if (ffCount > 0)  lossLines.push(`<div class="trv-loss-row">✈ <strong>${ffCount}</strong> frequent flyer program${ffCount === 1 ? '' : 's'}</div>`);
  if (lpCount > 0)  lossLines.push(`<div class="trv-loss-row">🏨 <strong>${lpCount}</strong> hotel/rental loyalty program${lpCount === 1 ? '' : 's'}</div>`);
  if (trv.knownTravelerNumber) lossLines.push(`<div class="trv-loss-row">🛂 Known Traveler Number</div>`);
  const lossList = lossLines.length
    ? `<div class="trv-loss-list">${lossLines.join("")}</div>`
    : `<div class="trv-loss-empty">No data attached to this traveler.</div>`;

  // Past trips that reference this traveler will keep them in their roster
  // (with the name fallback) so the historical record is preserved.
  const pastTripCount = trips.filter(t => {
    if (tripBucket(t) !== "past") return false;
    return (t.travelers || []).some(ref => ref.travelerId === travelerId);
  }).length;
  const pastNote = pastTripCount > 0
    ? `<div class="sp-hint">Past trip records (${pastTripCount}) will keep ${trv.name}'s name but not their profile data.</div>`
    : '';

  const html = `
    <div class="modal-sheet" style="max-height: 80%;">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <div class="modal-title">Remove ${trv.name}?</div>
        <div class="modal-close" onclick="closeModal()">×</div>
      </div>
      <div class="modal-body">
        <div class="trv-loss-warn">
          <div class="trv-loss-warn-icon">⚠</div>
          <div class="trv-loss-warn-text">
            <strong>This permanently deletes the following:</strong>
          </div>
        </div>
        ${lossList}
        ${pastNote}
        <div class="nt-field" style="margin-top: 16px;">
          <label class="nt-label">Type <strong>${trv.name}</strong> to confirm</label>
          <input type="text" id="trv-rm-confirm" autocomplete="off" placeholder="${trv.name}">
        </div>
      </div>
      <div class="modal-footer">
        <span class="btn" onclick="closeModal()">Cancel</span>
        <span class="btn btn-danger-strong" id="trv-rm-go" disabled>Remove permanently</span>
      </div>
    </div>
  `;
  openModal(html);

  const input = document.getElementById("trv-rm-confirm");
  const goBtn = document.getElementById("trv-rm-go");
  // Disabled visual + functional state
  goBtn.classList.add("disabled");
  input.focus();
  input.oninput = () => {
    const matches = input.value.trim() === trv.name.trim();
    if (matches) {
      goBtn.classList.remove("disabled");
      goBtn.removeAttribute("disabled");
    } else {
      goBtn.classList.add("disabled");
      goBtn.setAttribute("disabled", "disabled");
    }
  };
  goBtn.onclick = () => {
    if (input.value.trim() !== trv.name.trim()) return;
    closeModal();
    removeGlobalTraveler(travelerId);
    app.travelerEditId = null;
    showToast(`${trv.name} removed`);
    render();
  };
}

// Create a new doc of `catId` tagged to `travelerId`, then jump to its detail
// page in My Documents. Mirrors addDocument() but pre-populates travelerId
// and navigates to the doc detail page (which lives under the documents settings).
function addDocumentForTraveler(catId, travelerId) {
  closeModal();

  // Single-record categories (globalEntry, tsaPreCheck, insurance) are stored
  // as objects, not arrays. For these, just set the travelerId on the
  // existing object and jump to the editor.
  const meta = docCategoryMeta(catId);
  if (meta && !meta.multi) {
    if (!userSettings.documents[catId]) userSettings.documents[catId] = {};
    userSettings.documents[catId].travelerId = travelerId;
    persist();
    // Navigate to the single-doc editor in edit mode
    app.screen = "settings";
    app.settingsPage = "documents";
    app.documentCategory = catId;
    app.documentId = null;
    app.travelerEditId = null;
    app.docReturnTraveler = travelerId;
    startEdit();
    showToast(`New ${meta.label.toLowerCase()} — fill in the details and save`);
    return;
  }

  // Multi-record: create a new entry
  if (!userSettings.documents[catId]) userSettings.documents[catId] = [];
  const newDoc = { id: "d-" + Date.now(), travelerId: travelerId };
  if (meta && meta.fields) {
    meta.fields.forEach(f => {
      if (f === "doses") newDoc[f] = [];
      else newDoc[f] = "";
    });
  }
  newDoc.photoData = null;
  userSettings.documents[catId].push(newDoc);
  persist();

  // Navigate to the new doc's detail page in edit mode
  app.screen = "settings";
  app.settingsPage = "documents";
  app.documentCategory = catId;
  app.documentId = newDoc.id;
  app.travelerEditId = null;
  app.docReturnTraveler = travelerId;
  startEdit();
  showToast("New document — fill in the details and save");
}

function removeFrequentFlyer(travelerId, idx) {
  const trv = findTraveler(travelerId);
  if (!trv || !trv.frequentFlyer) return;
  trv.frequentFlyer.splice(idx, 1);
  persist();
  render();
}
function removeLoyaltyProgram(travelerId, idx) {
  const trv = findTraveler(travelerId);
  if (!trv || !trv.loyaltyPrograms) return;
  trv.loyaltyPrograms.splice(idx, 1);
  persist();
  render();
}

    return months <= 0 ? "this month" : `${months} ${months === 1 ? 'month' : 'months'} ago`;

  const twoFA = effective("twoFactorEnabled");

  return `
    <div class="sp-body">
      <div class="sp-section">

            <div class="session-meta">Cleveland, OH · Active now</div>

        </div>
        <div class="session-row">

  memberId:         { label: "Member ID",             type: "text", mono: true, sensitive: true },
  groupNumber:      { label: "Group number",          type: "text", mono: true },
  planName:         { label: "Plan name",             type: "text" },
  medication:       { label: "Medication name",       type: "text" },
  dosage:           { label: "Dosage",                type: "text" },
  prescriber:       { label: "Prescriber",            type: "text" },
  allergen:         { label: "Allergen",              type: "text" },
  severity:         { label: "Severity",              type: "select", options: ["Mild","Moderate","Severe","Anaphylactic"] },
  condition:        { label: "Condition",             type: "text" },
  name:             { label: "Name",                  type: "text" },
  relationship:     { label: "Relationship",          type: "text" },
  phone:            { label: "Phone",                 type: "tel" },
  email:            { label: "Email",                 type: "email" }
};

function docCategoryMeta(catId) {
  return DOC_CATEGORIES.find(c => c.id === catId);
}

function docCategoryLabel(catId) {
  return docCategoryMeta(catId)?.label || catId;
}

function docCount(catId) {
  const data = userSettings.documents[catId];
  if (!data) return 0;
  if (Array.isArray(data)) return data.length;
  if (typeof data === "object" && data !== null) {
    // Single-record category: count is 1 if any field has data
    return Object.values(data).some(v => v !== null && v !== "") ? 1 : 0;
  }
  if (typeof data === "string") return data ? 1 : 0;
  return 0;
}

function docVaultSummary() {
  let total = 0;
  let expiringSoon = 0;
  const now = new Date();
  const sixMonths = new Date(now.getTime() + 180 * 86400000);

  for (const cat of DOC_CATEGORIES) {
    total += docCount(cat.id);
    // Check expiration on any document with an expiration field
    const data = userSettings.documents[cat.id];
    if (Array.isArray(data)) {
      for (const item of data) {
        const exp = item.expiration || item.validUntil;
        if (exp && new Date(exp) <= sixMonths && new Date(exp) >= now) expiringSoon++;
      }
    } else if (data && typeof data === "object") {
      const exp = data.expiration || data.validUntil;
      if (exp && new Date(exp) <= sixMonths && new Date(exp) >= now) expiringSoon++;
    }
  }

  if (total === 0) return "Add your first document";
  let summary = `${total} ${total === 1 ? 'document' : 'documents'} stored`;
  if (expiringSoon > 0) summary += ` · ${expiringSoon} expiring soon`;
  return summary;
}

// Returns "expired" | "expiring" | "ok" | null based on a date string
function docExpiryStatus(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return null;
  const now = new Date();
  if (d < now) return "expired";
  const sixMonths = new Date(now.getTime() + 180 * 86400000);
  if (d < sixMonths) return "expiring";
  return "ok";
}

function docDetailTitle(catId, docId) {
  const meta = docCategoryMeta(catId);
  const data = userSettings.documents[catId];
  if (!meta) return "";
  if (!meta.multi) return meta.label;
  const doc = (data || []).find(d => d.id === docId);
  if (!doc) return meta.label;
  // Use most identifying field
  return doc.country || doc.state || doc.vaccine || doc.medication || doc.allergen || doc.condition || doc.name || meta.label;
}

/* ===== HUB: list of categories ===== */

function documentsHubBody() {
  const groups = DOC_GROUPS.map(group => {
    const cats = DOC_CATEGORIES.filter(c => c.group === group.id);
    const rows = cats.map(cat => {
      const count = docCount(cat.id);
      let summary;
      if (cat.id === "bloodType") {
        summary = userSettings.documents.bloodType || "Not set";
      } else if (count === 0) {
        summary = "None added";
      } else {
        summary = `${count} ${count === 1 ? 'item' : 'items'}`;
      }
      return `
        <div class="settings-row" onclick="gotoDocCategory('${cat.id}')">
          <div class="settings-row-icon">${cat.icon}</div>
          <div class="settings-row-text">
            <div>${cat.label}</div>
            <div class="settings-row-sub">${summary}</div>
          </div>
          <div class="settings-row-chevron">›</div>

      `;
    }).join("");
    return `
      <div class="settings-section-label">${group.label}</div>
      <div class="settings-list">${rows}</div>

  }).join("");

  return `

/* ===== CATEGORY LIST: shows all docs in a category ===== */

function documentCategoryBody(catId) {
  const meta = docCategoryMeta(catId);
  if (!meta) return `<div class="sp-body">Unknown category.</div>`;

  // Special case: bloodType is just a string
  if (catId === "bloodType") {
    return bloodTypeEditorBody();
  }

  // Single-record category (Global Entry, TSA, Insurance): show editor inline
  if (!meta.multi) {
    return singleDocEditorBody(catId);
  }

  // Multi-record: list of cards + add button
  const data = effective("documents")[catId] || [];
  const items = data.map(doc => renderDocListItem(catId, doc)).join("");

  return `
    <div class="sp-body">
      ${data.length === 0 ? `
        <div class="docs-empty">
          <div class="docs-empty-icon">${meta.icon}</div>
          <div class="docs-empty-text">No ${meta.label.toLowerCase()} added yet.</div>
        </div>
      ` : `<div class="doc-list">${items}</div>`}
      ${app.editMode ? `
        <div class="doc-add" onclick="addDocument('${catId}')">
          + Add ${meta.label.toLowerCase().replace(/s$/, '').replace(/contacts$/, 'contact')}
        </div>
      ` : ''}
    </div>
  `;
}

function renderDocListItem(catId, doc) {
  // Build a "title" and "subtitle" for the card based on the category
  let title, subtitle, expiryStatus;
  if (catId === "passports") {
    title = doc.country ? `${doc.country} passport` : "Passport";
    subtitle = doc.fullName || doc.number || "";
    expiryStatus = docExpiryStatus(doc.expiration);
  } else if (catId === "driversLicenses") {
    title = doc.state ? `${doc.state} driver's license` : "Driver's license";
    subtitle = doc.fullName || doc.number || "";
    expiryStatus = docExpiryStatus(doc.expiration);
  } else if (catId === "visas") {
    title = doc.country ? `${doc.country} visa` : "Visa";
    subtitle = doc.type || "";
    expiryStatus = docExpiryStatus(doc.validUntil);
  } else if (catId === "vaccinations") {
    title = doc.vaccine || "Vaccination";
    const lastDose = doc.doses?.[doc.doses.length - 1];
    subtitle = lastDose ? `Latest: ${lastDose.date}` : "";
  } else if (catId === "prescriptions") {
    title = doc.medication || "Prescription";
    subtitle = doc.dosage || "";
  } else if (catId === "allergies") {
    title = doc.allergen || "Allergy";
    subtitle = doc.severity || "";
  } else if (catId === "medicalConditions") {
    title = doc.condition || "Condition";
    subtitle = doc.notes || "";
  } else if (catId === "emergencyContacts") {
    title = doc.name || "Contact";
    subtitle = doc.relationship || doc.phone || "";
  } else {
    title = "Document";
    subtitle = "";
  }

  const expiryBadge = expiryStatus === "expired"
    ? '<span class="doc-expiry-badge expired">Expired</span>'
    : expiryStatus === "expiring"
    ? '<span class="doc-expiry-badge expiring">Expiring soon</span>'
    : '';

  return `
    <div class="doc-card" onclick="gotoDocDetail('${catId}', '${doc.id}')">
      <div class="doc-card-body">
        <div class="doc-card-title">${title}</div>
        ${subtitle ? `<div class="doc-card-subtitle">${subtitle}</div>` : ''}
      </div>
      ${expiryBadge}
      <span class="doc-card-chevron">›</span>
    </div>
  `;
}

function documentDetailBody(catId, docId) {

function renderDocTravelerRow(catId, doc) {

        ${travelers.map(t => `<option value="${t.id}" ${currentId === t.id ? 'selected' : ''}>${t.name}${t.primary ? ' (primary)' : ''}</option>`).join("")}

// Set the travelerId on a doc in the current edit draft.
function setDocTraveler(catId, docId, travelerId) {
  if (!app.editMode || !app.draft) return;
  const meta = docCategoryMeta(catId);
  if (!meta) return;
  if (meta.multi) {
    const list = app.draft.documents[catId] || [];
    const doc = list.find(d => d.id === docId);
    if (doc) doc.travelerId = travelerId;
  } else {
    if (!app.draft.documents[catId]) app.draft.documents[catId] = {};
    app.draft.documents[catId].travelerId = travelerId;
  }
  // Don't re-render to avoid losing focus on other inputs
}

function renderField(catId, doc, fieldName) {
  const fieldMeta = FIELD_META[fieldName] || { label: fieldName, type: "text" };
  const value = doc[fieldName] || "";
  const inputId = `doc-field-${catId}-${doc.id || 'single'}-${fieldName}`;

  // Field types
  if (fieldMeta.type === "boolean") {
    return `
      <div class="sp-toggle-row ${app.editMode ? '' : 'readonly'}" onclick="toggleDocField('${catId}', ${attrJS(doc.id || '')}, '${fieldName}')">
        <div class="sp-toggle-info">
          <div class="sp-toggle-label">${fieldMeta.label}</div>
        </div>
        <div class="sp-toggle ${value ? 'on' : ''}"></div>
      </div>
    `;
  }

  if (fieldMeta.type === "select") {
    const options = (fieldMeta.options || []).map(o =>
      `<option ${value === o ? 'selected' : ''}>${o}</option>`
    ).join("");
    return `
      <div class="sp-field">
        <label class="sp-label">${fieldMeta.label}</label>
        <select class="sp-select" ${app.editMode ? '' : 'disabled'} onchange="setDocField('${catId}', ${attrJS(doc.id || '')}, '${fieldName}', this.value)">
          <option value=""></option>
          ${options}
        </select>
      </div>
    `;
  }

  // Sensitive fields get masking when not editing
  const masking = userSettings.maskSensitive && fieldMeta.sensitive && !app.editMode && value;
  const revealKey = `${catId}::${doc.id || 'single'}::${fieldName}`;
  const isRevealed = revealedFields.has(revealKey);
  const showMasked = masking && !isRevealed;
  const displayValue = showMasked ? "•".repeat(Math.max(value.length, 6)) : value;

  if (fieldMeta.type === "textarea") {
    return `
      <div class="sp-field">
        <label class="sp-label">${fieldMeta.label}</label>
        <textarea class="loyalty-input" rows="3" style="font-family: inherit; letter-spacing: 0; resize: vertical;"
                  ${app.editMode ? '' : 'disabled'}
                  oninput="setDocField('${catId}', ${attrJS(doc.id || '')}, '${fieldName}', this.value)">${value.replace(/</g, '&lt;')}</textarea>
      </div>
    `;
  }

  // Special expiry visual
  let expiryIndicator = "";
  if (fieldMeta.expiry && value && !app.editMode) {
    const status = docExpiryStatus(value);
    if (status === "expired") expiryIndicator = '<span class="doc-expiry-badge expired" style="margin-left: 6px;">Expired</span>';
    else if (status === "expiring") expiryIndicator = '<span class="doc-expiry-badge expiring" style="margin-left: 6px;">Expiring soon</span>';
  }

  return `
    <div class="sp-field">
      <label class="sp-label">${fieldMeta.label}${expiryIndicator}</label>
      <div class="${showMasked ? 'doc-masked-row' : ''}">
        <input type="${fieldMeta.type}" class="loyalty-input"
               style="${fieldMeta.mono ? 'font-family: ui-monospace, Menlo, monospace;' : 'font-family: inherit; letter-spacing: 0;'}"
               value="${displayValue.replace(/"/g, '&quot;')}"
               ${app.editMode ? '' : 'disabled'}
               oninput="setDocField('${catId}', ${attrJS(doc.id || '')}, '${fieldName}', this.value)">
        ${showMasked ? `<span class="loyalty-reveal" onclick="revealDocField(${attrJS(revealKey)})">Show</span>` : ''}
      </div>
    </div>
  `;
}

// Tracks which document fields are temporarily revealed
const revealedFields = new Set();
function revealDocField(key) {
  revealedFields.add(key);
  setTimeout(() => {
    revealedFields.delete(key);
    if (app.screen === "settings" && app.settingsPage === "documents") render();
  }, 30000);
  render();
}

function uploadDocPhoto(event, catId, docId) {
  if (!app.editMode) return;
  const file = event.target.files?.[0];
  if (!file) return;
  if (file.size > 15 * 1024 * 1024) {
    showToast("Image too large — max 15 MB");
    event.target.value = "";
    return;
  }
  // Re-encode through canvas to keep the stored data URL small enough that
  // localStorage's ~5 MB total quota can hold all the user's documents.
  // See uploadTripDoc for the same approach with more context.
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const MAX_LONG_EDGE = 1600;
      let { width, height } = img;
      if (Math.max(width, height) > MAX_LONG_EDGE) {
        const scale = MAX_LONG_EDGE / Math.max(width, height);
        width = Math.round(width * scale);
        height = Math.round(height * scale);
      }
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      canvas.getContext("2d").drawImage(img, 0, 0, width, height);
      const dataUrl = canvas.toDataURL("image/jpeg", 0.82);
      const meta = docCategoryMeta(catId);
      if (meta.multi) {
        const list = app.draft.documents[catId] || [];
        const doc = list.find(d => d.id === docId);
        if (doc) doc.photoData = dataUrl;
      } else {
        if (!app.draft.documents[catId]) app.draft.documents[catId] = {};
        app.draft.documents[catId].photoData = dataUrl;
      }
      render();
    };
    img.onerror = () => showToast("Couldn't read this image");
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  event.target.value = "";
}

function removeDocPhoto(catId, docId) {
  if (!app.editMode) return;
  const meta = docCategoryMeta(catId);
  if (meta.multi) {
    const list = app.draft.documents[catId] || [];
    const doc = list.find(d => d.id === docId);
    if (doc) doc.photoData = null;
  } else {
    if (app.draft.documents[catId]) app.draft.documents[catId].photoData = null;
  }
  render();
}

function openDocPhoto(catId, docId) {
  const data = userSettings.documents[catId];
  let photoData = null;
  if (Array.isArray(data)) {
    const doc = data.find(d => d.id === docId);
    photoData = doc?.photoData;
  } else if (data && typeof data === "object") {
    photoData = data.photoData;
  }
  if (!photoData) return;
  const html = `
    <div class="modal-sheet" style="max-height: 95%; background: #000;">
      <div class="modal-header" style="background: rgba(0,0,0,0.7); border: none;">
        <div class="modal-title" style="color: white;">Document photo</div>
        <div class="modal-close" style="color: white;" onclick="closeModal()">×</div>
      </div>
      <div class="modal-body" style="padding: 0; display: flex; align-items: center; justify-content: center; background: #000;">
        <img src="${photoData}" style="max-width: 100%; max-height: 80vh; display: block;">
      </div>
    </div>
  `;
  openModal(html);
}

/* ===== EDIT HANDLERS ===== */

function setDocField(catId, docId, fieldName, value) {
  if (!app.editMode) return;
  const meta = docCategoryMeta(catId);
  if (meta.multi) {
    const list = app.draft.documents[catId] || [];
    const doc = list.find(d => d.id === docId);
    if (doc) doc[fieldName] = value;
  } else {
    if (!app.draft.documents[catId]) app.draft.documents[catId] = {};
    app.draft.documents[catId][fieldName] = value;
  }
}

function toggleDocField(catId, docId, fieldName) {
  if (!app.editMode) return;
  const meta = docCategoryMeta(catId);
  if (meta.multi) {
    const list = app.draft.documents[catId] || [];
    const doc = list.find(d => d.id === docId);
    if (doc) doc[fieldName] = !doc[fieldName];
  } else {
    if (!app.draft.documents[catId]) app.draft.documents[catId] = {};
    app.draft.documents[catId][fieldName] = !app.draft.documents[catId][fieldName];
  }
  render();
}

function addDocument(catId) {
  if (!app.editMode) {
    // Auto-enter edit mode for adding
    startEdit();
  }
  if (!app.draft.documents[catId]) app.draft.documents[catId] = [];
  const newDoc = { id: "d-" + Date.now() };
  // Initialize fields based on category
  const meta = docCategoryMeta(catId);
  meta.fields.forEach(f => {
    if (f === "doses") newDoc[f] = [];
    else newDoc[f] = "";
  });
  newDoc.photoData = null;
  app.draft.documents[catId].push(newDoc);
  app.documentId = newDoc.id;
  render();
}

function deleteDocument(catId, docId) {
  if (!app.editMode) return;
  const list = app.draft.documents[catId] || [];
  app.draft.documents[catId] = list.filter(d => d.id !== docId);
  app.documentId = null;
  showToast("Document removed (save to confirm)");
  render();
}

// Tracks which loyalty numbers are currently revealed (only matters when masking is on)
const revealedLoyalty = new Set();

// Render the membership-number input list for currently-selected loyalty programs
// Render loyalty number inputs for a given category ("travel" or "lodging")
// Only shows programs that belong to that category AND are currently selected.
function renderLoyaltyNumbers(category) {
  const catalogKey = category === "lodging" ? "lodgingLoyalty" : "travelLoyalty";
  const categoryPrograms = CATALOG[catalogKey];
  const selected = effective("loyalty");
  const numbers = effective("loyaltyNumbers") || {};
  // Filter to only the programs in this category that are also selected
  const list = categoryPrograms.filter(p => selected.has(p));
  const masking = userSettings.maskSensitive && !app.editMode; // never mask while editing
  if (list.length === 0) {
    return `<div class="loyalty-empty">Select a program above to add your membership number.</div>`;
  }
  const rows = list.map(program => {
    const num = numbers[program] || "";
    const isRevealed = revealedLoyalty.has(program);
    const showMasked = masking && num && !isRevealed;
    const displayValue = showMasked ? "•".repeat(Math.max(num.length, 6)) : num;

    if (showMasked) {
      return `
        <div class="loyalty-row">
          <label class="loyalty-label">${program}</label>
          <div class="loyalty-masked">
            <span class="loyalty-masked-value">${displayValue}</span>
            <span class="loyalty-reveal" onclick="revealLoyalty(${attrJS(program)})">Show</span>
          </div>
        </div>
      `;
    }

    return `
      <div class="loyalty-row">
        <label class="loyalty-label">${program}</label>
        <input type="text" class="loyalty-input"
               value="${displayValue.replace(/"/g, '&quot;')}"
               placeholder="Membership number"
               ${app.editMode ? '' : 'disabled'}
               oninput="setLoyaltyNumber(${attrJS(program)}, this.value)">
      </div>
    `;
  }).join("");
  return `<div class="loyalty-numbers">${rows}</div>`;
}

function revealLoyalty(program) {
  revealedLoyalty.add(program);
  // Auto-hide after 30 seconds for safety
  setTimeout(() => {
    revealedLoyalty.delete(program);
    if (app.screen === "settings" && app.settingsPage === "travel") render();
  }, 30000);
  render();
}

function setLoyaltyNumber(program, value) {
  if (!app.editMode) return;
  if (!app.draft.loyaltyNumbers) app.draft.loyaltyNumbers = {};
  if (value.trim()) {
    app.draft.loyaltyNumbers[program] = value;
  } else {
    delete app.draft.loyaltyNumbers[program];
  }
}

function toggleTag(group, tag) {
  // Only mutate state when in edit mode
  if (!app.editMode) return;
  const target = app.draft[group];
  if (SINGLE_SELECT.has(group)) {
    app.draft[group] = tag;
  } else {
    if (target.has(tag)) {
      target.delete(tag);
      // If deselecting a loyalty program, drop its stored membership number too
      if (group === "loyalty" && app.draft.loyaltyNumbers) {
        delete app.draft.loyaltyNumbers[tag];
      }
    } else {
      target.add(tag);
    }
  }
  render();
}

function renderChipGroup(group) {
  const selected = effective(group);
  const isSingle = SINGLE_SELECT.has(group);
  const disabled = !app.editMode;
  return CATALOG[group].map(opt => {
    const active = isSingle ? selected === opt : selected.has(opt);
    return `<span class="nt-chip ${active ? 'active' : ''} ${disabled ? 'readonly' : ''}" onclick="toggleTag('${group}', ${attrJS(opt)})">${opt}</span>`;
  }).join("");
}

// Render a chip group using a category-specific loyalty catalog (travelLoyalty or lodgingLoyalty),
// but read/write to the unified `loyalty` Set so it stays a single canonical list.
function renderLoyaltyChips(catalogKey) {
  const selected = effective("loyalty");
  const disabled = !app.editMode;
  return CATALOG[catalogKey].map(opt => {
    const active = selected.has(opt);
    return `<span class="nt-chip ${active ? 'active' : ''} ${disabled ? 'readonly' : ''}" onclick="toggleTag('loyalty', ${attrJS(opt)})">${opt}</span>`;
  }).join("");
}

/* In-app confirm dialog. Returns a Promise that resolves to true (confirm) or
   false (cancel). Use this instead of window.confirm() — native confirm() is
   silently blocked in sandboxed iframes (returns false without showing a UI),
   which previously made the Save button on the new-trip dialog appear dead
   when changing dates. This helper renders into #modal-2 so it can stack on
   top of #modal (e.g. the new-trip dialog) without destroying its DOM.
   Options: { title, message, confirmLabel, cancelLabel, danger }. */
function confirmDialog(opts) {
  const {
    title = "Are you sure?",
    message = "",
    confirmLabel = "OK",
    cancelLabel = "Cancel",
    danger = false
  } = opts || {};
  return new Promise((resolve) => {
    const m = document.getElementById("modal-2");
    // Escape user-supplied text — message is the only field a caller might
    // pass dynamic content into, but be safe across the board.
    const esc = (s) => String(s).replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
    // Render newlines in the message as <br> so callers can pass plain \n.
    const messageHtml = esc(message).replace(/\n/g, "<br>");
    m.innerHTML = `
      <div class="modal-sheet" style="max-height: 60%;">
        <div class="modal-handle"></div>
        <div class="modal-header">
          <div class="modal-title">${esc(title)}</div>
        </div>
        <div class="modal-body" style="padding-bottom: 8px;">
          <p style="margin: 0 0 16px; color: var(--text-secondary); white-space: pre-line;">${messageHtml}</p>
        </div>
        <div class="modal-footer">
          <span class="btn" id="confirm-cancel">${esc(cancelLabel)}</span>
          <span class="btn ${danger ? 'btn-danger' : 'btn-primary'}" id="confirm-ok">${esc(confirmLabel)}</span>
        </div>
      </div>
    `;
    m.classList.add("active");

    const cleanup = (result) => {
      m.classList.remove("active");
      setTimeout(() => { m.innerHTML = ""; }, 250);
      resolve(result);
    };
    document.getElementById("confirm-ok").onclick = () => cleanup(true);
    document.getElementById("confirm-cancel").onclick = () => cleanup(false);
    // Tap outside the sheet = cancel
    m.onclick = (e) => { if (e.target === m) cleanup(false); };
  });
}

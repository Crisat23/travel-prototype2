function renderTripDetail(area) {
  const t = currentTrip();
  if (!t) return;

  // Date-change warning (rendered above the tab content so it's visible on
  // every tab — Plan, Itinerary, Map — and on every sub-view within them).
  const warningHtml = renderDateChangeWarning(t);

  // Render the tab content. Wrap it in a parent so the warning + tab-slot
  // share the screen-area. We wrap the slot in another flex container
  // so the slot can still flex:1 on Map without the warning eating its height.
  area.innerHTML = `
    ${warningHtml}
    <div id="trip-tab-slot" class="trip-tab-slot trip-tab-slot--${app.tab}"></div>
  `;
  const tabSlot = document.getElementById("trip-tab-slot");
  // Backward compat: legacy "discover" and "select" both map to "plan"
  if (app.tab === "discover" || app.tab === "select") app.tab = "plan";
  if (app.tab === "itinerary") renderItinerary(tabSlot);
  else if (app.tab === "map") renderMap(tabSlot);
  else if (app.tab === "plan") renderSelect(tabSlot);
}

/* ======= ITINERARY ======= */

function renderItinerary(area) {
  const t = currentTrip();
  if (!t) return;

  // Detail page routing: if user has tapped a card, show that item's detail screen
  if (app.itineraryDetail) {
    return renderItineraryDetail(area, t, app.itineraryDetail);
  }
  // Day-view routing: if user has tapped a day header, show just that day
  if (app.itineraryDay) {
    return renderItineraryDay(area, t, app.itineraryDay);
  }

  const fmtDate = (d) => new Date(d + "T00:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
  const getDates = () => {
    const dates = [];
    let d = new Date(t.originDate + "T00:00:00");
    const end = new Date(t.returnDate + "T00:00:00");
    while (d <= end) {
      dates.push(toLocalDateStr(d));
      d.setDate(d.getDate() + 1);
    }
    return dates;
  };
  const cityForDate = (date) => {
    // First day: origin → first stay (travel)
    // Days within a stay: that city
    // Stay transitions: travel day
    const stay = t.stays.find(s => date >= s.checkIn && date < s.checkOut);
    if (stay) return { city: stay.city, travel: false };
    // Check-out day
    const endingStay = t.stays.find(s => s.checkOut === date);
    if (endingStay) {
      // Is there a next stay starting this date?
      const nextStay = t.stays.find(s => s.checkIn === date);
      if (nextStay) return { city: `${endingStay.city} → ${nextStay.city}`, travel: true };
      // Otherwise heading to the return city (defaults to origin)
      const destination = (t.returnCity || t.origin).split(",")[0];
      return { city: `${endingStay.city} → ${destination}`, travel: true };
    }
    // Origin day
    if (date === t.originDate) {
      const firstStay = t.stays[0];
      return firstStay ? { city: `${t.origin.split(",")[0]} → ${firstStay.city}`, travel: true } : { city: t.origin, travel: false };
    }
    return { city: "—", travel: false };
  };

  const dates = getDates();
  area.innerHTML = `
    <div class="trip-header">
      <h2 class="trip-detail-name">${t.name}</h2>
      <p class="trip-detail-meta">${t.cities.join(" · ")} · ${fmtDate(t.originDate)} – ${fmtDate(t.returnDate)}</p>
    </div>
    <div id="days"></div>
    <div class="trip-actions">
      <div class="trip-actions-title">Trip actions</div>
      <div class="trip-action danger" onclick="openDeleteTripDialog('${t.id}')">
        <span class="trip-action-icon">🗑</span>
        <div class="trip-action-text">
          <div class="trip-action-label">Delete this trip</div>
          <div class="trip-action-desc">Removes the trip and all its planned items. Can't be undone.</div>
        </div>
      </div>
    </div>
  `;

  const daysEl = document.getElementById("days");
  dates.forEach((date, idx) => {
    const { city, travel } = cityForDate(date);
    const dayEl = document.createElement("div");
    dayEl.className = "day";

    // Add affordances for adding new dining/sights to a stay day. Transport and stay are handled
    // by the day cards themselves (they show even when nothing's selected, with a "tap to pick" sub).
    let pickLinks = "";
    const stay = t.stays.find(s => s.checkIn && s.checkOut && date >= s.checkIn && date < s.checkOut);
    if (stay) {
      pickLinks = `
        <span class="day-pick-link" onclick="gotoSelection('dining', '${stay.id}')">+ Dining</span>
        <span class="day-pick-link" onclick="gotoSelection('sights', '${stay.id}')">+ Sights</span>
      `;
    }

    dayEl.innerHTML = `
      <div class="day-header clickable" onclick="openItineraryDay('${date}')">
        <span class="day-num">Day ${idx + 1}</span>
        <span class="day-date">${fmtDate(date)}</span>
        <span class="day-city">· ${city}</span>
        ${travel ? '<span class="day-badge travel">Travel</span>' : ''}
        <span class="day-header-chevron">›</span>
      </div>
      <div class="items" data-date="${date}"></div>
      ${pickLinks ? `<div class="day-pick-row">${pickLinks}</div>` : ''}
    `;
    daysEl.appendChild(dayEl);
    renderDayItems(date);
  });
}

function renderDayItems(date) {
  const t = currentTrip();
  const itemsEl = document.querySelector(`.items[data-date="${date}"]`);
  if (!itemsEl) return;
  itemsEl.innerHTML = "";

  // Helper to format times like "19:30" → "7:30 PM"
  const formatTime = (t24) => {
    if (!t24) return "";
    const [h, m] = t24.split(":").map(Number);
    const ampm = h >= 12 ? "PM" : "AM";
    const h12 = ((h + 11) % 12) + 1;
    return `${h12}:${String(m).padStart(2, "0")} ${ampm}`;
  };

  // Compute what's on this day per category
  const cards = collectDayCards(t, date);

  if (cards.length === 0) {
    itemsEl.innerHTML = `<div class="empty-day">Nothing planned yet · <span class="link" onclick="switchTab('plan')">Plan something</span></div>`;
    return;
  }

  // Render one section per category with content
  cards.forEach(section => {
    const sectionEl = document.createElement("div");
    sectionEl.className = "day-cat-section";
    const items = section.items.map(it => {
      const periodTimeLabel = [it.period, formatTime(it.time)].filter(Boolean).join(" · ");
      const docCount = countDocsForCard(t, section.category, it.slotKey);
      // Check for issues on this card's slot
      let hasIssue = false;
      if (section.category === "transport" || section.category === "stay") {
        hasIssue = getIssuesForSlot(t, section.category, it.slotKey).length > 0;
      } else {
        // dining/sights — check by dayItem id (date-out-of-range issues use dayItem id as slotId)
        hasIssue = getSelectionIssues(t).some(i => i.category === section.category && i.slotId === it.slotKey);
      }
      // Reschedule flag — red, urgent. Now applies to all four categories:
      //   dining/sights → check by dayItem id
      //   transport     → check by leg id (slotKey is the leg id for transport)
      //   stay          → check by stay id (slotKey is the stay id for stay)
      let rescheduleStatus = null;
      let rescheduleHint = "";
      if (section.category === "dining" || section.category === "sights") {
        rescheduleStatus = getDayItemRescheduleStatus(t, it.slotKey);
        if (rescheduleStatus) {
          if (rescheduleStatus.type === "orphan") {
            rescheduleHint = "Outside trip dates — reschedule";
          } else if (rescheduleStatus.type === "shifted") {
            rescheduleHint = `Now in ${rescheduleStatus.newCity} (was ${rescheduleStatus.oldCity})`;
          }
        }
      } else if (section.category === "transport") {
        rescheduleStatus = getTransportRebookStatus(t, it.slotKey);
        if (rescheduleStatus) {
          if (rescheduleStatus.type === "leg-removed") {
            rescheduleHint = "Leg no longer in trip — cancel reservation";
          } else {
            rescheduleHint = `Date changed: was ${formatPopupDate(rescheduleStatus.oldDate)}, now ${formatPopupDate(rescheduleStatus.newDate)} — rebook`;
          }
        }
      } else if (section.category === "stay") {
        rescheduleStatus = getStayRebookStatus(t, it.slotKey);
        if (rescheduleStatus) {
          if (rescheduleStatus.type === "stay-removed") {
            rescheduleHint = "Stay no longer in trip — cancel reservation";
          } else {
            rescheduleHint = `Dates changed: was ${formatPopupDate(rescheduleStatus.oldCheckIn)} – ${formatPopupDate(rescheduleStatus.oldCheckOut)}, now ${formatPopupDate(rescheduleStatus.newCheckIn)} – ${formatPopupDate(rescheduleStatus.newCheckOut)} — rebook`;
          }
        }
      }
      const needsReschedule = !!rescheduleStatus;
      const isDiningOrSights = section.category === "dining" || section.category === "sights";
      // Build the footer button row. Dining/sights get Rebook + Details + Remove;
      // transport/stay get Details + Remove (Rebook doesn't apply — those slots
      // are fixed to the trip's leg/stay dates).
      const footerActions = isDiningOrSights ? `
        <span class="day-card-btn" onclick="event.stopPropagation(); openMoveItemDialog('${date}', '${it.slotKey}')">📅 Rebook</span>
        <span class="day-card-btn" onclick="event.stopPropagation(); openItineraryDetail('${date}', '${section.category}', '${it.slotKey}')">Details</span>
        <span class="day-card-btn danger" onclick="event.stopPropagation(); unscheduleFromDayCard('${date}', '${it.slotKey}')">× Remove</span>
      ` : `
        <span class="day-card-btn" onclick="event.stopPropagation(); openItineraryDetail('${date}', '${section.category}', '${it.slotKey}')">Details</span>
        ${section.category === "transport"
          ? `<span class="day-card-btn danger" onclick="event.stopPropagation(); clearTransportSelectionFromItinerary('${it.slotKey}')">× Remove</span>`
          : `<span class="day-card-btn danger" onclick="event.stopPropagation(); clearStaySelectionFromItinerary('${it.slotKey}')">× Remove</span>`
        }
      `;
      return `
        <div class="day-card ${hasIssue ? 'has-issue' : ''} ${needsReschedule ? 'needs-reschedule' : ''}" onclick="openItineraryDetail('${date}', '${section.category}', '${it.slotKey}')">
          <div class="day-card-row">
            <div class="day-card-icon ${section.category}">${section.icon}</div>
            <div class="day-card-body">
              <div class="day-card-name">${it.name}${needsReschedule ? ' <span class="day-card-flag">!</span>' : (hasIssue ? ' <span class="day-card-warn">⚠</span>' : '')}</div>
              <div class="day-card-sub">${needsReschedule ? rescheduleHint : (it.sub || '')}</div>
            </div>
            <div class="day-card-right">
              ${periodTimeLabel ? `<div class="day-card-time">${periodTimeLabel}</div>` : ''}
              ${docCount > 0 ? `<div class="day-card-docs">📎 ${docCount}</div>` : ''}
              ${renderCardWebsite(it.website)}
            </div>
          </div>
          <div class="day-card-footer">${footerActions}</div>
        </div>
      `;
    }).join("");

    sectionEl.innerHTML = `
      <div class="day-cat-header">
        <span class="day-cat-icon">${section.icon}</span>
        <span class="day-cat-title">${section.title}</span>
      </div>
      ${items}
    `;
    itemsEl.appendChild(sectionEl);
  });
}

// Walk the trip's data and produce category-grouped cards for a given date.
// Returns array of { category, title, icon, items: [{ slotKey, name, sub, period, time }] }.
function collectDayCards(t, date) {
  const sections = [];

  // ---- Transport: any leg whose date matches this day ----
  const legs = tripLegs(t);
  const transportItems = [];
  legs.forEach(leg => {
    if (leg.date !== date) return;
    const slot = t.selections?.transport?.[leg.id];
    const fromCity = (leg.fromCity || "").split(",")[0];
    const toCity = (leg.toCity || "").split(",")[0];
    if (slot?.selectedOptionId) {
      // We have a selection — show its summary
      const id = slot.selectedOptionId;
      let name = `${fromCity} → ${toCity}`;
      let sub = "";
      let website = null;
      if (slot.agentSelections?.[id]) {
        const r = slot.agentSelections[id];
        name = `${r.airline || ''} ${r.flightNum || ''}`.trim() || name;
        sub = [`${fromCity} → ${toCity}`, r.depTime && r.arrTime ? `${r.depTime} → ${r.arrTime}` : null].filter(Boolean).join(' · ');
        website = resolveCarrierWebsite(r);
      } else if (typeof generateTransportOptions === "function") {
        const opts = generateTransportOptions(leg, leg.date, slot.window || 0);
        const opt = opts.find(o => o.id === id);
        if (opt) {
          name = `${opt.airline} ${opt.flightNum}`;
          sub = `${fromCity} → ${toCity} · ${opt.depTime} → ${opt.arrTime}`;
          website = resolveCarrierWebsite(opt);
        }
      }
      transportItems.push({ slotKey: leg.id, name, sub, period: "", time: "", website });
    } else {
      transportItems.push({
        slotKey: leg.id,
        name: `${fromCity} → ${toCity}`,
        sub: "No flight selected — tap to pick",
        period: "",
        time: "",
        website: null
      });
    }
  });
  if (transportItems.length > 0) {
    sections.push({ category: "transport", title: "Transport", icon: "✈", items: transportItems });
  }

  // ---- Stay: a stay covering this date (check-in inclusive, check-out exclusive) OR check-in/check-out edge days ----
  const stay = (t.stays || []).find(s => s.checkIn && s.checkOut && date >= s.checkIn && date <= s.checkOut);
  if (stay) {
    const slot = t.selections?.stay?.[stay.id];
    let name = `${stay.city} stay`;
    let sub = "";
    let website = null;

    // Status text based on day-of-stay
    const checkInDate = new Date(stay.checkIn + "T00:00:00");
    const thisDate = new Date(date + "T00:00:00");
    const dayOfStay = Math.round((thisDate - checkInDate) / 86400000) + 1;
    let status = `Day ${dayOfStay}`;
    if (date === stay.checkIn) status = "Checked in";
    else if (date === stay.checkOut) status = "Checking out";

    // Find the booking that covers this specific date. If multiple bookings
    // exist (e.g. central hotel + airport hotel), each day shows the
    // correct one. Falls back to legacy single-selection if no bookings.
    const bookings = getStayBookings(t, stay.id);
    const bookingForDate = bookings.find(b =>
      date >= b.checkIn && date < b.checkOut
    ) || (date === stay.checkOut ? bookings[bookings.length - 1] : null);

    if (bookingForDate) {
      const id = bookingForDate.hotelId;
      if (slot?.agentSelections?.[id]) {
        const r = slot.agentSelections[id];
        name = r.name || name;
        sub = `${status}${r.neighborhood ? ' · ' + r.neighborhood : ''}`;
        website = r.website || null;
      } else {
        const cityPlaces = getCityPlaces(stay.city);
        const found = (cityPlaces.stay || []).find(p => p.id === id);
        if (found) {
          name = found.name;
          sub = `${status} · ${found.meta || stay.city}`;
          website = found.website || null;
        } else if (bookingForDate.snapshot) {
          name = bookingForDate.snapshot.name || name;
          sub = `${status}${bookingForDate.snapshot.neighborhood ? ' · ' + bookingForDate.snapshot.neighborhood : ''}`;
        }
      }
    } else {
      sub = `${status} · No hotel selected — tap to pick`;
    }
    sections.push({ category: "stay", title: "Stay", icon: "🏨", items: [{ slotKey: stay.id, name, sub, period: "", time: "", website }] });
  }

  // ---- Dining: dayItems on this date with category=dining ----
  const dayItems = (t.dayItems?.[date] || []);
  // Helper to resolve a dayItem's website (agent snapshot or catalog lookup)
  const resolveDayItemWebsite = (it) => {
    if (it.agentSnapshot && it.agentSnapshot.website) return it.agentSnapshot.website;
    if (it.placeId) {
      const place = findPlace(it.placeId);
      if (place && place.website) return place.website;
    }
    return null;
  };
  const diningItems = dayItems.filter(i => i.category === "dining").map(i => ({
    slotKey: i.id,
    name: i.name,
    sub: i.sub || "",
    period: i.period || "",
    time: i.time || "",
    website: resolveDayItemWebsite(i)
  }));
  if (diningItems.length > 0) {
    sections.push({ category: "dining", title: "Dining", icon: "🍽", items: diningItems });
  }

  // ---- Sights: dayItems on this date with category=sights ----
  const sightsItems = dayItems.filter(i => i.category === "sights").map(i => ({
    slotKey: i.id,
    name: i.name,
    sub: i.sub || "",
    period: i.period || "",
    time: i.time || "",
    website: resolveDayItemWebsite(i)
  }));
  if (sightsItems.length > 0) {
    sections.push({ category: "sights", title: "Sights", icon: "🗺", items: sightsItems });
  }

  return sections;
}

// Count docs (uploaded + auto-fetched references) for a card's slot.
function countDocsForCard(t, category, slotKey) {
  if (category === "dining" || category === "sights") {
    // For dining/sights, slotKey is a dayItem id, not a slot. The docs live on the stay's slot.
    // Find which stay this dayItem came from via fromSelection metadata.
    const dayItem = Object.values(t.dayItems || {}).flat().find(i => i.id === slotKey);
    if (!dayItem || !dayItem.fromSelection) return 0;
    const docs = t.tripDocs?.[category]?.[dayItem.fromSelection.stayId] || [];
    return docs.length;
  }
  // Transport / stay: slotKey IS the slot id
  const docs = t.tripDocs?.[category]?.[slotKey] || [];
  return docs.length;
}

// Open the detail page for a day item
// Quick "Remove" action from a dining/sights Itinerary day card.
// Unschedules the dayItem and bounces it back to the shortlist (existing behavior).
async function unscheduleFromDayCard(date, dayItemId) {
  if (!(await confirmDialog({
    title: "Remove from itinerary?",
    message: "This will move the item back to your shortlist.",
    confirmLabel: "Remove",
    danger: true
  }))) return;
  unscheduleDayItem(date, dayItemId);
}

// Move a scheduled dining/sights dayItem to a different day. Opens a small
// modal with a date dropdown of valid days within the current stay.
function openMoveItemDialog(date, dayItemId) {
  const t = currentTrip();
  const items = t.dayItems[date];
  if (!items) return;
  const dayItem = items.find(i => i.id === dayItemId);
  if (!dayItem) return;

  // The valid target days are the ones inside the originating stay.
  // Fall back to the trip range if we can't find the originating stay.
  let validDays = [];
  let stayId = dayItem.fromSelection?.stayId;
  if (stayId) {
    const stay = (t.stays || []).find(s => s.id === stayId);
    if (stay && stay.checkIn && stay.checkOut) {
      let d = new Date(stay.checkIn + "T00:00:00");
      const end = new Date(stay.checkOut + "T00:00:00");
      while (d <= end) {
        validDays.push(toLocalDateStr(d));
        d.setDate(d.getDate() + 1);
      }
    }
  }
  // Fallback: use the trip's full date range
  if (validDays.length === 0 && t.originDate && t.returnDate) {
    let d = new Date(t.originDate + "T00:00:00");
    const end = new Date(t.returnDate + "T00:00:00");
    while (d <= end) {
      validDays.push(toLocalDateStr(d));
      d.setDate(d.getDate() + 1);
    }
  }

  const fmtDay = (d) => new Date(d + "T00:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });

  const state = { day: date };

  const html = `
    <div class="modal-sheet" style="max-height: 50%;">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <div class="modal-title">Move "${dayItem.name}"</div>
        <div class="modal-close" onclick="closeModal()">×</div>
      </div>
      <div class="modal-body">
        <div class="nt-section">
          <div class="nt-field">
            <label class="nt-label">Move to day</label>
            <select id="move-day" class="sp-select">
              ${validDays.map(d => `<option value="${d}" ${d === date ? 'selected' : ''}>${fmtDay(d)}${d === date ? ' (current)' : ''}</option>`).join("")}
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <span class="btn" onclick="closeModal()">Cancel</span>
        <span class="btn btn-primary" id="move-save">Move</span>
      </div>
    </div>
  `;
  openModal(html);

  document.getElementById("move-day").onchange = (e) => { state.day = e.target.value; };
  document.getElementById("move-save").onclick = () => {
    if (state.day === date) { closeModal(); return; }
    moveDayItem(date, dayItemId, state.day);
    closeModal();
  };
}

// Move a dayItem from one date to another, preserving period/time and provenance.
function moveDayItem(fromDate, dayItemId, toDate) {
  const t = currentTrip();
  const items = t.dayItems[fromDate];
  if (!items) return;
  const idx = items.findIndex(i => i.id === dayItemId);
  if (idx === -1) return;
  const dayItem = items[idx];
  // Conflict guard — moving to a date that already has the same meal/period
  // booked. Skip when the item being moved has no period (quick-adds without
  // a time slot don't conflict). The excludeId is the moved item itself in
  // case the destination is its current date.
  if (dayItem.period) {
    const conflict = findScheduleConflict(t, dayItem.category, toDate, dayItem.period, dayItem.time, dayItem.id);
    if (conflict) {
      const fmtWhen = dayItem.category === "dining"
        ? dayItem.period
        : (dayItem.time ? `${dayItem.period} at ${dayItem.time}` : dayItem.period);
      showToast(`Can't move — already booked for ${fmtWhen}: ${conflict.name}`);
      return;
    }
  }
  items.splice(idx, 1);
  if (items.length === 0) delete t.dayItems[fromDate];
  if (!t.dayItems[toDate]) t.dayItems[toDate] = [];
  t.dayItems[toDate].push(dayItem);
  showToast(`Moved to ${new Date(toDate + "T00:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" })}`);
  persist();
  render();
}

function openItineraryDetail(date, category, slotKey) {
  app.itineraryDetail = { date, category, slotKey };
  render();
  document.getElementById("screen-area").scrollTop = 0;
}

// Open the single-day view for the given date. Used when the user taps a day
// header on the itinerary list, or via prev/next arrows from another day view.

// Render a detail page for a card on a specific day.
// Reuses the existing trip docs section for uploaded + auto-fetched docs.
// Render Address and Phone detail rows with tappable links (maps + dialer).
// Pass `addressFallback` (e.g., "Covent Garden — neighborhood") to show that
// when no real address is available (e.g., agent results without street data).
// Render a small inline "Site ↗" link for use on Plan list cards and Itinerary day cards.
// Uses an explicit window.open() in the click handler rather than relying on
// the anchor's default — some browsers (notably iOS Safari, and any case where
// the link is inside a card with an onclick handler) don't reliably navigate
// from a default <a> when an onclick handler is present. This makes it bulletproof.
// Returns empty string if no website provided.
// Render a "dates row" shown on selected/scheduled cards — surfaces the trip
// dates the selection is bound to (transport leg date, stay range, scheduled
// dining/sights dates). Helps users spot which selections need reviewing after
// they've changed trip dates.
//
// `dates` can be:
//   - a single YYYY-MM-DD string  → "📅 Jun 15"
//   - { start, end }              → "📅 Jun 15 – Jun 18 (3 nights)"
//   - an array of YYYY-MM-DD      → "📅 Jun 15  📅 Jun 17"
// Returns empty string for falsy/empty input.
function renderSelectedDates(dates) {
  if (!dates) return "";
  let pills;
  if (typeof dates === "string") {
    pills = `<span class="sel-result-dates-pill">📅 ${formatDate(dates)}</span>`;
  } else if (Array.isArray(dates)) {
    if (dates.length === 0) return "";
    // Sort ascending
    const sorted = [...dates].sort();
    pills = sorted.map(d => `<span class="sel-result-dates-pill">📅 ${formatDate(d)}</span>`).join("");
  } else if (dates.start && dates.end) {
    const nights = Math.max(0, Math.round((new Date(dates.end + "T00:00:00") - new Date(dates.start + "T00:00:00")) / 86400000));
    pills = `<span class="sel-result-dates-pill">📅 ${formatDate(dates.start)} – ${formatDate(dates.end)}${nights > 0 ? ` · ${nights} night${nights === 1 ? "" : "s"}` : ""}</span>`;
  } else {
    return "";
  }
  return `<div class="sel-result-dates"><span class="sel-result-dates-label">Dates</span>${pills}</div>`;
}

function renderCardWebsite(websiteUrl) {
  if (!websiteUrl) return '';
  // attrJS escapes for safe embedding inside a double-quoted attribute
  const safeUrl = attrJS(websiteUrl);
  return `<a href="${websiteUrl}" target="_blank" rel="noopener" class="card-site-link" onclick="event.stopPropagation(); event.preventDefault(); window.open(${safeUrl}, '_blank', 'noopener'); return false;">Site ↗</a>`;
}

function renderContactRows(info, addressFallback) {
  const rows = [];

  // Address row — always show. Real address links to Maps; neighborhood-only fallback also links
  // (so the user can still search for the place by neighborhood + name).
  if (info && info.address) {
    const mapsUrl = `https://maps.google.com/?q=${encodeURIComponent(info.address)}`;
    rows.push(`
      <div class="iddet-row">
        <span class="iddet-label">Address</span>
        <span class="iddet-value">
          <a href="${mapsUrl}" target="_blank" rel="noopener">${info.address} ↗</a>
        </span>
      </div>
    `);
  } else if (addressFallback) {
    // We have a neighborhood but not a street address (typically agent results)
    const mapsUrl = `https://maps.google.com/?q=${encodeURIComponent((info?.name || '') + ' ' + addressFallback)}`;
    rows.push(`
      <div class="iddet-row">
        <span class="iddet-label">Address</span>
        <span class="iddet-value">
          <a href="${mapsUrl}" target="_blank" rel="noopener">${addressFallback} ↗</a>
          <div class="iddet-hint">Neighborhood only — search for exact location</div>
        </span>
      </div>
    `);
  } else {
    rows.push(`
      <div class="iddet-row">
        <span class="iddet-label">Address</span>
        <span class="iddet-value iddet-empty-val">—</span>
      </div>
    `);
  }

  // Phone row — only show if we have one. Tappable on mobile (tel: opens dialer);
  // browsers without dialer support just ignore it.
  if (info && info.phone) {
    // Strip non-dial chars for the tel: URL but keep formatted text for display
    const dialNumber = info.phone.replace(/[^\d+]/g, '');
    rows.push(`
      <div class="iddet-row">
        <span class="iddet-label">Phone</span>
        <span class="iddet-value">
          <a href="tel:${dialNumber}">${info.phone}</a>
        </span>
      </div>
    `);
  }

  return rows.join('');
}

// Single-day itinerary view. Reached by tapping a day header on the full list.
// Shows the day's items grouped by category (same as the list view's per-day
// section), plus a prominent date header and prev/next arrows for fast browsing
// across days. Reuses renderDayItems for the actual cards.
function renderItineraryDay(area, t, date) {
  const fmtDateLong = (d) => new Date(d + "T00:00:00").toLocaleDateString("en-US", {
    weekday: "long", month: "long", day: "numeric", year: "numeric"
  });

  // Compute prev/next dates within the trip range
  const tripDates = [];
  let dt = new Date(t.originDate + "T00:00:00");
  const end = new Date(t.returnDate + "T00:00:00");
  while (dt <= end) {
    tripDates.push(toLocalDateStr(dt));
    dt.setDate(dt.getDate() + 1);
  }
  const idx = tripDates.indexOf(date);
  const dayNum = idx >= 0 ? idx + 1 : null;
  const prevDate = idx > 0 ? tripDates[idx - 1] : null;
  const nextDate = (idx >= 0 && idx < tripDates.length - 1) ? tripDates[idx + 1] : null;

  // Reuse the same city-resolution logic as the list view
  const cityForDate = (d) => {
    const stay = (t.stays || []).find(s => d >= s.checkIn && d < s.checkOut);
    if (stay) return { city: stay.city, travel: false };
    const endingStay = (t.stays || []).find(s => s.checkOut === d);
    if (endingStay) {
      const nextStay = (t.stays || []).find(s => s.checkIn === d);
      if (nextStay) return { city: `${endingStay.city} → ${nextStay.city}`, travel: true };
      const destination = (t.returnCity || t.origin || "").split(",")[0];
      return { city: `${endingStay.city} → ${destination}`, travel: true };
    }
    if (d === t.originDate) {
      const firstStay = (t.stays || [])[0];
      return firstStay ? { city: `${(t.origin || "").split(",")[0]} → ${firstStay.city}`, travel: true } : { city: t.origin || "—", travel: false };
    }
    return { city: "—", travel: false };
  };
  const { city, travel } = cityForDate(date);

  // "+ Dining/+ Sights" affordances — only inside a stay window
  const stay = (t.stays || []).find(s => s.checkIn && s.checkOut && date >= s.checkIn && date < s.checkOut);
  const pickLinks = stay
    ? `
      <span class="day-pick-link" onclick="gotoSelection('dining', '${stay.id}')">+ Dining</span>
      <span class="day-pick-link" onclick="gotoSelection('sights', '${stay.id}')">+ Sights</span>
    `
    : "";

  // Prev/next bar — disabled state when at trip endpoints
  const prevBtn = prevDate
    ? `<span class="day-nav-btn" onclick="openItineraryDay('${prevDate}')">‹ Previous day</span>`
    : `<span class="day-nav-btn disabled">‹ Previous day</span>`;
  const nextBtn = nextDate

  const fmtDate = (d) => new Date(d + "T00:00:00").toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });

  // Compute back-row label once, up front, so every code path (including the

  // a hardcoded "← Back to itinerary" — even when the user had navigated
  // in from the Map tab and expected "← Back to Map".
  const backLabel = app.detailReturnTab === "map"
    ? "← Back to Map"

  // Resolve the actual item depending on category
  let title = "", sub = "", body = "", actions = "", docsCategory = category, docsSlotId = slotKey;

  if (category === "transport") {

    const toCity = (leg.toCity || "").split(",")[0];
    title = `${fromCity} → ${toCity}`;
    sub = `${leg.label || ''} · ${fmtDate(leg.date)}`;

    if (slot?.selectedOptionId) {

      if (slot.agentSelections?.[id]) {

        const carrierPhone = resolveCarrierPhone(opt);

          <div class="iddet-row"><span class="iddet-label">Flight</span><span class="iddet-value">${opt.flightNum || '—'}</span></div>

        ${info.rating ? `<div class="iddet-row"><span class="iddet-label">Rating</span><span class="iddet-value">★ ${info.rating}</span></div>` : ''}

}

// Helpers used by the detail page actions
async function clearTransportSelectionFromItinerary(legId) {
  if (!(await confirmDialog({
    title: "Remove transport selection?",
    message: "You can pick a different option afterward.",
    confirmLabel: "Remove",
    danger: true
  }))) return;
  const t = currentTrip();
  const slot = ensureTransportSlot(t, legId);
  slot.selectedOptionId = null;
  persist();
  showToast("Transport selection removed");
  app.itineraryDetail = null;
  render();
}

async function clearStaySelectionFromItinerary(stayId) {
  const t = currentTrip();
  const slot = ensureStaySlot(t, stayId);
  const bookingCount = (slot.bookings || []).length || (slot.selectedOptionId ? 1 : 0);
  if (!(await confirmDialog({
    title: bookingCount > 1 ? "Remove all hotel bookings?" : "Remove hotel selection?",
    message: bookingCount > 1
      ? `All ${bookingCount} bookings for this stay will be removed. You can pick again afterward.`
      : "You can pick a different option afterward.",
    confirmLabel: "Remove",
    danger: true
  }))) return;
  slot.selectedOptionId = null;
  slot.selectedSnapshot = null;
  slot.bookings = [];
  persist();
  showToast(bookingCount > 1 ? "All bookings removed" : "Hotel selection removed");
  app.itineraryDetail = null;
  render();
}

function removeItem(date, itemId) {
  const t = currentTrip();
  if (!t.dayItems[date]) return;
  const item = t.dayItems[date].find(i => i.id === itemId);
  // If this came from a Select shortlist, bounce it back to the shortlist
  if (item && item.fromSelection) {
    unscheduleDayItem(date, itemId);
    return;
  }
  // Otherwise just remove (legacy items added via Plan)
  t.dayItems[date] = t.dayItems[date].filter(i => i.id !== itemId);
  if (!t.dayItems[date].length) delete t.dayItems[date];
  renderDayItems(date);
  persist();
}

// Drag state for reorder
let dragState = null;

function startDrag(e, date, idx, item, sourceEl) {
  e.preventDefault();
  const point = getPoint(e);
  const rect = sourceEl.getBoundingClientRect();
  const floatingEl = sourceEl.cloneNode(true);
  floatingEl.classList.add("floating");
  floatingEl.style.width = `${rect.width}px`;
  floatingEl.style.left = `${rect.left}px`;
  floatingEl.style.top = `${rect.top}px`;
  document.body.appendChild(floatingEl);
  sourceEl.classList.add("dragging");
  dragState = {
    date, fromIdx: idx, sourceItem: item, sourceEl, floatingEl,
    pointerOffset: { x: point.x - rect.left, y: point.y - rect.top },
    currentTargetIdx: idx
  };
  document.addEventListener("mousemove", onDragMove);
  document.addEventListener("mouseup", endDrag);
  document.addEventListener("touchmove", onDragMove, { passive: false });
  document.addEventListener("touchend", endDrag);
}

function onDragMove(e) {
  if (!dragState) return;
  if (e.cancelable) e.preventDefault();
  const point = getPoint(e);
  dragState.floatingEl.style.left = `${point.x - dragState.pointerOffset.x}px`;
  dragState.floatingEl.style.top = `${point.y - dragState.pointerOffset.y}px`;
  const targetIdx = computeDropTarget(point);
  updateDropIndicators(targetIdx);
  dragState.currentTargetIdx = targetIdx;
}

function computeDropTarget(point) {
  const itemsEl = document.querySelector(`.items[data-date="${dragState.date}"]`);
  if (!itemsEl) return dragState.fromIdx;
  const itemEls = [...itemsEl.querySelectorAll(".item")].filter(el => !el.classList.contains("dragging"));
  let targetIdx = itemEls.length;
  for (let i = 0; i < itemEls.length; i++) {
    const r = itemEls[i].getBoundingClientRect();
    if (point.y < r.top + r.height / 2) {
      targetIdx = i;
      break;
    }
  }
  return targetIdx;
}

function updateDropIndicators(targetIdx) {
  document.querySelectorAll(`.drop-indicator[data-date="${dragState.date}"]`).forEach(ind => {
    const insertIdx = parseInt(ind.dataset.insertIdx, 10);
    const show = insertIdx === targetIdx
      && targetIdx !== dragState.fromIdx
      && !(targetIdx === dragState.fromIdx + 1 && insertIdx === dragState.fromIdx + 1);
    ind.classList.toggle("visible", show);
  });
}

function endDrag() {
  if (!dragState) return;
  const { date, fromIdx, sourceEl, floatingEl, currentTargetIdx } = dragState;
  floatingEl.remove();
  sourceEl.classList.remove("dragging");
  document.querySelectorAll(".drop-indicator").forEach(i => i.classList.remove("visible"));
  if (currentTargetIdx !== fromIdx && currentTargetIdx !== fromIdx + 1) {
    const t = currentTrip();
    const items = t.dayItems[date];
    if (items) {
      const [moved] = items.splice(fromIdx, 1);
      let insertAt = currentTargetIdx;
      if (currentTargetIdx > fromIdx) insertAt -= 1;
      items.splice(insertAt, 0, moved);
      renderDayItems(date);
      persist();
    }
  }
  dragState = null;
  document.removeEventListener("mousemove", onDragMove);
  document.removeEventListener("mouseup", endDrag);
  document.removeEventListener("touchmove", onDragMove);
  document.removeEventListener("touchend", endDrag);
}

function getPoint(e) {
  if (e.touches?.[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (e.changedTouches?.[0]) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

/* ======= PLAN ======= */

/* ============================================================
   AI AGENT SEARCH — finds options for transport/stay/dining/sights
   ============================================================ */

// Storage shape per slot:
//   { lastQuery, runtime, status, results, ranAt, error }
//   status: "idle" | "searching" | "results" | "error"
//   runtime: "demo" | "live" — captured from settings at search time
function ensureAgentSearches(t) {
  if (!t.agentSearches) {
    t.agentSearches = { transport: {}, stay: {}, dining: {}, sights: {} };
  }
  return t.agentSearches;
}

function getAgentState(t, category, slotId) {
  ensureAgentSearches(t);
  if (!t.agentSearches[category][slotId]) {
    t.agentSearches[category][slotId] = {
      status: "idle",
      results: [],
      lastQuery: "",
      runtime: null,
      ranAt: null,
      error: null
    };
  }
  return t.agentSearches[category][slotId];
}

// Build the per-category context payload for the agent.
// Returns { summary, prompt } — summary shown to user, prompt sent to Claude.
function buildAgentContext(t, category, slotId) {
  const prefs = t.preferences || {};
  if (category === "transport") {
    const leg = tripLegs(t).find(l => l.id === slotId);
    const filterSlot = ensureTransportSlot(t, slotId);
    const stops = filterSlot.stopFilters.length > 0 ? filterSlot.stopFilters.join("/") : "any";
    const summary = `${cityShort(leg.fromCity)} → ${cityShort(leg.toCity)} on ${formatDate(leg.date)}\n· Class: ${filterSlot.classFilter}\n· Stops: ${stops}\n· Window: ${filterSlot.window === 0 ? 'exact date' : '± ' + filterSlot.window + ' days'}`;
    const prompt = `Find the best 5-8 flight options for this trip:
- From: ${leg.fromCity}
- To: ${leg.toCity}
- Date: ${leg.date}${filterSlot.window > 0 ? ` (flexible ± ${filterSlot.window} days)` : ''}
- Class: ${filterSlot.classFilter}
- Stops preference: ${stops}

For each option, return: airline, flight number(s), departure time, arrival time (note +1 day if next-day arrival), total duration, number of stops, approximate price in USD, and where known the airline's official website URL.

Return results as a JSON array with this exact shape:
[{"airline":"...", "flightNum":"...", "depTime":"HH:MM", "arrTime":"HH:MM", "durationMin":420, "stops":0, "price":1247, "date":"YYYY-MM-DD", "website":"https://...", "why":"brief reason this fits"}]

Only return the JSON array, no other text.`;
    return { summary, prompt };
  }
  if (category === "stay") {
    const stay = (t.stays || []).find(s => s.id === slotId);
    const filterSlot = ensureStaySlot(t, slotId);
    const types = filterSlot.typeFilters.length > 0 ? filterSlot.typeFilters.join(", ") : "any type";
    const amenities = filterSlot.amenityFilters.length > 0 ? filterSlot.amenityFilters.join(", ") : "no specific";
    const nights = stay.checkIn && stay.checkOut ? Math.round((new Date(stay.checkOut + "T00:00:00") - new Date(stay.checkIn + "T00:00:00")) / 86400000) : 0;
    const summary = `${stay.city} · ${formatDate(stay.checkIn)} – ${formatDate(stay.checkOut)} (${nights} night${nights === 1 ? '' : 's'})\n· Type: ${types}\n· Amenities: ${amenities}`;
    const prompt = `Find the best 5-8 hotel/lodging options for this stay:
- City: ${stay.city}
- Check-in: ${stay.checkIn}
- Check-out: ${stay.checkOut} (${nights} nights)
- Property types preferred: ${types}
- Required amenities: ${amenities}

// Programmatic generators for cities not in the curated PLACES catalog.
// Use a stable seed-per-city so results are deterministic across renders (same city = same options).
function _seededShuffle(arr, seed) {
  let s = seed;
  const rng = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  return arr.map(x => ({ x, r: rng() })).sort((a, b) => a.r - b.r).map(o => o.x);
}
function _citySeed(city) {
  let h = 0;
  for (let i = 0; i < city.length; i++) h = (h * 31 + city.charCodeAt(i)) % 1000000;
  return h;
}

function generateGenericStays(city, count) {
  const seed = _citySeed(city);
  const types = ["Hotel", "Boutique", "Resort", "Apartment", "B&B"];
  const adjectives = ["Grand", "Royal", "Park", "Palace", "Plaza", "Garden", "Heritage", "Riverside", "Central", "Old Town"];
  const noun = ["Hotel", "Inn", "House", "Residence", "Suites", "Lodge"];
  const amenityPool = ["Pool", "Gym", "Breakfast", "Wifi", "Parking", "Spa", "Restaurant", "Bar", "Concierge"];
  const neighborhoods = [`Central ${city}`, `${city} Old Town`, "Downtown", `${city} Riverside`, `${city} Quarter`];

  const shuffledAdj = _seededShuffle(adjectives, seed);
  const shuffledNouns = _seededShuffle(noun, seed + 17);
  return Array.from({ length: count }, (_, i) => {
    const sd = seed + i * 13;
    return {
      name: `${shuffledAdj[i % shuffledAdj.length]} ${city} ${shuffledNouns[i % shuffledNouns.length]}`,
      neighborhood: neighborhoods[i % neighborhoods.length],
      type: types[(sd >> 1) % types.length],
      amenities: _seededShuffle(amenityPool, sd).slice(0, 3),
      pricePerNight: 130 + ((sd * 7) % 320),
      rating: parseFloat((4.0 + ((sd * 11) % 100) / 100).toFixed(1)),
      why: i === 0 ? "Top-rated for your dates" : (i === 1 ? "Great value pick" : "Walkable to main sights")
    };
  });
}

function generateGenericDining(city, count) {
  const seed = _citySeed(city) + 100;
  const cuisines = ["Italian", "French", "Japanese", "Mediterranean", "Steak", "Seafood", "Cafe", "Modern European"];
  const styles = ["Bistro", "Trattoria", "Brasserie", "Kitchen", "House", "Tavern", "Restaurant", "Osteria"];
  const namePool = ["The", "La", "Le", "Casa", "Old", "Little", "Maison", "Bella"];
  const tiers = ["$", "$$", "$$$", "$$$$"];
  const neighborhoods = [`Central ${city}`, `${city} Old Town`, "Downtown", `${city} Quarter`];

  return Array.from({ length: count }, (_, i) => {
    const sd = seed + i * 19;
    const namePart = namePool[(sd >> 2) % namePool.length];
    const stylePart = styles[(sd >> 1) % styles.length];
    return {
      name: `${namePart} ${city} ${stylePart}`,
      neighborhood: neighborhoods[i % neighborhoods.length],
      cuisine: cuisines[(sd * 3) % cuisines.length],
      priceTier: tiers[(sd >> 3) % tiers.length],
      rating: parseFloat((4.1 + ((sd * 13) % 90) / 100).toFixed(1)),
      why: i === 0 ? "Reservations recommended" : (i === 1 ? "Local favorite" : "Highly reviewed for cuisine")
    };
  });
}

function generateGenericSights(city, count) {
  const seed = _citySeed(city) + 200;
  const archetypes = [
    { suffix: "Museum", category: "Museums", time: "2-3 hours" },
    { suffix: "Cathedral", category: "Architecture", time: "1-2 hours" },
    { suffix: "Old Town", category: "History", time: "Half day" },
    { suffix: "Park", category: "Outdoors", time: "1-2 hours" },
    { suffix: "Castle", category: "History", time: "2-3 hours" },
    { suffix: "Market", category: "Food", time: "1-2 hours" },
    { suffix: "Square", category: "Architecture", time: "1 hour" },
    { suffix: "Gallery", category: "Art", time: "1-2 hours" }
  ];
  const neighborhoods = [`Central ${city}`, `${city} Old Town`, "Downtown", `${city} Riverside`];

  return Array.from({ length: count }, (_, i) => {
    const sd = seed + i * 23;
    const arche = archetypes[i % archetypes.length];
    return {
      name: `${city} ${arche.suffix}`,
      neighborhood: neighborhoods[i % neighborhoods.length],
      category: arche.category,
      timeNeeded: arche.time,
      rating: parseFloat((4.2 + ((sd * 7) % 80) / 100).toFixed(1)),
      why: i === 0 ? "Must-see for your interests" : (i === 1 ? "Local favorite" : "Highly rated and walkable")
    };
  });
}

// === LIVE MODE — real Claude API call with web search ===
async function callClaudeAgent(prompt) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 2000,
      messages: [{ role: "user", content: prompt }],
      tools: [{ type: "web_search_20250305", name: "web_search" }]
    })
  });
  if (!response.ok) {
    throw new Error(`API returned ${response.status}`);
  }
  const data = await response.json();
  // Concatenate text blocks, ignore tool_use blocks
  const text = (data.content || [])
    .filter(b => b.type === "text")
    .map(b => b.text)
    .join("\n");
  // Parse JSON from response (strip markdown fences if present)
  const cleaned = text.replace(/```json\s*|\s*```/g, "").trim();
  // Find the JSON array (response sometimes has prose before/after)
  const jsonMatch = cleaned.match(/\[[\s\S]*\]/);
  if (!jsonMatch) {
    throw new Error("Could not parse agent response");
  }
  return JSON.parse(jsonMatch[0]);
}

// === MAIN ENTRY: run an agent search for a slot ===
async function runAgentSearch(category, slotId) {
  const t = currentTrip();
  const state = getAgentState(t, category, slotId);
  const ctx = buildAgentContext(t, category, slotId);
  const runtime = userSettings.agentMode || "demo";

  state.status = "searching";
  state.runtime = runtime;
  state.lastQuery = ctx.summary;
  state.error = null;
  render();

  try {
    let results;
    if (runtime === "demo") {
      // Brief artificial delay so the UX feels right
      await new Promise(r => setTimeout(r, 1200));
      results = generateMockAgentResults(t, category, slotId);
    } else {
      results = await callClaudeAgent(ctx.prompt);
    }
    state.results = results;
    state.status = "results";
    state.ranAt = Date.now();
    persist();
    showToast(runtime === "live" ? "Agent found options" : "Demo results loaded");
  } catch (err) {
    console.error("Agent search failed:", err);
    state.status = "error";
    state.error = err.message || "Search failed";
  }
  render();
}

function clearAgentSearch(category, slotId) {
  const t = currentTrip();
  const state = getAgentState(t, category, slotId);
  state.status = "idle";
  state.results = [];
  state.error = null;
  persist();
  render();
}

// Convert an agent result into the user's selection (using the existing select* functions)
function selectFromAgentResult(category, slotId, result, index) {
  const t = currentTrip();
  if (category === "transport") {
    const slot = ensureTransportSlot(t, slotId);
    // Stash the agent result as a "virtual selection" — we don't have a real ID for it
    const virtualId = `agent-${slotId}-${index}`;
    if (!slot.agentSelections) slot.agentSelections = {};
    slot.agentSelections[virtualId] = result;
    slot.selectedOptionId = virtualId;
    // Save a snapshot for the rebook banner + future date-change matching
    slot.selectedSnapshot = {
      airline: result.airline || null,
      airlineCode: result.airlineCode || null,
      stops: result.stops != null ? result.stops : null,
      depTime: result.depTime || null,
      flightNum: result.flightNum || null
    };
    if (slot.autoSuggested) slot.autoSuggested = false;
    // User has explicitly selected — clear any pending rebook flag for this leg
    clearRebookFlag(t, "transport", slotId);
    persist();

    // Round-trip auto-fill: if this was the outbound, populate the return leg.
    // The agent result object has the same shape we need (airline, etc.).
    const autoFilled = applyRoundTripAutoFill(t, slotId, result);
    if (autoFilled) persist();

    fetchReferenceDocs("transport", slotId, result);

    if (autoFilled) {
      showToast("Round-trip return auto-selected — tap to review");
    }
    // Stay on the page so the user can review or change their pick. They
    // explicitly tap "Done with Transport" at the bottom when finished.
    render();
    return;
  }
  if (category === "stay") {
    const slot = ensureStaySlot(t, slotId);
    const virtualId = `agent-${slotId}-${index}`;
    if (!slot.agentSelections) slot.agentSelections = {};
    slot.agentSelections[virtualId] = result;
    slot.selectedOptionId = virtualId;
    // Save a snapshot so rebook banner can show the hotel name
    slot.selectedSnapshot = {
      name: result.name || "Hotel",
      neighborhood: result.neighborhood || result.address || "",
      rating: result.rating || null
    };
    // User has explicitly selected — clear any pending rebook flag for this stay
    clearRebookFlag(t, "stay", slotId);
    persist();
    fetchReferenceDocs("stay", slotId, result);
    // Stay on the page after selection — user explicitly taps "Done with
    // Stay" at the bottom when finished.
    render();
    return;
  }
  // dining / sights are multi-select shortlists — no auto-fetch (would be spammy)
  const slot = category === "dining" ? ensureDiningSlot(t, slotId) : ensureSightsSlot(t, slotId);
  const virtualId = `agent-${slotId}-${index}`;
  if (!slot.agentSelections) slot.agentSelections = {};
  slot.agentSelections[virtualId] = result;
  if (!slot.selectedIds.includes(virtualId)) slot.selectedIds.push(virtualId);
  persist();
  render();
}

// Render the "+ Add your own X" row to be placed right after filters on each detail page.
// Same visual design across all 4 categories — different label per category.
function renderAddOwnRow(category, slotId) {
  const labels = {
    transport: "Add your own transport",
    stay: "Add your own hotel or place",
    dining: "Add your own restaurant",
    sights: "Add your own sight"
  };
  return `
    <div class="sel-add-own-row" onclick="openAddCustomItem('${category}', '${slotId}')">
      <span class="sel-add-own-icon">+</span>
      <span class="sel-add-own-text">${labels[category]}</span>
    </div>
  `;
}

// Dispatcher — opens the right form per category. Dining/sights reuse the existing
// openAddCustomPlace flow. Transport and stay get their own forms.
function openAddCustomItem(category, slotId) {
  const t = currentTrip();
  if (category === "dining" || category === "sights") {
    const stay = (t.stays || []).find(s => s.id === slotId);
    if (!stay) return;
    openAddCustomPlace(stay.city, category);
    return;
  }
  if (category === "transport") {
    openAddCustomTransport(slotId);
    return;
  }
  if (category === "stay") {
    openAddCustomStay(slotId);
    return;
  }
}

function renderAgentSection(category, slotId) {
  const t = currentTrip();
  const state = getAgentState(t, category, slotId);
  const isDemo = (userSettings.agentMode || "demo") === "demo";

  // Idle: small centered button with mode badge. No redundant preference summary —
  // the filters above already show the user's choices.
  if (state.status === "idle") {
    return `
      <div class="agent-section idle">
        <div class="agent-cta">
          <span class="btn btn-primary btn-small agent-find-btn" onclick="runAgentSearch('${category}', '${slotId}')">
            ✨ Find options
          </span>
          ${isDemo ? '<span class="agent-mode-badge">DEMO</span>' : '<span class="agent-mode-badge live">LIVE</span>'}
        </div>
      </div>
    `;
  }

  if (state.status === "searching") {
    return `
      <div class="agent-section searching">
        <div class="agent-searching">
          <div class="agent-spinner"></div>
          <div class="agent-search-msg">${state.runtime === "demo" ? "Loading demo results..." : "Searching the web..."}</div>
        </div>
      </div>
    `;
  }

  if (state.status === "error") {
    return `
      <div class="agent-section error">
        <div class="agent-error">
          <strong>Search failed:</strong> ${state.error || "Unknown error"}
          <div style="margin-top:8px; text-align:center;">
            <span class="btn btn-small" onclick="clearAgentSearch('${category}', '${slotId}')">Reset</span>
            <span class="btn btn-primary btn-small" onclick="runAgentSearch('${category}', '${slotId}')">Try again</span>
          </div>
        </div>
      </div>
    `;
  }

  if (state.status === "results") {
    return `
      <div class="agent-section results">
        <div class="agent-results-meta">
          <span class="agent-icon">✨</span>
          ${state.results.length} suggestion${state.results.length === 1 ? '' : 's'} added
          · ${state.runtime === "demo" ? "Demo" : "Live"}
          · ${new Date(state.ranAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
          <span class="agent-rerun" onclick="runAgentSearch('${category}', '${slotId}')">↻ Refresh</span>
          <span class="agent-rerun" onclick="clearAgentSearch('${category}', '${slotId}')" style="margin-left:8px;">× Clear</span>
        </div>
      </div>
    `;
  }

  return "";
}

[{"title":"...", "source":"...", "url":"https://...", "summary":"..."}]`;

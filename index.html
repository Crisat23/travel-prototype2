function findPlace(placeId) {
  // If this looks like a sample id (sample-{cat}-{city}-{idx}), make sure
  // that city's procedural bucket is generated so the lookup can succeed
  // even on a cold path (e.g. clicking a saved sample selection on a fresh
  // app load before the Map has rendered for that city).
  if (typeof placeId === "string" && placeId.startsWith("sample-")) {
    const m = placeId.match(/^sample-(stay|dining|sights)-(.+)-\d+$/);
    if (m) {
      const cityFromId = m[2].replace(/_/g, " ");
      ensureCityPlaces(cityFromId);
    }
  }
  // Check curated catalog (and any procedurally-filled buckets)
  for (const city of Object.values(PLACES)) {
    for (const cat of Object.values(city)) {
      const found = cat.find(p => p.id === placeId);
      if (found) return found;
    }
  }
  // Then check user's custom places
  const custom = (userSettings.customPlaces || []).find(p => p.id === placeId);
  if (custom) return custom;
  // Then check agent results stashed on any trip's selections. Lets the
  // Details modal work for AI-found hotels/restaurants/sights even though
  // they aren't in the curated PLACES catalog.
  for (const trip of trips) {
    if (!trip.selections) continue;
    for (const cat of ["stay", "dining", "sights"]) {
      const slots = trip.selections[cat] || {};
      for (const slot of Object.values(slots)) {
        if (slot?.agentSelections?.[placeId]) {
          const ag = slot.agentSelections[placeId];
          // Synthesize a place-shaped object from the agent result so the
          // Details modal can render it.
          return {
            id: placeId,
            cat,
            name: ag.name || "Place",
            meta: ag.neighborhood || ag.cuisine || ag.type || "",
            rating: ag.rating || null,
            reviews: 0,
            tags: [ag.cuisine, ag.type, ag.priceTier, ...(ag.amenities || [])].filter(Boolean),
            address: ag.neighborhood || "",
            website: ag.website || null,
            _isAgent: true,
            why: ag.why || null
          };
        }
      }
    }
  }
  return null;
}

function showDayPicker(placeId) {
  const menu = document.getElementById("day-menu");
  if (!menu) return;
  const t = currentTrip();
  const p = findPlace(placeId);
  const fmtDate = (d) => new Date(d + "T00:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
  const getDates = () => {
    const dates = []; let d = new Date(t.originDate + "T00:00:00"); const end = new Date(t.returnDate + "T00:00:00");
    while (d <= end) { dates.push(toLocalDateStr(d)); d.setDate(d.getDate() + 1); }
    return dates;
  };
  const dates = getDates();
  const cityForDate = (date) => {
    const stay = t.stays.find(s => date >= s.checkIn && date < s.checkOut);
    if (stay) return stay.city;
    return null;
  };
  menu.innerHTML = dates.map(date => {
    const dayCity = cityForDate(date);
    // city-matching: the place belongs to one of our known cities
    let mismatch = false;
    if (dayCity) {
      // Look up which city this place belongs to
      for (const [cityName, cats] of Object.entries(PLACES)) {
        if (Object.values(cats).some(catArr => catArr.find(x => x.id === p.id))) {
          if (cityName !== dayCity) mismatch = true;
          break;
        }
      }
    }
    return `
      <div class="day-menu-item ${mismatch ? 'mismatch' : ''}" onclick="addToDay('${placeId}', '${date}', ${mismatch})">
        <span>${fmtDate(date)}${dayCity ? ` <span style="color:var(--text-tertiary)">· ${dayCity}</span>` : ''}</span>
        ${mismatch ? '<span style="font-size:10px; color:var(--text-danger);">Different city</span>' : ''}
      </div>
    `;
  }).join("");
  menu.classList.add("active");
  // Close on outside click
  setTimeout(() => {
    const handler = (e) => {
      if (!menu.contains(e.target)) {
        menu.classList.remove("active");
        document.removeEventListener("click", handler);
      }
    };
    document.addEventListener("click", handler);
  }, 10);
}

async function addToDay(placeId, date, isMismatch) {
  if (isMismatch) {
    const ok = await confirmDialog({
      title: "Add to a different city?",
      message: "This place is in a different city than this day. You can add it anyway, but it'll be flagged as mismatched.",
      confirmLabel: "Add anyway"
    });
    if (!ok) {
      document.getElementById("day-menu")?.classList.remove("active");
      return;
    }
  }
  const t = currentTrip();
  const p = findPlace(placeId);
  if (!p) return;
  if (!t.dayItems[date]) t.dayItems[date] = [];
  // No duplicates
  if (t.dayItems[date].some(i => i.placeId === placeId)) {
    showToast("Already added to this day");
    document.getElementById("day-menu")?.classList.remove("active");
    return;
  }
  t.dayItems[date].push({
    id: "di-" + Date.now(),
    category: p.cat,
    placeId: p.id,
    name: p.name,
    sub: p.meta,
    time: ""
  });
  document.getElementById("day-menu")?.classList.remove("active");
  closeModal();
  showToast("Added");
  persist();
  render();
}

/* ============================================================
   TOAST
   ============================================================ */

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove("show"), 1800);
}

/* ============================================================
   ASSISTANT (Day 16)
   ============================================================
   Conversational helper. Floats in the bottom-right; opens a sheet
   panel where the user can type or speak commands. The assistant:

   - Knows where the user is (app.tab, currentTrip()) and customizes
     the greeting + chip suggestions accordingly.
   - Recognizes intents via pattern matching with synonyms. The
     intent router lives in assistantHandleUserMessage(); each intent
     navigates the app (switchTab, openSelectionFor, etc.) and replies.
   - Falls back to a "I'm not sure how to help with that" with helpful
     chips so the user is never stuck.
   - Voice via Web Speech API where supported (Chrome/Safari/Edge).
     Falls back to text-only with a disabled mic on browsers like
     Firefox where SpeechRecognition isn't available.

   Design choice: this is intentionally pattern-based, NOT LLM-backed.
   That keeps it free, fast, and offline-capable. The intent registry
   below is the easiest place to expand vocabulary as you learn what
   users actually type.
*/

// Session state (resets on reload — by design for now)
const assistantState = {
  open: false,
  messages: [],          // {role: "user"|"bot", text: string, chips?: string[]}
  listening: false,
  recognition: null,     // SpeechRecognition instance, lazily created
  hasGreeted: false      // first-open vs subsequent-open
};

// Detect Web Speech API support. webkitSpeechRecognition is the
// prefixed name on Safari/Chrome; SpeechRecognition is the standard.
function getSpeechRecognitionCtor() {
  if (typeof window === "undefined") return null;
  return window.SpeechRecognition || window.webkitSpeechRecognition || null;
}

// ---- Open / close lifecycle ---------------------------------------------

function openAssistant() {
  const backdrop = document.getElementById("assist-backdrop");
  if (!backdrop) return;
  backdrop.classList.add("active");
  assistantState.open = true;

  // First time: post a context-aware greeting. Subsequent opens just
  // resume the existing conversation.
  if (!assistantState.hasGreeted) {
    assistantState.hasGreeted = true;
    postAssistantGreeting();
  } else {
    // Refresh the subtitle in case context changed (different tab, etc.)
    updateAssistantSubtitle();
  }

  renderAssistantBody();
  // Focus the input after the slide-up animation settles
  setTimeout(() => {
    const inp = document.getElementById("assist-input");
    if (inp) inp.focus();
  }, 280);

  // Clear the pulsing nudge — they found it
  document.getElementById("fab-assist")?.classList.remove("pulse");
}

function closeAssistant() {
  const backdrop = document.getElementById("assist-backdrop");
  if (!backdrop) return;
  backdrop.classList.remove("active");
  assistantState.open = false;
  // Stop voice if it was active
  if (assistantState.listening) stopAssistantListening();
}

// Backdrop click outside the sheet also closes
function closeAssistantBackdrop(e) {
  if (e.target.id === "assist-backdrop") closeAssistant();
}

// ---- Context detection: what is the user looking at? -------------------

function getAssistantContext() {
  const t = (typeof currentTrip === "function") ? currentTrip() : null;
  const tab = (typeof app !== "undefined") ? app.tab : null;
  return {
    hasTrip: !!t,
    tripName: t ? (t.name || "your trip") : null,
    primaryCity: t?.stays?.[0]?.city || null,
    tab,
    selectionCategory: app?.selectionCategory || null
  };
}

function updateAssistantSubtitle() {
  const sub = document.getElementById("assist-subtitle");
  if (!sub) return;
  const ctx = getAssistantContext();
  let text = "Ready to help";
  if (!ctx.hasTrip) text = "No trip open";
  else if (ctx.tab === "plan") text = `Planning ${ctx.tripName}`;
  else if (ctx.tab === "itinerary") text = `Itinerary · ${ctx.tripName}`;
  else if (ctx.tab === "map") text = `Map · ${ctx.tripName}`;
  sub.textContent = text;
}

// ---- Greeting and message posting --------------------------------------

function postAssistantGreeting() {
  const ctx = getAssistantContext();
  let text, chips;
  if (!ctx.hasTrip) {
    text = "Hi! I can help you plan a new trip or explore options. Where would you like to start?";
    chips = ["New trip", "Pick a destination", "Help me decide"];
  } else if (ctx.tab === "plan") {
    text = `You're planning ${ctx.tripName}. Want me to help with a specific part?`;
    chips = ["Stay", "Dining", "Sights", "Transport", "Dates"];
  } else if (ctx.tab === "itinerary") {
    text = "I can help you adjust your itinerary. What's on your mind?";
    chips = ["Move to Plan", "Add to a day", "Show map"];
  } else if (ctx.tab === "map") {
    text = "You're on the map. I can navigate you elsewhere or help refine what's shown.";
    chips = ["Open Plan", "Open Itinerary", "Filter pins"];
  } else {
    text = "Hi! What would you like to do?";
    chips = ["See my trips", "New trip", "Settings"];
  }
  pushAssistantMessage("bot", text, chips);
  updateAssistantSubtitle();
}

function pushAssistantMessage(role, text, chips) {
  assistantState.messages.push({ role, text, chips });
  renderAssistantBody();
}

// ---- Body rendering ----------------------------------------------------

function renderAssistantBody() {
  const body = document.getElementById("assist-body");
  if (!body) return;
  body.innerHTML = assistantState.messages.map(m => {
    const msgHTML = `<div class="assist-msg from-${m.role === "user" ? "user" : "bot"}">${escapeHtml(m.text)}</div>`;
    if (m.role === "bot" && Array.isArray(m.chips) && m.chips.length > 0) {
      const chipsHTML = `<div class="assist-chips">${m.chips.map(c =>
        `<span class="assist-chip" onclick="onAssistantChipClick(${JSON.stringify(c).replace(/"/g, '&quot;')})">${escapeHtml(c)}</span>`
      ).join("")}</div>`;
      return msgHTML + chipsHTML;
    }
    return msgHTML;
  }).join("");
  // Scroll to bottom so the latest message is always visible
  body.scrollTop = body.scrollHeight;
}

function onAssistantChipClick(text) {
  // Chip tap is equivalent to typing + sending that text
  assistantHandleUserMessage(text);
}

// ---- Input handling ----------------------------------------------------

function resizeAssistantInput(el) {
  el.style.height = "auto";
  el.style.height = Math.min(110, el.scrollHeight) + "px";
}

function updateAssistantSendBtn() {
  const inp = document.getElementById("assist-input");
  const btn = document.getElementById("assist-send");
  if (!inp || !btn) return;
  btn.classList.toggle("disabled", inp.value.trim().length === 0);
}

function handleAssistantKeydown(e) {
  // Enter sends, Shift+Enter inserts newline (standard chat ergonomics)
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendAssistantInput();
  }
}

function sendAssistantInput() {
  const inp = document.getElementById("assist-input");
  if (!inp) return;
  const text = inp.value.trim();
  if (!text) return;
  inp.value = "";
  resizeAssistantInput(inp);
  updateAssistantSendBtn();
  assistantHandleUserMessage(text);
}

// ---- Voice (Web Speech API) --------------------------------------------

function toggleAssistantMic() {
  const Ctor = getSpeechRecognitionCtor();
  if (!Ctor) {
    showToast("Voice input not supported on this browser");
    return;
  }
  if (assistantState.listening) {
    stopAssistantListening();
  } else {
    startAssistantListening();
  }
}

function startAssistantListening() {
  const Ctor = getSpeechRecognitionCtor();
  if (!Ctor) return;
  const rec = new Ctor();
  rec.lang = navigator.language || "en-US";
  rec.interimResults = true;
  rec.continuous = false;

  rec.onstart = () => {
    assistantState.listening = true;
    document.getElementById("assist-mic")?.classList.add("listening");
    const sub = document.getElementById("assist-subtitle");
    if (sub) sub.textContent = "Listening…";
  };
  rec.onresult = (e) => {
    // Build the transcript from all results so far; interim results give
    // the user live feedback in the input box.
    let transcript = "";
    for (let i = 0; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
    }
    const inp = document.getElementById("assist-input");
    if (inp) {
      inp.value = transcript;
      resizeAssistantInput(inp);
      updateAssistantSendBtn();
    }
  };
  rec.onerror = (e) => {
    console.warn("Speech recognition error:", e.error);
    stopAssistantListening();
    if (e.error === "not-allowed") {
      showToast("Microphone permission denied");
    } else if (e.error === "no-speech") {
      // Silent fail — user just didn't speak
    } else {
      showToast("Voice error: " + e.error);
    }
  };
  rec.onend = () => {
    // Auto-send the final transcript if we got one and it looks like
    // a real utterance (not just whitespace). This is the "tap mic, say
    // thing, done" flow most users expect.
    const inp = document.getElementById("assist-input");
    const finalText = (inp?.value || "").trim();
    stopAssistantListening();
    if (finalText.length > 0) {
      // Small delay so the user sees their words land before send
      setTimeout(() => {
        if (inp && inp.value.trim() === finalText) {
          sendAssistantInput();
        }
      }, 200);
    }
  };

  try {
    rec.start();
    assistantState.recognition = rec;
  } catch (e) {
    console.warn("Couldn't start speech recognition:", e);
    stopAssistantListening();
  }
}

function stopAssistantListening() {
  if (assistantState.recognition) {
    try { assistantState.recognition.stop(); } catch (e) { /* already stopped */ }
    assistantState.recognition = null;
  }
  assistantState.listening = false;
  document.getElementById("assist-mic")?.classList.remove("listening");
  updateAssistantSubtitle();
}

// ---- Intent router -----------------------------------------------------
// Each intent has:
//   name:     short id (for logging/debugging)
//   match:    function(text) → boolean  (text is already lowercased + trimmed)
//   handle:   function(text) → { reply: string, chips?: string[], action?: () => void }
//
// Intents are tried in order; first match wins. Add more by appending to
// this array — no other wiring needed.
const ASSIST_INTENTS = [
  // --- Greetings / pleasantries -----------------------------------------
  {
    name: "greeting",
    match: t => /^(hi|hello|hey|howdy|yo|hola)\b/.test(t),
    handle: () => {
      const ctx = getAssistantContext();
      const greeting = ctx.hasTrip
        ? `Hi! How can I help with ${ctx.tripName}?`
        : "Hi there! Want to start a new trip or explore something?";
      return {
        reply: greeting,
        chips: ctx.hasTrip ? ["Stay", "Dining", "Sights", "Transport"] : ["New trip", "Help me decide"]
      };
    }
  },
  {
    name: "thanks",
    match: t => /^(thanks|thank you|thx|ty|appreciate)\b/.test(t),
    handle: () => ({ reply: "You're welcome! Anything else?" })
  },
  // --- Trip lifecycle ---------------------------------------------------
  {
    name: "new_trip",
    match: t => /\b(new trip|start.*trip|plan.*trip|create.*trip)\b/.test(t),
    handle: () => ({
      reply: "Opening the new trip dialog.",
      action: () => { if (typeof openNewTrip === "function") openNewTrip(); closeAssistant(); }
    })
  },
  {
    name: "see_trips",
    match: t => /\b(my trips|see.*trips|show.*trips|trip list)\b/.test(t),
    handle: () => ({
      reply: "Heading to your trips list.",
      action: () => {
        if (typeof app !== "undefined") {
          app.tab = "home";
          app.tripId = null;
        }
        if (typeof render === "function") render();
        closeAssistant();
      }
    })
  },
  // --- Tab navigation (within a trip) -----------------------------------
  {
    name: "open_plan",
    match: t => /\b(plan|planning)\b/.test(t) && !/\b(don't|stop|cancel)\b/.test(t),
    handle: () => {
      const ctx = getAssistantContext();
      if (!ctx.hasTrip) {
        return { reply: "Open a trip first — I can take you to your trips list.", chips: ["See my trips", "New trip"] };
      }
      return {
        reply: "Opening Plan.",
        action: () => { if (typeof switchTab === "function") switchTab("plan"); closeAssistant(); }
      };
    }
  },
  {
    name: "open_itinerary",
    match: t => /\b(itinerary|schedule|days|day plan)\b/.test(t),
    handle: () => {
      const ctx = getAssistantContext();
      if (!ctx.hasTrip) {
        return { reply: "Open a trip first to see its itinerary.", chips: ["See my trips", "New trip"] };
      }
      return {
        reply: "Opening Itinerary.",
        action: () => { if (typeof switchTab === "function") switchTab("itinerary"); closeAssistant(); }
      };
    }
  },
  {
    name: "open_map",
    match: t => /\b(map|show.*map|on.*map)\b/.test(t),
    handle: () => {
      const ctx = getAssistantContext();
      if (!ctx.hasTrip) {
        return { reply: "Map needs an open trip first.", chips: ["See my trips", "New trip"] };
      }
      return {
        reply: "Opening Map.",
        action: () => { if (typeof switchTab === "function") switchTab("map"); closeAssistant(); }
      };
    }
  },
  // --- Plan sub-categories ----------------------------------------------
  {
    name: "stay",
    match: t => /\b(stay|hotel|hotels|lodging|accommodation|where.*sleep)\b/.test(t),
    handle: () => routeToSelection("stay")
  },
  {
    name: "dining",
    match: t => /\b(dining|restaurant|restaurants|eat|food|cuisine|where.*eat)\b/.test(t),
    handle: () => routeToSelection("dining")
  },
  {
    name: "sights",
    match: t => /\b(sights|sight|attraction|attractions|things to do|see|museum|landmark)\b/.test(t),
    handle: () => routeToSelection("sights")
  },
  {
    name: "transport",
    match: t => /\b(transport|transit|flight|flights|train|trains|getting there|getting around)\b/.test(t),
    handle: () => {
      const ctx = getAssistantContext();
      if (!ctx.hasTrip) {
        return { reply: "Open a trip first so I know which leg you mean.", chips: ["See my trips", "New trip"] };
      }
      return {
        reply: "Heading to Plan — you'll find transport options there.",
        action: () => { if (typeof switchTab === "function") switchTab("plan"); closeAssistant(); }
      };
    }
  },
  {
    name: "dates",
    match: t => /\b(dates|change.*date|edit.*date|when|reschedule trip)\b/.test(t),
    handle: () => {
      const ctx = getAssistantContext();
      if (!ctx.hasTrip) {
        return { reply: "Start a trip first — I can open the new-trip dialog.", chips: ["New trip"] };
      }
      return {
        reply: "Opening the trip editor where you can adjust dates.",
        action: () => {
          const t = currentTrip();
          if (t && typeof openNewTrip === "function") openNewTrip(t);
          closeAssistant();
        }
      };
    }
  },
  // --- Settings ---------------------------------------------------------
  {
    name: "settings",
    match: t => /\b(settings|preferences|profile|account)\b/.test(t),
    handle: () => ({
      reply: "Opening Settings.",
      action: () => {
        if (typeof app !== "undefined") app.screen = "settings";
        if (typeof render === "function") render();
        closeAssistant();
      }
    })
  },
  // --- Capability + help -------------------------------------------------
  {
    name: "what_can_you_do",
    match: t => /\b(what.*can.*you.*do|help|capabilities|commands|guide)\b/.test(t),
    handle: () => ({
      reply: "I can navigate the app for you, jump to planning sections, start trips, or open settings. Try any of these:",
      chips: ["New trip", "Stay", "Dining", "Sights", "Map", "Settings"]
    })
  },
  // --- Help me decide (open-ended planning) ------------------------------
  {
    name: "help_decide",
    match: t => /\b(help.*decide|surprise|recommend|suggest|inspire|don't know)\b/.test(t),
    handle: () => ({
      reply: "I'd love to. For now I can route you around the app — for personalized suggestions powered by AI, that's coming soon. Want to start with a destination, or browse existing trips?",
      chips: ["Pick a destination", "See my trips", "New trip"]
    })
  },
  {
    name: "pick_destination",
    match: t => /\b(pick.*destination|choose.*destination|where.*go|destination)\b/.test(t),
    handle: () => ({
      reply: "Opening the new trip dialog — type any city and I'll suggest matches as you go.",
      action: () => { if (typeof openNewTrip === "function") openNewTrip(); closeAssistant(); }
    })
  }
];

// Shared helper: route the user to a specific selection page (Stay/Dining/Sights).
// Falls back to the Plan tab when no trip is open or no stay exists yet.
function routeToSelection(cat) {
  const ctx = getAssistantContext();
  if (!ctx.hasTrip) {
    return {
      reply: `To browse ${cat} options, you'll need an open trip first.`,
      chips: ["See my trips", "New trip"]
    };
  }
  const t = currentTrip();
  const firstStay = (t.stays || [])[0];
  if (!firstStay) {
    return {
      reply: `This trip has no city set yet. Edit the trip to add one.`,
      action: () => { if (t && typeof openNewTrip === "function") openNewTrip(t); closeAssistant(); }
    };
  }
  const labelMap = { stay: "Stay", dining: "Dining", sights: "Sights" };
  return {
    reply: `Opening ${labelMap[cat]} for ${firstStay.city}.`,
    action: () => {
      if (typeof app !== "undefined") {
        app.tab = "plan";
        app.selectionCategory = cat;
        app.selectionSlotId = firstStay.id;
      }
      if (typeof render === "function") render();
      closeAssistant();
    }
  };
}

// ---- The main handler ---------------------------------------------------

function assistantHandleUserMessage(rawText) {
  const text = String(rawText || "").trim();
  if (!text) return;

  // Echo the user's message into the conversation
  pushAssistantMessage("user", text);

  // Brief typing indicator so it feels responsive, then route the intent.
  // The typing indicator is rendered manually and replaced when the bot
  // reply lands.
  const body = document.getElementById("assist-body");
  if (body) {
    const typing = document.createElement("div");
    typing.className = "assist-typing";
    typing.id = "_assist-typing";
    typing.innerHTML = "<span></span><span></span><span></span>";
    body.appendChild(typing);
    body.scrollTop = body.scrollHeight;
  }

  // 300ms feels alive without feeling sluggish. Actual intent matching is
  // synchronous and trivial — the delay is purely UX.
  setTimeout(() => {
    document.getElementById("_assist-typing")?.remove();

    const lower = text.toLowerCase();
    const hit = ASSIST_INTENTS.find(intent => {
      try { return intent.match(lower); } catch (e) { return false; }
    });

    let result;
    if (hit) {
      try { result = hit.handle(text); }
      catch (e) {
        console.warn("Intent handler crashed:", hit.name, e);
        result = { reply: "Hmm, something went wrong handling that. Try a different phrasing?" };
      }
    } else {
      result = {
        reply: "I didn't catch that. I can navigate the app — try one of these:",
        chips: ["Stay", "Dining", "Sights", "Map", "New trip", "Help"]
      };
    }

    pushAssistantMessage("bot", result.reply, result.chips);

    // Action runs AFTER the reply is shown so the user sees the
    // assistant's confirmation before the screen changes.
    if (typeof result.action === "function") {
      setTimeout(() => {
        try { result.action(); }
        catch (e) { console.warn("Intent action crashed:", hit?.name, e); }
      }, 350);
    }
  }, 300);
}

// ---- Mic availability check on load -------------------------------------
function _assistantInitOnce() {
  const mic = document.getElementById("assist-mic");
  if (mic && !getSpeechRecognitionCtor()) {
    mic.classList.add("unavailable");
    mic.title = "Voice input not supported on this browser";
  }
  // Gentle pulse on first session to draw attention to the helper.
  // Wears off after the user opens the assistant (cleared in openAssistant)
  // or after the animation completes (3 iterations).
  const fab = document.getElementById("fab-assist");
  if (fab) fab.classList.add("pulse");
}

/* ============================================================
   INIT
   ============================================================ */

loadFromStorage();
migrateLegacyLoyaltyToPrimary();
render();
_assistantInitOnce();
</script>
